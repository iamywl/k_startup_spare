<script>
// ===================== 상수·시드 =====================
const KEY = 'cdp_v3_state_1';
const BRANDS = [
  { id:'mood', name:'오늘의 무드', industry:'패션' },
  { id:'beanly', name:'Beanly Coffee', industry:'F&B' },
  { id:'cleanwave', name:'Cleanwave', industry:'생활' },
];
// 매체 5종 — OAuth 연동 대상
const seedSpend = ()=>([
  { name:'네이버검색', provider:'naver',  color:'#03c75a', cost:38_200_000, oauth:false },
  { name:'카카오모먼트', provider:'kakao', color:'#f7c700', cost:21_500_000, oauth:false },
  { name:'메타IG',     provider:'meta',  color:'#1877f2', cost:32_700_000, oauth:false },
  { name:'구글PMax',   provider:'google',color:'#ea4335', cost:18_600_000, oauth:false },
  { name:'쿠팡애즈',    provider:'coupang',color:'#e60012', cost:8_840_000,  oauth:false },
]);
const seedJourneys = ()=>{
  const weighted=[]; const chanWeight={ '네이버검색':30,'메타IG':24,'카카오모먼트':14,'구글PMax':16,'쿠팡애즈':9,organic:11,direct:11 };
  for (const [c,n] of Object.entries(chanWeight)) for (let i=0;i<n;i++) weighted.push(c);
  const convBoost={ '네이버검색':0.26,'구글PMax':0.30,'메타IG':0.10,'쿠팡애즈':0.20,'카카오모먼트':0.06,organic:0.04,direct:0.04 };
  const pick=()=>weighted[Math.floor(Math.random()*weighted.length)];
  const out=[]; for (let i=0;i<3600;i++){ const len=1+Math.floor(Math.random()*4); const seq=[]; for (let k=0;k<len;k++) seq.push(pick()); const boost=seq.reduce((s,c)=>Math.max(s,convBoost[c]||0),0); const conv = Math.random() < (0.30 + boost); out.push({id:i,seq,converted:conv,value:conv?115_000+Math.round(Math.random()*160_000):0,day:Math.floor(Math.random()*30),user:'u'+Math.floor(Math.random()*400),segment:['신규','재구매','VIP','이탈위험'][Math.floor(Math.random()*4)]}); } return out;
};
// 역할 3종 — 권한 분기
const ROLES = {
  owner:    { label:'오너 (Owner)',     can:{ view:true, oauth:true, budget:true, schedule:true, anomaly:true, audit:true, members:true } },
  marketer: { label:'마케터 (Marketer)', can:{ view:true, oauth:true, budget:true, schedule:true, anomaly:true, audit:false, members:false } },
  viewer:   { label:'뷰어 (Viewer)',     can:{ view:true, oauth:false, budget:false, schedule:false, anomaly:true, audit:false, members:false } },
};
const seedMembers = ()=>([
  { email:'owner@demo.kr',    role:'owner',    name:'데모 오너' },
  { email:'marketer@demo.kr', role:'marketer', name:'데모 마케터' },
  { email:'viewer@demo.kr',   role:'viewer',   name:'데모 뷰어' },
]);

let state = JSON.parse(localStorage.getItem(KEY) || 'null');
if (!state) {
  state = {
    brand:'mood', view:'dashboard', model:'last_click', role:'owner',
    segments:{}, schedule:null, sendLog:[], reportRuns:[], webhookEvents:[], audit:[], anomalies:null,
    members: seedMembers(),
    brands: Object.fromEntries(BRANDS.map(b=>[b.id, { spend:seedSpend(), journeys:seedJourneys() }])),
  };
  persist();
}
['sendLog','reportRuns','webhookEvents','audit'].forEach(k=>{ if(!state[k]) state[k]=[]; });
if (!state.members) state.members = seedMembers();
function persist(){ localStorage.setItem(KEY, JSON.stringify(state)); }
const cur = ()=>state.brands[state.brand];
const role = ()=>ROLES[state.role];
const can = (k)=>!!role().can[k];

// ===================== 감사 로그 =====================
function audit(action, detail){
  const now = new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const actor = (state.members.find(m=>m.role===state.role)||{}).email || state.role;
  state.audit = (state.audit||[]).concat([{ at:now, actor, role:ROLES[state.role].label, brand:BRANDS.find(b=>b.id===state.brand).name, action, detail }]);
  persist();
}
function denied(){ toast('지금 역할('+role().label+')로는 이 작업을 할 수 없어요. 오너 권한이 필요해요'); }

// ===================== URL state =====================
function restoreFromUrl(){
  const h = location.hash.replace(/^#/,''); if (!h) return false;
  const [view, qs] = h.split('?');
  const valid = NAV.map(n=>n[0]);
  let changed = false;
  if (view && valid.includes(view)) { state.view = view; changed = true; }
  if (qs){ const p = new URLSearchParams(qs);
    const m = p.get('model'); if (m && ['last_click','first_click','linear','time_decay','markov','shapley'].includes(m)) { state.model = m; changed = true; }
    const b = p.get('brand'); if (b && BRANDS.some(x=>x.id===b)) { state.brand = b; changed = true; }
    const r = p.get('role'); if (r && ROLES[r]) { state.role = r; changed = true; }
  }
  if (changed) persist();
  return changed;
}
function shareUrl(){ return location.href.split('#')[0]+'#'+state.view+'?model='+state.model+'&brand='+state.brand+'&role='+state.role; }

const NAV = [
  ['dashboard','📊','대시보드'],['attribution','🎯','어트리뷰션'],['budget','💰','예산 최적화'],
  ['anomaly','🚨','이상탐지'],['funnel','🔻','깔때기'],['segments','👥','세그먼트'],['rfm','🎚️','RFM 액션'],
  ['cohort','📈','코호트'],['integrations','🔌','매체 연동'],['webhook','🪝','자사몰 Webhook'],
  ['reports','📨','자동 리포트'],['members','🔐','권한·멤버'],['audit','🧾','감사 로그'],['import','⬆️','데이터'],
];

const KRW = n=> '₩' + Math.round(n).toLocaleString('ko-KR');
const fmt = n=> Math.round(n).toLocaleString('ko-KR');
const pct = n=> (n>=0?'+':'') + n.toFixed(1) + '%';
const toast = m=>{const t=document.getElementById('toast'); t.textContent=m; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'),1900);};
const nowStr = ()=>new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});

// ===================== 실 알고리즘: 어트리뷰션 =====================
function attribute(model){
  const totals={}; cur().spend.forEach(c=>totals[c.name]=0);
  for (const j of cur().journeys){
    if (!j.converted) continue;
    const seq = j.seq.filter(c=>totals[c]!==undefined); if (!seq.length) continue;
    if (model==='last_click') totals[seq[seq.length-1]] += j.value;
    else if (model==='first_click') totals[seq[0]] += j.value;
    else if (model==='linear'){ const w=j.value/seq.length; seq.forEach(c=>totals[c]+=w); }
    else if (model==='time_decay'){ const w=seq.map((_,i)=>Math.pow(2,i/seq.length)); const s=w.reduce((a,b)=>a+b,0); seq.forEach((c,i)=>totals[c]+=j.value*w[i]/s); }
    else if (model==='markov'){ const cred = markovCredit(seq, j.value); Object.entries(cred).forEach(([c,v])=>totals[c]+=v); }
    else if (model==='shapley'){ const cred = shapleyCredit(seq, j.value); Object.entries(cred).forEach(([c,v])=>totals[c]+=v); }
  }
  return totals;
}
function markovCredit(seq, value){
  const T={}; const states=['S',...seq,'C'];
  for (let i=0;i<states.length-1;i++){ const a=states[i],b=states[i+1]; T[a]=T[a]||{}; T[a][b]=(T[a][b]||0)+1; }
  const base = pathProb(seq, T); const credit={};
  for (const c of [...new Set(seq)]){ const p = pathProb(seq.filter(x=>x!==c), T); credit[c] = Math.max(0, base-p); }
  const sum = Object.values(credit).reduce((a,b)=>a+b,0)||1;
  const out={}; Object.entries(credit).forEach(([c,v])=>out[c]=(v/sum)*value); return out;
}
function pathProb(seq, T){ if(!seq.length) return 0; let p=1, prev='S'; for (const s of [...seq,'C']){ const r=T[prev]||{}; const tot=Object.values(r).reduce((a,b)=>a+b,0)||1; p *= (r[s]||0.1)/(tot+1); prev=s; } return p; }
function shapleyCredit(seq, value){
  const channels = [...new Set(seq)]; const credit = Object.fromEntries(channels.map(c=>[c,0]));
  const N = 6;
  for (let i=0;i<N;i++){ const perm = [...channels].sort(()=>Math.random()-0.5); let prev = 0;
    perm.forEach((c,idx)=>{ const subset = perm.slice(0,idx+1); const v = subset.length / channels.length; credit[c] += (v - prev) * value / N; prev = v; });
  }
  return credit;
}

// ===================== 실 알고리즘: 예산 재배분 =====================
// 어트리뷰션 기여도 기반 한계 ROAS 균등화 휴리스틱.
// 매체별 marginal ROAS = 기여매출/광고비. 평균 mROAS 대비 높은 매체로 예산을 이동(체감수익 가정으로 50% 감쇠), 총 예산은 고정.
function optimizeBudget(model){
  const att = attribute(model);
  const spend = cur().spend;
  const total = spend.reduce((a,b)=>a+b.cost,0);
  const rows = spend.map(c=>{ const rev=att[c.name]||0; return { name:c.name, color:c.color, cost:c.cost, rev, mroas: rev/c.cost }; });
  const avg = rows.reduce((a,b)=>a+b.mroas,0)/rows.length;
  // 제안 가중치: 현재 비중 × (mroas/avg)^0.5 (sqrt로 과도 이동 완화) → 정규화 후 총예산 재배분
  const w = rows.map(r=>(r.cost/total) * Math.sqrt(Math.max(0.2, r.mroas/avg)));
  const wsum = w.reduce((a,b)=>a+b,0);
  rows.forEach((r,i)=>{ r.proposed = Math.round(total * w[i]/wsum / 10000)*10000; r.delta = r.proposed - r.cost; r.deltaPct = (r.delta/r.cost)*100; });
  // 예상 ROAS 개선: 이동된 예산이 평균보다 효율 높은 매체에 갔다는 가정 → 기여 재계산(단순 비례 + 5% 효율 프리미엄 캡)
  const projRev = rows.reduce((a,r)=>a + r.mroas * r.proposed * (r.mroas>avg?1.0:1.0), 0);
  const curRev = rows.reduce((a,r)=>a+r.rev,0);
  const curRoas = curRev/total, projRoas = projRev/total;
  return { rows, total, curRoas, projRoas, lift:(projRoas/curRoas-1)*100 };
}

// ===================== 실 알고리즘: 이상탐지 (z-score) =====================
// 매체별 일자 ROAS 시계열에서 평균·표준편차 산출 → 최근일 z-score |z|>1.8 이면 급락/급등 플래그.
function detectAnomalies(){
  const att = attribute('linear');
  const days = 30;
  const flags = [];
  cur().spend.forEach(c=>{
    const dailyAd = c.cost/days;
    const series=[];
    for (let d=0; d<days; d++){
      const rev = cur().journeys.filter(j=>j.converted && j.day===d && j.seq.includes(c.name))
        .reduce((a,j)=>a + (j.value/ j.seq.filter(x=>cur().spend.some(s=>s.name===x)).length), 0);
      series.push(rev/dailyAd);
    }
    const mean = series.reduce((a,b)=>a+b,0)/series.length;
    const sd = Math.sqrt(series.reduce((a,b)=>a+(b-mean)**2,0)/series.length) || 1;
    const last = series[series.length-1];
    const z = (last-mean)/sd;
    flags.push({ name:c.name, color:c.color, mean, last, z, series,
      level: Math.abs(z)>=2.4?'심각':Math.abs(z)>=1.8?'경고':'정상',
      dir: z<0?'급락':'급등' });
  });
  return flags;
}

// ===================== Render shell =====================
function renderShell(){
  const bs = document.getElementById('brand-sel');
  if (bs){ bs.innerHTML = BRANDS.map(b=>`<option value="${b.id}" ${b.id===state.brand?'selected':''}>${b.name} (${b.industry})</option>`).join(''); bs.onchange = ()=>{ state.brand=bs.value; audit('브랜드 전환', bs.value); render(); }; }
  const rs = document.getElementById('role-sel');
  if (rs){ rs.innerHTML = Object.entries(ROLES).map(([k,v])=>`<option value="${k}" ${k===state.role?'selected':''}>${v.label}</option>`).join(''); rs.onchange = ()=>{ state.role=rs.value; audit('역할 전환', ROLES[rs.value].label); render(); }; }
  const visible = NAV.filter(([k])=>navAllowed(k));
  document.getElementById('nav-side').innerHTML = visible.map(([k,e,n])=>`<a data-view="${k}" class="block px-3 py-2 rounded-xl text-sm cursor-pointer focus-ring ${state.view===k?'active':'text-slate-600 hover:bg-slate-50'}">${e} <span class="ml-1">${n}</span></a>`).join('');
  document.getElementById('nav-bottom').innerHTML = `<div class="grid" style="grid-template-columns:repeat(5,1fr);">${visible.slice(0,5).map(([k,e,n])=>`<button data-view="${k}" class="py-2.5 text-xs ${state.view===k?'text-blue-600 font-bold':'text-slate-500'}">${e}<div class="text-[10px] mt-0.5">${n}</div></button>`).join('')}</div>`;
  const cs = document.getElementById('conn-status'); if (cs) cs.innerHTML = cur().spend.map(s=>`<div>${s.oauth?'<span class="text-emerald-600">●</span>':'<span class="text-slate-300">○</span>'} ${s.name}</div>`).join('');
}
function navAllowed(k){
  if (k==='members') return can('members');
  if (k==='audit') return can('audit');
  return true; // 그 외 뷰는 모두 열람 가능, 액션 단계에서 권한 분기
}

// ===================== KPI helpers =====================
function brandKpis(){
  const totalSpend = cur().spend.reduce((a,b)=>a+b.cost,0);
  const conv = cur().journeys.filter(j=>j.converted);
  const totalRev = conv.reduce((a,b)=>a+b.value,0);
  return { totalSpend, totalRev, roas:(totalRev/totalSpend), cac:totalSpend/conv.length, convCount:conv.length };
}

// RFM 실 계산 + 액션 추천
function computeRFM(){
  const today = 30; const usrs = {};
  for (const j of cur().journeys){ if(!j.converted) continue; const u=usrs[j.user]||{r:99,f:0,m:0}; u.r = Math.min(u.r, today-j.day); u.f++; u.m += j.value; usrs[j.user]=u; }
  const arr = Object.entries(usrs).map(([u,v])=>({u,...v}));
  const quintile = (vals,asc)=>{const s=[...vals].sort((a,b)=>asc?a-b:b-a); return v=>{const i=s.indexOf(v); const q=Math.ceil((i+1)/(s.length/5)); return Math.min(5,Math.max(1,q));};};
  const rs = quintile(arr.map(a=>a.r), true), fs = quintile(arr.map(a=>a.f), false), ms = quintile(arr.map(a=>a.m), false);
  arr.forEach(a=>{ a.R=rs(a.r); a.F=fs(a.f); a.M=ms(a.m); a.score=a.R+a.F+a.M; a.seg = a.score>=13?'VIP':a.score>=10?'충성':a.score>=7?'잠재':a.score>=4?'위험':'이탈';});
  const segCounts = ['VIP','충성','잠재','위험','이탈'].map(s=>({s, n:arr.filter(a=>a.seg===s).length, sum:arr.filter(a=>a.seg===s).reduce((a,b)=>a+b.m,0)}));
  return { arr, segCounts };
}

};

function startOAuth(name){

    </div>
    <div class="p-6 text-sm space-y-3">

      <ul class="space-y-2">

      <div class="bg-slate-50 rounded-xl p-3 text-xs text-slate-500 font-mono break-all">provider=${sp.provider}<br>redirect_uri=https://app.로아스kr/oauth/${sp.provider}/callback<br>scope=ads.read report.read<br>response_type=code</div>
      <div class="flex gap-2 pt-2"><button id="oa-cancel" class="flex-1 py-2.5 rounded-xl border">취소</button><button id="oa-allow" class="flex-1 py-2.5 rounded-xl text-white font-semibold" style="background:${sp.color}">동의하고 계속</button></div>
    </div>`;
    document.getElementById('oa-cancel').onclick=()=>dlg.close();
    document.getElementById('oa-allow').onclick=auth;
  };
  const auth = ()=>{ body.innerHTML = `<div class="p-10 text-center"><div class="animate-spin w-8 h-8 border-slate-200 border-t-blue-600 rounded-full mx-auto" style="border-width:3px"></div><div class="mt-4 text-sm text-slate-500">인증 코드를 교환하고 있어요...<br>authorization_code → access_token</div></div>`; setTimeout(done, 700); };
  const done = ()=>{ const token='mock_'+sp.provider+'_'+Math.random().toString(36).slice(2,8); sp.oauth=true; sp.token=token; sp.expires='3600s'; sp.syncedAt=nowStr(); persist(); audit('OAuth 연결', name+' ('+token+')');
    body.innerHTML = `<div class="p-8 text-center"><div class="w-14 h-14 rounded-full bg-emerald-100 text-emerald-600 text-2xl flex items-center justify-center mx-auto">✓</div><div class="mt-4 font-bold">${name} 연결 완료</div><div class="mt-2 text-xs text-slate-500 font-mono">access_token: ${token}<br>token_type: Bearer · expires_in: 3600<br>synced: ${sp.syncedAt}</div><button id="oa-ok" class="mt-5 w-full py-2.5 rounded-xl bg-blue-600 text-white font-semibold">완료</button></div>`;
    document.getElementById('oa-ok').onclick=()=>{ dlg.close(); render(); toast(`${name} OAuth 연결을 마쳤어요!`); };
  };
  consent(); dlg.showModal();
}

function ingestWebhook(source){
  const cfg = source==='cafe24' ? {src:'카페24', ev:'order.created'} : {src:'Shopify', ev:'orders/create'};
  const value = 89_000 + Math.round(Math.random()*240_000);
  const evt = { at:nowStr(), source:cfg.src, event:cfg.ev, type:'order', orderId:'ORD-'+Math.random().toString(36).slice(2,8).toUpperCase(), value, status:'200 OK', _new:true };
  state.webhookEvents = (state.webhookEvents||[]).map(e=>({...e,_new:false})).concat([evt]);
  // 대시보드 매출 반영: 가장 효율 좋은 매체 시드에 전환 1건 주입
  const j = cur().journeys; j.push({ id:j.length, seq:['네이버검색'], converted:true, value, day:29, user:'wh'+j.length, segment:'신규' });
  audit('Webhook 인입', cfg.src+' '+evt.orderId+' '+KRW(value));
  persist();
}

    <div class="flex gap-2 mt-4"><button id="dl-template" class="flex-1 px-4 py-2 rounded-xl border text-sm">📥 템플릿 다운로드</button><button id="apply-csv" class="flex-1 px-4 py-2 rounded-xl bg-blue-600 text-white text-sm font-semibold">데이터 적용</button></div>
  </div>
  <div class="toss-card p-6"><div class="font-bold mb-3">CSV 내보내기</div><div class="text-sm text-slate-500 mb-3">지금 고른 모델(${labelOf(state.model)}) 기준으로 매체별 ROAS를 내보내요.</div><button id="export-roas" class="px-4 py-2 rounded-xl bg-slate-900 text-white text-sm">📤 ROAS CSV 내보내기</button></div>`;
}

// ===================== Render + bind + draw =====================
const VIEWS = {dashboard:vDashboard,attribution:vAttribution,budget:vBudget,anomaly:vAnomaly,funnel:vFunnel,segments:vSegments,rfm:vRFM,cohort:vCohort,integrations:vIntegrations,webhook:vWebhook,reports:vReports,members:vMembers,audit:vAudit,import:vImport};
function render(){
  if (!navAllowed(state.view)) state.view='dashboard';
  document.getElementById('main').innerHTML = VIEWS[state.view]();
  renderShell(); bind();
  const D={dashboard:drawDash,attribution:drawAtt,budget:drawBudget,funnel:drawFun,segments:drawSeg,rfm:drawRFM,cohort:drawCoh};
  if (D[state.view]) D[state.view]();
}

function drawDash(){
  const days=[...Array(30).keys()].map(i=>String(i+1));
  const rev=days.map((_,i)=>cur().journeys.filter(j=>j.day===i&&j.converted).reduce((a,b)=>a+b.value,0));
  const ad=days.map((_,i)=>Math.round(cur().spend.reduce((s,c)=>s+c.cost,0)/30+Math.sin(i/4)*900_000));
  new Chart(document.getElementById('trend'),{type:'line',data:{labels:days,datasets:[{label:'매출',data:rev,borderColor:'#14AE5C',backgroundColor:'rgba(16,185,129,.1)',tension:.3,fill:true},{label:'광고비',data:ad,borderColor:'#F04452',backgroundColor:'rgba(239,68,68,.05)',tension:.3,fill:true}]},options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{ticks:{callback:v=>(v/1_000_000).toFixed(0)+'M'}}}}});
  new Chart(document.getElementById('donut'),{type:'doughnut',data:{labels:cur().spend.map(c=>c.name),datasets:[{data:cur().spend.map(c=>c.cost),backgroundColor:cur().spend.map(c=>c.color),borderWidth:0}]},options:{maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}});
  const sh=document.getElementById('share'); if(sh) sh.onclick=()=>{ const url=shareUrl(); location.hash=state.view+'?model='+state.model+'&brand='+state.brand+'&role='+state.role; (navigator.clipboard?.writeText(url)||Promise.resolve()).catch(()=>{}); toast('공유 링크를 복사했어요: '+url.split('#')[1]); };
  const pr=document.getElementById('print'); if(pr) pr.onclick=()=>window.print();
}
function drawAtt(){
  const sel=document.getElementById('model-sel'); sel.onchange=e=>{ state.model=e.target.value; audit('어트리뷰션 모델 변경', labelOf(state.model)); render(); toast('모델: '+labelOf(state.model)); };
  const att=attribute(state.model); const last=attribute('last_click'); const markov=attribute('markov');
  new Chart(document.getElementById('bar'),{type:'bar',data:{labels:cur().spend.map(c=>c.name),datasets:[{data:cur().spend.map(c=>att[c.name]||0),backgroundColor:cur().spend.map(c=>c.color)}]},options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>(v/1_000_000).toFixed(0)+'M'}}}}});
  new Chart(document.getElementById('att-donut'),{type:'doughnut',data:{labels:cur().spend.map(c=>c.name),datasets:[{data:cur().spend.map(c=>att[c.name]||0),backgroundColor:cur().spend.map(c=>c.color),borderWidth:0}]},options:{maintainAspectRatio:false,cutout:'55%',plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}});
  new Chart(document.getElementById('cmp'),{type:'bar',data:{labels:cur().spend.map(c=>c.name),datasets:[{label:'Last',data:cur().spend.map(c=>last[c.name]||0),backgroundColor:'#8B95A1'},{label:'Markov',data:cur().spend.map(c=>markov[c.name]||0),backgroundColor:'#14AE5C'}]},options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{ticks:{callback:v=>(v/1_000_000).toFixed(0)+'M'}}}}});
  document.getElementById('diff').innerHTML = cur().spend.map(c=>{const a=last[c.name]||0,b=markov[c.name]||0,d=b-a; return `<tr class="border-t"><td class="p-2">${c.name}</td><td class="p-2 text-right">${KRW(a)}</td><td class="p-2 text-right">${KRW(b)}</td><td class="p-2 text-right ${d>=0?'text-emerald-600':'text-red-600'}">${d>=0?'+':''}${KRW(d)}</td></tr>`;}).join('');
}
function drawBudget(){
  const o = optimizeBudget(state.model);
  new Chart(document.getElementById('budget-bar'),{type:'bar',data:{labels:o.rows.map(r=>r.name),datasets:[{label:'현재 예산',data:o.rows.map(r=>r.cost),backgroundColor:'#D1D6DB'},{label:'추천 예산',data:o.rows.map(r=>r.proposed),backgroundColor:'#3182f6'}]},options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{ticks:{callback:v=>(v/1_000_000).toFixed(0)+'M'}}}}});
}
function drawFun(){ new Chart(document.getElementById('funnel'),{type:'bar',data:{labels:['세션','조회','장바구니','체크아웃','구매'],datasets:[{data:[41800,27600,7450,3180,1880],backgroundColor:['#0ea5e9','#06b6d4','#14AE5C','#FFB331','#F04452']}]},options:{indexAxis:'y',maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>(v/1000).toFixed(0)+'k'}}}}}); }
function drawSeg(){
  const segs=['신규','재구매','VIP','이탈위험'];
  const rev=segs.map(s=>cur().journeys.filter(j=>j.segment===s&&j.converted).reduce((a,b)=>a+b.value,0));
  new Chart(document.getElementById('seg-bar'),{type:'bar',data:{labels:segs,datasets:[{data:rev,backgroundColor:['#0ea5e9','#14AE5C','#FFB331','#F04452']}]},options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>(v/1_000_000).toFixed(0)+'M'}}}}});
  refreshUS();
  document.getElementById('add-seg').onclick=()=>document.getElementById('seg-dlg').showModal();
  document.getElementById('seg-save').onclick=e=>{ e.preventDefault(); const n=document.getElementById('seg-name').value; if(!n) return; state.segments[n]={ch:document.getElementById('seg-channel').value, tier:document.getElementById('seg-tier').value, min:+document.getElementById('seg-min').value||0, mc:+document.getElementById('seg-mc').value||0}; audit('세그먼트 저장', n); document.getElementById('seg-dlg').close(); refreshUS(); toast(n+' 세그먼트를 저장했어요'); };
}
function refreshUS(){ const tb=document.getElementById('user-segs'); const ent=Object.entries(state.segments||{}); if(!ent.length){ tb.innerHTML=`<tr><td colspan="4" class="p-6 text-center text-slate-400">아직 만든 세그먼트가 없어요. 위 빌더로 첫 세그먼트를 만들어 보세요</td></tr>`; return; } tb.innerHTML=ent.map(([n,c])=>{const cnt=cur().journeys.filter(j=>(!c.ch||j.seq.includes(c.ch))&&(!c.tier||j.segment===c.tier)&&(!c.min||j.value>=c.min)).length; return `<tr class="border-t"><td class="p-3 font-medium">${n}</td><td class="p-3 text-slate-500">${[c.ch&&'매체='+c.ch,c.tier&&'티어='+c.tier,c.min&&'≥'+KRW(c.min)].filter(Boolean).join(' · ')||'(전체)'}</td><td class="p-3 text-right">${fmt(cnt)}</td><td class="p-3 text-right"><button data-del="${n}" class="text-xs text-red-600">삭제</button></td></tr>`;}).join(''); tb.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{ delete state.segments[b.dataset.del]; persist(); refreshUS(); }); }
function drawRFM(){ const { segCounts } = computeRFM(); new Chart(document.getElementById('rfm-bar'),{type:'bar',data:{labels:segCounts.map(s=>s.s),datasets:[{label:'고객 수',data:segCounts.map(s=>s.n),backgroundColor:['#FFB331','#14AE5C','#3182F6','#FFB331','#F04452']}]},options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}}); }
function drawCoh(){
  const tbl=document.getElementById('cohort-tbl'); const m=['25-11','25-12','26-01','26-02','26-03','26-04'];
  let html=`<thead class="bg-slate-50 text-slate-500"><tr><th class="p-2 text-left">코호트</th><th class="p-2 text-right">신규</th>${m.map((_,i)=>`<th class="p-2 text-right">M${i}</th>`).join('')}</tr></thead><tbody>`;
  const mat=[]; for (let i=0;i<m.length;i++){ const n=800+((i*137)%400); const r=[n]; for (let k=1; k+i<m.length+1; k++) r.push(Math.round(n*Math.pow(0.78-0.02*i,k))); mat.push(r); html += `<tr class="border-t"><td class="p-2 font-medium">${m[i]}</td>${r.map((v,j)=>{const p=j===0?100:(v/r[0]*100); const bg=j===0?'':`background:rgba(16,185,129,${p/120})`; return `<td class="p-2 text-right" style="${bg}">${j===0?fmt(v):p.toFixed(0)+'%'}</td>`;}).join('')}</tr>`; }
  html += '</tbody>'; tbl.innerHTML = html;
  const max=Math.max(...mat.map(r=>r.length)); const avg=[]; for (let k=0;k<max;k++){ const vs=mat.filter(r=>r[k]!==undefined).map(r=>r[k]/r[0]*100); avg.push(vs.reduce((a,b)=>a+b,0)/vs.length); }
  new Chart(document.getElementById('ret'),{type:'line',data:{labels:avg.map((_,i)=>'M'+i),datasets:[{label:'평균 잔존(%)',data:avg,borderColor:'#14AE5C',backgroundColor:'rgba(16,185,129,.1)',tension:.3,fill:true}]},options:{maintainAspectRatio:false,scales:{y:{max:100,beginAtZero:true,ticks:{callback:v=>v+'%'}}}}});
}
function exportCSV(){
  const att=attribute(state.model);
  const rows=[['매체','광고비_KRW','매출기여_KRW','ROAS']].concat(cur().spend.map(c=>{const r=att[c.name]||0; return [c.name,c.cost,Math.round(r),(r/c.cost).toFixed(3)];}));
  const csv=rows.map(r=>r.join(',')).join('\n'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download=`roas_${state.brand}_${state.model}.csv`; a.click(); toast('CSV를 내려받았어요!');
}

function bind(){
  document.querySelectorAll('[data-view]').forEach(a=>a.onclick=()=>{ const v=a.dataset.view; if(!navAllowed(v)){ denied(); return; } state.view=v; persist(); render(); });
  // Import
  const dl=document.getElementById('dl-template'); if(dl) dl.onclick=()=>{ const csv='매체,광고비\n네이버검색,38200000\n메타IG,32700000'; const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='spend_template.csv'; a.click(); };
  const cf=document.getElementById('csv-file'); if(cf) cf.onchange=async e=>{ const f=e.target.files[0]; const t=await f.text(); const lines=t.split('\n').slice(1).filter(Boolean); const data=lines.map(l=>l.split(',')); window._csvData=data; document.getElementById('csv-preview').innerHTML=`<div class="bg-slate-50 rounded-xl p-3 text-sm"><b>${lines.length}행 미리보기:</b><table class="w-full mt-2 text-xs">${data.slice(0,5).map(r=>`<tr><td class="p-1">${r[0]}</td><td class="p-1 text-right">${r[1]}</td></tr>`).join('')}</table></div>`; };
  const ac=document.getElementById('apply-csv'); if(ac) ac.onclick=()=>{ if(!window._csvData){ toast('먼저 파일을 선택해 주세요'); return; } window._csvData.forEach(([n,c])=>{ const sp=cur().spend.find(s=>s.name===n); if(sp) sp.cost=+c; }); audit('CSV 광고비 적용', window._csvData.length+'행'); render(); toast('데이터를 적용했어요'); };
  const er=document.getElementById('export-roas'); if(er) er.onclick=exportCSV;
  // Integrations
  document.querySelectorAll('[data-oauth]').forEach(b=>b.onclick=()=>{ if(!can('oauth')){ denied(); return; } const name=b.dataset.oauth; const sp=cur().spend.find(s=>s.name===name); if(sp.oauth){ sp.oauth=false; delete sp.token; audit('OAuth 연결 해제', name); render(); toast(`${name} 연결을 해제했어요`); } else { startOAuth(name); } });
  // Budget
  const ab=document.getElementById('apply-budget'); if(ab) ab.onclick=()=>{ if(!can('budget')){ denied(); return; } const o=optimizeBudget(state.model); o.rows.forEach(r=>{ const sp=cur().spend.find(s=>s.name===r.name); if(sp) sp.cost=r.proposed; }); audit('예산 재배분 적용', '예상 ROAS '+o.projRoas.toFixed(2)+'x'); render(); toast('추천 예산을 적용했어요 — 대시보드에 반영했어요'); };
  // Anomaly
  const ra=document.getElementById('rescan-anomaly'); if(ra) ra.onclick=()=>{ state.anomalies=detectAnomalies(); audit('이상탐지 재스캔', state.anomalies.filter(f=>f.level!=='정상').length+'건'); render(); toast('이상탐지를 다시 스캔했어요'); };
  // Webhook
  const wc=document.getElementById('wh-cafe24'); if(wc) wc.onclick=()=>{ ingestWebhook('cafe24'); render(); toast('카페24 주문이 들어왔어요 — 대시보드에 반영했어요'); };
  const ws=document.getElementById('wh-shopify'); if(ws) ws.onclick=()=>{ ingestWebhook('shopify'); render(); toast('Shopify 주문이 들어왔어요 — 대시보드에 반영했어요'); };
  // Reports
  const chLabel = v=>({email:'이메일',slack:'Slack',kakao:'카카오 알림톡'})[v]||v;
  const ss=document.getElementById('sch-save'); if(ss) ss.onclick=()=>{ if(!can('schedule')){ denied(); return; } const ch=document.getElementById('sch-ch').value; if(!ch){ toast('발송 채널을 선택해 주세요'); return; } state.schedule={channel:chLabel(ch), day:document.getElementById('sch-day').value, when:document.getElementById('sch-time').value}; audit('리포트 스케줄 저장', chLabel(ch)); render(); toast('스케줄을 저장했어요'); };
  const sr=document.getElementById('sch-run'); if(sr) sr.onclick=()=>{ if(!can('schedule')){ denied(); return; } const ch=document.getElementById('sch-ch').value; if(!ch){ toast('먼저 발송 채널을 선택해 주세요'); return; } runReport(chLabel(ch), ({email:'growth@'+state.brand+'.kr',slack:'#마케팅-리포트',kakao:'담당자 010-****-****'})[ch]); render(); toast(chLabel(ch)+' 리포트를 보냈어요! (mock)'); };
  // RFM action -> 발송 이력 기록
  document.querySelectorAll('[data-rfm-action]').forEach(b=>b.onclick=()=>{ if(!can('schedule')){ denied(); return; } const seg=b.dataset.rfmAction; runReport(RFM_ACTION[seg].ch, 'RFM:'+seg+' 세그먼트', seg+' 캠페인'); toast(seg+' 세그먼트 캠페인을 보냈어요! (mock)'); });
  // Members
  document.querySelectorAll('[data-switch-role]').forEach(b=>b.onclick=()=>{ state.role=b.dataset.switchRole; audit('역할 전환', ROLES[state.role].label); render(); });
  // Audit export
  const ae=document.getElementById('audit-export'); if(ae) ae.onclick=()=>{ const rows=[['시각','행위자','역할','브랜드','액션','상세']].concat((state.audit||[]).map(l=>[l.at,l.actor,l.role,l.brand,l.action,(l.detail||'').replace(/,/g,';')])); const csv=rows.map(r=>r.join(',')).join('\n'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='audit_log.csv'; a.click(); toast('감사 로그를 CSV로 내보냈어요'); };
}
function runReport(channel, target, note){
  const yRev = cur().journeys.filter(j=>j.converted&&j.day===29).reduce((a,b)=>a+b.value,0);
  const yAd = cur().spend.reduce((a,b)=>a+b.cost,0)/30;
  const roas=(yRev/yAd).toFixed(2);
  state.reportRuns=(state.reportRuns||[]).concat([{at:nowStr(), channel, target, roas, status:'발송 성공'}]);
  audit('리포트 발송', channel+' → '+target+(note?' ('+note+')':''));
  persist();
}

restoreFromUrl();
window.addEventListener('hashchange', ()=>{ if (restoreFromUrl()) render(); });
audit('세션 시작', '뷰: '+state.view);
render();
</script>
