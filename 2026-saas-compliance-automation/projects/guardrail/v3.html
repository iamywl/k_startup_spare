<style>
  body { font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
  .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #CBCEDF; border-radius: 4px; }
  [x-cloak] { display: none !important; }

  /* ===== design-tone-components (guide §6·§7) ===== */
  button, [role="button"], a.w-full, input[type="submit"], input[type="button"] {
    transition: transform .12s cubic-bezier(.3,0,0,1), opacity .15s ease, box-shadow .15s ease, background-color .15s ease;
  }
  button:active:not(:disabled), [role="button"]:active, a.w-full:active,
  input[type="submit"]:active, input[type="button"]:active { transform: scale(.97); }
  button:disabled, button[disabled], [role="button"][aria-disabled="true"] { opacity: .35; cursor: not-allowed; }
  button:focus-visible, [role="button"]:focus-visible, a.w-full:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
    outline: none; border-color: #4338CA; box-shadow: 0 0 0 1.5px #4338CA;
  }
  button.w-full, button[type="submit"].w-full, a.w-full[class*="bg-"] {
    min-height: 52px; border-radius: 12px;
  }

  /* glass-material (guide §5 — 떠 있는 레이어 전용) */
  /* 페이지 베이스 + 은은한 그라데이션 (글래스가 색을 머금도록) */
  body { background-color: #EEEFF8; }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(72% 56% at 8% -2%, rgba(67,56,202,0.20), transparent 60%),
      radial-gradient(64% 52% at 98% 10%, rgba(20,174,92,0.14), transparent 60%),
      radial-gradient(80% 62% at 50% 104%, rgba(99,102,241,0.18), transparent 60%);
  }

  /* 스티키 상단 헤더 — 스크롤되는 본문 위에서 frosted */
  header.bg-white.border-b {
    position: sticky; top: 0; z-index: 30;
    background-color: rgba(255,255,255,0.55) !important;
    -webkit-backdrop-filter: saturate(200%) blur(26px);
            backdrop-filter: saturate(200%) blur(26px);
    box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.75), 0 1px 3px rgba(31,27,54,0.04);
  }

  /* 다크(잉크) 사이드바 — 다크 글래스 */
  aside.bg-slate-900 {
    background-color: rgba(31,27,54,0.55) !important;
    -webkit-backdrop-filter: saturate(180%) blur(24px);
            backdrop-filter: saturate(180%) blur(24px);
    box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.08);
  }

  /* 토스트 — 떠 있는 레이어 sheen (시맨틱 색은 유지) */
  #toast-root > div {
    -webkit-backdrop-filter: saturate(160%) blur(10px);
            backdrop-filter: saturate(160%) blur(10px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 8px 24px rgba(31,27,54,0.18);
  }

  /* 콘텐츠 영역은 평면 유지 — 반투명 배경 카드가 비치도록 본문 배경만 살짝 투명 */
  div.bg-slate-100.overflow-auto { background-color: transparent !important; }

  /* 폴백 — 투명도 미지원 / 투명 감소 선호 시 불투명 복원 */
  @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    header.bg-white.border-b { background-color: #FFFFFF !important; -webkit-backdrop-filter: none; backdrop-filter: none; }
    aside.bg-slate-900 { background-color: #1F1B36 !important; -webkit-backdrop-filter: none; backdrop-filter: none; }
    #toast-root > div { -webkit-backdrop-filter: none; backdrop-filter: none; }
    div.bg-slate-100.overflow-auto { background-color: #F2F4F6 !important; }
  }
  @media (prefers-reduced-transparency: reduce) {
    header.bg-white.border-b { background-color: #FFFFFF !important; -webkit-backdrop-filter: none; backdrop-filter: none; }
    aside.bg-slate-900 { background-color: #1F1B36 !important; -webkit-backdrop-filter: none; backdrop-filter: none; }
    #toast-root > div { -webkit-backdrop-filter: none; backdrop-filter: none; }
    div.bg-slate-100.overflow-auto { background-color: #F2F4F6 !important; }
  }

  /* ===== 모바일 네이티브 레이아웃 (≤767px) — 데스크톱(≥768px) 완전 불변 ===== */

  /* 모바일 상단 앱바 + 백드롭은 데스크톱에서 항상 숨김 */
  #mobile-appbar { display: none; }
  #drawer-backdrop { display: none; }

  @media (max-width: 767px) {
    /* 1) 데스크톱 사이드바 → 오프캔버스 드로어 */
    aside.bg-slate-900 {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 82vw; max-width: 300px;
      z-index: 60;
      transform: translateX(-100%);
      transition: transform .28s cubic-bezier(.3,0,0,1);
      box-shadow: 0 8px 40px rgba(0,0,0,.35);
      -webkit-overflow-scrolling: touch;
    }
    body.drawer-open aside.bg-slate-900 { transform: translateX(0); }

    /* 반투명 백드롭 */
    #drawer-backdrop {
      display: block; position: fixed; inset: 0; z-index: 55;
      background: rgba(15,12,30,.5);
      -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
      opacity: 0; pointer-events: none; transition: opacity .28s ease;
    }
    body.drawer-open #drawer-backdrop { opacity: 1; pointer-events: auto; }
    body.drawer-open { overflow: hidden; }

    /* 2) 모바일 전용 상단 앱바 */
    #mobile-appbar {
      display: flex; align-items: center; gap: .625rem;
      position: sticky; top: 0; z-index: 40;
      height: 52px; padding: 0 .875rem;
      background: rgba(255,255,255,.75);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
              backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(31,27,54,.08);
    }
    #mobile-appbar .ab-burger {
      width: 38px; height: 38px; flex: none;
      display: flex; align-items: center; justify-content: center;
      border-radius: 10px; background: transparent; color: #1F1B36;
      font-size: 20px; line-height: 1;
    }
    #mobile-appbar .ab-burger:active { background: rgba(31,27,54,.06); }
    #mobile-appbar .ab-logo {
      width: 30px; height: 30px; flex: none; border-radius: 8px;
      background: #4338CA; color: #fff; font-weight: 700;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    #mobile-appbar .ab-title { font-weight: 700; color: #1F1B36; font-size: 16px; }

    /* 3) 본문 풀폭 — 사이드바가 흐름에서 빠졌으므로 main이 전체 폭 */
    .min-h-screen.flex { display: block; }
    .flex-1.flex.flex-col.min-w-0 { width: 100%; }

    /* 데스크톱 헤더는 모바일 앱바와 중복 — 컴팩트하게 */
    header.bg-white.border-b {
      padding-left: 1rem; padding-right: 1rem; padding-top: .75rem; padding-bottom: .75rem;
      flex-wrap: wrap; gap: .5rem;
    }
    header.bg-white.border-b .flex.items-center.gap-5 { flex-wrap: wrap; gap: .75rem; }

    /* 4) 본문 패딩 축소 */
    div.bg-slate-100.overflow-auto, div.overflow-auto.p-8, .overflow-auto.p-8 { padding: 1rem; }

    /* 5) 그리드 스택 — 모바일에서 읽히는 열 수로 */
    .grid.grid-cols-6 { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .grid.grid-cols-5 { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .grid.grid-cols-4 { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .grid.grid-cols-3 { grid-template-columns: minmax(0,1fr); }
    .grid.grid-cols-2 { grid-template-columns: minmax(0,1fr); }
    .col-span-2, .col-span-3 { grid-column: span 1 / span 1; }

    /* 6) 가로로 넓은 표/히트맵은 가로 스크롤 허용(세로 쪼개짐 방지) */
    table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
  }
  </style>
</head>

<script>

const STORAGE_KEY = "guardrail.state.v3";

function blankTenant(name, framework) {
  const controls = {};
  controlsForFramework(framework).forEach(c => { controls[c.uid] = { status: "none" }; });
  return {
    id: "T-" + Math.random().toString(36).slice(2, 8),
    name, framework,
    org: { name, responsible: "", effectiveDate: "", version: "1.0" },
    controls,             // uid -> { status }
    evidences: [],        // {id,name,type,dataUrl,size,uid,version,expiry,uploadedAt,source}
    tickets: [],          // {id,uid,title,assignee,status,createdAt,jira}
    policies: [],         // {id,templateId,title,versions:[...]}
    scans: [],            // {id,provider,ranAt,results:[...]}
    snapshots: [],        // {ts, score}
    audit: [],            // {ts, actor, role, action}
    monitor: { lastRun: "", events: [], cycle: 0 }, // #1 연속 모니터링
    integrations: [],     // #3 외부 연동 로그 (Jira/Slack)
    requests: []          // #5 심사관 협업: 증적요청·코멘트·승인 {id,uid,note,status,comments:[],createdBy,createdAt}
  };
}

function seedState() {
  const t1 = blankTenant("주식회사 가드레일테크", "ISMS-P");
  t1.org.responsible = "정보보호최고책임자 김보안";
  t1.org.effectiveDate = "2026-07-01";
  const t2 = blankTenant("클라우드원 (CSAP 대상)", "CSAP");
  t2.org.responsible = "보안팀장 이클라우드";
  return { role: "ciso", lang: "ko", activeTenant: t1.id, tenants: [t1, t2] };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return seedState();
    const parsed = JSON.parse(raw);
    if (!parsed.tenants || !parsed.tenants.length) return seedState();
    // 하위 호환: 신규 필드 보강
    parsed.lang = parsed.lang || "ko";
    parsed.tenants.forEach(t => {
      t.monitor = t.monitor || { lastRun: "", events: [], cycle: 0 };
      t.integrations = t.integrations || [];
      t.requests = t.requests || [];
    });
    return parsed;
  } catch (e) {
    console.warn("상태 로드 실패, 시드 사용", e);
    return seedState();
  }
}

/* ===========================================================================
   G) 계산 로직 — 실 알고리즘 2종
   G1) 교차매핑 충족 계산 (#2): 공통통제 1건 met → 매핑된 전 프레임워크 control_id
       에 동시 충족 반영. 프레임워크별 준비율을 단일 모델에서 동시 산출.
   G2) 리스크 스코어링 (#4): risk = 노출도(상태) × 영향도(impact) × 드리프트가중 × 증적부재
   --------------------------------------------------------------------------- */
function activeControls() { return controlsForFramework(tenant().framework); }

function controlsByDomain() {
  const map = {};
  activeControls().forEach(c => { (map[c.domain] = map[c.domain] || []).push(c); });
  return map;
}

function readinessStats(fw) {
  const t = tenant();
  const framework = fw || t.framework;
  const list = controlsForFramework(framework);
  let met = 0, partial = 0, na = 0, none = 0;
  list.forEach(c => {
    const s = (t.controls[c.uid] || {}).status || "none";
    if (s === "met") met++; else if (s === "partial") partial++;
    else if (s === "na") na++; else none++;
  });
  const total = list.length;
  const applicable = total - na;
  const weighted = met + partial * 0.5;
  const score = applicable === 0 ? 0 : Math.round((weighted / applicable) * 1000) / 10;
  return { met, partial, na, none, total, applicable, score };
}

// G1 — 교차매핑: 공통통제 1건이 각 프레임워크에서 동시 충족 처리되는 control_id 집합
function crossMappingFor(uid) {
  const c = UNIFIED_CONTROLS.find(x => x.uid === uid);
  if (!c) return [];
  return Object.entries(c.map).map(([fw, cid]) => ({ fw, label: FRAMEWORKS[fw].label, control_id: cid }));
}
// 전 프레임워크 동시 준비율 (단일 모델 → 다중 산출)
function allFrameworkReadiness() {
  return Object.keys(FRAMEWORKS).map(fw => ({ fw, label: FRAMEWORKS[fw].label, ...readinessStats(fw) }));
}

// G2 — 리스크 스코어링 (실 알고리즘)
const STATUS_EXPOSURE = { none: 1.0, partial: 0.5, met: 0.0, na: 0.0 };
function driftWeight(uid) {
  // 최근 drift(이탈) 이벤트가 있으면 가중 1.4, 아니면 1.0
  const t = tenant();
  const recent = (t.monitor.events || []).some(e => e.uid === uid && e.type === "drift" && !e.resolved);
  return recent ? 1.4 : 1.0;
}
function riskScore(c) {
  const t = tenant();
  const status = (t.controls[c.uid] || {}).status || "none";
  const exposure = STATUS_EXPOSURE[status] ?? 1.0;
  if (exposure === 0) return { score: 0, status, exposure, impact: c.impact, drift: 1.0, evW: 1.0, level: "none" };
  const evCount = t.evidences.filter(e => e.uid === c.uid).length;
  const evW = evCount === 0 ? 1.0 : 0.7;
  const drift = driftWeight(c.uid);
  // 정규화: exposure(0~1) × impact(1~5)/5 × drift(1~1.4) × evW → 0~100
  const raw = exposure * (c.impact / 5) * drift * evW;
  const score = Math.round(raw * 100);
  const level = score >= 70 ? "critical" : score >= 45 ? "high" : score >= 20 ? "medium" : "low";
  return { score, status, exposure, impact: c.impact, drift, evW, evCount, level };
}
function riskRegister() {
  return activeControls().map(c => ({ c, ...riskScore(c) }))
    .filter(r => r.score > 0).sort((a, b) => b.score - a.score);
}
function residualRiskIndex() {
  // 잔여 리스크 지수 = 평균 리스크 점수 (0~100, 낮을수록 안전)
  const reg = riskRegister();
  if (!reg.length) return 0;
  return Math.round(reg.reduce((s, r) => s + r.score, 0) / reg.length);
}

function evidenceCountFor(uid) { return tenant().evidences.filter(e => e.uid === uid).length; }

/* ===========================================================================
   H) #6 정책 ↔ 증적 일치성 자동검사
   각 정책템플릿이 매핑한 통제(mapped uid)에 대해: 통제 충족 여부 + 증적 존재 여부를
   교차검증하여 '정책은 있으나 증적 없음', '정책 없음', '정합' 으로 분류.
   --------------------------------------------------------------------------- */
function consistencyCheck() {
  const t = tenant();
  const rows = [];
  POLICY_TEMPLATES.forEach(tpl => {
    const policyExists = t.policies.some(p => p.templateId === tpl.id);
    tpl.mapped.forEach(uid => {
      const c = UNIFIED_CONTROLS.find(x => x.uid === uid);
      if (!c || !c.map[t.framework]) return; // 현재 프레임워크 미해당 통제 제외
      const status = (t.controls[uid] || {}).status || "none";
      const evCount = t.evidences.filter(e => e.uid === uid).length;
      let verdict, cls;
      if (!policyExists) { verdict = "정책 미생성"; cls = "rose"; }
      else if (status === "met" && evCount > 0) { verdict = "정합 (정책+증적+충족)"; cls = "emerald"; }
      else if (evCount === 0) { verdict = "증적 누락 (정책만 존재)"; cls = "amber"; }
      else if (status !== "met") { verdict = "통제 미충족 (증적 보강 필요)"; cls = "amber"; }
      else { verdict = "정합"; cls = "emerald"; }
      rows.push({ tpl, c, status, evCount, policyExists, verdict, cls });
    });
  });
  return rows;
}

function toast(msg, kind) {
  const root = document.getElementById("toast-root");
  const colors = { ok: "bg-emerald-600", warn: "bg-amber-600", info: "bg-slate-800", err: "bg-rose-600" };
  const t = el(`<div class="${colors[kind]||colors.info} text-white text-sm px-4 py-2.5 rounded-lg shadow-lg">${msg}</div>`);
  root.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

    case "risk": body = renderRisk(); break;
    case "crossmap": body = renderCrossmap(); break;
    case "checklist": body = renderChecklist(); break;
    case "scan": body = renderScan(); break;
    case "evidence": body = renderEvidence(); break;
    case "consistency": body = renderConsistency(); break;
    case "tickets": body = renderTickets(); break;
    case "integrations": body = renderIntegrations(); break;
    case "portal": body = renderPortal(); break;
    case "policy": body = renderPolicy(); break;
    case "package": body = renderPackage(); break;
    case "audit": body = renderAudit(); break;
    default: body = renderKpi();
  }
  content.appendChild(body);
  main.appendChild(content);
  wrap.appendChild(main);

  // 오프캔버스 드로어 백드롭 + 토글 (모바일)
  const backdrop = el(`<div id="drawer-backdrop"></div>`);
  wrap.appendChild(backdrop);
  const closeDrawer = () => document.body.classList.remove("drawer-open");
  const openDrawer = () => document.body.classList.add("drawer-open");
  appbar.querySelector("#mobile-hamburger").onclick = openDrawer;
  backdrop.onclick = closeDrawer;
  // 메뉴 항목 클릭 시 드로어 닫힘
  side.querySelectorAll("#nav button").forEach(b => b.addEventListener("click", closeDrawer));
  closeDrawer(); // 렌더 시 항상 닫힌 상태로 시작

  return wrap;
}

    <div class="flex items-center justify-between mb-3">

/* =========================== #1 실시간 연속 모니터링 =========================== */
function runMonitorCycle(forceDrift) {
  const t = tenant();
  t.monitor.cycle = (t.monitor.cycle || 0) + 1;
  t.monitor.lastRun = new Date().toISOString();
  let drifts = 0, passes = 0;
  MONITOR_PROBES.forEach(p => {
    const prevStatus = (t.controls[p.uid] || {}).status || "none";
    // mock 점검: forceDrift면 met 통제를 미흡으로 떨어뜨려 drift 유발, 아니면 현 상태 유지 PASS
    let result, finding;
    if (forceDrift && (prevStatus === "met" || prevStatus === "partial")) {
      result = "FAIL"; finding = p.failHint;
      // drift: 통제 상태 강등 + drift 이벤트
      t.controls[p.uid] = { status: "partial" };
      t.monitor.events.unshift({ id:"EV-"+Date.now()+Math.random().toString(36).slice(2,4), probe:p.id, uid:p.uid,
        type:"drift", result, finding, ts:new Date().toISOString(), resolved:false });
      slackNotify("#compliance-alerts", `[DRIFT] ${p.name} 이탈 감지 — ${finding} (통제 ${p.uid})`);
      audit(`연속 모니터링 drift 감지 — ${p.name}: ${finding}`);
      drifts++;
    } else {
      result = "PASS"; finding = p.target + " 준수";
      t.monitor.events.unshift({ id:"EV-"+Date.now()+Math.random().toString(36).slice(2,4), probe:p.id, uid:p.uid,
        type:"check", result, finding, ts:new Date().toISOString(), resolved:true });
      passes++;
    }
  });
  t.monitor.events = t.monitor.events.slice(0, 60);
  snapshotReadiness();
  return { drifts, passes };
}

      <td class="pr-2 text-xs ${r.drift>1?'text-rose-600 font-semibold':'text-slate-400'}">×${r.drift}</td>
      <td class="pr-2 text-xs ${r.evCount>0?'text-emerald-600':'text-slate-400'}">${r.evCount||0}건</td>
      <td id="act"></td></tr>`);
    const act = row.querySelector("#act");
    if (hasTicket) act.appendChild(el(`<span class="text-[11px] text-indigo-500">티켓 등록됨</span>`));
    else if (!readOnly) {
      const b = el(`<button class="text-[11px] px-2 py-0.5 rounded border border-indigo-300 text-indigo-600 hover:bg-indigo-50">티켓+Jira</button>`);
      b.onclick = () => {
        const jira = jiraCreateIssue(`[${r.c.control_id}] ${r.c.title}`, r.c.uid, r.level==='critical'?'Highest':r.level==='high'?'High':'Medium');
        t.tickets.unshift({ id:"TK-"+Date.now(), uid:r.c.uid, title:`[갭조치] ${r.c.title}`, assignee:"", status:"open", createdAt:new Date().toISOString(), jira:jira.key });
        audit(`리스크 티켓+Jira 생성 — ${r.c.control_id} (${jira.key})`);
        toast(`티켓과 Jira ${jira.key}를 만들었어요`, "ok"); render();
      };
      act.appendChild(b);
    } else act.appendChild(el(`<span class="text-[11px] text-slate-300">—</span>`));
    tb.appendChild(row);
  });
  root.appendChild(tableWrap);
  return root;
}

/* =========================== #2 다중 프레임워크 교차매핑 =========================== */
function renderCrossmap() {
  const t = tenant();
  const root = el(`<div class="space-y-6"></div>`);
  const readOnly = !can("edit");

  // 전 프레임워크 동시 준비율 카드
  const fwWrap = el(`<div class="grid grid-cols-3 gap-4"></div>`);
  allFrameworkReadiness().forEach(f => {
    const active = f.fw === t.framework;
    const color = f.score>=70?'#14AE5C':f.score>=40?'#FFB331':'#F04452';
    const card = el(`<button class="text-left bg-white rounded-xl border ${active?'border-indigo-500':'border-slate-200 hover:bg-slate-50'} p-5">
      <div class="flex items-center justify-between mb-2"><span class="text-sm font-semibold ${active?'text-indigo-700':'text-slate-700'}">${f.label}${active?' · 활성':''}</span>
        <span class="text-lg font-extrabold" style="color:${color}">${f.score}%</span></div>
      <div class="h-2.5 rounded-full bg-slate-100 overflow-hidden"><div style="width:${f.score}%;background:${color}" class="h-full"></div></div>
      <div class="text-[11px] text-slate-400 mt-2">통제 ${f.total} · 충족 ${f.met} · 부분 ${f.partial}</div></button>`);
    card.onclick = () => {
      if (readOnly) { toast("지금 역할로는 바꿀 수 없어요 (읽기 전용)", "warn"); return; }
      t.framework = f.fw;
      controlsForFramework(f.fw).forEach(c => { if (!t.controls[c.uid]) t.controls[c.uid] = { status:"none" }; });
      audit(`활성 프레임워크 전환 → ${f.label}`); toast(`${f.label}을 활성화했어요 (공통 통제를 그대로 가져왔어요)`, "ok"); render();
    };
    fwWrap.appendChild(card);
  });
  root.appendChild(fwWrap);

  // 교차매핑 자동 충족 데모
  if (!readOnly) {
    const demo = el(`<div class="bg-white rounded-xl border border-slate-200 p-6">
      <div class="text-sm font-semibold text-slate-700 mb-1">교차매핑 자동 충족 계산</div>
      <div class="text-xs text-slate-500 mb-3">공통통제 1건을 충족 처리하면 매핑된 모든 프레임워크의 control_id가 <b>동시 충족</b>으로 계산돼요.</div>
      <div class="flex items-center gap-3 flex-wrap">
        <select id="udem" class="text-sm border border-slate-300 rounded-md px-2 py-1.5"></select>
        <button id="setmet" class="text-sm px-3 py-1.5 rounded-md bg-emerald-600 text-white">충족 처리 (교차 반영)</button>
        <span id="xmap" class="text-xs text-slate-500"></span></div></div>`);
    const sel = demo.querySelector("#udem");
    UNIFIED_CONTROLS.forEach(c => sel.appendChild(el(`<option value="${c.uid}">${c.uid} — ${c.title}</option>`)));
    const showMap = () => {
      const xs = crossMappingFor(sel.value);
      demo.querySelector("#xmap").innerHTML = "→ " + xs.map(x=>`<span class="font-mono text-indigo-600">${x.label}:${x.control_id}</span>`).join(" · ");
    };
    sel.onchange = showMap; showMap();
    demo.querySelector("#setmet").onclick = () => {
      const uid = sel.value; const xs = crossMappingFor(uid);
      t.controls[uid] = { status:"met" };
      audit(`교차매핑 충족 입력 — ${uid} (동시반영: ${xs.map(x=>x.label+':'+x.control_id).join(', ')})`);
      snapshotReadiness();
      toast(`${xs.length}개 프레임워크에 동시 충족을 반영했어요`, "ok"); render();
    };
    root.appendChild(demo);
  }

  // 교차매핑표
  const tableWrap = el(`<div class="bg-white rounded-xl border border-slate-200 p-6">
    <div class="text-sm font-semibold text-slate-700 mb-4">공통통제 ↔ 프레임워크 교차매핑표 + 현재 충족 상태</div>
    <div class="overflow-auto"><table class="w-full text-sm"><thead><tr class="text-left text-xs text-slate-400 border-b border-slate-200">
      <th class="py-2 pr-3">공통통제(UID)</th><th class="pr-3">통제항목</th><th class="pr-3">ISMS-P</th><th class="pr-3">CSAP</th><th class="pr-3">ISO27001</th><th class="pr-3">교차충족</th><th>현재상태</th></tr></thead><tbody></tbody></table></div></div>`);
  const tb = tableWrap.querySelector("tbody");
  UNIFIED_CONTROLS.forEach(c => {
    const status = (t.controls[c.uid]||{}).status || "none";
    const m = STATUS_META[status];
    const cell = (v) => v ? `<span class="font-mono text-xs text-indigo-600">${v}</span>` : `<span class="text-slate-300 text-xs">—</span>`;
    const xCount = Object.keys(c.map).length;
    const xBadge = status==="met" ? `<span class="text-[10px] text-emerald-600 font-semibold">${xCount}개 동시충족</span>` : `<span class="text-[10px] text-slate-400">${xCount}개 매핑</span>`;
    tb.appendChild(el(`<tr class="border-b border-slate-50 hover:bg-slate-50">
      <td class="py-2 pr-3 font-mono text-[11px] text-slate-500">${c.uid}</td>
      <td class="pr-3">${c.title}</td>
      <td class="pr-3">${cell(c.map["ISMS-P"])}</td>
      <td class="pr-3">${cell(c.map["CSAP"])}</td>
      <td class="pr-3">${cell(c.map["ISO27001"])}</td>
      <td class="pr-3">${xBadge}</td>
      <td><span class="text-[11px] px-2 py-0.5 rounded-full border ${m.cls}">${m.label}</span></td></tr>`));
  });
  root.appendChild(tableWrap);
  return root;
}

/* =========================== 증적 자동수집 스캔 (v2 승계) =========================== */
function renderScan() {
  const t = tenant();
  const root = el(`<div class="space-y-6"></div>`);
  const readOnly = !can("edit");
  if (readOnly) root.appendChild(roleNotice("스캔 실행"));

  const ctrl = el(`<div class="bg-white rounded-xl border border-slate-200 p-6">
    <div class="text-sm font-semibold text-slate-700 mb-2">클라우드 설정 스캔 (커넥터 mock)</div>
    <div class="text-xs text-slate-500 mb-4">클라우드 API 키가 없으면 mock으로 설정을 스캔해요. 스캔 결과는 통제에 자동으로 매핑돼 증적 후보로 등록돼요.</div>
    <div class="flex gap-2 flex-wrap" id="provbtns"></div></div>`);
  if (!readOnly) {
    const pb = ctrl.querySelector("#provbtns");
    Object.keys(SCAN_PROVIDERS).forEach(prov => {
      const b = el(`<button class="px-4 py-2 rounded-lg border border-slate-300 text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-indigo-500"></span>${prov} 스캔 실행</button>`);
      b.onclick = () => {
        const results = SCAN_PROVIDERS[prov].map(r => ({ ...r }));
        t.scans.unshift({ id:"SC-"+Date.now(), provider:prov, ranAt:new Date().toISOString(), results });
        let added = 0;
        results.filter(r => r.pass).forEach(r => {
          t.evidences.unshift({ id:"EV-"+Date.now()+"-"+Math.random().toString(36).slice(2,5), name:`[자동수집] ${prov} · ${r.resource}`, type:"scan/json",
            dataUrl:"", size:r.raw.length, uid:r.uid, version:"auto", expiry:"", uploadedAt:new Date().toISOString(), source:`${prov} 스캔`, raw:r.raw });
          if ((t.controls[r.uid]||{}).status === "none") t.controls[r.uid] = { status:"partial" };
          added++;
        });
        audit(`${prov} 클라우드 스캔 실행 — 결과 ${results.length}건, 증적 후보 ${added}건 자동 등록`); snapshotReadiness();
        toast(`${prov} 스캔을 마쳤어요 — 증적 ${added}건을 자동 등록했어요`, "ok"); render();
      };
      pb.appendChild(b);
    });
  }
  root.appendChild(ctrl);

  const logWrap = el(`<div class="bg-white rounded-xl border border-slate-200 p-6">
    <div class="flex items-center justify-between mb-4"><div class="text-sm font-semibold text-slate-700">스캔 결과 로그</div><div class="text-xs text-slate-400">${t.scans.length}회 실행</div></div>
    <div id="scans" class="space-y-4"></div></div>`);
  const sc = logWrap.querySelector("#scans");
  if (!t.scans.length) sc.appendChild(el(`<div class="text-sm text-slate-400 py-8 text-center">아직 스캔 이력이 없어요.</div>`));
  t.scans.forEach(scan => {
    const pass = scan.results.filter(r=>r.pass).length;
    const box = el(`<div class="border border-slate-200 rounded-lg">
      <div class="px-4 py-2 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
        <div class="text-sm font-medium text-slate-700">${scan.provider} 스캔 <span class="text-[11px] text-slate-400">${new Date(scan.ranAt).toLocaleString('ko-KR')}</span></div>
        <div class="text-xs"><span class="text-emerald-600">통과 ${pass}</span> · <span class="text-rose-600">미흡 ${scan.results.length-pass}</span></div></div>
      <div id="rs"></div></div>`);
    const rs = box.querySelector("#rs");
    scan.results.forEach(r => {
      const c = UNIFIED_CONTROLS.find(x=>x.uid===r.uid);
      rs.appendChild(el(`<div class="px-4 py-2 flex items-center gap-3 border-b border-slate-50 text-sm">
        <span class="w-5 text-center ${r.pass?'text-emerald-500':'text-rose-500'}">${r.pass?'✓':'✕'}</span>
        <div class="flex-1 min-w-0"><div class="text-slate-700">${r.resource} — <span class="${r.pass?'text-slate-600':'text-rose-600'}">${r.finding}</span></div>
          <div class="text-[11px] text-slate-400 font-mono">${r.raw} · 매핑 통제: ${r.uid} ${c?'('+c.title+')':''}</div></div></div>`));
    });
    sc.appendChild(box);
  });
  root.appendChild(logWrap);
  return root;
}

/* =========================== 증적 관리 (v2 승계) =========================== */
function renderEvidence() {
  const t = tenant();
  const root = el(`<div class="grid grid-cols-3 gap-6"></div>`);
  const readOnly = !can("edit");

  const left = el(`<div class="space-y-6"></div>`);
  if (!readOnly) {
    const form = el(`<div class="bg-white rounded-xl border border-slate-200 p-5">
      <div class="text-sm font-semibold text-slate-700 mb-4">증적 업로드 (수동)</div>
      <label class="block text-xs text-slate-500 mb-1">파일 선택</label>
      <input id="file" type="file" class="w-full text-xs mb-3 file:mr-2 file:px-3 file:py-1.5 file:rounded-md file:border-0 file:bg-indigo-600 file:text-white"/>
      <div id="preview" class="hidden mb-3 border border-slate-200 rounded-lg p-2 bg-slate-50"></div>
      <label class="block text-xs text-slate-500 mb-1">매핑 통제항목</label>
      <select id="ctrl" class="w-full text-xs border border-slate-300 rounded-md px-2 py-1.5 mb-3"></select>
      <div class="grid grid-cols-2 gap-2 mb-3">
        <div><label class="block text-xs text-slate-500 mb-1">버전</label><input id="ver" value="1.0" class="w-full text-xs border border-slate-300 rounded-md px-2 py-1.5"/></div>
        <div><label class="block text-xs text-slate-500 mb-1">만료일</label><input id="exp" type="date" class="w-full text-xs border border-slate-300 rounded-md px-2 py-1.5"/></div>
      </div>
      <button id="add" class="w-full text-sm bg-indigo-600 text-white py-2 rounded-md hover:bg-indigo-700">증적 등록</button></div>`);
    const sel = form.querySelector("#ctrl");
    activeControls().forEach(c => sel.appendChild(el(`<option value="${c.uid}">${c.control_id} — ${c.title}</option>`)));
    let pendingFile = null;
    const preview = form.querySelector("#preview");
    form.querySelector("#file").onchange = (e) => {
      const f = e.target.files[0]; if (!f) return;
      const reader = new FileReader();
      reader.onload = () => {
        pendingFile = { name:f.name, size:f.size, dataUrl:reader.result, mime:f.type };
        preview.classList.remove("hidden"); preview.innerHTML = "";
        if (f.type.startsWith("image/")) preview.appendChild(el(`<img src="${reader.result}" class="max-h-32 mx-auto rounded"/>`));
        else preview.appendChild(el(`<div class="text-xs text-slate-600 py-3 text-center">📄 ${f.name}<div class="text-[10px] text-slate-400">${(f.size/1024).toFixed(1)} KB</div></div>`));
      };
      reader.readAsDataURL(f);
    };
    form.querySelector("#add").onclick = () => {
      if (!pendingFile) { toast("파일을 먼저 선택해 주세요", "warn"); return; }
      const uid = sel.value;
      t.evidences.unshift({ id:"EV-"+Date.now(), name:pendingFile.name, type:pendingFile.mime||"file", dataUrl:pendingFile.dataUrl, size:pendingFile.size, uid, version:form.querySelector("#ver").value||"1.0", expiry:form.querySelector("#exp").value||"", uploadedAt:new Date().toISOString(), source:"수동 업로드" });
      audit(`증적 등록(수동) — ${pendingFile.name} → ${uid}`); toast("증적을 등록했어요", "ok"); render();
    };
    left.appendChild(form);
  } else left.appendChild(roleNotice("증적 업로드"));
  root.appendChild(left);

  const listWrap = el(`<div class="col-span-2 bg-white rounded-xl border border-slate-200 p-5">
    <div class="flex items-center justify-between mb-4"><div class="text-sm font-semibold text-slate-700">등록된 증적 <span class="text-[11px] text-slate-400 font-normal">(수동 + 자동수집 통합)</span></div><div class="text-xs text-slate-400">${t.evidences.length}건</div></div>
    <div id="evlist" class="space-y-2"></div></div>`);
  const list = listWrap.querySelector("#evlist");
  if (!t.evidences.length) list.appendChild(el(`<div class="text-sm text-slate-400 py-8 text-center">아직 등록된 증적이 없어요.</div>`));
  t.evidences.forEach(ev => {
    const ctrl = UNIFIED_CONTROLS.find(c => c.uid === ev.uid);
    const cid = ctrl ? (ctrl.map[t.framework] || ev.uid) : ev.uid;
    const expired = ev.expiry && new Date(ev.expiry) < new Date();
    const isImg = (ev.type||"").startsWith("image/");
    const auto = ev.source && ev.source.includes("스캔");
    const item = el(`<div class="flex items-center gap-3 border ${auto?'border-indigo-200 bg-indigo-50/40':'border-slate-200'} rounded-lg p-3">
      <div class="w-12 h-12 rounded-md bg-slate-100 flex items-center justify-center overflow-hidden shrink-0">${isImg && ev.dataUrl ? `<img src="${ev.dataUrl}" class="w-full h-full object-cover"/>` : `<span class="text-xl">${auto?'🛰':'📄'}</span>`}</div>
      <div class="min-w-0 flex-1">
        <div class="text-sm font-medium text-slate-800 truncate">${ev.name}</div>
        <div class="text-xs text-slate-500">통제 <span class="font-mono text-indigo-600">${cid}</span> · ${ctrl?ctrl.title:''} · v${ev.version} · ${(ev.size/1024).toFixed(1)}KB · <span class="${auto?'text-indigo-600':'text-slate-400'}">${ev.source||'수동'}</span></div>
        <div class="text-[11px] ${expired?'text-rose-600 font-semibold':'text-slate-400'}">만료일: ${ev.expiry||'설정 안 함'}${expired?' (만료됐어요)':''} · 등록 ${new Date(ev.uploadedAt).toLocaleDateString('ko-KR')}</div></div>
      ${!readOnly?`<button class="text-xs text-rose-500 hover:underline shrink-0" id="del">삭제</button>`:''}</div>`);
    if (!readOnly) item.querySelector("#del").onclick = () => { t.evidences = t.evidences.filter(x => x.id !== ev.id); audit(`증적 삭제 — ${ev.name}`); render(); };
    list.appendChild(item);
  });
  root.appendChild(listWrap);
  return root;
}

  const bad = rows.filter(r => r.cls==="rose").length;

  const info = el(`<div class="bg-indigo-50 border border-indigo-200 rounded-xl p-4">
    <div class="text-sm text-indigo-800 mb-1">정책·통제·증적 <b>3자 교차검증</b> — 정책이 매핑한 통제마다 (정책 존재 + 통제 충족 + 증적 존재)를 자동으로 점검해 누락을 찾아내요.</div>
    <div class="text-xs text-indigo-600">정합 ${ok} · 보강필요 ${warn} · 정책 미생성 ${bad} (총 ${rows.length}건 검사)</div></div>`);
  root.appendChild(info);

  const sum = el(`<div class="grid grid-cols-3 gap-4"></div>`);
  [["정합",ok,"text-emerald-600"],["보강 필요",warn,"text-amber-600"],["정책 미생성",bad,"text-rose-600"]].forEach(([l,v,c]) =>
    sum.appendChild(el(`<div class="bg-white rounded-xl border border-slate-200 p-5"><div class="text-xs text-slate-500 mb-1">${l}</div><div class="text-3xl font-extrabold ${c}">${v}</div></div>`)));
  root.appendChild(sum);

  const tableWrap = el(`<div class="bg-white rounded-xl border border-slate-200 p-6">
    <div class="text-sm font-semibold text-slate-700 mb-4">일치성 검사 결과</div>
    <div class="overflow-auto"><table class="w-full text-sm"><thead><tr class="text-left text-xs text-slate-400 border-b border-slate-200">
      <th class="py-2 pr-3">정책문서</th><th class="pr-3">매핑 통제</th><th class="pr-3">통제ID</th><th class="pr-3">통제상태</th><th class="pr-3">증적</th><th>판정</th></tr></thead><tbody></tbody></table></div></div>`);
  const tb = tableWrap.querySelector("tbody");
  rows.forEach(r => {
    const m = STATUS_META[r.status];
    const vcls = { emerald:"bg-emerald-100 text-emerald-700 border-emerald-300", amber:"bg-amber-100 text-amber-700 border-amber-300", rose:"bg-rose-100 text-rose-700 border-rose-300" }[r.cls];
    tb.appendChild(el(`<tr class="border-b border-slate-50 hover:bg-slate-50">
      <td class="py-2 pr-3">${r.tpl.title} ${r.policyExists?'<span class="text-[10px] text-emerald-600">생성됨</span>':'<span class="text-[10px] text-rose-500">미생성</span>'}</td>
      <td class="pr-3 text-xs">${r.c.title}</td>
      <td class="pr-3 font-mono text-xs text-indigo-600">${r.c.map[t.framework]||r.c.uid}</td>
      <td class="pr-3"><span class="text-[11px] px-2 py-0.5 rounded-full border ${m.cls}">${m.label}</span></td>
      <td class="pr-3 text-xs ${r.evCount>0?'text-emerald-600':'text-rose-500'}">${r.evCount}건</td>
      <td><span class="text-[11px] px-2 py-0.5 rounded-full border ${vcls}">${r.verdict}</span></td></tr>`));
  });
  root.appendChild(tableWrap);
  return root;
}

/* =========================== 과제 티켓 · GRC 연동 =========================== */
function renderTickets() {
  const t = tenant();
  const root = el(`<div class="space-y-6"></div>`);
  const readOnly = !can("assign");
  if (readOnly) root.appendChild(roleNotice("티켓 배정·상태변경"));

  if (!readOnly) {
    const reg = riskRegister().filter(g => !t.tickets.some(tk => tk.uid === g.c.uid));
    const bulk = el(`<div class="bg-white rounded-xl border border-slate-200 p-5 flex items-center justify-between">
      <div class="text-sm text-slate-600">아직 티켓이 없는 리스크 <b>${reg.length}건</b> — 위험이 높은 갭을 한 번에 티켓과 Jira 이슈로 만들어요.</div>
      <button id="bulk" class="text-sm px-4 py-2 rounded-md bg-indigo-600 text-white ${reg.length?'':'opacity-40 pointer-events-none'}">상위 5건 일괄 생성 (+Jira)</button></div>`);
    bulk.querySelector("#bulk").onclick = () => {
      const n = Math.min(5, reg.length);
      reg.slice(0,5).forEach(g => {
        const jira = jiraCreateIssue(`[${g.c.control_id}] ${g.c.title}`, g.c.uid, g.level==='critical'?'Highest':g.level==='high'?'High':'Medium');
        t.tickets.unshift({ id:"TK-"+Date.now()+Math.random().toString(36).slice(2,4), uid:g.c.uid, title:`[갭조치] ${g.c.title}`, assignee:"", status:"open", createdAt:new Date().toISOString(), jira:jira.key });
      });
      audit(`리스크 티켓 일괄 생성 — ${n}건 (+Jira 동기화)`); toast(`티켓 ${n}건과 Jira 이슈를 만들었어요`, "ok"); render();
    };
    root.appendChild(bulk);
  }

  const cols = [["open","예정"],["progress","진행"],["done","완료"]];
  const board = el(`<div class="grid grid-cols-3 gap-4"></div>`);
  const ASSIGNEES = ["김보안 (보안팀)","이클라우드 (인프라)","박개인정보 (CPO실)","최운영 (운영팀)"];
  cols.forEach(([st, label]) => {
    const m = TICKET_META[st];
    const items = t.tickets.filter(tk => tk.status === st);
    const col = el(`<div class="bg-slate-50 rounded-xl border border-slate-200 p-3">
      <div class="flex items-center justify-between mb-3 px-1"><span class="text-sm font-semibold text-slate-700">${label}</span>
        <span class="text-[11px] px-2 py-0.5 rounded-full border ${m.cls}">${items.length}</span></div>
      <div class="space-y-2" id="cards"></div></div>`);
    const cards = col.querySelector("#cards");
    if (!items.length) cards.appendChild(el(`<div class="text-xs text-slate-400 text-center py-4">아직 없어요</div>`));
    items.forEach(tk => {
      const c = UNIFIED_CONTROLS.find(x=>x.uid===tk.uid);
      const cid = c ? (c.map[t.framework]||tk.uid) : tk.uid;
      const card = el(`<div class="bg-white rounded-lg border border-slate-200 p-3">
        <div class="text-xs font-medium text-slate-800 mb-1">${tk.title}</div>
        <div class="text-[11px] text-slate-400 mb-1 font-mono">${cid} · ${tk.uid}</div>
        ${tk.jira?`<div class="text-[10px] mb-2 inline-flex items-center gap-1 px-1.5 py-0.5 rounded bg-blue-50 text-blue-600 border border-blue-200">🔗 Jira ${tk.jira}</div>`:''}
        <div id="assignrow" class="mb-2"></div>
        <div class="flex gap-1" id="ops"></div></div>`);
      const ar = card.querySelector("#assignrow");
      if (!readOnly) {
        const sel = el(`<select class="w-full text-[11px] border border-slate-300 rounded px-1.5 py-1"><option value="">담당자 미배정</option></select>`);
        ASSIGNEES.forEach(a => { const o=el(`<option>${a}</option>`); if(a===tk.assignee)o.selected=true; sel.appendChild(o); });
        sel.onchange = (e) => { tk.assignee = e.target.value; audit(`티켓 담당자 배정 — ${tk.title} → ${tk.assignee||'미배정'}`); toast("담당자를 배정했어요", "ok"); render(); };
        ar.appendChild(sel);
      } else ar.appendChild(el(`<div class="text-[11px] text-slate-500">담당: ${tk.assignee||'미배정'}</div>`));
      const ops = card.querySelector("#ops");
      if (!readOnly) {
        if (st !== "done") {
          const nextSt = st === "open" ? "progress" : "done";
          const nb = el(`<button class="text-[11px] px-2 py-1 rounded border border-indigo-300 text-indigo-600 hover:bg-indigo-50 flex-1">${nextSt==="progress"?"진행 시작":"완료 처리"}</button>`);
          nb.onclick = () => {
            tk.status = nextSt;
            audit(`티켓 상태 변경 — ${tk.title} → ${TICKET_META[nextSt].label}`);
            if (nextSt === "done") {
              const has = t.evidences.some(e => e.uid === tk.uid);
              t.controls[tk.uid] = { status: has ? "met" : "partial" };
              if (tk.jira) slackNotify("#compliance", `Jira ${tk.jira} 완료 — 통제 ${tk.uid} ${has?'충족':'부분충족'} 전파`);
              audit(`티켓 완료 → 통제 ${tk.uid} ${has?'충족':'부분충족'} 전파`); snapshotReadiness();
              toast(`완료했어요 — 통제를 ${has?'충족':'부분충족'}으로 반영했어요`, "ok");
            } else toast("진행을 시작했어요", "info");
            render();
          };
          ops.appendChild(nb);
        }
        const db = el(`<button class="text-[11px] px-2 py-1 rounded border border-rose-200 text-rose-500 hover:bg-rose-50">삭제</button>`);
        db.onclick = () => { t.tickets = t.tickets.filter(x=>x.id!==tk.id); audit(`티켓 삭제 — ${tk.title}`); render(); };
        ops.appendChild(db);
      }
      cards.appendChild(card);
    });
    board.appendChild(col);
  });
  root.appendChild(board);
  return root;
}

/* =========================== #3 외부 연동 (Jira · Slack) =========================== */
function renderIntegrations() {
  const t = tenant();
  const root = el(`<div class="space-y-6"></div>`);
  const readOnly = !can("jira");

  const info = el(`<div class="bg-indigo-50 border border-indigo-200 rounded-xl p-4">
    <div class="text-sm text-indigo-800 mb-1">외부 GRC/티켓·알림 시스템 연동 — <b>Jira</b>(이슈 생성)·<b>Slack</b>(알림) 커넥터예요. API 토큰이 없으면 mock으로 동작하고, 모든 호출을 로그로 남겨요.</div>

  // 커넥터 상태 + 수동 트리거

    <div class="flex items-center justify-between mb-3"><div class="flex items-center gap-2"><span class="text-lg">🔗</span><span class="text-sm font-semibold text-slate-700">Jira (GRC 티켓)</span></div>
      <span class="text-[11px] px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 border border-amber-300">mock 연결</span></div>
    <div class="text-xs text-slate-500 mb-3">프로젝트: GRC · 베이스URL: https://guardrail.atlassian.net (mock)</div>

  if (!readOnly) {

    b.onclick = () => {
      const reg = riskRegister(); if (!reg.length) { toast("미흡 통제가 없어요", "info"); return; }
      const top = reg[0]; const j = jiraCreateIssue(`[${top.c.control_id}] ${top.c.title}`, top.c.uid, top.level==='critical'?'Highest':'High');
      toast(`Jira ${j.key}를 만들었어요 (mock)`, "ok"); render();
    };
    jiraCard.querySelector("#jops").appendChild(b);
  }
  conn.appendChild(jiraCard);

  const slackCard = el(`<div class="bg-white rounded-xl border border-slate-200 p-5">
    <div class="flex items-center justify-between mb-3"><div class="flex items-center gap-2"><span class="text-lg">💬</span><span class="text-sm font-semibold text-slate-700">Slack (알림)</span></div>
      <span class="text-[11px] px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 border border-amber-300">mock 연결</span></div>
    <div class="text-xs text-slate-500 mb-3">워크스페이스: guardrail · 채널: #compliance, #compliance-alerts (mock)</div>
    <div id="sops" class="flex gap-2"></div></div>`);
  if (!readOnly) {
    const b = el(`<button class="text-xs px-3 py-1.5 rounded-md bg-emerald-600 text-white">준비율 요약 Slack 알림 발송</button>`);
    b.onclick = () => { const s = readinessStats(); slackNotify("#compliance", `[${t.name}] ${FRAMEWORKS[t.framework].label} 준비율 ${s.score}% · 잔여리스크 ${residualRiskIndex()} · 미흡 ${s.none}건`); toast("Slack 알림을 보냈어요 (mock)", "ok"); render(); };
    slackCard.querySelector("#sops").appendChild(b);
  }
  conn.appendChild(slackCard);
  root.appendChild(conn);

  // 연동 로그
  const logWrap = el(`<div class="bg-white rounded-xl border border-slate-200 p-6">
    <div class="flex items-center justify-between mb-4"><div class="text-sm font-semibold text-slate-700">외부 연동 호출 로그</div><div class="text-xs text-slate-400">${t.integrations.length}건</div></div>
    <div id="ilist" class="space-y-1 max-h-96 overflow-auto scrollbar-thin"></div></div>`);
  const il = logWrap.querySelector("#ilist");
  if (!t.integrations.length) il.appendChild(el(`<div class="text-xs text-slate-400 py-4 text-center">아직 연동 호출 로그가 없어요.</div>`));
  t.integrations.forEach(i => {
    const sysCls = i.system==="Jira"?'bg-blue-100 text-blue-700':'bg-emerald-100 text-emerald-700';
    il.appendChild(el(`<div class="flex items-center gap-3 text-xs py-1.5 border-b border-slate-50">
      <span class="text-slate-400 font-mono shrink-0 w-32">${new Date(i.ts).toLocaleString('ko-KR')}</span>
      <span class="px-1.5 py-0.5 rounded ${sysCls} shrink-0 text-[10px] font-medium">${i.system}</span>
      <span class="text-slate-700 flex-1">${i.action}: ${i.summary} ${i.key?`<span class="font-mono text-blue-600">[${i.key}]</span>`:''}${i.channel?`<span class="text-slate-400">${i.channel}</span>`:''}</span>
      <span class="text-[10px] text-emerald-600 shrink-0">${i.status}</span></div>`));
  });
  root.appendChild(logWrap);
  return root;
}

/* =========================== #5 심사관 협업 포털 =========================== */
function renderPortal() {
  const t = tenant();
  const root = el(`<div class="space-y-6"></div>`);
  const isAuditor = state.role === "auditor";

  const info = el(`<div class="bg-indigo-50 border border-indigo-200 rounded-xl p-4">
    <div class="text-sm text-indigo-800 mb-1">심사관 협업 포털 — 심사관이 <b>증적을 요청</b>하면 실무자가 응답하고, 서로 <b>코멘트</b>를 주고받은 뒤 심사관이 <b>승인/반려</b>해요.</div>
    <div class="text-xs text-indigo-600">현재 역할: ${ROLES[state.role].label} ${isAuditor?'(증적 요청·승인 가능)':'(요청 응답·코멘트 가능)'}</div></div>`);
  root.appendChild(info);

  // 심사관: 증적 요청 생성
  if (can("request")) {
    const reqForm = el(`<div class="bg-white rounded-xl border border-slate-200 p-5">
      <div class="text-sm font-semibold text-slate-700 mb-3">증적 요청 생성 (심사관)</div>
      <div class="flex items-end gap-3 flex-wrap">
        <div class="flex-1 min-w-[200px]"><label class="block text-xs text-slate-500 mb-1">대상 통제</label>
          <select id="ruid" class="w-full text-sm border border-slate-300 rounded-md px-2 py-1.5"></select></div>
        <div class="flex-[2] min-w-[260px]"><label class="block text-xs text-slate-500 mb-1">요청 내용</label>
          <input id="rnote" placeholder="예: MFA 적용 화면 캡처와 설정 로그 제출 요청" class="w-full text-sm border border-slate-300 rounded-md px-2 py-1.5"/></div>
        <button id="addreq" class="text-sm px-4 py-2 rounded-md bg-indigo-600 text-white">요청 등록</button></div></div>`);
    const rs = reqForm.querySelector("#ruid");
    activeControls().forEach(c => rs.appendChild(el(`<option value="${c.uid}">${c.control_id} — ${c.title}</option>`)));
    reqForm.querySelector("#addreq").onclick = () => {
      const uid = rs.value; const note = reqForm.querySelector("#rnote").value || "증적 제출 요청";
      t.requests.unshift({ id:"RQ-"+Date.now(), uid, note, status:"requested", comments:[], createdBy:ROLES[state.role].label, createdAt:new Date().toISOString() });
      slackNotify("#compliance", `[심사관 증적요청] ${uid} — ${note}`);
      audit(`심사관 증적 요청 — ${uid}: ${note}`); toast("증적 요청을 등록하고 Slack으로 알렸어요", "ok"); render();
    };
    root.appendChild(reqForm);
  }

  // 요청 목록 (칸반 스타일 상태)
  const REQ_META = { requested:{label:"요청됨",cls:"bg-amber-100 text-amber-700 border-amber-300"}, responded:{label:"응답됨",cls:"bg-indigo-100 text-indigo-700 border-indigo-300"}, approved:{label:"승인",cls:"bg-emerald-100 text-emerald-700 border-emerald-300"}, rejected:{label:"반려",cls:"bg-rose-100 text-rose-700 border-rose-300"} };
  const listWrap = el(`<div class="bg-white rounded-xl border border-slate-200 p-6">
    <div class="flex items-center justify-between mb-4"><div class="text-sm font-semibold text-slate-700">증적 요청·검토 워크플로</div><div class="text-xs text-slate-400">${t.requests.length}건</div></div>
    <div id="rlist" class="space-y-3"></div></div>`);
  const rl = listWrap.querySelector("#rlist");
  if (!t.requests.length) rl.appendChild(el(`<div class="text-sm text-slate-400 py-8 text-center">아직 증적 요청이 없어요. ${can("request")?'위에서 요청을 만들어 보세요.':'심사관이 요청을 만들면 여기에 보여요.'}</div>`));
  t.requests.forEach(rq => {
    const c = UNIFIED_CONTROLS.find(x=>x.uid===rq.uid);
    const cid = c?(c.map[t.framework]||rq.uid):rq.uid;
    const evCount = t.evidences.filter(e=>e.uid===rq.uid).length;
    const m = REQ_META[rq.status];
    const box = el(`<div class="border border-slate-200 rounded-lg">
      <div class="px-4 py-2.5 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
        <div class="text-sm font-medium text-slate-800">${c?c.title:rq.uid} <span class="font-mono text-[11px] text-indigo-600">${cid}</span></div>
        <span class="text-[11px] px-2 py-0.5 rounded-full border ${m.cls}">${m.label}</span></div>
      <div class="px-4 py-3">
        <div class="text-xs text-slate-600 mb-2">요청: ${rq.note} <span class="text-slate-400">— ${rq.createdBy} · ${new Date(rq.createdAt).toLocaleDateString('ko-KR')}</span></div>
        <div class="text-[11px] mb-2 ${evCount>0?'text-emerald-600':'text-rose-500'}">매핑 증적 현황: ${evCount}건</div>
        <div id="comments" class="space-y-1 mb-2"></div>
        <div id="ops" class="flex items-center gap-2 flex-wrap"></div></div></div>`);
    const cm = box.querySelector("#comments");
    rq.comments.forEach(co => cm.appendChild(el(`<div class="text-[11px] text-slate-600 bg-slate-50 rounded px-2 py-1"><span class="font-medium text-slate-700">${co.by}:</span> ${co.text} <span class="text-slate-400">${new Date(co.ts).toLocaleTimeString('ko-KR')}</span></div>`)));
    const ops = box.querySelector("#ops");
    // 코멘트 입력 (모든 역할)
    if (can("comment")) {
      const ci = el(`<input placeholder="코멘트 입력" class="text-[11px] border border-slate-300 rounded px-2 py-1 flex-1 min-w-[160px]"/>`);
      const cb = el(`<button class="text-[11px] px-2 py-1 rounded border border-slate-300 text-slate-600 hover:bg-slate-50">코멘트</button>`);
      cb.onclick = () => { const v = ci.value.trim(); if(!v) return; rq.comments.push({ by:ROLES[state.role].label, text:v, ts:new Date().toISOString() }); audit(`증적요청 코멘트 — ${rq.uid}: ${v}`); toast("코멘트를 남겼어요", "ok"); render(); };
      ops.appendChild(ci); ops.appendChild(cb);
    }
    // 실무자: 응답 처리
    if (can("respond") && rq.status==="requested") {
      const respb = el(`<button class="text-[11px] px-2 py-1 rounded bg-indigo-600 text-white">증적 제출 응답</button>`);
      respb.onclick = () => { rq.status="responded"; rq.comments.push({ by:ROLES[state.role].label, text:`증적 ${evCount}건 제출 응답`, ts:new Date().toISOString() }); slackNotify("#compliance", `증적요청 ${rq.uid} 응답 완료`); audit(`증적요청 응답 — ${rq.uid}`); toast("응답했어요", "ok"); render(); };
      ops.appendChild(respb);
    }
    // 심사관: 승인/반려
    if (can("approve") && (rq.status==="responded"||rq.status==="requested")) {

      const rb = el(`<button class="text-[11px] px-2 py-1 rounded bg-rose-600 text-white">반려</button>`);
      rb.onclick = () => { rq.status="rejected"; rq.comments.push({by:ROLES[state.role].label,text:"증적 미흡 — 보강 후 재제출 요청",ts:new Date().toISOString()}); audit(`심사관 증적 반려 — ${rq.uid}`); toast("반려했어요. 증적을 보강해 다시 제출해 주세요", "warn"); render(); };
      ops.appendChild(ab); ops.appendChild(rb);
    }
    rl.appendChild(box);
  });
  root.appendChild(listWrap);

}

function fillTemplate(body) {
  const t = tenant(), o = t.org;
  return body.replaceAll("{{조직명}}", o.name||"(조직명 미입력)").replaceAll("{{시행일}}", o.effectiveDate||"(시행일 미입력)")
    .replaceAll("{{책임자}}", o.responsible||"(책임자 미입력)").replaceAll("{{버전}}", o.version||"1.0")
    .replaceAll("{{프레임워크}}", FRAMEWORKS[t.framework].label);
}
function lineDiff(oldStr, newStr) {
  const a = oldStr.split("\n"), b = newStr.split("\n");
  const out = []; const setB = new Set(b), setA = new Set(a);
  const max = Math.max(a.length, b.length);
  for (let i=0;i<max;i++) {
    const la = a[i], lb = b[i];
    if (la === lb) out.push({ t:"=", v:la??"" });
    else {
      if (la !== undefined && !setB.has(la)) out.push({ t:"-", v:la });
      if (lb !== undefined && !setA.has(lb)) out.push({ t:"+", v:lb });
      if (la !== undefined && setB.has(la) && lb !== undefined && setA.has(lb) && la !== lb) { out.push({t:"-",v:la}); out.push({t:"+",v:lb}); }
    }
  }
  return out;
}

function exportControlsCsv(statusEl) {

function generatePackagePdf(statusEl, lang) {
  const t = tenant();
  const stats = readinessStats();
  const dict = I18N[lang] || I18N.ko;
  const isEn = lang === "en";
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit:"pt", format:"a4" });
    const W = doc.internal.pageSize.getWidth();
    let y = 0;
    // 한글·영문 모두 canvas 렌더로 이미지화 (한글 깨짐 0 보장)
    const drawText = (text, size, color, bold, indent) => {
      const c = document.createElement("canvas");
      const scale = 3, pad = 4, fontPx = size * 1.34;
      c.width = (W - 80) * scale;
      const ctx = c.getContext("2d");
      ctx.font = `${bold?'bold ':''}${fontPx*scale}px -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif`;
      const maxW = c.width - pad*2;
      const words = String(text).split(""); const lines = []; let cur = "";
      words.forEach(ch => {
        if (ch === "\n") { lines.push(cur); cur=""; return; }
        const test = cur + ch;
        if (ctx.measureText(test).width > maxW) { lines.push(cur); cur = ch; } else cur = test;
      });
      if (cur) lines.push(cur);
      const lineH = fontPx * scale * 1.4;
      c.height = lineH * lines.length + pad*2;
      const ctx2 = c.getContext("2d");
      ctx2.clearRect(0,0,c.width,c.height);
      ctx2.font = `${bold?'bold ':''}${fontPx*scale}px -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif`;
      ctx2.fillStyle = color || "#1F1B36"; ctx2.textBaseline = "top";
      lines.forEach((ln,i) => ctx2.fillText(ln, pad + (indent?indent*scale:0), pad + i*lineH));
      const imgH = (c.height/scale);
      if (y + imgH > doc.internal.pageSize.getHeight() - 40) { doc.addPage(); y = 40; }
      doc.addImage(c.toDataURL("image/png"), "PNG", 40, y, W-80, imgH);
      y += imgH + 4;
    };
    const hr = () => { doc.setDrawColor(200); doc.line(40, y, W-40, y); y += 10; };
    const fwLabel = isEn ? FRAMEWORKS[t.framework].en : FRAMEWORKS[t.framework].label;
    const statusLabel = (s) => isEn ? dict[s] : STATUS_META[s].label;

    // 표지
    y = 120;
    drawText(dict.pkgTitle, 26, "#4338CA", true); y += 6;
    drawText(t.name, 16, "#1F1B36", true);
    drawText(`${dict.framework}: ${fwLabel}`, 12, "#4E5968");
    drawText(`${dict.readiness}: ${stats.score}%`, 12, "#4E5968");
    drawText(`${dict.generatedAt}: ${new Date().toLocaleString(isEn?'en-US':'ko-KR')}`, 10, "#8B95A1");
    doc.addPage(); y = 40;

    // 1. 요약
    drawText(`1. ${dict.summary}`, 16, "#4338CA", true); hr();
    drawText(isEn
      ? `Total ${stats.total} · ${dict.met} ${stats.met} · ${dict.partial} ${stats.partial} · ${dict.none} ${stats.none} · ${dict.na} ${stats.na}`
      : `전체 통제 ${stats.total} · 충족 ${stats.met} · 부분충족 ${stats.partial} · 미점검 ${stats.none} · 해당없음 ${stats.na}`, 11, "#333D4B");
    drawText(isEn ? `Residual risk index: ${residualRiskIndex()}` : `잔여 리스크 지수: ${residualRiskIndex()}`, 11, "#333D4B");
    y += 8;

    // 2. 통제별 충족 현황
    drawText(`2. ${dict.controlStatus}`, 16, "#4338CA", true); hr();
    activeControls().forEach(c => {
      const s = (t.controls[c.uid]||{}).status||"none";
      const title = isEn ? c.en : c.title;
      drawText(`[${c.control_id}] ${title} — ${statusLabel(s)} (${dict.evidence} ${evidenceCountFor(c.uid)})`, 10, s==="met"?"#14AE5C":s==="partial"?"#FFB331":"#4E5968");
    });
    doc.addPage(); y = 40;

    // 3. 증적 인덱스
    drawText(`3. ${dict.evidenceIndex}`, 16, "#4338CA", true); hr();
    if (!t.evidences.length) drawText(isEn?"No evidence registered":"등록된 증적 없음", 10, "#8B95A1");
    t.evidences.forEach((e,i) => { const c = UNIFIED_CONTROLS.find(x=>x.uid===e.uid); const cid = c ? (c.map[t.framework]||e.uid) : e.uid; drawText(`${i+1}. ${e.name} · ${cid} · v${e.version} · ${e.source||'manual'}`, 10, "#333D4B"); });
    y += 8;

    // 4. 정책문서 목록
    drawText(`4. ${dict.policyList}`, 16, "#4338CA", true); hr();
    if (!t.policies.length) drawText(isEn?"No policy documents":"생성된 정책문서 없음", 10, "#8B95A1");
    t.policies.forEach((p,i) => drawText(`${i+1}. ${p.title} (v${p.versions[p.versions.length-1].v})`, 10, "#333D4B"));
    y += 8;

    // 5. 위험 등록부
    drawText(`5. ${dict.riskRegister}`, 16, "#4338CA", true); hr();
    const reg = riskRegister();
    if (!reg.length) drawText(isEn?"No open risks":"미흡 리스크 없음", 10, "#8B95A1");
    reg.slice(0,12).forEach((r,i) => { const title = isEn ? r.c.en : r.c.title; drawText(`${i+1}. [${r.c.control_id}] ${title} — risk ${r.score} (${RISK_META[r.level].label})`, 10, r.level==="critical"?"#F04452":r.level==="high"?"#FFB331":"#4E5968"); });

    const fname = `${t.name}_${dict.pkgTitle}_${fwLabel}${isEn?'_EN':''}.pdf`;
    doc.save(fname);
    audit(`심사 대응 패키지 PDF 생성(${isEn?'EN':'KO'}) — ${fwLabel}, 통제 ${stats.total}·증적 ${t.evidences.length}·정책 ${t.policies.length}·리스크 ${reg.length}`);
    if (statusEl) statusEl.innerHTML = `<span class="text-emerald-600">${isEn?'EN':'국문'} PDF를 만들었어요 — ${doc.internal.getNumberOfPages()}페이지 · ${isEn?'영문 렌더':'한글 렌더'} 정상 · 통제 ${stats.total}/증적 ${t.evidences.length}/정책 ${t.policies.length}/리스크 ${reg.length} 포함</span>`;
    toast(`${isEn?'영문':'국문'} 패키지 PDF를 만들었어요`, "ok");
  } catch (e) {
    if (statusEl) statusEl.innerHTML = `<span class="text-rose-600">잠시 PDF를 만들지 못했어요. 다시 시도해 주세요. (${e.message})</span>`;
    toast("잠시 PDF를 만들지 못했어요. 다시 시도해 주세요", "err"); console.error(e);
  }
}

/* =========================== 감사로그·준비율 추세 (v2 승계) =========================== */
function renderAudit() {
  const t = tenant();
  const root = el(`<div class="space-y-6"></div>`);

  const trendWrap = el(`<div class="bg-white rounded-xl border border-slate-200 p-6">
    <div class="text-sm font-semibold text-slate-700 mb-4">준비율 추세 (시계열)</div><div id="trend"></div></div>`);
  const tr = trendWrap.querySelector("#trend");
  const snaps = t.snapshots.slice(-14);
  if (snaps.length < 2) {
    tr.appendChild(el(`<div class="text-sm text-slate-400 py-6 text-center">아직 추세를 보여줄 데이터가 부족해요.<div class="mt-3"><button id="seedtrend" class="text-xs px-3 py-1.5 rounded bg-indigo-600 text-white">데모 추세 시드 생성</button></div></div>`));
    const sb = tr.querySelector("#seedtrend");
    if (sb) sb.onclick = () => {
      const base = readinessStats().score;
      const seq = [Math.max(0,base-28), Math.max(0,base-20), Math.max(0,base-11), Math.max(0,base-5), base];
      const today = new Date();
      t.snapshots = seq.map((s,i) => ({ ts:new Date(today.getTime()-(seq.length-1-i)*86400000).toISOString().slice(0,10), score:s }));
      audit("준비율 추세 데모 시드 생성"); toast("추세 시드를 만들었어요", "ok"); render();
    };
  } else {
    const W=720,H=200,pad=30;
    const xs=(i)=>pad+i*((W-pad*2)/(snaps.length-1));
    const ys=(v)=>H-pad-(v/100)*(H-pad*2);
    const pts = snaps.map((s,i)=>`${xs(i)},${ys(s.score)}`).join(" ");
    const area = `${pad},${H-pad} ${pts} ${xs(snaps.length-1)},${H-pad}`;
    let svg = `<svg width="100%" viewBox="0 0 ${W} ${H}">
      <line x1="${pad}" y1="${ys(50)}" x2="${W-pad}" y2="${ys(50)}" stroke="#E5E8EB" stroke-dasharray="4"/>
      <line x1="${pad}" y1="${ys(70)}" x2="${W-pad}" y2="${ys(70)}" stroke="#D2F2E0" stroke-dasharray="4"/>
      <polygon points="${area}" fill="#4338CA20"/>
      <polyline points="${pts}" fill="none" stroke="#4338CA" stroke-width="2.5"/>`;
    snaps.forEach((s,i)=>{ svg+=`<circle cx="${xs(i)}" cy="${ys(s.score)}" r="3.5" fill="#4338CA"/>
      <text x="${xs(i)}" y="${ys(s.score)-8}" font-size="10" text-anchor="middle" fill="#4338CA">${s.score}%</text>
      <text x="${xs(i)}" y="${H-10}" font-size="9" text-anchor="middle" fill="#8B95A1">${s.ts.slice(5)}</text>`; });
    svg += `<text x="${pad-6}" y="${ys(70)+3}" font-size="9" text-anchor="end" fill="#14AE5C">70</text>
      <text x="${pad-6}" y="${ys(50)+3}" font-size="9" text-anchor="end" fill="#8B95A1">50</text></svg>`;
    tr.appendChild(el(svg));
  }
  root.appendChild(trendWrap);

  const auditWrap = el(`<div class="bg-white rounded-xl border border-slate-200 p-6">
    <div class="flex items-center justify-between mb-4"><div class="text-sm font-semibold text-slate-700">감사로그 (Audit Trail)</div>
      <div class="flex items-center gap-3"><span class="text-xs text-slate-400">${t.audit.length}건</span>
        <button id="auditcsv" class="text-xs px-3 py-1.5 rounded border border-slate-300 text-slate-600 hover:bg-slate-50">감사로그 CSV</button></div></div>
    <div id="alog" class="space-y-1 max-h-96 overflow-auto scrollbar-thin"></div></div>`);
  auditWrap.querySelector("#auditcsv").onclick = () => {
    const rows = [["timestamp","actor","role","action"], ...t.audit.map(a=>[a.ts,a.actor,a.role,a.action])];
    const csv = "﻿" + rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob([csv],{type:"text/csv;charset=utf-8"}); const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`${t.name}_감사로그.csv`; a.click(); URL.revokeObjectURL(url);
    toast("감사로그를 CSV로 내보냈어요", "ok");
  };
  const al = auditWrap.querySelector("#alog");
  if (!t.audit.length) al.appendChild(el(`<div class="text-xs text-slate-400 py-4">아직 감사 기록이 없어요.</div>`));
  t.audit.forEach(a => al.appendChild(el(`<div class="flex gap-3 text-xs py-1.5 border-b border-slate-50">
    <span class="text-slate-400 font-mono shrink-0 w-36">${new Date(a.ts).toLocaleString('ko-KR')}</span>
    <span class="px-1.5 rounded bg-slate-100 text-slate-500 shrink-0 text-[10px] self-center">${a.role}</span>
    <span class="text-slate-700">${a.action}</span></div>`)));
  root.appendChild(auditWrap);
  return root;
}

/* =========================== 부트스트랩 =========================== */
render();
</script>
</body>
</html>
