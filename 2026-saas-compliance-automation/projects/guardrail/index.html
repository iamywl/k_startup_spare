<style>
  body { font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }

  /* ===== design-tone-components (guide §6·§7) ===== */
  button, [role="button"], a.w-full, input[type="submit"], input[type="button"] {
    transition: transform .12s cubic-bezier(.3,0,0,1), opacity .15s ease, box-shadow .15s ease, background-color .15s ease;
  }
  button:active:not(:disabled), [role="button"]:active, a.w-full:active,
  input[type="submit"]:active, input[type="button"]:active { transform: scale(.97); }
  button:disabled, button[disabled], [role="button"][aria-disabled="true"] { opacity: .35; cursor: not-allowed; }
  button:focus-visible, [role="button"]:focus-visible, a.w-full:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
    outline: none; border-color: #4338CA; box-shadow: 0 0 0 1.5px #4338CA;
  }
  button.w-full, button[type="submit"].w-full, a.w-full[class*="bg-"] {
    min-height: 52px; border-radius: 12px;
  }

  /* glass-material (guide §5 — 떠 있는 레이어 전용) */
  /* 페이지 베이스 + 은은한 그라데이션 (글래스가 색을 머금도록) */
  body { background-color: #EEEFF8; }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(72% 56% at 8% -2%, rgba(67,56,202,0.20), transparent 60%),
      radial-gradient(64% 52% at 98% 10%, rgba(20,174,92,0.14), transparent 60%),
      radial-gradient(80% 62% at 50% 104%, rgba(99,102,241,0.18), transparent 60%);
  }

  /* 스티키 상단 헤더 — 스크롤되는 본문 위에서 frosted */
  header.bg-white.border-b {
    position: sticky; top: 0; z-index: 30;
    background-color: rgba(255,255,255,0.55) !important;
    -webkit-backdrop-filter: saturate(200%) blur(26px);
            backdrop-filter: saturate(200%) blur(26px);
    box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.75), 0 1px 3px rgba(31,27,54,0.04);
  }

  /* 다크(잉크) 사이드바 — 다크 글래스 */
  aside.bg-slate-900 {
    background-color: rgba(31,27,54,0.55) !important;
    -webkit-backdrop-filter: saturate(180%) blur(24px);
            backdrop-filter: saturate(180%) blur(24px);
    box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.08);
  }

  /* 콘텐츠 영역은 평면 유지 — 반투명 배경 카드가 비치도록 본문 배경만 살짝 투명 */
  div.bg-slate-100.overflow-auto { background-color: transparent !important; }

  /* 폴백 — 투명도 미지원 / 투명 감소 선호 시 불투명 복원 */
  @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    header.bg-white.border-b { background-color: #FFFFFF !important; -webkit-backdrop-filter: none; backdrop-filter: none; }
    aside.bg-slate-900 { background-color: #1F1B36 !important; -webkit-backdrop-filter: none; backdrop-filter: none; }
    div.bg-slate-100.overflow-auto { background-color: #F2F4F6 !important; }
  }
  @media (prefers-reduced-transparency: reduce) {
    header.bg-white.border-b { background-color: #FFFFFF !important; -webkit-backdrop-filter: none; backdrop-filter: none; }
    aside.bg-slate-900 { background-color: #1F1B36 !important; -webkit-backdrop-filter: none; backdrop-filter: none; }
    div.bg-slate-100.overflow-auto { background-color: #F2F4F6 !important; }
  }

  /* 반응형 보정 — 390px 모바일에서 가로 overflow 방지 (데스크톱 불변) */
  @media (max-width: 640px) {
    aside.w-64 { width: 13rem; }
    header.bg-white.border-b { padding-left: 1rem; padding-right: 1rem; }
    div.bg-slate-100.overflow-auto, div.overflow-auto.p-8 { padding: 1rem; }
    .grid.grid-cols-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.grid-cols-3 { grid-template-columns: minmax(0, 1fr); }
    .col-span-2 { grid-column: span 1 / span 1; }

/* ---------------------------------------------------------------------------
   3) 상태 관리 (localStorage 영속)
   --------------------------------------------------------------------------- */
const STORAGE_KEY = "guardrail.state.v1";

function defaultState() {
  const controls = {};
  CONTROL_LIBRARY.forEach(c => { controls[c.control_id] = { status: "none" }; }); // none | met | partial | na
  return {
    org: { name: "", responsible: "", effectiveDate: "", version: "1.0" },
    framework: "ISMS-P",
    controls,                 // control_id -> { status }
    evidences: [],            // {id,name,type,dataUrl,size,control_id,version,expiry,uploadedAt}
    generatedPolicies: [],    // {id,templateId,title,body,createdAt}
    workflow: { step: 1, completed: { 1:false,2:false,3:false,4:false } },
    activity: []              // {ts, msg}
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    // 안전 병합 (스키마 변동 대비)
    const base = defaultState();
    return {
      ...base, ...parsed,
      org: { ...base.org, ...(parsed.org||{}) },
      controls: { ...base.controls, ...(parsed.controls||{}) },
      workflow: { ...base.workflow, ...(parsed.workflow||{}), completed: { ...base.workflow.completed, ...((parsed.workflow||{}).completed||{}) } }
    };
  } catch (e) {
    console.warn("상태 로드 실패, 기본값 사용", e);
    return defaultState();
  }
}

let state = loadState();

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { console.warn("상태 저장 실패", e); }
}

function logActivity(msg) {
  state.activity.unshift({ ts: new Date().toISOString(), msg });
  state.activity = state.activity.slice(0, 50);
}

/* ---------------------------------------------------------------------------
   4) 계산 로직
   --------------------------------------------------------------------------- */
function controlsByCategory() {
  const map = {};
  CONTROL_LIBRARY.forEach(c => {
    if (!map[c.category]) map[c.category] = [];
    map[c.category].push(c);
  });
  return map;
}

function readinessStats() {
  let met = 0, partial = 0, na = 0, none = 0;
  CONTROL_LIBRARY.forEach(c => {
    const s = (state.controls[c.control_id] || {}).status || "none";
    if (s === "met") met++;
    else if (s === "partial") partial++;
    else if (s === "na") na++;
    else none++;
  });
  const total = CONTROL_LIBRARY.length;
  const applicable = total - na;
  // 준비율: 충족 1.0 + 부분충족 0.5, 분모는 해당없음 제외
  const weighted = met + partial * 0.5;
  const score = applicable === 0 ? 0 : Math.round((weighted / applicable) * 1000) / 10;
  return { met, partial, na, none, total, applicable, score };
}

function gapList() {
  // 미흡(none/partial) 항목을 우선순위로 (none 우선, 증적유형 많은 순)
  return CONTROL_LIBRARY
    .map(c => ({ c, status: (state.controls[c.control_id]||{}).status || "none" }))
    .filter(x => x.status === "none" || x.status === "partial")
    .sort((a, b) => {
      if (a.status !== b.status) return a.status === "none" ? -1 : 1;
      return b.c.evidence_types.length - a.c.evidence_types.length;
    });
}

function evidenceCountFor(controlId) {
  return state.evidences.filter(e => e.control_id === controlId).length;
}

        <div class="text-xs text-slate-400">${gaps.length}건 조치 필요</div>
      </div>
      <div id="gaptable"></div></div>`);

    const table = el(`<table class="w-full text-sm"><thead><tr class="text-left text-xs text-slate-400 border-b border-slate-200">
      <th class="py-2 pr-2">통제ID</th><th class="pr-2">통제항목</th><th class="pr-2">분류</th><th class="pr-2">상태</th><th class="pr-2">증적</th><th>요구 증적유형</th></tr></thead><tbody></tbody></table>`);

      const m = STATUS_META[status];
      tb.appendChild(el(`<tr class="border-b border-slate-50 hover:bg-slate-50">
        <td class="py-2 pr-2 font-mono text-xs text-indigo-600">${c.control_id}</td>
        <td class="pr-2">${c.title}</td>
        <td class="pr-2 text-slate-500 text-xs">${c.category}</td>
        <td class="pr-2"><span class="text-[11px] px-2 py-0.5 rounded-full border ${m.cls}">${m.label}</span></td>
        <td class="pr-2 text-xs ${evidenceCountFor(c.control_id)>0?'text-emerald-600':'text-slate-400'}">${evidenceCountFor(c.control_id)}건</td>
        <td class="text-xs text-slate-500">${c.evidence_types.join(", ")}</td></tr>`));
    });
    gt.appendChild(table);
  }
  root.appendChild(gapWrap);

  // Activity log
  const act = el(`<div class="bg-white rounded-xl border border-slate-200 p-6">
      <div class="text-sm font-semibold text-slate-700 mb-3">최근 활동 로그</div>
      <div id="actlog" class="space-y-2 max-h-48 overflow-auto scrollbar-thin"></div></div>`);
  const al = act.querySelector("#actlog");
  if (state.activity.length === 0) al.appendChild(el(`<div class="text-xs text-slate-400">아직 활동 기록이 없어요.</div>`));
  state.activity.slice(0,10).forEach(a => {
    al.appendChild(el(`<div class="flex gap-3 text-xs"><span class="text-slate-400 font-mono shrink-0">${new Date(a.ts).toLocaleString('ko-KR')}</span><span class="text-slate-600">${a.msg}</span></div>`));
  });
  root.appendChild(act);
  return root;
}

            <div class="text-[11px] text-slate-400 mt-1">요구 증적: ${c.evidence_types.join(", ")} · 점검 포인트: ${c.review_note}</div>
          </div>
          <div class="flex gap-1 shrink-0" id="btns"></div>
        </div></div>`);
      const btns = row.querySelector("#btns");
      ["met","partial","na","none"].forEach(st => {

        const active = status === st;

          state.controls[c.control_id].status = st;
          logActivity(`통제 ${c.control_id} 상태 변경 → ${m.label}`);
          render();
        };
        btns.appendChild(b);
      });
      rows.appendChild(row);
    });
    root.appendChild(sec);
  });
  return root;
}

/* ---------- 증적 관리 ---------- */
function renderEvidence() {
  const root = el(`<div class="grid grid-cols-3 gap-6"></div>`);

  // Upload form
  const form = el(`<div class="bg-white rounded-xl border border-slate-200 p-5">
    <div class="text-sm font-semibold text-slate-700 mb-4">증적 업로드</div>
    <label class="block text-xs text-slate-500 mb-1">파일 선택</label>
    <input id="file" type="file" class="w-full text-xs mb-3 file:mr-2 file:px-3 file:py-1.5 file:rounded-md file:border-0 file:bg-indigo-600 file:text-white"/>
    <div id="preview" class="hidden mb-3 border border-slate-200 rounded-lg p-2 bg-slate-50"></div>
    <label class="block text-xs text-slate-500 mb-1">매핑 통제항목</label>
    <select id="ctrl" class="w-full text-xs border border-slate-300 rounded-md px-2 py-1.5 mb-3"></select>
    <div class="grid grid-cols-2 gap-2 mb-3">
      <div><label class="block text-xs text-slate-500 mb-1">버전</label><input id="ver" value="1.0" class="w-full text-xs border border-slate-300 rounded-md px-2 py-1.5"/></div>
      <div><label class="block text-xs text-slate-500 mb-1">만료일</label><input id="exp" type="date" class="w-full text-xs border border-slate-300 rounded-md px-2 py-1.5"/></div>
    </div>
    <button id="add" class="w-full text-sm bg-indigo-600 text-white py-2 rounded-md hover:bg-indigo-700">증적 등록</button>
  </div>`);
  const sel = form.querySelector("#ctrl");
  CONTROL_LIBRARY.forEach(c => sel.appendChild(el(`<option value="${c.control_id}">${c.control_id} — ${c.title}</option>`)));
  let pendingFile = null;
  const fileInput = form.querySelector("#file");
  const preview = form.querySelector("#preview");
  fileInput.onchange = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      pendingFile = { name: f.name, size: f.size, dataUrl: reader.result, mime: f.type };
      preview.classList.remove("hidden");
      preview.innerHTML = "";
      if (f.type.startsWith("image/")) {
        preview.appendChild(el(`<img src="${reader.result}" class="max-h-32 mx-auto rounded"/>`));
      } else {
        preview.appendChild(el(`<div class="text-xs text-slate-600 py-3 text-center">📄 ${f.name}<div class="text-[10px] text-slate-400">${(f.size/1024).toFixed(1)} KB · 미리보기를 지원하지 않는 형식이에요</div></div>`));
      }
    };
    reader.readAsDataURL(f);
  };
  form.querySelector("#add").onclick = () => {
    if (!pendingFile) { alert("파일을 먼저 선택해 주세요."); return; }
    const cid = sel.value;
    state.evidences.unshift({
      id: "EV-" + Date.now(),
      name: pendingFile.name, type: pendingFile.mime || "file",
      dataUrl: pendingFile.dataUrl, size: pendingFile.size,
      control_id: cid, version: form.querySelector("#ver").value || "1.0",
      expiry: form.querySelector("#exp").value || "",
      uploadedAt: new Date().toISOString()
    });
    logActivity(`증적 등록 — ${pendingFile.name} → 통제 ${cid}`);
    render();
  };
  root.appendChild(form);

  // Evidence list (span 2)
  const listWrap = el(`<div class="col-span-2 bg-white rounded-xl border border-slate-200 p-5">
    <div class="flex items-center justify-between mb-4">
      <div class="text-sm font-semibold text-slate-700">등록된 증적</div>
      <div class="text-xs text-slate-400">${state.evidences.length}건</div>
    </div>
    <div id="evlist" class="space-y-2"></div></div>`);
  const list = listWrap.querySelector("#evlist");
  if (state.evidences.length === 0) {
    list.appendChild(el(`<div class="text-sm text-slate-400 py-8 text-center">아직 등록된 증적이 없어요. 왼쪽에서 파일을 올려 주세요.</div>`));
  }
  state.evidences.forEach(ev => {
    const ctrl = CONTROL_LIBRARY.find(c => c.control_id === ev.control_id);
    const expired = ev.expiry && new Date(ev.expiry) < new Date();
    const isImg = (ev.type||"").startsWith("image/");
    const item = el(`<div class="flex items-center gap-3 border border-slate-200 rounded-lg p-3">
      <div class="w-12 h-12 rounded-md bg-slate-100 flex items-center justify-center overflow-hidden shrink-0">
        ${isImg ? `<img src="${ev.dataUrl}" class="w-full h-full object-cover"/>` : `<span class="text-xl">📄</span>`}
      </div>
      <div class="min-w-0 flex-1">
        <div class="text-sm font-medium text-slate-800 truncate">${ev.name}</div>
        <div class="text-xs text-slate-500">통제 <span class="font-mono text-indigo-600">${ev.control_id}</span> · ${ctrl?ctrl.title:''} · v${ev.version} · ${(ev.size/1024).toFixed(1)}KB</div>
        <div class="text-[11px] ${expired?'text-rose-600 font-semibold':'text-slate-400'}">만료일: ${ev.expiry||'설정 안 함'}${expired?' (만료됐어요)':''} · 등록 ${new Date(ev.uploadedAt).toLocaleDateString('ko-KR')}</div>
      </div>
      <button class="text-xs text-rose-500 hover:underline shrink-0" id="del">삭제</button>
    </div>`);
    item.querySelector("#del").onclick = () => {
      state.evidences = state.evidences.filter(x => x.id !== ev.id);
      logActivity(`증적 삭제 — ${ev.name}`);
      render();
    };
    list.appendChild(item);
  });
  root.appendChild(listWrap);
  return root;
}

/* ---------- 정책문서 생성 ---------- */
function fillTemplate(body) {
  const o = state.org;
  return body
    .replaceAll("{{조직명}}", o.name || "(조직명 미입력)")
    .replaceAll("{{시행일}}", o.effectiveDate || "(시행일 미입력)")
    .replaceAll("{{책임자}}", o.responsible || "(책임자 미입력)")
    .replaceAll("{{버전}}", o.version || "1.0");
}

function renderPolicy() {
  const root = el(`<div class="grid grid-cols-3 gap-6"></div>`);

  // Org form + template list
  const left = el(`<div class="space-y-6"></div>`);
  const orgForm = el(`<div class="bg-white rounded-xl border border-slate-200 p-5">

    <label class="block text-xs text-slate-500 mb-1">책임자 {{책임자}}</label>

      <div><label class="block text-xs text-slate-500 mb-1">버전</label><input id="over" value="${state.org.version}" class="w-full text-sm border border-slate-300 rounded-md px-2 py-1.5"/></div>
    </div>
    <button id="savorg" class="w-full text-sm bg-slate-700 text-white py-2 rounded-md hover:bg-slate-800">조직 변수 저장</button>
  </div>`);
  orgForm.querySelector("#savorg").onclick = () => {
    state.org = {
      name: orgForm.querySelector("#oname").value,
      responsible: orgForm.querySelector("#oresp").value,
      effectiveDate: orgForm.querySelector("#odate").value,
      version: orgForm.querySelector("#over").value || "1.0"
    };
    logActivity(`조직 변수 저장 — ${state.org.name||'(미입력)'}`);
    render();
  };
  left.appendChild(orgForm);

  const tplWrap = el(`<div class="bg-white rounded-xl border border-slate-200 p-5">
    <div class="text-sm font-semibold text-slate-700 mb-3">외주 템플릿 코퍼스 (${POLICY_TEMPLATES.length}종)</div>
    <div class="space-y-2" id="tpls"></div></div>`);
  const tpls = tplWrap.querySelector("#tpls");
  POLICY_TEMPLATES.forEach(t => {
    const row = el(`<div class="flex items-center justify-between border border-slate-200 rounded-lg px-3 py-2">
      <div><div class="text-sm font-medium text-slate-800">${t.title}</div>
        <div class="text-[11px] text-slate-400">${t.id} · 매핑통제: ${t.mapped_controls.join(", ")}</div></div>
      <button class="text-xs px-3 py-1.5 rounded-md bg-indigo-600 text-white hover:bg-indigo-700" id="gen">생성</button></div>`);
    row.querySelector("#gen").onclick = () => {
      const filled = fillTemplate(t.body);
      state.generatedPolicies.unshift({
        id: "GEN-" + Date.now(), templateId: t.id, title: t.title,
        body: filled, createdAt: new Date().toISOString()
      });
      logActivity(`정책문서 생성 — ${t.title}`);
      render();
    };
    tpls.appendChild(row);
  });
  left.appendChild(tplWrap);
  root.appendChild(left);

  // Generated docs (span 2)
  const right = el(`<div class="col-span-2 bg-white rounded-xl border border-slate-200 p-5">
    <div class="flex items-center justify-between mb-4">
      <div class="text-sm font-semibold text-slate-700">생성된 정책문서</div>
      <div class="text-xs text-slate-400">${state.generatedPolicies.length}건</div>
    </div>
    <div id="gens" class="space-y-3"></div></div>`);
  const gens = right.querySelector("#gens");
  if (state.generatedPolicies.length === 0) {
    gens.appendChild(el(`<div class="text-sm text-slate-400 py-8 text-center">왼쪽에서 조직 변수를 저장하고 템플릿을 만들어 보세요.</div>`));
  }
  state.generatedPolicies.forEach(g => {
    const item = el(`<div class="border border-slate-200 rounded-lg">
      <div class="flex items-center justify-between px-4 py-2 bg-slate-50 border-b border-slate-200">
        <div class="text-sm font-medium text-slate-800">${g.title} <span class="text-[11px] text-slate-400 font-normal">${g.templateId} · ${new Date(g.createdAt).toLocaleString('ko-KR')}</span></div>
        <div class="flex gap-2">
          <button class="text-xs px-2 py-1 rounded border border-slate-300 text-slate-600 hover:bg-slate-100" id="dl">다운로드(.md)</button>
          <button class="text-xs px-2 py-1 rounded border border-rose-200 text-rose-500 hover:bg-rose-50" id="rm">삭제</button>
        </div>
      </div>
      <pre class="text-xs text-slate-700 whitespace-pre-wrap p-4 max-h-72 overflow-auto scrollbar-thin">${g.body.replace(/</g,"&lt;")}</pre>
    </div>`);
    item.querySelector("#dl").onclick = () => {
      const blob = new Blob([g.body], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `${g.title}.md`; a.click();
      URL.revokeObjectURL(url);
      logActivity(`정책문서 다운로드 — ${g.title}`);
    };
    item.querySelector("#rm").onclick = () => {
      state.generatedPolicies = state.generatedPolicies.filter(x => x.id !== g.id);
      render();
    };
    gens.appendChild(item);
  });
  root.appendChild(right);
  return root;
}

/* ---------- 워크플로 ---------- */
function renderWorkflow() {
  const stats = readinessStats();
  const root = el(`<div class="space-y-6"></div>`);

  const steps = [
    { n:1, title:"프레임워크 선택", desc:"인증 대상 프레임워크를 정해요." },
    { n:2, title:"통제 점검", desc:"통제 체크리스트에서 항목별 상태를 점검해요." },
    { n:3, title:"증적 첨부", desc:"통제별 증적을 올리고 매핑해요." },
    { n:4, title:"정책 생성 & 준비율 확인", desc:"정책문서를 만들고 준비율을 확인해요." }
  ];
  const cur = state.workflow.step;

  // Stepper
  const stepper = el(`<div class="bg-white rounded-xl border border-slate-200 p-6">
    <div class="flex items-center justify-between" id="stepbar"></div></div>`);
  const bar = stepper.querySelector("#stepbar");
  steps.forEach((s, i) => {
    const done = state.workflow.completed[s.n];
    const active = cur === s.n;
    const node = el(`<div class="flex-1 flex items-center ${i<steps.length-1?'':''}">
      <div class="flex flex-col items-center text-center cursor-pointer" id="node">
        <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm ${done?'bg-emerald-500 text-white':active?'bg-indigo-600 text-white':'bg-slate-200 text-slate-500'}">${done?'✓':s.n}</div>
        <div class="text-xs font-medium mt-2 ${active?'text-indigo-700':'text-slate-600'}">${s.title}</div>
      </div>
      ${i<steps.length-1?`<div class="flex-1 h-0.5 mx-2 ${done?'bg-emerald-400':'bg-slate-200'}"></div>`:''}
    </div>`);
    node.querySelector("#node").onclick = () => { state.workflow.step = s.n; render(); };
    bar.appendChild(node);
  });
  root.appendChild(stepper);

  // Step content
  const panel = el(`<div class="bg-white rounded-xl border border-slate-200 p-6"></div>`);
  const s = steps[cur-1];
  panel.appendChild(el(`<div class="text-sm font-bold text-slate-800 mb-1">${cur}단계 · ${s.title}</div><div class="text-xs text-slate-500 mb-5">${s.desc}</div>`));

  const inner = el(`<div></div>`);
  if (cur === 1) {
    const fwWrap = el(`<div class="flex gap-3" id="fws"></div>`);
    ["ISMS-P","CSAP"].forEach(fw => {
      const active = state.framework === fw;
      const b = el(`<button class="px-5 py-4 rounded-lg border text-left ${active?'border-indigo-500 bg-indigo-50':'border-slate-200 hover:bg-slate-50'}">
        <div class="font-semibold text-sm ${active?'text-indigo-700':'text-slate-700'}">${fw}</div>
        <div class="text-xs text-slate-500 mt-1">${fw==='ISMS-P'?'정보보호 및 개인정보보호 관리체계 인증':'클라우드 보안 인증제'}</div>
        ${active?'<div class="text-[11px] text-indigo-600 mt-2">✓ 선택됨 · 통제 라이브러리 로드</div>':''}</button>`);
      b.onclick = () => { state.framework = fw; logActivity(`프레임워크 선택 — ${fw}`); render(); };
      fwWrap.appendChild(b);
    });
    inner.appendChild(fwWrap);
    inner.appendChild(el(`<div class="text-xs text-slate-400 mt-4">v1은 단일 프레임워크로 동작하는 PoC예요. (CSAP 통제 라이브러리는 외주 납품 시 동일 스키마로 교체돼요)</div>`));
  } else if (cur === 2) {
    inner.appendChild(el(`<div class="text-sm text-slate-600 mb-3">현재 점검 현황: 충족 ${stats.met} · 부분충족 ${stats.partial} · 미점검 ${stats.none} · 해당없음 ${stats.na}</div>`));
    const go = el(`<button class="text-sm px-4 py-2 rounded-md bg-indigo-600 text-white">통제 체크리스트로 이동</button>`);
    go.onclick = () => { currentView = "checklist"; render(); };
    inner.appendChild(go);
  } else if (cur === 3) {
    inner.appendChild(el(`<div class="text-sm text-slate-600 mb-3">등록된 증적: <b>${state.evidences.length}</b>건 · 증적 보유 통제: ${new Set(state.evidences.map(e=>e.control_id)).size}개</div>`));
    const go = el(`<button class="text-sm px-4 py-2 rounded-md bg-indigo-600 text-white">증적 관리로 이동</button>`);
    go.onclick = () => { currentView = "evidence"; render(); };
    inner.appendChild(go);
  } else {
    inner.appendChild(el(`<div class="flex items-center gap-6 mb-4">
      <div><div class="text-xs text-slate-500">생성 정책문서</div><div class="text-2xl font-bold text-slate-800">${state.generatedPolicies.length}건</div></div>
      <div><div class="text-xs text-slate-500">인증 준비율</div><div class="text-2xl font-bold ${stats.score>=70?'text-emerald-600':'text-amber-600'}">${stats.score}%</div></div>
    </div>`));
    const go = el(`<button class="text-sm px-4 py-2 rounded-md bg-indigo-600 text-white mr-2">정책 생성으로 이동</button>`);
    go.onclick = () => { currentView = "policy"; render(); };
    inner.appendChild(go);
    const go2 = el(`<button class="text-sm px-4 py-2 rounded-md border border-slate-300 text-slate-600">대시보드에서 결과 확인</button>`);
    go2.onclick = () => { currentView = "dashboard"; render(); };
    inner.appendChild(go2);
  }
  panel.appendChild(inner);

  // Step nav
  const navrow = el(`<div class="flex items-center justify-between mt-6 pt-4 border-t border-slate-100"></div>`);
  const prev = el(`<button class="text-sm px-4 py-2 rounded-md border border-slate-300 text-slate-600 ${cur===1?'opacity-40 pointer-events-none':''}">이전</button>`);
  prev.onclick = () => { if(cur>1){ state.workflow.step = cur-1; render(); } };
  const completeBtn = el(`<button class="text-sm px-4 py-2 rounded-md ${state.workflow.completed[cur]?'bg-emerald-100 text-emerald-700':'bg-emerald-600 text-white'}">${state.workflow.completed[cur]?'완료됨 ✓':'이 단계 완료 표시'}</button>`);
  completeBtn.onclick = () => {
    state.workflow.completed[cur] = !state.workflow.completed[cur];
    logActivity(`워크플로 ${cur}단계 ${state.workflow.completed[cur]?'완료':'완료해제'}`);
    render();
  };
  const next = el(`<button class="text-sm px-4 py-2 rounded-md bg-slate-800 text-white ${cur===4?'opacity-40 pointer-events-none':''}">다음 단계</button>`);
  next.onclick = () => { if(cur<4){ state.workflow.step = cur+1; render(); } };
  const rightBtns = el(`<div class="flex gap-2"></div>`);
  rightBtns.appendChild(completeBtn); rightBtns.appendChild(next);
  navrow.appendChild(prev); navrow.appendChild(rightBtns);
  panel.appendChild(navrow);
  root.appendChild(panel);
  return root;
}

/* ---------------------------------------------------------------------------
   6) 부트스트랩
   --------------------------------------------------------------------------- */
render();
</script>
</body>
</html>
