<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>셀러스튜디오 · 커머스 AI 콘텐츠 스튜디오</title>
<!--
  셀러스튜디오 v1 — 커머스 AI 콘텐츠 생성 스튜디오 (단일 HTML 자체완결 데모)
  ⚠️ AI 정직성(§2.6): 본 데모의 "AI 생성"은 외부 LLM(ChatGPT/Claude 등) 호출이 아니라,
     커머스 도메인 지식을 코드화한 **자체 결정론적 룰/템플릿 엔진**이다.
     - 키워드 → 구조화 카피 변형 (셀링포인트 추출 · 베네핏 매핑)
     - 톤/길이/채널(네이버·인스타·구글)별 변형 + 글자수 제약 enforcement
     - 금칙어·과대광고 문구 검수 레이어 (실 정규식 룰)
     - 품질/전환 스코어 (룰 기반 eval — 래퍼가 아님의 증거)
  외부 네트워크 0 · localStorage 영속 · canvas 이미지 처리 · jsPDF export.
-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --brand:#6b4bf5; --brand-d:#5436e0; --brand-soft:#efeaff;
  --ink:#1c1830; --ink2:#5a5470; --ink3:#928da6;
  --bg:#f6f5fb; --surf:#ffffff; --surf2:#f2f0fa; --line:#e7e3f2;
  --ok:#1f9d6b; --warn:#c9881a; --bad:#d94848; --info:#3478f6;
  --r:14px; --sh:0 6px 24px rgba(40,30,90,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",Roboto,sans-serif;
  background:
    radial-gradient(900px 500px at 88% -8%, #efe9ff 0%, transparent 60%),
    radial-gradient(700px 460px at -6% 4%, #e9f0ff 0%, transparent 55%),
    var(--bg);
  color:var(--ink);font-size:15px;line-height:1.5;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:14px}
a{color:var(--brand);text-decoration:none}
.hidden{display:none!important}

/* layout */
.app{display:flex;min-height:100vh}
.sidebar{width:248px;flex-shrink:0;background:#fff;border-right:1px solid var(--line);
  padding:18px 12px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{display:flex;align-items:center;gap:10px;padding:6px 10px 16px}
.brand .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--brand),#9b7bff);
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:18px;box-shadow:0 4px 12px rgba(107,75,245,.4)}
.brand b{font-size:17px;letter-spacing:-.3px}
.brand small{display:block;color:var(--ink3);font-size:11px;font-weight:600;margin-top:1px}
.nav-sec{font-size:11px;font-weight:700;color:var(--ink3);padding:12px 12px 4px;letter-spacing:.4px}
.nav-btn{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;color:var(--ink2);
  font-weight:600;font-size:14px;width:100%;text-align:left;transition:.14s}
.nav-btn .ic{width:20px;text-align:center;font-size:16px}
.nav-btn:hover{background:var(--surf2)}
.nav-btn.active{background:var(--brand-soft);color:var(--brand-d);font-weight:700}
.nav-btn .badge{margin-left:auto;font-size:11px;background:var(--brand);color:#fff;border-radius:9px;padding:1px 7px;font-weight:700}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 22px;border-bottom:1px solid var(--line);
  background:rgba(255,255,255,.78);backdrop-filter:saturate(180%) blur(14px);position:sticky;top:0;z-index:30}
.topbar .hamb{display:none;font-size:22px;width:38px;height:38px;border-radius:10px}
.topbar h1{font-size:16px;margin:0;font-weight:700;letter-spacing:-.3px}
.topbar .sub{color:var(--ink3);font-size:12px;font-weight:600}
.spacer{flex:1}
.rolesel,.langsel{border:1px solid var(--line);border-radius:10px;padding:7px 10px;background:#fff;font-weight:600;color:var(--ink2)}
.content{padding:22px;max-width:1180px;width:100%;margin:0 auto}
.view{display:none}.view.active{display:block;animation:fade .25s}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* generic */
h2.vt{font-size:22px;margin:0 0 4px;letter-spacing:-.5px}
.vdesc{color:var(--ink2);margin:0 0 18px;font-size:13.5px}
.card{background:var(--surf);border:1px solid var(--line);border-radius:var(--r);padding:18px}
.card+.card{margin-top:16px}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
label.fl{display:block;font-size:12px;font-weight:700;color:var(--ink2);margin:0 0 5px}
.inp,textarea.inp,select.inp{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff;color:var(--ink)}
textarea.inp{resize:vertical;min-height:74px;line-height:1.55}
.inp:focus,textarea.inp:focus,select.inp:focus{outline:2px solid var(--brand);outline-offset:0;border-color:transparent}
.field{margin-bottom:14px}
.btn{background:var(--brand);color:#fff;font-weight:700;padding:11px 16px;border-radius:11px;transition:.12s;font-size:14px}
.btn:hover{background:var(--brand-d)}.btn:active{transform:scale(.97)}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:9px}
.btn.gho{background:#fff;color:var(--brand-d);border:1px solid var(--line)}
.btn.gho:hover{background:var(--surf2)}
.btn.dark{background:var(--ink)}.btn.dark:hover{background:#322c4d}
.btn:disabled{opacity:.4;pointer-events:none}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;
  background:var(--surf2);color:var(--ink2);border:1px solid var(--line)}
.chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.chip.act{cursor:pointer}.chip.act:hover{border-color:var(--brand)}
.pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}
.pill.ok{background:#e6f6ee;color:var(--ok)}.pill.warn{background:#fbf2dd;color:var(--warn)}
.pill.bad{background:#fbe7e7;color:var(--bad)}.pill.info{background:#e7f0ff;color:var(--info)}
.kpi{background:var(--surf);border:1px solid var(--line);border-radius:var(--r);padding:16px}
.kpi .n{font-size:27px;font-weight:800;letter-spacing:-1px}
.kpi .l{color:var(--ink2);font-size:12.5px;font-weight:600;margin-top:2px}
.kpi .d{font-size:11.5px;font-weight:700;margin-top:6px}
.muted{color:var(--ink3)}
table.tb{width:100%;border-collapse:collapse;font-size:13.5px}
table.tb th,table.tb td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
table.tb th{font-size:11.5px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
table.tb tr:last-child td{border-bottom:none}
.bar{height:8px;border-radius:6px;background:var(--surf2);overflow:hidden}
.bar>i{display:block;height:100%;background:var(--brand);border-radius:6px}
.scorering{--p:0;width:84px;height:84px;border-radius:50%;display:grid;place-items:center;
  background:conic-gradient(var(--brand) calc(var(--p)*1%), var(--surf2) 0);position:relative;flex-shrink:0}
.scorering::before{content:"";position:absolute;inset:8px;border-radius:50%;background:#fff}
.scorering b{position:relative;font-size:22px;font-weight:800}

/* output blocks */
.outbox{background:var(--surf2);border:1px solid var(--line);border-radius:12px;padding:14px;white-space:pre-wrap;
  font-size:13.5px;line-height:1.65;position:relative}
.outbox .cnt{position:absolute;top:8px;right:10px;font-size:11px;font-weight:700;color:var(--ink3)}
.variant{border:1px solid var(--line);border-radius:12px;padding:14px;background:#fff;margin-bottom:12px}
.variant.win{border-color:var(--brand);box-shadow:0 0 0 2px var(--brand-soft)}
.variant h4{margin:0 0 6px;font-size:14px;display:flex;align-items:center;gap:8px}
.detail-sec{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:12px}
.detail-sec .h{background:var(--surf2);padding:9px 13px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px}
.detail-sec .b{padding:13px;font-size:13.5px;line-height:1.6}

/* toast */
#toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
  padding:12px 18px;border-radius:12px;font-weight:600;font-size:13.5px;box-shadow:var(--sh);opacity:0;pointer-events:none;
  transition:.3s;z-index:200;max-width:90vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(28,24,48,.34);backdrop-filter:blur(4px);display:none;
  align-items:center;justify-content:center;z-index:100;padding:18px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:18px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--sh);padding:22px}
.modal h3{margin:0 0 12px;font-size:18px}

/* drawer/bottom nav (mobile) */
#scrim{position:fixed;inset:0;background:rgba(28,24,48,.34);z-index:45;display:none}
body.drawer-open #scrim{display:block}
#bottomnav{display:none}

@media(max-width:860px){
  .sidebar{position:fixed;left:0;top:0;z-index:50;transform:translateX(-100%);transition:.26s;box-shadow:var(--sh)}
  body.drawer-open .sidebar{transform:translateX(0)}
  .topbar .hamb{display:grid;place-items:center}
  .content{padding:16px 14px 86px}
  .g2,.g3,.g4{grid-template-columns:1fr}
  .topbar .sub{display:none}
  #bottomnav{display:flex;position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.94);
    backdrop-filter:blur(14px);border-top:1px solid var(--line);z-index:48;padding:6px 4px;justify-content:space-around}
  #bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10.5px;
    font-weight:700;color:var(--ink3);padding:6px 2px}
  #bottomnav button.active{color:var(--brand-d)}
  #bottomnav button .ic{font-size:19px}
}
@media(min-width:861px){#scrim{display:none!important}}
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.thumb{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
.thumb canvas{display:block;width:100%;height:auto}
.thumb .cap{padding:7px 10px;font-size:11.5px;font-weight:700;color:var(--ink2);display:flex;justify-content:space-between}
.seg{display:inline-flex;background:var(--surf2);border-radius:10px;padding:3px;gap:2px}
.seg button{padding:6px 12px;border-radius:8px;font-weight:700;font-size:13px;color:var(--ink2)}
.seg button.on{background:#fff;color:var(--brand-d);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.flag{font-size:12px;padding:6px 10px;border-radius:9px;margin-bottom:6px;font-weight:600;display:flex;gap:8px;align-items:flex-start}
.flag.bad{background:#fbe7e7;color:#b13434}.flag.warn{background:#fbf2dd;color:#92621a}.flag.ok{background:#e6f6ee;color:#157a4f}
.note{font-size:12px;color:var(--ink2);background:var(--brand-soft);border-radius:10px;padding:10px 12px;margin-bottom:14px;
  border-left:3px solid var(--brand)}
.logline{font-size:12.5px;border-bottom:1px solid var(--line);padding:8px 2px;display:flex;gap:10px;align-items:center}
.logline .t{color:var(--ink3);font-size:11px;font-weight:700;width:62px;flex-shrink:0}
.adm-warn{background:#fff;border:1px dashed var(--bad);color:var(--bad);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:700}
</style>
</head>
<body>
<div id="scrim" onclick="closeDrawer()"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">S</div>
      <div><b>셀러스튜디오</b><small id="bsub">커머스 AI 콘텐츠 스튜디오</small></div>
    </div>
    <div class="nav-sec" data-i18n="nav_create">생성 스튜디오</div>
    <button class="nav-btn active" data-view="dashboard"><span class="ic">▦</span><span data-i18n="nav_dash">대시보드</span></button>
    <button class="nav-btn" data-view="products"><span class="ic">▤</span><span data-i18n="nav_prod">제품</span><span class="badge" id="prodBadge">0</span></button>
    <button class="nav-btn" data-view="detail"><span class="ic">▣</span><span data-i18n="nav_detail">상세페이지</span></button>

    <button class="nav-btn" data-view="ab"><span class="ic">⇄</span><span data-i18n="nav_ab">A/B 비교</span></button>

    <button class="nav-btn" data-view="usage"><span class="ic">▰</span><span data-i18n="nav_usage">사용량</span></button>
    <button class="nav-btn admin-only hidden" data-view="admin"><span class="ic">⚙</span><span data-i18n="nav_admin">관리자</span></button>
    <div style="flex:1"></div>
    <div style="font-size:11px;color:var(--ink3);padding:10px 12px;font-weight:600">엔진: 결정론적 룰/템플릿<br>외부 LLM 미사용 · v1</div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="hamb" onclick="openDrawer()">☰</button>
      <div>
        <h1 id="topTitle">대시보드</h1>
        <div class="sub" id="topSub">셀러스튜디오 — 커머스 콘텐츠 생성</div>
      </div>
      <div class="spacer"></div>
      <select class="langsel" id="langSel" title="언어">
        <option value="ko">🇰🇷 KO</option><option value="en">🇺🇸 EN</option>
      </select>
      <select class="rolesel" id="roleSel" title="역할">
        <option value="seller">셀러</option><option value="editor">에디터</option><option value="admin">관리자</option>
      </select>
    </header>
    <div class="content" id="content"></div>
  </div>
</div>

<nav id="bottomnav">
  <button data-view="dashboard" class="active"><span class="ic">▦</span>홈</button>
  <button data-view="detail"><span class="ic">▣</span>상세</button>
  <button data-view="copy"><span class="ic">✎</span>카피</button>
  <button data-view="image"><span class="ic">▩</span>이미지</button>
  <button data-view="history"><span class="ic">⟲</span>기록</button>
</nav>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalBox"></div></div>
<div id="toast"></div>

<script>
/* ════════════════════════════════════════════════════════════════════
   셀러스튜디오 — 자체 결정론적 커머스 콘텐츠 엔진
   외부 LLM 호출 0. 모든 "생성"은 아래 룰/템플릿/휴리스틱으로 동작.
   ════════════════════════════════════════════════════════════════════ */
const FEATURES = []; // 코드 하단에서 카운트
const F = (id,desc)=>{FEATURES.push({id,desc});return desc;};

const LS_KEY = "seller-studio-v1";
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const uid = ()=>Math.random().toString(36).slice(2,9);
const now = ()=>Date.now();
const fmtT = ts=>new Date(ts).toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* ─────────────── 도메인 사전 (커머스 카피 룰의 핵심 데이터) ─────────────── */
// F1 카테고리별 셀링포인트/베네핏 매핑 사전 (래퍼 아님: 도메인 지식을 코드화)
const CAT_LEX = {
  fashion:{ko:"패션·의류",hooks:["데일리룩","핏","소재","코디","계절감"],
    benefits:["하루 종일 편한 핏","어떤 상의에도 어울리는 코디","세탁 후에도 변형 없는 소재"],
    power:["인생템","데일리","무드","꾸안꾸","핏보장"]},
  beauty:{ko:"뷰티·화장품",hooks:["보습","흡수력","성분","지속력","민감성"],
    benefits:["밤사이 채워주는 깊은 보습","순한 성분으로 민감 피부도 안심","아침까지 무너지지 않는 지속력"],
    power:["피부장벽","속보습","저자극","결광","올인원"]},
  food:{ko:"식품·건강",hooks:["맛","원물","간편","신선","HACCP"],
    benefits:["3분이면 완성되는 한 끼","산지직송 당일 손질","조미료 없이 원물 그대로"],
    power:["산지직송","당일배송","무첨가","집밥","간편식"]},
  living:{ko:"리빙·생활",hooks:["내구성","수납","공간","디자인","위생"],
    benefits:["좁은 공간도 두 배로 쓰는 수납","물걸레질 한 번이면 끝","어떤 인테리어에도 녹아드는 디자인"],
    power:["공간활용","미니멀","인테리어","대용량","항균"]},
  digital:{ko:"디지털·가전",hooks:["성능","호환","배터리","무게","AS"],
    benefits:["한 번 충전으로 이틀 사용","무게 걱정 없는 초경량","기존 기기와 바로 연결"],
    power:["초경량","고속충전","호환성","올데이","무선"]},
  baby:{ko:"유아·키즈",hooks:["안전","소재","발달","위생","무독성"],
    benefits:["입에 닿아도 안심인 무독성 소재","연령별 발달에 맞춘 설계","삶아 빨아도 끄떡없는 내구성"],
    power:["무독성","안심소재","발달놀이","순면","엄마픽"]},
};

/* ═══════════════ 결정론적 생성 엔진 (핵심) ═══════════════ */
// 시드 기반 의사난수 — 같은 입력 → 같은 출력(결정론)
function rng(seedStr){let h=2166136261;for(const c of seedStr){h^=c.charCodeAt(0);h=Math.imul(h,16777619);}
  return ()=>{h+=0x6D2B79F5;let t=h;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;};}
const pick=(arr,r)=>arr[Math.floor(r()*arr.length)];

// F4 셀링포인트 추출: 제품 feats + 카테고리 베네핏 → 구조화 셀링포인트
function deriveSellingPoints(p){
  const lex=CAT_LEX[p.cat]||CAT_LEX.living;
  const pts=[];
  p.feats.forEach((f,i)=>pts.push({head:lex.hooks[i%lex.hooks.length],body:f,benefit:lex.benefits[i%lex.benefits.length]}));
  return pts;
}
// F5 톤 변환: 어미/형용사/이모지 룰 적용
function applyTone(text,toneKey,opt={}){
  const t=TONES[toneKey]||TONES.friendly;
  let out=text;
  if(opt.emoji&&t.emoji) out=out+" "+t.emoji;
  return out;
}
// F6 채널 카피 생성 — 글자수 제약 enforcement 포함
function genChannelCopy(p,channelKey,toneKey,lang){
  const ch=CHANNELS[channelKey], lex=CAT_LEX[p.cat]||CAT_LEX.living, t=TONES[toneKey]||TONES.friendly;
  const r=rng(p.id+channelKey+toneKey+lang);
  const kw=p.keywords.slice(0,3);
  let title, body;
  if(lang==="en"){
    title=`${p.name} — ${kw[0]||"new"} pick`;
    body=`${p.feats[0]}. ${pick(lex.benefits,r)} Shop now.`;
  }else{
    const power=pick(lex.power,r);
    if(channelKey==="naver"){title=`[${power}] ${p.name} ${kw.join(" ")}`;
      body=`${p.feats.join(" · ")}. ${p.price.toLocaleString()}원`;}
    else if(channelKey==="insta"){title=`${t.emoji} ${pick(lex.power,r)} ${kw[0]}템`;
      body=`${pick(lex.benefits,r)}\n지금이 딱 ${pick(["타이밍","찬스","순간"],r)}!`;}
    else if(channelKey==="google"){title=`${p.name}｜${power}`;
      body=`${p.feats[0]}. 오늘 주문 시 빠른배송. 지금 확인 →`;}
    else{title=`${kw[0]} ${p.name} 혜택`;body=`${pick(lex.benefits,r)} 채널 친구가만 ${pick(["10%","무료배송","사은품"],r)}!`;}
    body=applyTone(body,toneKey,{emoji:ch.emoji});
  }
  // 글자수 제약 enforce (실 truncation + 표시)
  const titleTrim=enforceLen(title,ch.titleMax), bodyTrim=enforceLen(body,ch.bodyMax);
  // 해시태그
  let tags="";
  if(ch.hashtag){tags="\n"+kw.concat(lex.power.slice(0,2)).map(k=>"#"+k.replace(/\s/g,"")).join(" ");}
  const full=bodyTrim.text+tags;
  return {channel:channelKey,title:titleTrim.text,body:full,
    titleLen:titleTrim.text.length,bodyLen:full.length,
    titleMax:ch.titleMax,bodyMax:ch.bodyMax,
    titleTrunc:titleTrim.trunc,bodyTrunc:bodyTrim.trunc};
}
function enforceLen(s,max){if(s.length<=max)return{text:s,trunc:false};
  return{text:s.slice(0,max-1)+"…",trunc:true};}

// F7 상세페이지 생성 — 섹션 구조 룰(후킹→문제→솔루션→스펙→신뢰→CTA)
function genDetailPage(p,toneKey,lang){
  const lex=CAT_LEX[p.cat]||CAT_LEX.living, t=TONES[toneKey]||TONES.friendly, r=rng(p.id+"detail"+toneKey);
  const sp=deriveSellingPoints(p);
  const ko=lang!=="en";
  const secs=[];
  secs.push({icon:"✨",title:ko?"이런 분께 추천해요":"Recommended for",
    body:ko?`${p.target} 분들을 위해 만들었어요.\n${pick(lex.benefits,r)}`:`Made for ${p.target}. ${pick(lex.benefits,r)}`});
  secs.push({icon:"💡",title:ko?"이런 고민 있으셨죠?":"The problem",
    body:ko?`• ${pick(lex.hooks,r)} 때문에 늘 아쉬우셨나요?\n• 비슷한 제품, 막상 써보면 실망스러우셨죠.`:`• Tired of compromising on ${pick(lex.hooks,r)}?`});
  secs.push({icon:"✅",title:ko?"그래서 이렇게 풀었어요":"How we solved it",
    body:sp.map(s=>`【${s.head}】 ${s.body}\n→ ${s.benefit}`).join("\n\n")});
  secs.push({icon:"📋",title:ko?"상세 스펙":"Specifications",
    body:[`상품명: ${p.name}`,`카테고리: ${lex.ko}`,`핵심 키워드: ${p.keywords.join(", ")}`,
      `가격: ${p.price.toLocaleString()}원`,...p.feats.map((f,i)=>`특징 ${i+1}: ${f}`)].join("\n")});
  secs.push({icon:"🛡",title:ko?"믿고 사셔도 됩니다":"Trust",
    body:ko?`• 안심 교환·반품\n• 빠른 배송\n• ${pick(lex.power,r)} 검증`:`• Easy returns • Fast shipping`});
  secs.push({icon:"🛒",title:ko?"지금 만나보세요":"Get it now",
    body:applyTone(ko?`${pick(lex.benefits,r)}\n오늘의 ${p.name}, 놓치지 마세요`:`Don't miss out on ${p.name}`,toneKey,{emoji:true})});
  return {product:p.id,tone:toneKey,lang,sections:secs,
    wordcount:secs.reduce((a,s)=>a+s.body.length,0)};
}

// F8 품질·전환 스코어 — 룰 기반 eval 레이어 (래퍼 아님의 핵심 증거)
function scoreContent(text,opts={}){
  const checks=[];
  const len=text.length;
  // 1) 길이 적정성
  const idealMin=opts.idealMin||40, idealMax=opts.idealMax||220;
  let lenScore = len<idealMin? len/idealMin*70 : len>idealMax? clamp(100-(len-idealMax)/3,40,100) : 100;
  checks.push({k:"길이 적정성",s:Math.round(lenScore),tip:len<idealMin?"너무 짧아요 — 베네핏을 더하세요":len>idealMax?"너무 길어요 — 핵심만":"적정"});
  // 2) 파워워드 밀도
  const allPower=Object.values(CAT_LEX).flatMap(c=>c.power).concat(["한정","오늘","무료배송","후기","리뷰"]);
  const pHits=allPower.filter(w=>text.includes(w)).length;
  const pScore=clamp(pHits*28,0,100);
  checks.push({k:"파워워드 밀도",s:pScore,tip:pHits<1?"후킹 단어를 1개 이상 넣어보세요":`${pHits}개 감지`});
  // 3) 숫자/근거 포함(전환 신호)
  const numHits=(text.match(/\d/g)||[]).length;
  const nScore=clamp(numHits*12,0,100);
  checks.push({k:"구체적 수치",s:nScore,tip:numHits<2?"가격·수치·비율로 신뢰를 더하세요":`수치 ${numHits}개`});
  // 4) CTA(행동유도) 존재
  const ctaRe=/지금|오늘|확인|구매|클릭|만나|담기|→|now|shop/i;
  const ctaScore=ctaRe.test(text)?100:35;
  checks.push({k:"행동유도(CTA)",s:ctaScore,tip:ctaScore<100?"'지금 확인' 같은 CTA를 추가하세요":"있음"});
  // 5) 금칙어 클린(감점)
  const flags=scanBanned(text);
  const banPenalty=flags.filter(f=>f.lv==="bad").length*40+flags.filter(f=>f.lv==="warn").length*15;
  const cleanScore=clamp(100-banPenalty,0,100);
  checks.push({k:"광고규정 준수",s:cleanScore,tip:flags.length?`${flags.length}건 검토 필요`:"클린"});
  // 가중 종합 → 전환 점수
  const w=[.18,.22,.18,.22,.20];
  const total=Math.round(checks.reduce((a,c,i)=>a+c.s*w[i],0));
  // 예상 전환율 추정(데모용 휴리스틱) — [추정] 표기
  const estCvr=(0.6+total/100*3.4).toFixed(2);
  return {total,checks,flags,estCvr};
}
// F9 금칙어 스캔 — 실 정규식 + 브랜드 추가 금칙어
function scanBanned(text){
  const out=[];
  BANNED.forEach(b=>{if(b.re.test(text))out.push({lv:b.lv,msg:b.msg,m:(text.match(b.re)||[])[0]});});
  (state.brand.banExtra||[]).forEach(w=>{if(w&&text.includes(w))out.push({lv:"bad",msg:`브랜드 금칙어: "${w}"`,m:w});});
  return out;
}

function logGen(type,title,payload){
  state.history.unshift({id:uid(),seq:state.seq++,type,title,ts:now(),payload,
    score:payload&&payload.score!=null?payload.score:null});
  state.history=state.history.slice(0,120);
  state.usage.gen++; state.usage[type]=(state.usage[type]||0)+1;
  state.usage.tokens+=Math.round((JSON.stringify(payload).length)/3); // mock 토큰
  save();
}

/* ── 이미지 변형 (canvas) ── */
let imageState={prodId:null,filter:"none",bg:"#efeaff",ratio:"1:1",label:""};
const FILTERS={none:"원본",warm:"따뜻하게",cool:"시원하게",mono:"흑백",vivid:"선명하게",soft:"부드럽게",vintage:"빈티지"};
const RATIOS={"1:1":[400,400],"4:5":[360,450],"16:9":[480,270],"story":[300,533]};
function vImage(){
  if(!imageState.prodId&&state.products[0])imageState.prodId=state.products[0].id;
  return `<h2 class="vt">이미지 변형</h2><p class="vdesc">canvas로 썸네일·배경·필터를 <b>실제로 픽셀 처리</b>해요(mock 토스트 아님). PNG로 다운로드 가능.</p>
  <div class="grid g2">
    <div class="card">
      <div class="field"><label class="fl">제품</label><select class="inp" onchange="imageState.prodId=this.value;drawImage()">${state.products.map(x=>`<option value="${x.id}" ${x.id===imageState.prodId?"selected":""}>${x.name}</option>`).join("")}</select></div>
      <div class="field"><label class="fl">비율(채널 규격)</label>
        <div class="seg">${Object.keys(RATIOS).map(r=>`<button class="${imageState.ratio===r?'on':''}" onclick="imageState.ratio='${r}';render();drawImage()">${r}</button>`).join("")}</div></div>
      <div class="field"><label class="fl">필터</label>
        <div class="row">${Object.entries(FILTERS).map(([k,v])=>`<span class="chip act ${imageState.filter===k?'on':''}" onclick="imageState.filter='${k}';drawImage()">${v}</span>`).join("")}</div></div>
      <div class="field"><label class="fl">배경색</label><input type="color" id="bgPick" value="${imageState.bg}" onchange="imageState.bg=this.value;drawImage()" style="width:60px;height:40px;border:1px solid var(--line);border-radius:8px"></div>
      <div class="field"><label class="fl">오버레이 문구(선택)</label><input class="inp" id="ovLabel" value="${imageState.label}" oninput="imageState.label=this.value;drawImage()" placeholder="예: 오늘만 20%"></div>
      <button class="btn" onclick="downloadImage()">⤓ PNG 다운로드</button>
      <button class="btn gho" onclick="genVariants()">▩ 변형 6종 한 번에</button>
    </div>
    <div class="card">
      <b>미리보기</b>
      <div style="display:grid;place-items:center;margin-top:12px"><canvas id="cv" width="400" height="400" style="max-width:100%;border:1px solid var(--line);border-radius:12px"></canvas></div>
    </div>
  </div>
  <div class="card" style="margin-top:16px"><b>변형 갤러리</b><div class="kgrid" id="variantGrid" style="margin-top:12px"></div></div>`;
}
vImage._after=function(){drawImage();}
function drawCanvasInto(cv,p,filter,bg,ratio,label){
  const[w,h]=RATIOS[ratio]||[400,400];cv.width=w;cv.height=h;const x=cv.getContext("2d");
  // 배경 그라데이션
  const g=x.createLinearGradient(0,0,w,h);g.addColorStop(0,bg);g.addColorStop(1,shade(bg,-18));
  x.fillStyle=g;x.fillRect(0,0,w,h);
  // 제품 "이미지" 대용 — 결정론적 도형 패턴(실 픽셀)
  const r=rng(p.id+ratio);const lex=CAT_LEX[p.cat]||CAT_LEX.living;
  for(let i=0;i<5;i++){x.globalAlpha=.12+r()*.1;x.fillStyle=shade(bg,-30-i*8);
    const cx=r()*w,cy=r()*h,rad=40+r()*120;x.beginPath();x.arc(cx,cy,rad,0,7);x.fill();}
  x.globalAlpha=1;
  // 중앙 카드
  x.fillStyle="rgba(255,255,255,.92)";roundRect(x,w*.12,h*.34,w*.76,h*.32,16);x.fill();
  x.fillStyle="#1c1830";x.font="700 "+Math.round(w*.062)+"px -apple-system,sans-serif";x.textAlign="center";
  wrapText(x,p.name,w/2,h*.45,w*.66,Math.round(w*.072));
  x.fillStyle="#6b4bf5";x.font="800 "+Math.round(w*.07)+"px sans-serif";
  x.fillText(p.price.toLocaleString()+"원",w/2,h*.6);
  x.fillStyle="#928da6";x.font="600 "+Math.round(w*.034)+"px sans-serif";
  x.fillText(lex.ko+" · "+(p.keywords[0]||""),w/2,h*.66);
  // 필터 픽셀 처리(실 ImageData 변환)
  if(filter!=="none"){const im=x.getImageData(0,0,w,h),d=im.data;
    for(let i=0;i<d.length;i+=4){let[R,G,B]=[d[i],d[i+1],d[i+2]];
      if(filter==="warm"){R=clamp(R+22,0,255);B=clamp(B-18,0,255);}
      else if(filter==="cool"){B=clamp(B+24,0,255);R=clamp(R-14,0,255);}
      else if(filter==="mono"){const m=R*.3+G*.59+B*.11;R=G=B=m;}
      else if(filter==="vivid"){const m=(R+G+B)/3;R=clamp(m+(R-m)*1.5,0,255);G=clamp(m+(G-m)*1.5,0,255);B=clamp(m+(B-m)*1.5,0,255);}
      else if(filter==="soft"){const m=(R+G+B)/3;R=(R+m)/2;G=(G+m)/2;B=(B+m)/2;}
      else if(filter==="vintage"){R=clamp(R*1.1+18,0,255);G=clamp(G*.95+12,0,255);B=clamp(B*.8,0,255);}
      d[i]=R;d[i+1]=G;d[i+2]=B;}
    x.putImageData(im,0,0);}
  // 오버레이 라벨
  if(label){x.fillStyle="#d94848";roundRect(x,w*.06,h*.06,Math.max(w*.3,label.length*w*.04),h*.09,8);x.fill();
    x.fillStyle="#fff";x.font="800 "+Math.round(w*.045)+"px sans-serif";x.textAlign="left";
    x.fillText(label,w*.1,h*.06+h*.062);x.textAlign="center";}
  // 워터마크(데모 정직)
  x.fillStyle="rgba(28,24,48,.28)";x.font="600 "+Math.round(w*.026)+"px sans-serif";x.textAlign="right";
  x.fillText("셀러스튜디오 · canvas 생성",w-8,h-8);
}
function drawImage(){const cv=$("#cv");if(!cv)return;const p=state.products.find(x=>x.id===imageState.prodId);if(!p)return;
  drawCanvasInto(cv,p,imageState.filter,imageState.bg,imageState.ratio,imageState.label);}
function downloadImage(){const cv=$("#cv");const p=state.products.find(x=>x.id===imageState.prodId);
  const a=document.createElement("a");a.download=`${p.name}_${imageState.ratio}_${imageState.filter}.png`;a.href=cv.toDataURL("image/png");a.click();
  logGen("image",p.name+" 이미지("+imageState.filter+")",{score:null});render?0:0;toast("PNG로 저장했어요");}
function genVariants(){const p=state.products.find(x=>x.id===imageState.prodId);if(!p)return;
  const grid=$("#variantGrid");grid.innerHTML="";const fils=Object.keys(FILTERS).slice(0,6);
  fils.forEach(f=>{const wrap=document.createElement("div");wrap.className="thumb";
    const c=document.createElement("canvas");drawCanvasInto(c,p,f,imageState.bg,"1:1","");
    wrap.appendChild(c);const cap=document.createElement("div");cap.className="cap";
    cap.innerHTML=`<span>${FILTERS[f]}</span><a style="cursor:pointer" onclick="(()=>{const a=document.createElement('a');a.download='${p.name}_${f}.png';a.href=this.parentNode.parentNode.querySelector('canvas').toDataURL();a.click();})()">⤓</a>`;
    wrap.appendChild(cap);grid.appendChild(wrap);});
  logGen("image",p.name+" 변형 6종",{score:null});state.usage.image+=5;save();toast("변형 6종을 만들었어요");}
function shade(hex,p){let c=hex.replace("#","");if(c.length===3)c=c.split("").map(x=>x+x).join("");
  let r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
  r=clamp(r+p,0,255);g=clamp(g+p,0,255);b=clamp(b+p,0,255);
  return "#"+[r,g,b].map(v=>v.toString(16).padStart(2,"0")).join("");}
function roundRect(x,a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath();}
function wrapText(ctx,text,x,y,maxW,lh){const words=text.split("");let line="",ly=y;
  for(const ch of words){if(ctx.measureText(line+ch).width>maxW&&line){ctx.fillText(line,x,ly);line=ch;ly+=lh;}else line+=ch;}ctx.fillText(line,x,ly);}

  return `<h2 class="vt">A/B 변형 비교</h2><p class="vdesc">같은 제품을 <b>4가지 톤</b>으로 변형 생성하고, 룰 기반 eval 점수로 자동 비교해요(승자 강조).</p>
  <div class="card">
    <div class="grid g2">
      <div class="field"><label class="fl">제품</label><select class="inp" onchange="abState.prodId=this.value">${state.products.map(x=>`<option value="${x.id}" ${x.id===abState.prodId?"selected":""}>${x.name}</option>`).join("")}</select></div>

function runAB(){
  const p=state.products.find(x=>x.id===abState.prodId);if(!p)return;
  abState.variants=Object.keys(TONES).map(tone=>{
    const c=genChannelCopy(p,abState.channel,tone,state.lang);
    const sc=scoreContent(c.title+" "+c.body,{idealMin:30,idealMax:CHANNELS[abState.channel].bodyMax});
    return {tone,...c,score:sc};});
  abState.variants.sort((a,b)=>b.score.total-a.score.total);
  state.usage.ab++;logGen("ab",p.name+" A/B 4종",{score:abState.variants[0].score.total});
  render();toast("A/B 변형을 비교했어요");

  dl("products.csv","﻿"+rows.map(r=>r.map(csvEsc).join(",")).join("\n"),"text/csv");}
