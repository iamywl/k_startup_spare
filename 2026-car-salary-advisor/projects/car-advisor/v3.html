    /* ⓘ 툴팁 (순수 CSS hover/focus, 외부 라이브러리 없음) */

  <!-- 데이터: Agent A가 작성. v3 신규 전역(realEfficiency·SUBSIDY_STOCK·OPTION_REVIEW·OPTION_PACKAGE·PERSONA_POPULAR·FINANCE·SOURCE_META) 부재 시 안전 fallback -->

<body class="text-ink-900">
  <div id="app"></div>
  <div id="toastHost" class="fixed left-1/2 -translate-x-1/2 bottom-6 z-[60] flex flex-col items-center gap-2 pointer-events-none"></div>

  <script>
  "use strict";

  // ===== 전역 데이터 안전 참조 (v1 + v2) =====
  const CARS        = Array.isArray(window.CARS) ? window.CARS : [];
  const OPTION_META = Array.isArray(window.OPTION_META) ? window.OPTION_META : [];
  const GROUP_META  = window.GROUP_META || {};
  const PERSONAS    = Array.isArray(window.PERSONAS) ? window.PERSONAS : [];
  const SYNONYMS    = window.SYNONYMS || {};
  const COST        = window.COST || {};

  const REGIONS = Array.isArray(window.REGIONS) && window.REGIONS.length
    ? window.REGIONS
    : [{ code: 'seoul', name: '서울', evLocalManwon: 150 }];
  const SUBSIDY = (window.SUBSIDY && window.SUBSIDY.ev)
    ? window.SUBSIDY
    : { ev: { nationalMaxManwon: 650, fullPriceCapManwon: 5500, halfPriceCapManwon: 8500 },
        taxBenefit: { EV: { gaesoseManwon: 300, chwideukManwon: 140 }, '하이브리드': { gaesoseManwon: 0, chwideukManwon: 40 } } };

  // ===== v3 신규 전역 (계약 A2) — 부재 시 안전 fallback =====
  const SUBSIDY_STOCK  = (window.SUBSIDY_STOCK  && typeof window.SUBSIDY_STOCK  === 'object') ? window.SUBSIDY_STOCK  : {};
  const OPTION_REVIEW  = (window.OPTION_REVIEW  && typeof window.OPTION_REVIEW  === 'object') ? window.OPTION_REVIEW  : {};
  const OPTION_PACKAGE = (window.OPTION_PACKAGE && typeof window.OPTION_PACKAGE === 'object') ? window.OPTION_PACKAGE : {};
  const PERSONA_POPULAR= (window.PERSONA_POPULAR&& typeof window.PERSONA_POPULAR=== 'object') ? window.PERSONA_POPULAR: {};
  const FINANCE        = (window.FINANCE        && typeof window.FINANCE        === 'object') ? window.FINANCE
                        : { loanAprPct: 6.5, loanMonths: 60, rentResidualPct: 0.40, rentAprPct: 8.0 };
  const SOURCE_META    = (window.SOURCE_META    && typeof window.SOURCE_META    === 'object') ? window.SOURCE_META : {};

  const OPTION_BY_KEY = {};
  OPTION_META.forEach(o => { OPTION_BY_KEY[o.key] = o; });
  const GROUP_ORDER = ['climate', 'parking', 'digital', 'longdrive', 'cargo'];

  // 옵션 직관 아이콘 (D31) — 키별 이모지
  const OPTION_ICON = {
    frontHeatedSeat:'🔥', rearHeatedSeat:'🔥', heatedWheel:'🧤', frontVentSeat:'💨', rearVentSeat:'💨',
    remoteClimate:'📲', multiZoneHvac:'🌡️', memorySeat:'💺',
    svm:'🛰️', parkingSensor:'📢', rearCam:'📷', rspa:'🅿️', bvm:'👀', ledHeadlamp:'💡',
    oemNavi:'🗺️', phoneProjection:'📱', wirelessCharger:'🔋', hud:'🪟', ota:'🛰️',
    scc:'🚙', lfa:'↔️', hda:'🛣️', fca:'🛑', bca:'⚠️', rcca:'⚠️', ecs:'🪶', autoHold:'⏸️',
    powerTailgate:'🚪', flatFold:'🛏️', rearSunshade:'🌂', outlet220v:'🔌', sunroof:'🌤️'
  };
  function optIcon(key) { return OPTION_ICON[key] || '•'; }

  const OPTION_DESC = (window.OPTION_DESC && typeof window.OPTION_DESC === 'object') ? window.OPTION_DESC : {};
  const FIN_DESC = {
    realPrice: '정가에서 보조금을 뺀, 실제로 내 돈으로 사는 가격이에요. 전기차는 국고+지자체 보조금을 빼고 비교해요.',
    subsidy:   '전기차에 주는 국고+지자체 보조금이에요. 차량가와 사는 지역에 따라 받는 금액이 달라져요. [추정 2025]',
    tco:       '실구매가에 5년간 유지비를 더하고 나중에 되팔 때 가치(잔존가치)를 뺀 진짜 총비용이에요. 싸 보여도 유지비·감가가 크면 TCO는 높아져요.',
    burden:    '연봉(또는 월소득) 대비 차값·유지비가 차지하는 비중이에요. 낮을수록 부담이 적어 형편에 맞는 차예요.',
    monthlyBurden: '60개월 할부 추정 원리금 + 월 유지비를 월 실수령(연봉/12 근사) 대비 비율로 본 거예요. 20% 이하면 안전, 30%를 넘으면 부담이 커요. [추정]',
    realEff: '공인연비는 시험실 기준이고, 실연비는 실제 도로에서 체감하는 값에 가까워요. 보통 공인의 80~95% 수준이에요. [추정]'
  };
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/"/g, '&quot;')
      .replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function infoTip(text, align) {
    const t = (text || '').trim();
    if (!t) return '';
    const popCls = align === 'left' ? ' pop-left' : (align === 'right' ? ' pop-right' : '');
    return `<span class="info"><span class="info-dot" tabindex="0" role="img" aria-label="설명: ${esc(t)}">i</span><span class="info-pop${popCls}" role="tooltip">${esc(t)}</span></span>`;
  }
  // 옵션 툴팁: 설명 + (있으면) 체감 후기 한 줄 (D26)
  function optionTipText(key) {
    const desc = OPTION_DESC[key] || '';
    const rev = OPTION_REVIEW[key];
    if (rev) return (desc ? desc + ' ' : '') + '— ' + rev + ' [mock]';
    return desc;
  }
  function optionTip(key, align) { return infoTip(optionTipText(key), align); }

  // ===== 상태 (localStorage 영속, 키 carAdvisorV3) =====
  const LS_KEY = 'carAdvisorV3';
  const defaultState = {
    salary: 5000,
    km: 13000,
    risk: 0.5,
    preset: 'balanced',
    fuelPref: [],
    region: REGIONS[0].code,
    homeCharge: true,
    // v3 라이프스타일 입력 (D2)
    commuteKm: 25,           // 출퇴근 거리 km/일 (왕복)
    familyCount: 2,          // 가족(탑승) 수
    submitted: false,
    // 결과 필터
    facetFuel: [],
    facetSegment: [],
    requiredOptions: [],
    excludedOptions: [],     // v3 D17 부정 검색 제외 옵션
    activePersonas: [],
    safe5Only: false,
    mechParkOnly: false,
    budgetSpread: false,     // v3 D5 ±1 예산구간 보기
    sort: 'score',
    compare: [],
    detailId: null,
    profiles: [],
    activeProfileId: null,
    syncLog: [],
    syncedSubsidyAt: null,
    syncedFuelAt: null
  };

  function loadState() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return { ...defaultState };
      const parsed = JSON.parse(raw);
      return { ...defaultState, ...parsed };
    } catch (e) {
      return { ...defaultState };
    }
  }
  function saveState() {
    try {
      const persist = {
        salary: state.salary, km: state.km, risk: state.risk, preset: state.preset,
        fuelPref: state.fuelPref, region: state.region, homeCharge: state.homeCharge,
        commuteKm: state.commuteKm, familyCount: state.familyCount,
        submitted: state.submitted,
        facetFuel: state.facetFuel, facetSegment: state.facetSegment,
        requiredOptions: state.requiredOptions, excludedOptions: state.excludedOptions,
        activePersonas: state.activePersonas,
        safe5Only: state.safe5Only, mechParkOnly: state.mechParkOnly, budgetSpread: state.budgetSpread,
        sort: state.sort, compare: state.compare,
        profiles: state.profiles, activeProfileId: state.activeProfileId,
        syncLog: state.syncLog, syncedSubsidyAt: state.syncedSubsidyAt, syncedFuelAt: state.syncedFuelAt
      };
      localStorage.setItem(LS_KEY, JSON.stringify(persist));
    } catch (e) { /* 저장 실패 무시 */ }
  }

  let state = loadState();
  if (!REGIONS.some(r => r.code === state.region)) state.region = REGIONS[0].code;

  // ===== 유지비 계산 (v1/v2 그대로) =====
  function fuelPrice(fuel) {
    const m = COST.fuelPriceWon || {};
    return m[fuel] != null ? m[fuel] : 1650;
  }
  function autoTaxWon(car) {
    if (car.fuel === 'EV') return COST.autoTaxEvFlatWon || 130000;
    const tiers = COST.autoTaxPerCc || [];
    let perCc = 200;
    for (const t of tiers) {
      if (car.displacementCc <= t.max) { perCc = t.won; break; }
    }
    return Math.round((car.displacementCc || 0) * perCc * 1.3);
  }
  function insuranceWon(car) {
    const base = COST.insuranceBaseWon != null ? COST.insuranceBaseWon : 400000;
    const rate = COST.insurancePriceRate != null ? COST.insurancePriceRate : 0.012;
    return Math.round(base + (car.price * 10000) * rate);
  }
  function maintWon(car) {
    const m = COST.maintByFuelWon || {};
    return m[car.fuel] != null ? m[car.fuel] : 600000;
  }
  function fuelCostWon(car, km) {
    const eff = car.efficiency || 1;
    const liters = km / eff;
    return Math.round(liters * fuelPrice(car.fuel === 'EV' ? 'EV' : car.fuel));
  }
  function costBreakdown(car, km) {
    const fuel = fuelCostWon(car, km);
    const tax = autoTaxWon(car);
    const ins = insuranceWon(car);
    const maint = maintWon(car);
    const total = fuel + tax + ins + maint;
    return { fuel, tax, ins, maint, total, monthly: Math.round(total / 12) };
  }

  // ===== v2 전기차 보조금 =====
  function subsidyFor(car, regionCode) {
    const ev = SUBSIDY.ev || {};
    const code = regionCode || state.region;
    const region = REGIONS.find(r => r.code === code) || REGIONS[0];
    if (car.fuel !== 'EV') {
      return { national: 0, local: 0, sum: 0, realPrice: car.price, region, isEv: false };
    }
    const full = ev.fullPriceCapManwon != null ? ev.fullPriceCapManwon : 5500;
    const half = ev.halfPriceCapManwon != null ? ev.halfPriceCapManwon : 8500;
    const nat = ev.nationalMaxManwon != null ? ev.nationalMaxManwon : 650;
    const national = car.price < full ? nat : (car.price < half ? Math.round(nat * 0.5) : 0);
    const local = region ? (region.evLocalManwon || 0) : 0;
    const sum = national + local;
    const realPrice = Math.max(0, car.price - sum);
    return { national, local, sum, realPrice, region, isEv: true };
  }
  function effectivePrice(car) {
    return subsidyFor(car).realPrice;
  }
  function taxBenefitManwon(car) {
    const tb = (SUBSIDY.taxBenefit || {})[car.fuel];
    if (!tb) return 0;
    return (tb.gaesoseManwon || 0) + (tb.chwideukManwon || 0);
  }

  // ===== v2 5년 TCO =====
  function tco5(car) {
    const real = effectivePrice(car) * 10000;
    const annualOp = costBreakdown(car, state.km).total;
    const op5 = annualOp * 5;
    const dep = (car.depreciationRate != null ? car.depreciationRate : 0.14);
    const residual = Math.round(car.price * 10000 * Math.pow(1 - dep, 5));
    const total = real + op5 - residual;
    return { real, op5, residual, total, dep };
  }

  // ===== v3 금융 계산 (D9·D10) =====
  // 원리금 균등상환 월 납입금(원). principalWon: 원, aprPct: 연%, months: 개월
  function monthlyPayment(principalWon, aprPct, months) {
    const r = (aprPct / 100) / 12;
    if (months <= 0) return principalWon;
    if (r <= 0) return Math.round(principalWon / months);
    const f = Math.pow(1 + r, months);
    return Math.round(principalWon * (r * f) / (f - 1));
  }
  // 월 차량지출(원) = 60개월 할부 추정 원리금 + 월 유지비 (D9)
  function monthlyCarSpend(car) {
    const principal = effectivePrice(car) * 10000;
    const loan = monthlyPayment(principal, FINANCE.loanAprPct, FINANCE.loanMonths || 60);
    const maint = costBreakdown(car, state.km).monthly;
    return { loan, maint, total: loan + maint };
  }
  // 월 실수령 근사 (연봉/12)
  function monthlyIncomeWon() { return state.salary > 0 ? (state.salary * 10000) / 12 : 0; }
  // D9 부담률 신호등
  function spendSignal(car) {
    const inc = monthlyIncomeWon();
    const spend = monthlyCarSpend(car).total;
    if (inc <= 0) return { lvl: 'na', label: '연봉 입력', ratio: 0, cls: 'bg-ink-100 text-ink-500', dot: '#8A93A3' };
    const ratio = Math.round((spend / inc) * 1000) / 10;
    if (ratio <= 20) return { lvl: 'green', label: '여유', ratio, cls: 'bg-[#E7F7EF] text-emerald-600', dot: '#14AE5C' };
    if (ratio <= 30) return { lvl: 'amber', label: '적정', ratio, cls: 'bg-[#FFF6E5] text-amber-600', dot: '#FFB331' };
    return { lvl: 'red', label: '부담', ratio, cls: 'bg-[#FDECEE] text-rose-600', dot: '#F04452' };
  }
  // D10 구매방식 비교 (현금 / 60개월 할부 / 장기렌트 48개월)
  function purchaseCompare(car) {
    const priceWon = effectivePrice(car) * 10000;
    const months = FINANCE.loanMonths || 60;
    // 현금: 실구매가 일시불
    const cash = { total: priceWon };
    // 할부: 월 납입 × 개월 (이자 포함 총액)
    const loanM = monthlyPayment(priceWon, FINANCE.loanAprPct, months);
    const loan = { monthly: loanM, total: loanM * months };
    // 장기렌트: 잔가 제외 원금에 렌트 이율, 48개월(잔가 반납형) — 총 납입(보유 안 함)
    const rentMonths = 48;
    const residual = priceWon * (FINANCE.rentResidualPct != null ? FINANCE.rentResidualPct : 0.4);
    const rentPrincipal = priceWon - residual;
    const rentM = monthlyPayment(rentPrincipal, FINANCE.rentAprPct, rentMonths) + Math.round(residual * ((FINANCE.rentAprPct/100)/12));
    const rent = { monthly: rentM, total: rentM * rentMonths, months: rentMonths, residual };
    return { cash, loan, rent, months };
  }

  // ===== v3 EV vs 가솔린 연료비 (D13) =====
  function evVsGasFuel(car) {
    // 같은 주행거리(state.km) 기준 EV 충전비 vs 동급(같은 세그먼트) 가솔린 대표 유류비
    const evCost = fuelCostWon(car, state.km);
    const gasPeers = CARS.filter(c => c.segment === car.segment && c.fuel === '가솔린');
    let gasCost, peerName;
    if (gasPeers.length) {
      // 같은 세그먼트 가솔린 평균 연비로 근사
      const avgEff = gasPeers.reduce((s, c) => s + (c.efficiency || 0), 0) / gasPeers.length;
      gasCost = Math.round((state.km / (avgEff || 12)) * fuelPrice('가솔린'));
      peerName = `동급 가솔린(${car.segment}) 평균`;
    } else {
      gasCost = Math.round((state.km / 12) * fuelPrice('가솔린'));
      peerName = '동급 가솔린 추정(연비 12km/L)';
    }
    const save = gasCost - evCost;
    return { evCost, gasCost, save, peerName };
  }

  // ===== v2 파생 속성 =====
  function kncap(car) { return car.kncapGrade != null ? car.kncapGrade : null; }
  function mechParkOk(car) {
    const l = car.lengthMm, w = car.widthMm, kg = car.weightKg;
    if (l == null || w == null || kg == null) return false;
    return l <= 5050 && w <= 1900 && kg <= 2300;
  }
  // v3 실연비 (D25) — 부재 시 공인×0.87 근사
  function realEff(car) {
    if (car.realEfficiency != null) return car.realEfficiency;
    return Math.round((car.efficiency || 0) * 0.87 * 10) / 10;
  }
  // v3 보조금 잔여 배지 (D14)
  function subsidyStock(regionCode) {
    const v = SUBSIDY_STOCK[regionCode || state.region];
    if (v == null) return null;
    if (v <= 0.2) return { ratio: v, label: '잔여 적음', cls: 'bg-[#FDECEE] text-rose-600' };
    if (v <= 0.4) return { ratio: v, label: '잔여 보통', cls: 'bg-[#FFF6E5] text-amber-600' };
    return { ratio: v, label: '잔여 여유', cls: 'bg-[#E7F7EF] text-emerald-600' };
  }

  // ===== 포맷 헬퍼 =====
  const fmtMan = n => Math.round(n).toLocaleString('ko-KR');
  const fmtWon = n => Math.round(n).toLocaleString('ko-KR');
  const won2man = won => Math.round(won / 10000);
  const pct = (a, b) => (b > 0 ? Math.round((a / b) * 1000) / 10 : 0);
  const stars = g => g ? '★'.repeat(g) + '☆'.repeat(Math.max(0, 5 - g)) : '–';
  const fmtTs = ts => { const d = new Date(ts); const p = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; };

  // ===== 추천 점수 (v1/v2 + v3 commute/family 가점) =====
  const PRESET_WEIGHTS = {
    options:  { opt: 0.55, value: 0.15, cost: 0.15, burden: 0.15 },
    cost:     { opt: 0.20, value: 0.20, cost: 0.45, burden: 0.15 },
    price:    { opt: 0.15, value: 0.45, cost: 0.15, burden: 0.25 },
    balanced: { opt: 0.30, value: 0.25, cost: 0.25, burden: 0.20 }
  };
  const PRESETS = [
    { key: 'options', label: '옵션 중시' },
    { key: 'cost', label: '유지비 중시' },
    { key: 'price', label: '가격 중시' },
    { key: 'balanced', label: '표준' }
  ];

  function optWeight(key) {
    const m = OPTION_BY_KEY[key];
    if (!m) return 1;
    if (m.valueWeight === 'high') return 1.6;
    if (m.valueWeight === 'low') return 0.6;
    return 1;
  }
  function carOptionCount(car) {
    let c = 0;
    OPTION_META.forEach(o => { if (car.options && car.options[o.key]) c++; });
    return c;
  }
  function buildSegmentStats(cars) {
    const stats = {};
    cars.forEach(c => {
      const s = c.segment || '기타';
      if (!stats[s]) stats[s] = { minPrice: Infinity, maxPrice: -Infinity, minOpt: Infinity, maxOpt: -Infinity };
      const oc = carOptionCount(c);
      const p = effectivePrice(c);
      stats[s].minPrice = Math.min(stats[s].minPrice, p);
      stats[s].maxPrice = Math.max(stats[s].maxPrice, p);
      stats[s].minOpt = Math.min(stats[s].minOpt, oc);
      stats[s].maxOpt = Math.max(stats[s].maxOpt, oc);
    });
    return stats;
  }
  function buildGlobalStats(cars) {
    let minM = Infinity, maxM = -Infinity, minB = Infinity, maxB = -Infinity;
    const salaryWon = state.salary * 10000;
    cars.forEach(c => {
      const cb = costBreakdown(c, state.km);
      minM = Math.min(minM, cb.monthly); maxM = Math.max(maxM, cb.monthly);
      const burden = salaryWon > 0 ? (effectivePrice(c) * 10000) / salaryWon : 0;
      minB = Math.min(minB, burden); maxB = Math.max(maxB, burden);
    });
    return { minM, maxM, minB, maxB };
  }
  function norm(v, lo, hi) {
    if (!isFinite(lo) || !isFinite(hi) || hi <= lo) return 0.5;
    return (v - lo) / (hi - lo);
  }

  function scoreCar(car, ctx) {
    const w = PRESET_WEIGHTS[state.preset] || PRESET_WEIGHTS.balanced;
    const required = state.requiredOptions;

    let reqScore = 1;
    if (required.length) {
      let hit = 0;
      required.forEach(k => { if (car.options && car.options[k]) hit++; });
      reqScore = hit / required.length;
    }
    let wsum = 0;
    OPTION_META.forEach(o => { if (car.options && car.options[o.key]) wsum += optWeight(o.key); });
    const richness = norm(wsum, ctx.minWsum, ctx.maxWsum);
    const optScore = 0.6 * reqScore + 0.4 * richness;

    const seg = ctx.segStats[car.segment] || {};
    const oc = carOptionCount(car);
    const optN = norm(oc, seg.minOpt, seg.maxOpt);
    const priceN = norm(effectivePrice(car), seg.minPrice, seg.maxPrice);
    const valueScore = Math.max(0, Math.min(1, 0.5 + (optN - priceN) / 2));

    const cb = costBreakdown(car, state.km);
    const costScore = 1 - norm(cb.monthly, ctx.g.minM, ctx.g.maxM);

    const salaryWon = state.salary * 10000;
    const burden = salaryWon > 0 ? (effectivePrice(car) * 10000) / salaryWon : 1;
    const burdenScore = 1 - norm(burden, ctx.g.minB, ctx.g.maxB);

    let raw = w.opt * optScore + w.value * valueScore + w.cost * costScore + w.burden * burdenScore;

    // EV 충전 환경 보정 (v2 B4)
    let chargeAdj = 0;
    if (car.fuel === 'EV') {
      chargeAdj = state.homeCharge ? 0.06 : -0.10;
    }
    // v3 라이프스타일 가점 (D2 §7.2 가점) — 하드 제외는 마법사가 필터로 처리, 여기선 부드러운 가점
    let lifeAdj = 0;
    if (state.commuteKm >= 50 && (car.fuel === '하이브리드' || car.fuel === '디젤' || car.fuel === 'EV')) lifeAdj += 0.03;
    if (state.commuteKm >= 50 && car.options && car.options.scc && car.options.lfa) lifeAdj += 0.02;
    if (state.familyCount >= 4 && (car.seats || 0) >= 5) lifeAdj += 0.02;

    raw = Math.max(0, Math.min(1, raw + chargeAdj + lifeAdj));
    return Math.round(raw * 1000) / 10;
  }

  // ===== 필터 파이프라인 (v1/v2 + v3 제외옵션·예산구간) =====
  function passFacets(car) {
    if (state.facetFuel.length && !state.facetFuel.includes(car.fuel)) return false;
    if (state.facetSegment.length && !state.facetSegment.includes(car.segment)) return false;
    return true;
  }
  function passRequiredOptions(car) {
    return state.requiredOptions.every(k => car.options && car.options[k]);
  }
  // v3 D17: 제외 옵션을 가진 차는 탈락
  function passExcludedOptions(car) {
    return state.excludedOptions.every(k => !(car.options && car.options[k]));
  }
  function passFuelPref(car) {
    if (!state.fuelPref.length) return true;
    return state.fuelPref.includes(car.fuel);
  }
  function passV2Filters(car) {
    if (state.safe5Only && kncap(car) !== 5) return false;
    if (state.mechParkOnly && !mechParkOk(car)) return false;
    return true;
  }
  // v3 D5: 예산 구간(연봉×성향) — 기본은 ±0%, budgetSpread 시 ±35% 확장
  function passBudget(car) {
    if (!state.budgetSpread) return true; // 토글 OFF면 예산 하드 필터 미적용 (v2 동작 보존)
    return true; // budgetSpread ON일 때는 "한 칸 위/아래까지 포함" = 제한 완화이므로 항상 통과
  }

  function getResults() {
    const segStats = buildSegmentStats(CARS);
    const g = buildGlobalStats(CARS);
    let minWsum = Infinity, maxWsum = -Infinity;
    CARS.forEach(c => {
      let ws = 0;
      OPTION_META.forEach(o => { if (c.options && c.options[o.key]) ws += optWeight(o.key); });
      minWsum = Math.min(minWsum, ws); maxWsum = Math.max(maxWsum, ws);
    });
    const ctx = { segStats, g, minWsum, maxWsum };

    let list = CARS.filter(c => passFuelPref(c) && passFacets(c) && passRequiredOptions(c)
      && passExcludedOptions(c) && passV2Filters(c) && passBudget(c));
    list = list.map(c => ({
      car: c, score: scoreCar(c, ctx), cost: costBreakdown(c, state.km),
      sub: subsidyFor(c), tco: tco5(c)
    }));

    list.sort((a, b) => {
      switch (state.sort) {
        case 'cost': return a.cost.monthly - b.cost.monthly;
        case 'price': return a.sub.realPrice - b.sub.realPrice;
        case 'eff': return (b.car.efficiency || 0) - (a.car.efficiency || 0);
        case 'tco': return a.tco.total - b.tco.total;
        case 'spend': return monthlyCarSpend(a.car).total - monthlyCarSpend(b.car).total; // v3 월지출순
        case 'score':
        default: return b.score - a.score;
      }
    });
    return list;
  }

  function facetCounts(dimension) {
    const counts = {};
    CARS.forEach(c => {
      if (!passFuelPref(c)) return;
      if (!passRequiredOptions(c)) return;
      if (!passExcludedOptions(c)) return;
      if (!passV2Filters(c)) return;
      if (dimension !== 'fuel') {
        if (state.facetFuel.length && !state.facetFuel.includes(c.fuel)) return;
      }
      if (dimension !== 'segment') {
        if (state.facetSegment.length && !state.facetSegment.includes(c.segment)) return;
      }
      const key = dimension === 'fuel' ? c.fuel : c.segment;
      counts[key] = (counts[key] || 0) + 1;
    });
    return counts;
  }

  function allFuels() { return [...new Set(CARS.map(c => c.fuel))]; }
  function allSegments() { return [...new Set(CARS.map(c => c.segment))]; }

  // ===== 예산 신호등 (실구매가 기준) =====
  function budgetSignal(car) {
    const cap = state.salary * state.risk;
    if (cap <= 0) return { color: 'ink', label: '연봉 입력', cls: 'bg-ink-100 text-ink-500' };
    const ratio = effectivePrice(car) / cap;
    if (ratio <= 1.0) return { color: 'green', label: '여유', cls: 'bg-[#E7F7EF] text-emerald-600' };
    if (ratio <= 1.35) return { color: 'amber', label: '적정', cls: 'bg-[#FFF6E5] text-amber-600' };
    return { color: 'red', label: '부담', cls: 'bg-[#FDECEE] text-rose-600' };
  }

  // ===== 검색 (v1 + v3 부정 검색 D17) =====
  // "통풍 빼고", "선루프 없는" → {keys: 포함, negKeys: 제외}
  const NEG_TOKENS = ['빼고', '제외', '없는', '없이', '말고', '빼줘', '빼', '제거', '안나오', '안 나오'];
  function searchToOptionKeys(query) {
    const raw = (query || '');
    if (!raw.trim()) return { keys: [], negKeys: [] };
    // 부정 의도 토큰을 찾아 텍스트에서 제거하고, 매칭 옵션을 negKeys 로
    let isNeg = false;
    let cleaned = raw;
    NEG_TOKENS.forEach(tok => {
      if (cleaned.includes(tok)) { isNeg = true; cleaned = cleaned.split(tok).join(' '); }
    });
    const q = cleaned.toLowerCase().replace(/\s+/g, '');
    const keys = new Set();
    if (q) {
      Object.keys(SYNONYMS).forEach(syn => {
        const s = syn.toLowerCase().replace(/\s+/g, '');
        if (s.includes(q) || q.includes(s)) SYNONYMS[syn].forEach(k => keys.add(k));
      });
      OPTION_META.forEach(o => {
        const hay = [(o.label || ''), (o.consumer || ''), (o.key || '')].join('').toLowerCase().replace(/\s+/g, '');
        if (hay.includes(q)) keys.add(o.key);
      });
    }
    const arr = [...keys];
    return isNeg ? { keys: [], negKeys: arr } : { keys: arr, negKeys: [] };
  }

  // ===== 토스트 =====
  function toast(msg, kind) {
    const host = document.getElementById('toastHost');
    if (!host) return;
    const el = document.createElement('div');
    const color = kind === 'error' ? 'bg-rose-500' : (kind === 'info' ? 'bg-ink-800' : 'bg-ink-900');
    el.className = `toast-in pointer-events-auto ${color} text-white text-sm font-semibold px-4 py-2.5 rounded-xl shadow-lg`;
    el.textContent = msg;
    host.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .25s'; setTimeout(() => el.remove(), 260); }, 1900);
  }

  // ===== D32 결과 공유 링크 — URL 쿼리 인코딩/복원 =====
  function encodeStateToQuery() {
    const p = new URLSearchParams();
    p.set('sal', state.salary); p.set('km', state.km); p.set('risk', state.risk);
    p.set('pre', state.preset); p.set('reg', state.region); p.set('hc', state.homeCharge ? 1 : 0);
    p.set('cm', state.commuteKm); p.set('fam', state.familyCount);
    if (state.fuelPref.length) p.set('fp', state.fuelPref.join('~'));
    if (state.facetFuel.length) p.set('ff', state.facetFuel.join('~'));
    if (state.facetSegment.length) p.set('fs', state.facetSegment.join('~'));
    if (state.requiredOptions.length) p.set('req', state.requiredOptions.join('~'));
    if (state.excludedOptions.length) p.set('exc', state.excludedOptions.join('~'));
    if (state.activePersonas.length) p.set('per', state.activePersonas.join('~'));
    if (state.safe5Only) p.set('s5', 1);
    if (state.mechParkOnly) p.set('mp', 1);
    if (state.budgetSpread) p.set('bs', 1);
    p.set('sort', state.sort); p.set('sub', 1);
    return p.toString();
  }
  function restoreStateFromQuery() {
    const p = new URLSearchParams(window.location.search);
    if (![...p.keys()].length) return false;
    const num = (k, d) => { const v = p.get(k); return v != null && v !== '' && !isNaN(+v) ? +v : d; };
    const arr = (k) => { const v = p.get(k); return v ? v.split('~').filter(Boolean) : []; };
    if (p.has('sal')) state.salary = Math.max(0, num('sal', state.salary));
    if (p.has('km')) state.km = num('km', state.km);
    if (p.has('risk')) state.risk = num('risk', state.risk);
    if (p.has('pre') && PRESETS.some(x => x.key === p.get('pre'))) state.preset = p.get('pre');
    if (p.has('reg') && REGIONS.some(r => r.code === p.get('reg'))) state.region = p.get('reg');
    if (p.has('hc')) state.homeCharge = p.get('hc') === '1';
    if (p.has('cm')) state.commuteKm = num('cm', state.commuteKm);
    if (p.has('fam')) state.familyCount = num('fam', state.familyCount);
    if (p.has('fp')) state.fuelPref = arr('fp').filter(f => allFuels().includes(f));
    if (p.has('ff')) state.facetFuel = arr('ff').filter(f => allFuels().includes(f));
    if (p.has('fs')) state.facetSegment = arr('fs').filter(s => allSegments().includes(s));
    if (p.has('req')) state.requiredOptions = arr('req').filter(k => OPTION_BY_KEY[k]);
    if (p.has('exc')) state.excludedOptions = arr('exc').filter(k => OPTION_BY_KEY[k]);
    if (p.has('per')) state.activePersonas = arr('per').filter(t => PERSONAS.some(x => x.tag === t));
    state.safe5Only = p.get('s5') === '1';
    state.mechParkOnly = p.get('mp') === '1';
    state.budgetSpread = p.get('bs') === '1';
    if (p.has('sort')) state.sort = p.get('sort');
    if (p.get('sub') === '1') state.submitted = true;
    detailKm = state.km;
    return true;
  }
  function shareLink() {
    const url = `${location.origin}${location.pathname}?${encodeStateToQuery()}`;
    const done = () => toast('공유 링크를 복사했어요');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(done).catch(() => { promptCopy(url); });
    } else { promptCopy(url); }
  }
  function promptCopy(url) {
    try {
      const ta = document.createElement('textarea');
      ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); ta.remove();
      toast('공유 링크를 복사했어요');
    } catch (e) { window.prompt('아래 링크를 복사하세요', url); }
  }

  // ===== 라우팅 / 뷰 =====
  let route = 'input';
  let searchQuery = '';
  let detailKm = state.km;
  const root = document.getElementById('app');

  function render() {
    if (route === 'input') root.innerHTML = viewInput();
    else root.innerHTML = viewResults();
    bindEvents();
    if (state.detailId) renderDetail();
    if (route === 'compare') renderCompare();
    if (route === 'profiles') renderProfiles();
    if (route === 'sync') renderSync();

  }

    }).join('');

    const optionGroups = GROUP_ORDER.map(g => {
      const meta = GROUP_META[g] || { label: g, icon: '•' };
      const keys = OPTION_META.filter(o => o.group === g).map(o => o.key);
      const chips = keys.map(k => {
        const o = OPTION_BY_KEY[k];
        const on = state.requiredOptions.includes(k);
        const tip = optionTipText(k)
          ? `<span class="info"><span class="info-dot ${on ? 'info-dot-on' : ''}" tabindex="0" role="img" aria-label="설명: ${esc(optionTipText(k))}">i</span><span class="info-pop" role="tooltip">${esc(optionTipText(k))}</span></span>`

        <div class="mb-3">

      ? results.map(r => cardHtml(r)).join('')

      ? `<div class="flex flex-wrap items-center gap-1.5 mt-1">
          <span class="text-xs text-ink-400">제외:</span>
          ${state.excludedOptions.map(k => `<button data-rmexc="${k}" class="text-xs px-2 py-0.5 rounded-full bg-[#FDECEE] text-rose-600 font-semibold">${OPTION_BY_KEY[k]?OPTION_BY_KEY[k].label:k} ✕</button>`).join('')}

        <div class="max-w-3xl mx-auto px-5 pb-1 flex items-center gap-2 text-xs text-ink-500 flex-wrap">

          <span class="px-2 py-0.5 rounded-full surface-sub">👨‍👩‍👧 ${state.familyCount}명</span>
          <button id="subsidyGuideBtn" class="px-2 py-0.5 rounded-full surface-sub text-brand font-semibold">보조금 안내</button>

        <!-- 검색 (D17 부정 검색 지원) -->
        <div class="max-w-3xl mx-auto px-5 pt-2 pb-2">
          <div class="relative">
            <input id="searchInput" type="text" placeholder="엉따, 360, 차박… 또는 ‘통풍 빼고’, ‘선루프 없는’"

          </div>
          <div id="searchHint" class="mt-1 text-xs text-ink-400"></div>

        <!-- 페르소나 바 -->
        <div class="max-w-3xl mx-auto px-5 pb-2 overflow-x-auto">

      </header>

      <main class="flex-1 max-w-3xl w-full mx-auto px-5 py-4 space-y-4">
        ${personaPopularBlock}

        <!-- 패싯 + v2 필터 + D5 예산구간 + 옵션 필터 -->
        <section class="surface rounded-2xl p-4 space-y-3">
          <div>
            <div class="text-xs font-bold text-ink-500 mb-1.5">유종</div>
            <div class="flex flex-wrap gap-1.5">${facetChips('fuel', allFuels(), fuelCounts)}</div>
          </div>
          <div>
            <div class="text-xs font-bold text-ink-500 mb-1.5">세그먼트</div>
            <div class="flex flex-wrap gap-1.5">${facetChips('segment', allSegments(), segCounts)}</div>
          </div>
          <div>
            <div class="text-xs font-bold text-ink-500 mb-1.5">안전·주차·예산</div>
            <div class="flex flex-wrap gap-1.5">
              <button id="safe5Btn" class="chip rounded-full border px-3 py-1.5 text-sm ${state.safe5Only ? 'border-brand bg-brand-light text-brand font-semibold' : 'border-ink-200 surface text-ink-600'}">KNCAP ★5만</button>
              <button id="mechParkBtn" class="chip rounded-full border px-3 py-1.5 text-sm ${state.mechParkOnly ? 'border-brand bg-brand-light text-brand font-semibold' : 'border-ink-200 surface text-ink-600'}">기계식 주차 OK</button>
              <button id="budgetSpreadBtn" class="chip rounded-full border px-3 py-1.5 text-sm ${state.budgetSpread ? 'border-brand bg-brand-light text-brand font-semibold' : 'border-ink-200 surface text-ink-600'}">한 칸 위/아래 예산도 보기</button>
            </div>
          </div>
          <details class="pt-1">
            <summary class="text-xs font-bold text-ink-500 cursor-pointer select-none">체감 옵션으로 좁히기 <span class="font-normal text-ink-400">· ⓘ 옵션 뜻 보기</span> ${state.requiredOptions.length ? `<span class="text-brand">(${state.requiredOptions.length})</span>` : ''}</summary>
            <div class="mt-3">${optionGroups}</div>

  // D27 같은 페르소나 인기 차 (활성 페르소나 첫 항목 기준)
  function personaPopularHtml() {
    if (!state.activePersonas.length) return '';
    const tag = state.activePersonas[0];
    const ids = Array.isArray(PERSONA_POPULAR[tag]) ? PERSONA_POPULAR[tag] : [];
    const cars = ids.map(id => CARS.find(c => c.id === id)).filter(Boolean).slice(0, 5);
    if (!cars.length) return '';
    const chips = cars.map(c => `
      <button data-car="${c.id}" class="car-card text-left shrink-0 surface-sub rounded-xl px-3 py-2.5 min-w-[150px]">
        <div class="text-[11px] text-ink-400">${c.brand} · ${c.fuel}</div>
        <div class="font-bold text-sm text-ink-800 truncate">${c.model}</div>
        <div class="text-xs text-brand font-semibold tabular-nums mt-0.5">${fmtMan(effectivePrice(c))}만</div>
      </button>`).join('');
    return `
      <section class="surface rounded-2xl p-4">
        <div class="text-sm font-bold text-ink-800 mb-2">#${tag} 분들이 많이 본 차 <span class="text-xs font-normal text-ink-400">[mock 집계]</span></div>
        <div class="flex gap-2 overflow-x-auto">${chips}</div>
      </section>`;
  }

  // D23 출처·신선도 푸터
  function sourceMetaHtml() {
    const keys = Object.keys(SOURCE_META);
    if (!keys.length) return '';
    const labelMap = { price:'가격', subsidy:'보조금', fuel:'유가', efficiency:'연비' };
    const items = keys.map(k => {
      const m = SOURCE_META[k] || {};
      return `<span class="px-2 py-0.5 rounded-full surface-sub">${labelMap[k]||k}: ${esc(m.src||'-')} · ${esc(m.date||'-')}</span>`;
    }).join(' ');
    return `<div class="flex flex-wrap justify-center gap-1.5 mb-2 text-[11px] text-ink-400">${items}</div>`;
  }
  function footerHtml() {
    return `
      <footer class="surface border-t border-ink-100 mt-4">
        <div class="max-w-3xl mx-auto px-5 py-4 text-xs text-ink-400 text-center space-y-1">
          ${sourceMetaHtml()}
          <p>보조금·세제·유지비·금융 수치는 모두 <b>근사치([추정]/[mock])</b>예요. 실제는 지자체·제조사·금융사 확인이 필요해요.</p>
          <p class="text-ink-300">본 결과는 참고용이며 구매 의사결정의 법적 근거가 되지 않아요.</p>
        </div>
      </footer>`;

      `<span class="text-xs px-2 py-0.5 rounded-md surface-sub text-ink-600">${optIcon(o.key)} ${o.consumer || o.label}</span>`).join('');

  function renderDetail() {
    const c = CARS.find(x => x.id === state.detailId);
    if (!c) return;
    detailKm = state.km;
    let overlay = document.getElementById('detailOverlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'detailOverlay';
      document.body.appendChild(overlay);
    }
    overlay.className = 'fixed inset-0 z-40 flex items-end sm:items-center justify-center';
    overlay.innerHTML = `
      <div id="detailBackdrop" class="absolute inset-0 bg-ink-900/40"></div>
      <div class="relative w-full sm:max-w-lg surface rounded-t-3xl sm:rounded-3xl sheet-shadow sm:modal-shadow max-h-[92vh] overflow-y-auto fade-in">
        <div id="detailBody"></div>
      </div>`;
    document.getElementById('detailBackdrop').onclick = closeDetail;
    paintDetailBody(c);
  }

    const cb = costBreakdown(c, detailKm);

    const sub = subsidyFor(c);
    const salaryWon = state.salary * 10000;
    const priceBurden = pct(effectivePrice(c) * 10000, salaryWon);
    const monthlyBurden = pct(cb.monthly, salaryWon / 12);
    const effUnit = c.fuel === 'EV' ? 'km/kWh' : 'km/L';
    const g = kncap(c);
    const mech = mechParkOk(c);
    const tb = taxBenefitManwon(c);
    const sg = spendSignal(c); // D9

    const items = [
      { t: '연료비', v: cb.fuel, color: '#2560DE' },
      { t: '자동차세', v: cb.tax, color: '#14AE5C' },
      { t: '보험(추정)', v: cb.ins, color: '#FFB331' },

  // D11 지자체별 실구매가 비교 표
  function regionalSubsidyTable(c) {
    const rows = REGIONS.map(r => {
      const s = subsidyFor(c, r.code);
      return { name: r.name, code: r.code, real: s.realPrice, sum: s.sum };
    });
    const min = Math.min(...rows.map(r => r.real));
    const max = Math.max(...rows.map(r => r.real));
    const body = rows.map(r => {
      const isMin = r.real === min, isMax = r.real === max;
      const here = r.code === state.region;
      return `
        <tr class="border-t border-ink-100 ${here ? 'bg-brand-light' : ''}">
          <td class="p-2 text-sm ${here ? 'font-bold text-brand' : 'text-ink-700'}">${r.name}${here ? ' 📍' : ''}</td>
          <td class="p-2 text-sm text-right tabular-nums text-emerald-600">−${fmtMan(r.sum)}만</td>
          <td class="p-2 text-sm text-right tabular-nums font-semibold ${isMin ? 'text-emerald-600' : (isMax ? 'text-rose-500' : 'text-ink-800')}">${fmtMan(r.real)}만${isMin ? ' ▼최저' : (isMax ? ' ▲최고' : '')}</td>
        </tr>`;
    }).join('');
    return `
      <section>
        <div class="text-sm font-bold text-ink-700 mb-1">지자체별 실구매가 비교 <span class="text-xs font-normal text-ink-400">[추정 2025]</span></div>
        <div class="text-xs text-ink-400 mb-2">같은 차라도 지역 보조금에 따라 최대 ${fmtMan(max - min)}만원까지 차이가 나요.</div>
        <div class="surface rounded-2xl border border-ink-100 overflow-hidden max-h-64 overflow-y-auto">
          <table class="w-full">
            <thead class="sticky top-0"><tr class="surface-sub"><th class="p-2 text-left text-xs text-ink-400">지역</th><th class="p-2 text-right text-xs text-ink-400">보조금</th><th class="p-2 text-right text-xs text-ink-400">실구매가</th></tr></thead>
            <tbody>${body}</tbody>
          </table>
        </div>
      </section>`;
  }

  // D13 EV vs 동급 가솔린 연료비 비교
  function evVsGasBlock(c) {
    const e = evVsGasFuel(c);
    const maxV = Math.max(e.evCost, e.gasCost, 1);
    return `
      <section class="surface-sub rounded-2xl p-4">
        <div class="flex items-baseline justify-between mb-2">
          <div class="font-bold text-ink-800">EV vs 동급 가솔린 연료비 <span class="text-xs font-normal text-ink-400">[추정]</span></div>
          <div class="text-emerald-600 font-bold tabular-nums">${e.save>=0?'연 '+fmtMan(won2man(e.save))+'만 절감':'연 '+fmtMan(won2man(-e.save))+'만 더 듦'}</div>
        </div>
        <div class="text-xs text-ink-400 mb-3">연 ${fmtMan(state.km)}km · ${e.peerName} 기준</div>
        <div class="space-y-2 text-sm">
          <div class="flex items-center gap-2">
            <div class="w-20 text-ink-500 shrink-0">이 EV 충전</div>
            <div class="flex-1 h-5 surface rounded-md overflow-hidden"><div class="h-full bg-emerald-500 rounded-md" style="width:${Math.max(4,(e.evCost/maxV)*100)}%"></div></div>
            <div class="w-24 text-right tabular-nums text-ink-700 font-semibold shrink-0">${fmtWon(e.evCost)}원</div>
          </div>
          <div class="flex items-center gap-2">
            <div class="w-20 text-ink-500 shrink-0">동급 가솔린</div>
            <div class="flex-1 h-5 surface rounded-md overflow-hidden"><div class="h-full bg-ink-400 rounded-md" style="width:${Math.max(4,(e.gasCost/maxV)*100)}%"></div></div>
            <div class="w-24 text-right tabular-nums text-ink-700 font-semibold shrink-0">${fmtWon(e.gasCost)}원</div>
          </div>
        </div>
      </section>`;

  function closeDetail() {
    state.detailId = null;
    const o = document.getElementById('detailOverlay');
    if (o) o.remove();
  }

  function toggleCompare(id) {
    const i = state.compare.indexOf(id);
    if (i >= 0) state.compare.splice(i, 1);
    else {
      if (state.compare.length >= 3) state.compare.shift();
      state.compare.push(id);
    }
    saveState();
    const btn = document.getElementById('compareOpenBtn');
    if (btn) btn.innerHTML = `비교함 ${state.compare.length ? `<span class="ml-0.5 text-brand">${state.compare.length}</span>` : ''}`;
  }

  // ---------- 비교함 (뷰 4) ----------
  function renderCompare() {
    const cars = state.compare.map(id => CARS.find(c => c.id === id)).filter(Boolean);
    let overlay = document.getElementById('compareOverlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'compareOverlay';
      document.body.appendChild(overlay);
    }
    overlay.className = 'fixed inset-0 z-40 flex items-end sm:items-center justify-center';

    const body = !cars.length
      ? `<div class="py-20 text-center">
           <div class="text-4xl mb-3">⚖️</div>
           <p class="font-bold text-ink-700">비교함이 비어 있어요</p>
           <p class="text-sm text-ink-400 mt-1">차량 상세에서 "비교함에 담기"를 눌러 2~3대를 모아보세요.</p>
         </div>`
      : compareTable(cars);

    overlay.innerHTML = `
      <div id="compareBackdrop" class="absolute inset-0 bg-ink-900/40"></div>
      <div class="relative w-full sm:max-w-2xl surface rounded-t-3xl sm:rounded-3xl sheet-shadow sm:modal-shadow max-h-[92vh] overflow-y-auto fade-in">
        <div class="sticky top-0 surface px-5 pt-4 pb-3 border-b border-ink-100 flex items-center justify-between z-10">
          <div class="font-bold text-lg text-ink-900">비교함 <span class="text-brand">${cars.length}</span></div>
          <button id="compareClose" class="text-ink-400 text-2xl leading-none px-1">×</button>
        </div>
        <div class="px-4 py-4">${body}</div>
      </div>`;
    document.getElementById('compareBackdrop').onclick = closeCompare;
    document.getElementById('compareClose').onclick = closeCompare;
    overlay.querySelectorAll('[data-rm]').forEach(b => {
      b.onclick = () => { toggleCompare(b.getAttribute('data-rm')); renderCompare(); };
    });
  }

  function compareTable(cars) {
    const rows = [];
    const header = `<th class="p-2 text-left text-xs text-ink-400 font-semibold sticky left-0 surface">항목</th>` +
      cars.map(c => `<th class="p-2 text-left align-top min-w-[120px]">
        <div class="font-bold text-ink-900 text-sm">${c.model}</div>
        <div class="text-xs text-ink-400">${c.trim}</div>
        <button data-rm="${c.id}" class="mt-1 text-xs text-rose-500 font-semibold">빼기</button>
      </th>`).join('');

    const specRow = (label, fn) => `
      <tr class="border-t border-ink-100">
        <td class="p-2 text-xs text-ink-500 sticky left-0 surface font-semibold">${label}</td>
        ${cars.map(c => `<td class="p-2 text-sm text-ink-800 tabular-nums">${fn(c)}</td>`).join('')}
      </tr>`;

    rows.push(specRow('정가', c => `${fmtMan(c.price)}만`));
    rows.push(specRow('보조금', c => { const s = subsidyFor(c); return s.isEv ? `<span class="text-emerald-600">−${fmtMan(s.sum)}만</span>` : '–'; }));
    rows.push(specRow('실구매가', c => { const s = subsidyFor(c); return `<span class="font-bold text-brand">${fmtMan(s.realPrice)}만</span>`; }));
    rows.push(specRow('유종', c => c.fuel));
    rows.push(specRow('안전도', c => { const g = kncap(c); return g ? `<span class="text-amber-600">${stars(g)}</span>` : '-'; }));
    rows.push(specRow('연비(공인/실)', c => `${c.efficiency} / ${realEff(c)} ${c.fuel==='EV'?'km/kWh':'km/L'}`));
    rows.push(specRow('월 유지비', c => `<span class="text-brand font-bold">${fmtMan(won2man(costBreakdown(c, state.km).monthly))}만</span>`));
    rows.push(specRow('월 총지출(할부+유지)', c => `${fmtMan(won2man(monthlyCarSpend(c).total))}만`));
    rows.push(specRow('월 부담률', c => { const s = spendSignal(c); return s.lvl==='na' ? '-' : `<span style="color:${s.dot}" class="font-bold">${s.ratio}%</span>`; }));
    rows.push(specRow('5년 TCO', c => `<span class="font-bold text-ink-900">${fmtMan(won2man(tco5(c).total))}만</span>`));
    rows.push(specRow('5년 잔존가치', c => `${fmtMan(won2man(tco5(c).residual))}만`));
    rows.push(specRow('승차정원', c => `${c.seats}인`));
    rows.push(specRow('전장', c => c.lengthMm ? `${fmtMan(c.lengthMm)}mm` : '-'));
    rows.push(specRow('기계식 주차', c => mechParkOk(c) ? '<span class="text-emerald-600">가능</span>' : '<span class="text-rose-500">어려움</span>'));
    rows.push(specRow('트렁크', c => c.trunkL != null ? `${c.trunkL}L` : '-'));
    rows.push(specRow('보유 옵션수', c => `${carOptionCount(c)}/${OPTION_META.length}`));

    GROUP_ORDER.forEach(g => {
      const meta = GROUP_META[g] || { label: g, icon: '' };
      const keys = OPTION_META.filter(o => o.group === g).map(o => o.key);
      rows.push(specRow(`${meta.icon} ${meta.label}`, c => {
        const n = keys.filter(k => c.options && c.options[k]).length;
        return `${n}/${keys.length}`;
      }));
    });

    return `<div class="overflow-x-auto"><table class="w-full border-collapse">
      <thead><tr>${header}</tr></thead>
      <tbody>${rows.join('')}</tbody>
    </table></div>`;
  }

  function closeCompare() {
    route = 'results';
    const o = document.getElementById('compareOverlay');
    if (o) o.remove();
  }

  // ---------- 프로필 (뷰 5) ----------
  function uid() { return 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
  function currentScenario(name) {
    return {
      id: uid(), name: name,
      salary: state.salary, km: state.km, risk: state.risk, preset: state.preset,
      fuelPref: [...state.fuelPref], region: state.region, homeCharge: state.homeCharge,
      commuteKm: state.commuteKm, familyCount: state.familyCount
    };
  }
  function applyProfile(p) {
    state.salary = p.salary; state.km = p.km; state.risk = p.risk; state.preset = p.preset;
    state.fuelPref = [...(p.fuelPref || [])];
    state.region = REGIONS.some(r => r.code === p.region) ? p.region : REGIONS[0].code;
    state.homeCharge = !!p.homeCharge;
    if (p.commuteKm != null) state.commuteKm = p.commuteKm;
    if (p.familyCount != null) state.familyCount = p.familyCount;
    state.activeProfileId = p.id;
    detailKm = state.km;
  }

  function renderProfiles() {
    let overlay = document.getElementById('profilesOverlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'profilesOverlay';
      document.body.appendChild(overlay);
    }
    overlay.className = 'fixed inset-0 z-40 flex items-end sm:items-center justify-center';

    const list = state.profiles.length
      ? state.profiles.map(p => `
        <div class="surface-sub rounded-2xl p-4 ${state.activeProfileId===p.id?'ring-1 ring-brand':''}">
          <div class="flex items-start justify-between gap-2">
            <div class="min-w-0">
              <div class="font-bold text-ink-900 truncate">${p.name} ${state.activeProfileId===p.id?'<span class="text-xs text-brand">· 적용중</span>':''}</div>
              <div class="text-xs text-ink-500 mt-0.5">연봉 ${fmtMan(p.salary)}만 · ${fmtMan(p.km)}km · ${regionName(p.region)} · ${p.homeCharge?'충전 가능':'충전 어려움'}</div>
              <div class="text-xs text-ink-400">성향 ${p.risk} · ${(PRESETS.find(x=>x.key===p.preset)||{}).label||p.preset} · 연료 ${(p.fuelPref&&p.fuelPref.length)?p.fuelPref.join('/'):'전체'}</div>
            </div>
            <div class="flex flex-col gap-1 shrink-0">
              <button data-apply="${p.id}" class="text-xs font-bold text-white bg-brand rounded-lg px-3 py-1.5">전환</button>
              <button data-del="${p.id}" class="text-xs font-semibold text-rose-500">삭제</button>
            </div>
          </div>
        </div>`).join('')
      : `<div class="py-12 text-center">
           <div class="text-4xl mb-3">📁</div>
           <p class="font-bold text-ink-700">저장된 시나리오가 없어요</p>
           <p class="text-sm text-ink-400 mt-1">지금 입력값을 이름 붙여 저장하면 나중에 한 번에 불러올 수 있어요.</p>
         </div>`;

    overlay.innerHTML = `
      <div id="profilesBackdrop" class="absolute inset-0 bg-ink-900/40"></div>
      <div class="relative w-full sm:max-w-lg surface rounded-t-3xl sm:rounded-3xl sheet-shadow sm:modal-shadow max-h-[92vh] overflow-y-auto fade-in">
        <div class="sticky top-0 surface px-5 pt-4 pb-3 border-b border-ink-100 flex items-center justify-between z-10">

          <button id="profilesClose" class="text-ink-400 text-2xl leading-none px-1">×</button>
        </div>
        <div class="px-5 py-4 space-y-4">
          <div class="surface-sub rounded-2xl p-4">
            <div class="text-sm font-semibold text-ink-700 mb-2">현재 입력값을 저장</div>
            <div class="text-xs text-ink-500 mb-3">연봉 ${fmtMan(state.salary)}만 · ${fmtMan(state.km)}km · ${regionName(state.region)} · ${state.homeCharge?'충전 가능':'충전 어려움'} · ${(PRESETS.find(x=>x.key===state.preset)||{}).label}</div>
            <div class="flex gap-2">
              <input id="profileName" type="text" placeholder="예: 출퇴근용 / 주말 차박" class="flex-1 surface rounded-xl border border-ink-200 px-3 py-2.5 text-sm" />
              <button id="profileSave" class="bg-brand hover:bg-brand-hover text-white font-bold rounded-xl px-4 text-sm">저장</button>
            </div>
          </div>
          <div class="space-y-2">${list}</div>
        </div>
      </div>`;

    document.getElementById('profilesBackdrop').onclick = closeProfiles;
    document.getElementById('profilesClose').onclick = closeProfiles;
    const saveBtn = document.getElementById('profileSave');
    saveBtn.onclick = () => {
      const inp = document.getElementById('profileName');
      const name = (inp.value || '').trim() || `시나리오 ${state.profiles.length + 1}`;
      const sc = currentScenario(name);
      state.profiles.push(sc);
      state.activeProfileId = sc.id;
      saveState();
      toast(`"${name}" 저장했어요`);
      renderProfiles();
    };
    overlay.querySelectorAll('[data-apply]').forEach(b => b.onclick = () => {
      const p = state.profiles.find(x => x.id === b.getAttribute('data-apply'));
      if (p) { applyProfile(p); saveState(); toast(`"${p.name}" 으로 전환했어요`); closeProfiles(); render(); }
    });
    overlay.querySelectorAll('[data-del]').forEach(b => b.onclick = () => {
      const id = b.getAttribute('data-del');
      state.profiles = state.profiles.filter(x => x.id !== id);
      if (state.activeProfileId === id) state.activeProfileId = null;
      saveState();
      renderProfiles();
    });
  }
  function closeProfiles() {
    route = state.submitted ? (route === 'profiles' ? 'input' : route) : 'input';
    if (route === 'profiles') route = 'input';
    const o = document.getElementById('profilesOverlay');
    if (o) o.remove();
    render();
  }

  // ---------- D2 라이프스타일 역산 마법사 (뷰 8) ----------
  // §7.2 역산 규칙 → 권장 유종/차급/필수 옵션 도출 + 이유
  function deriveRecommendation() {
    const cm = state.commuteKm, fam = state.familyCount, hc = state.homeCharge;
    const fuels = [];      // 권장(선호) 유종
    const segments = [];   // 권장 차급
    const reqOpts = [];    // 필수(가점→필수로 승격) 옵션
    const reasons = [];

    // 출퇴근 거리
    if (cm >= 50) {
      fuels.push('하이브리드', '디젤', 'EV');
      reqOpts.push('scc', 'lfa');
      reasons.push(`출퇴근 ${cm}km/일은 장거리예요. 연료비가 덜 드는 <b>하이브리드·디젤·EV</b>와 피로를 줄이는 <b>스마트 크루즈·차로 유지</b>를 권해요.`);
    } else if (cm < 15) {
      fuels.push('가솔린', 'EV');
      reasons.push(`출퇴근 ${cm}km/일은 단거리예요. <b>가솔린·도심형 EV</b>가 잘 맞고, 잦은 단거리엔 디젤은 권하지 않아요.`);
    } else {
      fuels.push('가솔린', '하이브리드', 'EV');
      reasons.push(`출퇴근 ${cm}km/일은 보통 수준이라 <b>가솔린·하이브리드·EV</b> 모두 무난해요.`);
    }

    // 가족 수
    if (fam >= 4) {
      ['중형', '준대형', '대형', '중형SUV', '대형SUV'].forEach(s => segments.push(s));
      reqOpts.push('rearVentSeat');
      reasons.push(`${fam}인 가족이면 <b>중형 이상·SUV</b>가 편하고, 뒷자리 승객을 위한 <b>2열 통풍</b>을 권해요.`);
    } else {
      ['경형', '소형SUV', '준중형', '중형'].forEach(s => segments.push(s));
      reasons.push(`${fam}인 정도면 <b>경형~중형</b>까지 폭넓게 골라도 돼요.`);
    }

    // 충전 환경
    if (hc) {
      reasons.push(`집·회사 충전이 가능하니 <b>전기차</b>를 우선 고려하면 유지비를 크게 줄일 수 있어요.`);
    } else {
      const i = fuels.indexOf('EV');
      if (i >= 0 && fuels.length > 1) fuels.splice(i, 1);
      reasons.push(`충전이 어려운 환경이라 <b>전기차는 추천에서 제외</b>했어요. 충전 인프라가 갖춰지면 다시 고려해 보세요.`);
    }

    // 실제 차급은 데이터에 존재하는 것만
    const validSegs = [...new Set(segments)].filter(s => allSegments().includes(s));
    const validFuels = [...new Set(fuels)].filter(f => allFuels().includes(f));
    const validOpts = [...new Set(reqOpts)].filter(k => OPTION_BY_KEY[k]);
    return { fuels: validFuels, segments: validSegs, reqOpts: validOpts, reasons };
  }

  // ---------- D28 내 조건 공유 카드 (canvas) ----------
  function buildShareCardCanvas() {
    const results = getResults();
    const top = results[0];
    const W = 800, H = 1000;
    const cv = document.createElement('canvas');
    cv.width = W; cv.height = H;
    const ctx = cv.getContext('2d');

    // 배경
    ctx.fillStyle = '#F7F8FA'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#2560DE'; ctx.fillRect(0, 0, W, 200);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 44px Pretendard, sans-serif';
    ctx.fillText('🚗 내 연봉 맞춤 차량', 48, 96);
    ctx.font = '600 26px Pretendard, sans-serif';
    ctx.fillText('Car Advisor v3 · 라이프스타일 역산', 48, 144);

    // 입력 요약 카드
    let y = 250;
    const line = (label, value, color) => {
      ctx.fillStyle = '#8A93A3'; ctx.font = '600 24px Pretendard, sans-serif';
      ctx.fillText(label, 48, y);
      ctx.fillStyle = color || '#161D2B'; ctx.font = 'bold 30px Pretendard, sans-serif';
      ctx.textAlign = 'right'; ctx.fillText(value, W - 48, y); ctx.textAlign = 'left';
      y += 64;
    };
    line('연봉', `${fmtMan(state.salary)}만원`);
    line('지역 · 충전', `${regionName(state.region)} · ${state.homeCharge ? '충전 가능' : '충전 어려움'}`);
    line('출퇴근 · 가족', `${fmtMan(state.commuteKm)}km/일 · ${state.familyCount}명`);
    line('우선순위', `${(PRESETS.find(x => x.key === state.preset) || {}).label || state.preset}`);

    // 구분선
    y += 8;
    ctx.strokeStyle = '#E1E5EC'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(48, y); ctx.lineTo(W - 48, y); ctx.stroke();
    y += 56;

    // Top1 추천
    ctx.fillStyle = '#2560DE'; ctx.font = 'bold 28px Pretendard, sans-serif';
    ctx.fillText('🏆 추천 1위', 48, y); y += 56;
    if (top) {
      const c = top.car;
      const sub = top.sub;
      ctx.fillStyle = '#161D2B'; ctx.font = 'bold 40px Pretendard, sans-serif';
      ctx.fillText(`${c.brand} ${c.model}`, 48, y); y += 50;
      ctx.fillStyle = '#4A5567'; ctx.font = '500 26px Pretendard, sans-serif';
      ctx.fillText(`${c.trim} · ${c.segment} · ${c.fuel}`, 48, y); y += 58;

      const sg = spendSignal(c);
      line('실구매가', `${fmtMan(sub.realPrice)}만원` + (sub.isEv ? ' (보조금 반영)' : ''), '#2560DE');
      line('월 유지비', `${fmtMan(won2man(top.cost.monthly))}만원`);
      line('5년 TCO', `${fmtMan(won2man(top.tco.total))}만원`);
      line('월 부담률', sg.lvl === 'na' ? '-' : `${sg.ratio}% (${sg.label})`, sg.dot);
    } else {
      ctx.fillStyle = '#8A93A3'; ctx.font = '500 26px Pretendard, sans-serif';
      ctx.fillText('조건에 맞는 차가 없어요. 필터를 줄여보세요.', 48, y);
      y += 60;
    }

    // 푸터 면책
    ctx.fillStyle = '#8A93A3'; ctx.font = '400 20px Pretendard, sans-serif';
    ctx.fillText('모든 수치는 근사치([추정]/[mock]) · 참고용', 48, H - 48);

    return cv;
  }

          <p class="text-xs text-ink-400 text-center">현재 입력·추천 1위를 이미지로 만들었어요. 저장해서 친구·가족에게 공유해 보세요.</p>
        </div>
        <div class="sticky bottom-0 surface border-t border-ink-100 px-5 py-3">
          <button id="shareCardDownload" class="w-full bg-brand hover:bg-brand-hover text-white font-bold">PNG 이미지 저장</button>
        </div>
      </div>`;

    const close = () => { const o = document.getElementById('shareCardOverlay'); if (o) o.remove(); };
    document.getElementById('shareCardBackdrop').onclick = close;
    document.getElementById('shareCardClose').onclick = close;

    let canvas;
    try {
      canvas = buildShareCardCanvas();
      canvas.style.width = '100%';
      canvas.style.display = 'block';
      const host = document.getElementById('shareCardHost');
      if (host) host.appendChild(canvas);
    } catch (e) {
      const host = document.getElementById('shareCardHost');
      if (host) host.innerHTML = '<div class="p-6 text-center text-sm text-ink-400">카드 생성에 실패했어요.</div>';
    }
    document.getElementById('shareCardDownload').onclick = () => {
      try {
        const c = canvas || buildShareCardCanvas();
        const url = c.toDataURL('image/png');
        const a = document.createElement('a');
        a.href = url; a.download = 'car-advisor-내조건.png';
        document.body.appendChild(a); a.click(); a.remove();
        toast('이미지를 저장했어요');
      } catch (e) { toast('저장에 실패했어요', 'error'); }
    };
  }

  // ===== 이벤트 바인딩 =====
  function bindEvents() {
    if (route === 'input') bindInput();
    else bindResults();
  }

  function bindInput() {
    const salary = document.getElementById('salaryInput');
    if (salary) salary.oninput = (e) => {
      state.salary = Math.max(0, parseInt(e.target.value || '0', 10) || 0);
      saveState();
    };
    const km = document.getElementById('kmRange');
    if (km) km.oninput = (e) => { state.km = parseInt(e.target.value, 10); detailKm = state.km; saveState(); render(); };

    const commute = document.getElementById('commuteInput');
    if (commute) commute.oninput = (e) => { state.commuteKm = Math.max(0, parseInt(e.target.value || '0', 10) || 0); saveState(); };
    const family = document.getElementById('familyInput');
    if (family) family.oninput = (e) => { state.familyCount = Math.max(1, Math.min(9, parseInt(e.target.value || '1', 10) || 1)); saveState(); };

    const region = document.getElementById('regionSelect');
    if (region) region.onchange = (e) => { state.region = e.target.value; saveState(); render(); };

    const wiz = document.getElementById('wizardBtn');
    if (wiz) wiz.onclick = () => {
      // 입력 반영 후 마법사 오픈
      if (salary) state.salary = Math.max(0, parseInt(salary.value || '0', 10) || 0);
      if (commute) state.commuteKm = Math.max(0, parseInt(commute.value || '0', 10) || 0);
      if (family) state.familyCount = Math.max(1, Math.min(9, parseInt(family.value || '1', 10) || 1));
      saveState();
      renderWizard();
    };

    document.querySelectorAll('.charge-btn').forEach(b => b.onclick = () => {
      state.homeCharge = b.getAttribute('data-charge') === 'true'; saveState(); render();
    });
    document.querySelectorAll('.risk-btn').forEach(b => b.onclick = () => {
      state.risk = parseFloat(b.getAttribute('data-risk')); saveState(); render();
    });
    document.querySelectorAll('.preset-btn').forEach(b => b.onclick = () => {
      state.preset = b.getAttribute('data-preset'); saveState(); render();
    });
    document.querySelectorAll('.fuel-btn').forEach(b => b.onclick = () => {
      const f = b.getAttribute('data-fuel');
      const i = state.fuelPref.indexOf(f);
      if (i >= 0) state.fuelPref.splice(i, 1); else state.fuelPref.push(f);
      saveState(); render();
    });

    const profilesBtn = document.getElementById('profilesBtn');
    if (profilesBtn) profilesBtn.onclick = () => { renderProfiles(); };
    const syncBtn = document.getElementById('syncBtn');
    if (syncBtn) syncBtn.onclick = () => { renderSync(); };

    const find = document.getElementById('findBtn');
    if (find) find.onclick = () => {
      if (salary) state.salary = Math.max(0, parseInt(salary.value || '0', 10) || 0);
      if (commute) state.commuteKm = Math.max(0, parseInt(commute.value || '0', 10) || 0);
      if (family) state.familyCount = Math.max(1, Math.min(9, parseInt(family.value || '1', 10) || 1));
      state.submitted = true;
      route = 'results';
      saveState();
      render();
      window.scrollTo(0, 0);
    };
  }

  function bindResults() {
    const back = document.getElementById('backBtn');
    if (back) back.onclick = () => { route = 'input'; render(); window.scrollTo(0,0); };

    const cmpOpen = document.getElementById('compareOpenBtn');
    if (cmpOpen) cmpOpen.onclick = () => { renderCompare(); };

    const guideBtn = document.getElementById('subsidyGuideBtn');
    if (guideBtn) guideBtn.onclick = () => { renderSubsidyGuide(); };

    const shareCard = document.getElementById('shareCardBtn');
    if (shareCard) shareCard.onclick = () => { renderShareCard(); };
    const shareLinkBtn = document.getElementById('shareLinkBtn');
    if (shareLinkBtn) shareLinkBtn.onclick = () => { shareLink(); };

    const sort = document.getElementById('sortSelect');
    if (sort) sort.onchange = (e) => { state.sort = e.target.value; saveState(); render(); };

    const safe5 = document.getElementById('safe5Btn');
    if (safe5) safe5.onclick = () => { state.safe5Only = !state.safe5Only; saveState(); render(); };
    const mech = document.getElementById('mechParkBtn');
    if (mech) mech.onclick = () => { state.mechParkOnly = !state.mechParkOnly; saveState(); render(); };
    const budgetSpread = document.getElementById('budgetSpreadBtn');
    if (budgetSpread) budgetSpread.onclick = () => { state.budgetSpread = !state.budgetSpread; saveState(); render(); };

    document.querySelectorAll('.facet-btn').forEach(b => b.onclick = () => {
      const dim = b.getAttribute('data-facet');
      const val = b.getAttribute('data-val');
      const arr = dim === 'fuel' ? state.facetFuel : state.facetSegment;
      const i = arr.indexOf(val);
      if (i >= 0) arr.splice(i, 1); else arr.push(val);
      saveState(); render();
    });

    document.querySelectorAll('.opt-btn').forEach(b => b.onclick = () => {
      const k = b.getAttribute('data-opt');
      const i = state.requiredOptions.indexOf(k);
      if (i >= 0) state.requiredOptions.splice(i, 1); else state.requiredOptions.push(k);
      saveState(); render();
    });
    const clearOpts = document.getElementById('clearOptsBtn');
    if (clearOpts) clearOpts.onclick = () => {
      state.requiredOptions = []; state.excludedOptions = []; state.activePersonas = []; saveState(); render();
    };

    // D17 제외 칩 제거
    document.querySelectorAll('[data-rmexc]').forEach(b => b.onclick = () => {
      const k = b.getAttribute('data-rmexc');
      const i = state.excludedOptions.indexOf(k);
      if (i >= 0) state.excludedOptions.splice(i, 1);
      saveState(); render();
    });

    document.querySelectorAll('.persona-btn').forEach(b => b.onclick = () => {
      const tag = b.getAttribute('data-persona');
      const p = PERSONAS.find(x => x.tag === tag);
      if (!p) return;
      const i = state.activePersonas.indexOf(tag);
      if (i >= 0) {
        state.activePersonas.splice(i, 1);
        const keep = new Set();
        state.activePersonas.forEach(t => {
          const pp = PERSONAS.find(x => x.tag === t);
          if (pp) pp.options.forEach(o => keep.add(o));
        });
        p.options.forEach(o => {
          if (!keep.has(o)) {
            const idx = state.requiredOptions.indexOf(o);
            if (idx >= 0) state.requiredOptions.splice(idx, 1);
          }
        });
      } else {
        state.activePersonas.push(tag);
        p.options.forEach(o => { if (!state.requiredOptions.includes(o)) state.requiredOptions.push(o); });
      }
      saveState(); render();
    });

    const search = document.getElementById('searchInput');
    if (search) {
      search.oninput = (e) => {
        searchQuery = e.target.value;
        const parsed = searchToOptionKeys(searchQuery);
        const hint = document.getElementById('searchHint');
        if (hint) {
          if (!searchQuery.trim()) {
            hint.innerHTML = '';
          } else if (parsed.negKeys.length) {
            hint.innerHTML = `제외할 옵션: ${parsed.negKeys.map(k => OPTION_BY_KEY[k] ? OPTION_BY_KEY[k].label : k).join(', ')} <button id="applySearch" class="ml-1 text-rose-500 font-semibold">제외 적용 ↵</button>`;
          } else if (parsed.keys.length) {
            hint.innerHTML = `매칭 옵션: ${parsed.keys.map(k => OPTION_BY_KEY[k] ? OPTION_BY_KEY[k].label : k).join(', ')} <button id="applySearch" class="ml-1 text-brand font-semibold">필터 적용 ↵</button>`;
          } else {
            hint.innerHTML = `<span class="text-ink-400">매칭되는 기능이 없어요. ‘통풍 빼고’처럼 제외 검색도 돼요.</span>`;
          }
          const apply = document.getElementById('applySearch');
          if (apply) apply.onclick = () => applySearch(parsed);
        }
      };
      search.onkeydown = (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          applySearch(searchToOptionKeys(searchQuery));
        }
      };
    }
  }

  function applySearch(parsed) {
    if (parsed.negKeys && parsed.negKeys.length) {
      parsed.negKeys.forEach(k => {
        if (!state.excludedOptions.includes(k)) state.excludedOptions.push(k);
        // 제외와 필수 동시 불가 → 필수에서 제거
        const i = state.requiredOptions.indexOf(k);
        if (i >= 0) state.requiredOptions.splice(i, 1);
      });
    }
    if (parsed.keys && parsed.keys.length) {
      parsed.keys.forEach(k => {
        if (!state.requiredOptions.includes(k)) state.requiredOptions.push(k);
        const i = state.excludedOptions.indexOf(k);
        if (i >= 0) state.excludedOptions.splice(i, 1);
      });
    }
    searchQuery = '';
    saveState();
    render();
  }

  // 차량 카드 클릭 위임
  root.addEventListener('click', (e) => {
    const card = e.target.closest('.car-card');
    if (card) {
      state.detailId = card.getAttribute('data-car');
      renderDetail();
    }
  });

  // ===== 초기 구동 =====
  function boot() {
    if (!CARS.length) {
      root.innerHTML = `
        <div class="min-h-screen flex items-center justify-center p-6 text-center">
          <div>
            <div class="text-4xl mb-3">📂</div>
            <p class="font-bold text-ink-700">데이터를 불러오지 못했어요</p>
            <p class="text-sm text-ink-400 mt-1">data.js 가 함께 있어야 차량 정보를 보여드릴 수 있어요.</p>
          </div>
        </div>`;
      return;
    }
    // D32: URL 쿼리가 있으면 복원
    restoreStateFromQuery();
    route = state.submitted ? 'results' : 'input';
    render();
  }
  boot();
  </script>
</body>
</html>
