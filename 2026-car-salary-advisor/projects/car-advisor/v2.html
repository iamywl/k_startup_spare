  <style>

  .sheet-shadow, .modal-shadow {
    background-color: rgba(255,255,255,0.58) !important;

  /* glass-bg-gradient — 은은한 컬러 배경(글래스가 색을 머금게) */
  body { background: #EEF2F9 !important; }

  <!-- 데이터: Agent A가 작성 (REGIONS/SUBSIDY/kncapGrade/depreciationRate 포함). 앱 스크립트보다 먼저 로드 -->

<body class="text-ink-900">
  <div id="app"></div>
  <div id="toastHost" class="fixed left-1/2 -translate-x-1/2 bottom-6 z-[60] flex flex-col items-center gap-2 pointer-events-none"></div>

  <script>
  "use strict";

  // ===== 전역 데이터 안전 참조 (v1 + v2 신규) =====
  const CARS        = Array.isArray(window.CARS) ? window.CARS : [];
  const OPTION_META = Array.isArray(window.OPTION_META) ? window.OPTION_META : [];
  const GROUP_META  = window.GROUP_META || {};
  const PERSONAS    = Array.isArray(window.PERSONAS) ? window.PERSONAS : [];
  const SYNONYMS    = window.SYNONYMS || {};
  const COST        = window.COST || {};

  // v2 신규 전역 (계약 A2) — 부재 시 안전 fallback
  const REGIONS = Array.isArray(window.REGIONS) && window.REGIONS.length
    ? window.REGIONS
    : [{ code: 'seoul', name: '서울', evLocalManwon: 150 }];
  const SUBSIDY = (window.SUBSIDY && window.SUBSIDY.ev)
    ? window.SUBSIDY
    : { ev: { nationalMaxManwon: 650, fullPriceCapManwon: 5500, halfPriceCapManwon: 8500 },
        taxBenefit: { EV: { gaesoseManwon: 300, chwideukManwon: 140 }, '하이브리드': { gaesoseManwon: 0, chwideukManwon: 40 } } };

  const OPTION_BY_KEY = {};
  OPTION_META.forEach(o => { OPTION_BY_KEY[o.key] = o; });
  const GROUP_ORDER = ['climate', 'parking', 'digital', 'longdrive', 'cargo'];

  // v2 옵션 세부설명(ⓘ 툴팁) — data.js 부재 시 빈 객체로 안전 fallback
  const OPTION_DESC = (window.OPTION_DESC && typeof window.OPTION_DESC === 'object') ? window.OPTION_DESC : {};
  // 핵심 금융 용어 설명(인라인 상수)
  const FIN_DESC = {
    realPrice: '정가에서 보조금을 뺀, 실제로 내 돈으로 사는 가격이에요. 전기차는 국고+지자체 보조금을 빼고 비교해요.',
    subsidy:   '전기차에 주는 국고+지자체 보조금이에요. 차량가와 사는 지역에 따라 받는 금액이 달라져요. [추정 2025]',
    tco:       '실구매가에 5년간 유지비를 더하고 나중에 되팔 때 가치(잔존가치)를 뺀 진짜 총비용이에요. 싸 보여도 유지비·감가가 크면 TCO는 높아져요.',
    burden:    '연봉(또는 월소득) 대비 차값·유지비가 차지하는 비중이에요. 낮을수록 부담이 적어 형편에 맞는 차예요.'
  };
  // HTML 이스케이프 (속성/본문 공용)
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/"/g, '&quot;')
      .replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  // ⓘ 아이콘 + 떠 있는 툴팁 1개 생성. align: 'center'|'left'|'right'
  function infoTip(text, align) {
    const t = (text || '').trim();
    if (!t) return '';
    const popCls = align === 'left' ? ' pop-left' : (align === 'right' ? ' pop-right' : '');
    return `<span class="info"><span class="info-dot" tabindex="0" role="img" aria-label="설명: ${esc(t)}">i</span><span class="info-pop${popCls}" role="tooltip">${esc(t)}</span></span>`;
  }
  function optionTip(key, align) { return infoTip(OPTION_DESC[key], align); }

  // ===== 상태 (localStorage 영속, 키 carAdvisorV2) =====
  const LS_KEY = 'carAdvisorV2';
  const defaultState = {
    salary: 5000,            // 연봉(만원)
    km: 13000,               // 연간 주행거리
    risk: 0.5,               // 예산 성향
    preset: 'balanced',
    fuelPref: [],
    region: REGIONS[0].code, // v2: 거주 지역(시·도)
    homeCharge: true,        // v2: 자택/직장 충전 가능
    submitted: false,
    // 결과 필터
    facetFuel: [],
    facetSegment: [],
    requiredOptions: [],
    activePersonas: [],
    safe5Only: false,        // v2: KNCAP ★5만
    mechParkOnly: false,     // v2: 기계식 주차 가능만
    sort: 'score',
    compare: [],
    detailId: null,
    // v2 프로필 (다중 시나리오)
    profiles: [],            // [{id,name,salary,km,risk,preset,fuelPref,region,homeCharge}]
    activeProfileId: null,
    // v2 동기화 로그
    syncLog: [],             // [{ts,source,count}]
    syncedSubsidyAt: null,
    syncedFuelAt: null
  };

  function loadState() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return { ...defaultState };
      const parsed = JSON.parse(raw);
      return { ...defaultState, ...parsed };
    } catch (e) {
      return { ...defaultState };
    }
  }
  function saveState() {
    try {
      const persist = {
        salary: state.salary, km: state.km, risk: state.risk, preset: state.preset,
        fuelPref: state.fuelPref, region: state.region, homeCharge: state.homeCharge,
        submitted: state.submitted,
        facetFuel: state.facetFuel, facetSegment: state.facetSegment,
        requiredOptions: state.requiredOptions, activePersonas: state.activePersonas,
        safe5Only: state.safe5Only, mechParkOnly: state.mechParkOnly,
        sort: state.sort, compare: state.compare,
        profiles: state.profiles, activeProfileId: state.activeProfileId,
        syncLog: state.syncLog, syncedSubsidyAt: state.syncedSubsidyAt, syncedFuelAt: state.syncedFuelAt
      };
      localStorage.setItem(LS_KEY, JSON.stringify(persist));
    } catch (e) { /* 저장 실패 무시 */ }
  }

  let state = loadState();
  if (!REGIONS.some(r => r.code === state.region)) state.region = REGIONS[0].code;

  // ===== 유지비 계산 (v1 §유지비 계산 그대로 재사용) =====
  function fuelPrice(fuel) {
    const m = COST.fuelPriceWon || {};
    return m[fuel] != null ? m[fuel] : 1650;
  }
  function autoTaxWon(car) {
    if (car.fuel === 'EV') return COST.autoTaxEvFlatWon || 130000;
    const tiers = COST.autoTaxPerCc || [];
    let perCc = 200;
    for (const t of tiers) {
      if (car.displacementCc <= t.max) { perCc = t.won; break; }
    }
    return Math.round((car.displacementCc || 0) * perCc * 1.3);
  }
  function insuranceWon(car) {
    const base = COST.insuranceBaseWon != null ? COST.insuranceBaseWon : 400000;
    const rate = COST.insurancePriceRate != null ? COST.insurancePriceRate : 0.012;
    return Math.round(base + (car.price * 10000) * rate);
  }
  function maintWon(car) {
    const m = COST.maintByFuelWon || {};
    return m[car.fuel] != null ? m[car.fuel] : 600000;
  }
  function fuelCostWon(car, km) {
    const eff = car.efficiency || 1;
    const liters = km / eff;
    return Math.round(liters * fuelPrice(car.fuel === 'EV' ? 'EV' : car.fuel));
  }
  function costBreakdown(car, km) {
    const fuel = fuelCostWon(car, km);
    const tax = autoTaxWon(car);
    const ins = insuranceWon(car);
    const maint = maintWon(car);
    const total = fuel + tax + ins + maint;
    return { fuel, tax, ins, maint, total, monthly: Math.round(total / 12) };
  }

  // ===== v2 전기차 보조금 (계약 B1) =====
  // 만원 단위. EV에만 보조금 적용, 그 외 0.
  function subsidyFor(car) {
    const ev = SUBSIDY.ev || {};
    const region = REGIONS.find(r => r.code === state.region) || REGIONS[0];
    if (car.fuel !== 'EV') {
      return { national: 0, local: 0, sum: 0, realPrice: car.price, region, isEv: false };
    }
    const full = ev.fullPriceCapManwon != null ? ev.fullPriceCapManwon : 5500;
    const half = ev.halfPriceCapManwon != null ? ev.halfPriceCapManwon : 8500;
    const nat = ev.nationalMaxManwon != null ? ev.nationalMaxManwon : 650;
    const national = car.price < full ? nat : (car.price < half ? Math.round(nat * 0.5) : 0);
    const local = region ? (region.evLocalManwon || 0) : 0;
    const sum = national + local;
    const realPrice = Math.max(0, car.price - sum);
    return { national, local, sum, realPrice, region, isEv: true };
  }
  // 추천/예산/정렬/비교의 "가격 기준" — EV는 실구매가, 그 외 정가
  function effectivePrice(car) {
    return subsidyFor(car).realPrice;
  }
  // 친환경차 세제 혜택(만원) — EV·HEV 표시용
  function taxBenefitManwon(car) {
    const tb = (SUBSIDY.taxBenefit || {})[car.fuel];
    if (!tb) return 0;
    return (tb.gaesoseManwon || 0) + (tb.chwideukManwon || 0);
  }

  // ===== v2 5년 TCO (계약 B2) =====
  function tco5(car) {
    const real = effectivePrice(car) * 10000;             // 실구매가(원)
    const annualOp = costBreakdown(car, state.km).total;  // 연 운영비(원)
    const op5 = annualOp * 5;
    const dep = (car.depreciationRate != null ? car.depreciationRate : 0.14);
    const residual = Math.round(car.price * 10000 * Math.pow(1 - dep, 5)); // 잔존가치(원)
    const total = real + op5 - residual;
    return { real, op5, residual, total, dep };
  }

  // ===== v2 파생 속성 (계약 B3) =====
  function kncap(car) { return car.kncapGrade != null ? car.kncapGrade : null; }
  function mechParkOk(car) {
    const l = car.lengthMm, w = car.widthMm, kg = car.weightKg;
    if (l == null || w == null || kg == null) return false;
    return l <= 5050 && w <= 1900 && kg <= 2300;
  }

  // ===== 포맷 헬퍼 =====
  const fmtMan = n => Math.round(n).toLocaleString('ko-KR');
  const fmtWon = n => Math.round(n).toLocaleString('ko-KR');
  const won2man = won => Math.round(won / 10000);
  const pct = (a, b) => (b > 0 ? Math.round((a / b) * 1000) / 10 : 0);
  const stars = g => g ? '★'.repeat(g) + '☆'.repeat(Math.max(0, 5 - g)) : '–';
  const fmtTs = ts => { const d = new Date(ts); const p = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; };

  // ===== 추천 점수 (v1 §5 + v2 충전 보정 B4) =====
  const PRESET_WEIGHTS = {
    options:  { opt: 0.55, value: 0.15, cost: 0.15, burden: 0.15 },
    cost:     { opt: 0.20, value: 0.20, cost: 0.45, burden: 0.15 },
    price:    { opt: 0.15, value: 0.45, cost: 0.15, burden: 0.25 },
    balanced: { opt: 0.30, value: 0.25, cost: 0.25, burden: 0.20 }
  };
  const PRESETS = [
    { key: 'options', label: '옵션 중시' },
    { key: 'cost', label: '유지비 중시' },
    { key: 'price', label: '가격 중시' },
    { key: 'balanced', label: '표준' }
  ];

  function optWeight(key) {
    const m = OPTION_BY_KEY[key];
    if (!m) return 1;
    if (m.valueWeight === 'high') return 1.6;
    if (m.valueWeight === 'low') return 0.6;
    return 1;
  }
  function carOptionCount(car) {
    let c = 0;
    OPTION_META.forEach(o => { if (car.options && car.options[o.key]) c++; });
    return c;
  }
  function buildSegmentStats(cars) {
    const stats = {};
    cars.forEach(c => {
      const s = c.segment || '기타';
      if (!stats[s]) stats[s] = { minPrice: Infinity, maxPrice: -Infinity, minOpt: Infinity, maxOpt: -Infinity };
      const oc = carOptionCount(c);
      // v2: 가성비도 실구매가 기준
      const p = effectivePrice(c);
      stats[s].minPrice = Math.min(stats[s].minPrice, p);
      stats[s].maxPrice = Math.max(stats[s].maxPrice, p);
      stats[s].minOpt = Math.min(stats[s].minOpt, oc);
      stats[s].maxOpt = Math.max(stats[s].maxOpt, oc);
    });
    return stats;
  }
  function buildGlobalStats(cars) {
    let minM = Infinity, maxM = -Infinity, minB = Infinity, maxB = -Infinity;
    const salaryWon = state.salary * 10000;
    cars.forEach(c => {
      const cb = costBreakdown(c, state.km);
      minM = Math.min(minM, cb.monthly); maxM = Math.max(maxM, cb.monthly);
      const burden = salaryWon > 0 ? (effectivePrice(c) * 10000) / salaryWon : 0;
      minB = Math.min(minB, burden); maxB = Math.max(maxB, burden);
    });
    return { minM, maxM, minB, maxB };
  }
  function norm(v, lo, hi) {
    if (!isFinite(lo) || !isFinite(hi) || hi <= lo) return 0.5;
    return (v - lo) / (hi - lo);
  }

  function scoreCar(car, ctx) {
    const w = PRESET_WEIGHTS[state.preset] || PRESET_WEIGHTS.balanced;
    const required = state.requiredOptions;

    let reqScore = 1;
    if (required.length) {
      let hit = 0;
      required.forEach(k => { if (car.options && car.options[k]) hit++; });
      reqScore = hit / required.length;
    }
    let wsum = 0;
    OPTION_META.forEach(o => { if (car.options && car.options[o.key]) wsum += optWeight(o.key); });
    const richness = norm(wsum, ctx.minWsum, ctx.maxWsum);
    const optScore = 0.6 * reqScore + 0.4 * richness;

    const seg = ctx.segStats[car.segment] || {};
    const oc = carOptionCount(car);
    const optN = norm(oc, seg.minOpt, seg.maxOpt);
    const priceN = norm(effectivePrice(car), seg.minPrice, seg.maxPrice);
    const valueScore = Math.max(0, Math.min(1, 0.5 + (optN - priceN) / 2));

    const cb = costBreakdown(car, state.km);
    const costScore = 1 - norm(cb.monthly, ctx.g.minM, ctx.g.maxM);

    const salaryWon = state.salary * 10000;
    const burden = salaryWon > 0 ? (effectivePrice(car) * 10000) / salaryWon : 1;
    const burdenScore = 1 - norm(burden, ctx.g.minB, ctx.g.maxB);

    let raw = w.opt * optScore + w.value * valueScore + w.cost * costScore + w.burden * burdenScore;

    // v2 B4: EV 충전 환경 보정 (가점/감점)
    let chargeAdj = 0;
    if (car.fuel === 'EV') {
      chargeAdj = state.homeCharge ? 0.06 : -0.10; // 자택/직장 충전 가능 시 가점, 불가 시 감점
    }
    raw = Math.max(0, Math.min(1, raw + chargeAdj));
    return Math.round(raw * 1000) / 10;
  }

  // ===== 필터 파이프라인 (v1 + v2 신규 필터 B3) =====
  function passFacets(car) {
    if (state.facetFuel.length && !state.facetFuel.includes(car.fuel)) return false;
    if (state.facetSegment.length && !state.facetSegment.includes(car.segment)) return false;
    return true;
  }
  function passRequiredOptions(car) {
    return state.requiredOptions.every(k => car.options && car.options[k]);
  }
  function passFuelPref(car) {
    if (!state.fuelPref.length) return true;
    return state.fuelPref.includes(car.fuel);
  }
  function passV2Filters(car) {
    if (state.safe5Only && kncap(car) !== 5) return false;
    if (state.mechParkOnly && !mechParkOk(car)) return false;
    return true;
  }

  function getResults() {
    const segStats = buildSegmentStats(CARS);
    const g = buildGlobalStats(CARS);
    let minWsum = Infinity, maxWsum = -Infinity;
    CARS.forEach(c => {
      let ws = 0;
      OPTION_META.forEach(o => { if (c.options && c.options[o.key]) ws += optWeight(o.key); });
      minWsum = Math.min(minWsum, ws); maxWsum = Math.max(maxWsum, ws);
    });
    const ctx = { segStats, g, minWsum, maxWsum };

    let list = CARS.filter(c => passFuelPref(c) && passFacets(c) && passRequiredOptions(c) && passV2Filters(c));
    list = list.map(c => ({
      car: c, score: scoreCar(c, ctx), cost: costBreakdown(c, state.km),
      sub: subsidyFor(c), tco: tco5(c)
    }));

    list.sort((a, b) => {
      switch (state.sort) {
        case 'cost': return a.cost.monthly - b.cost.monthly;
        case 'price': return a.sub.realPrice - b.sub.realPrice; // v2: 실구매가 기준
        case 'eff': return (b.car.efficiency || 0) - (a.car.efficiency || 0);
        case 'tco': return a.tco.total - b.tco.total;           // v2: 5년 TCO 낮은 순
        case 'score':
        default: return b.score - a.score;
      }
    });
    return list;
  }

  function facetCounts(dimension) {
    const counts = {};
    CARS.forEach(c => {
      if (!passFuelPref(c)) return;
      if (!passRequiredOptions(c)) return;
      if (!passV2Filters(c)) return;
      if (dimension !== 'fuel') {
        if (state.facetFuel.length && !state.facetFuel.includes(c.fuel)) return;
      }
      if (dimension !== 'segment') {
        if (state.facetSegment.length && !state.facetSegment.includes(c.segment)) return;
      }
      const key = dimension === 'fuel' ? c.fuel : c.segment;
      counts[key] = (counts[key] || 0) + 1;
    });
    return counts;
  }

  function allFuels() { return [...new Set(CARS.map(c => c.fuel))]; }
  function allSegments() { return [...new Set(CARS.map(c => c.segment))]; }

  // ===== 예산 신호등 (v2: 실구매가 기준 B1) =====
  function budgetSignal(car) {
    const cap = state.salary * state.risk;
    if (cap <= 0) return { color: 'ink', label: '연봉 입력', cls: 'bg-ink-100 text-ink-500' };
    const ratio = effectivePrice(car) / cap;
    if (ratio <= 1.0) return { color: 'green', label: '여유', cls: 'bg-[#E7F7EF] text-emerald-600' };
    if (ratio <= 1.35) return { color: 'amber', label: '적정', cls: 'bg-[#FFF6E5] text-amber-600' };
    return { color: 'red', label: '부담', cls: 'bg-[#FDECEE] text-rose-600' };
  }

  // ===== 검색 (v1 동일) =====
  function searchToOptionKeys(query) {
    const q = (query || '').toLowerCase().replace(/\s+/g, '');
    if (!q) return [];
    const keys = new Set();
    Object.keys(SYNONYMS).forEach(syn => {
      const s = syn.toLowerCase().replace(/\s+/g, '');
      if (s.includes(q) || q.includes(s)) SYNONYMS[syn].forEach(k => keys.add(k));
    });
    OPTION_META.forEach(o => {
      const hay = [(o.label || ''), (o.consumer || ''), (o.key || '')].join('').toLowerCase().replace(/\s+/g, '');
      if (hay.includes(q)) keys.add(o.key);
    });
    return [...keys];
  }

  // ===== 토스트 (B6) =====
  function toast(msg, kind) {
    const host = document.getElementById('toastHost');
    if (!host) return;
    const el = document.createElement('div');
    const color = kind === 'error' ? 'bg-rose-500' : (kind === 'info' ? 'bg-ink-800' : 'bg-ink-900');
    el.className = `toast-in pointer-events-auto ${color} text-white text-sm font-semibold px-4 py-2.5 rounded-xl shadow-lg`;
    el.textContent = msg;
    host.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .25s'; setTimeout(() => el.remove(), 260); }, 1900);
  }

  // ===== 라우팅 / 뷰 =====
  let route = state.submitted ? 'results' : 'input';
  let searchQuery = '';
  let detailKm = state.km;
  const root = document.getElementById('app');

    bindEvents();
    if (state.detailId) renderDetail();
    if (route === 'compare') renderCompare();
    if (route === 'profiles') renderProfiles();
    if (route === 'sync') renderSync();
    if (route === 'subsidyGuide') renderSubsidyGuide();
  }

            <div class="text-xs font-bold text-ink-500 mb-1.5">세그먼트</div>
            <div class="flex flex-wrap gap-1.5">${facetChips('segment', allSegments(), segCounts)}</div>
          </div>
          <!-- v2 신규 필터 (B3) -->
          <div>
            <div class="text-xs font-bold text-ink-500 mb-1.5">안전·주차</div>
            <div class="flex flex-wrap gap-1.5">
              <button id="safe5Btn" class="chip rounded-full border px-3 py-1.5 text-sm ${state.safe5Only ? 'border-brand bg-brand-light text-brand font-semibold' : 'border-ink-200 surface text-ink-600'}">KNCAP ★5만</button>
              <button id="mechParkBtn" class="chip rounded-full border px-3 py-1.5 text-sm ${state.mechParkOnly ? 'border-brand bg-brand-light text-brand font-semibold' : 'border-ink-200 surface text-ink-600'}">기계식 주차 OK</button>
            </div>
          </div>
          <details class="pt-1">
            <summary class="text-xs font-bold text-ink-500 cursor-pointer select-none">체감 옵션으로 좁히기 ${state.requiredOptions.length ? `<span class="text-brand">(${state.requiredOptions.length})</span>` : ''}</summary>
            <div class="mt-3">${optionGroups}</div>
            ${state.requiredOptions.length ? `<button id="clearOptsBtn" class="mt-1 text-xs text-rose-500 font-semibold">옵션 조건 비우기</button>` : ''}
          </details>
        </section>

        <!-- 정렬 -->
        <div class="flex items-center justify-between gap-2">
          <div class="text-sm text-ink-500">${results.length}대 · 주행 ${fmtMan(state.km)}km 기준</div>
          <select id="sortSelect" class="surface border border-ink-200 rounded-lg px-3 py-2 text-sm font-semibold text-ink-700">
            ${sortOptions.map(o => `<option value="${o.v}" ${state.sort===o.v?'selected':''}>${o.t}</option>`).join('')}
          </select>
        </div>

        <!-- 카드 -->
        <div class="space-y-3">${cards}</div>
      </main>

      <footer class="surface border-t border-ink-100 mt-4">
        <div class="max-w-3xl mx-auto px-5 py-4 text-xs text-ink-400 text-center">
          보조금·세제·유지비는 근사치예요. 실제는 지자체·제조사 확인이 필요해요.
        </div>
      </footer>
    </div>`;
  }

  // 차량 카드 (v2: 보조금/실구매가/안전등급 노출)
  function cardHtml(r) {
    const c = r.car;
    const sig = budgetSignal(c);
    const sub = r.sub;
    const owned = OPTION_META.filter(o => c.options && c.options[o.key]);
    owned.sort((a, b) => optWeight(b.key) - optWeight(a.key));
    const topBadges = owned.slice(0, 3).map(o =>
      `<span class="text-xs px-2 py-0.5 rounded-md surface-sub text-ink-600">${o.consumer || o.label}</span>`).join('');
    const moreCount = owned.length - 3;
    const effUnit = c.fuel === 'EV' ? 'km/kWh' : 'km/L';
    const g = kncap(c);

    // 가격 블록: EV는 정가 → 실구매가, 그 외 정가만
    const priceBlock = sub.isEv
      ? `<div class="text-xs text-ink-400 line-through tabular-nums">${fmtMan(c.price)}만</div>
         <div class="font-bold text-lg text-ink-900 tabular-nums">${fmtMan(sub.realPrice)}<span class="text-sm text-ink-400">만</span></div>
         <div class="text-[11px] font-semibold text-emerald-600">보조금 −${fmtMan(sub.sum)}만 [추정]</div>`
      : `<div class="font-bold text-lg text-ink-900 tabular-nums">${fmtMan(c.price)}<span class="text-sm text-ink-400">만</span></div>`;

    const evBadge = sub.isEv
      ? `<span class="text-xs px-1.5 py-0.5 rounded surface-sub text-emerald-600 font-semibold">실구매가</span>` : '';

    return `
    <button data-car="${c.id}" class="car-card w-full text-left surface rounded-2xl p-4 border border-transparent hover:border-ink-200 transition">
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <div class="flex items-center gap-1.5 flex-wrap">
            <span class="text-xs text-ink-400">${c.brand}</span>
            <span class="text-xs px-1.5 py-0.5 rounded surface-sub text-ink-500">${c.segment}</span>
            <span class="text-xs px-1.5 py-0.5 rounded surface-sub text-ink-500">${c.fuel}</span>
            ${g ? `<span class="text-xs text-amber-600">${stars(g)}</span>` : ''}
            ${evBadge}
          </div>
          <div class="font-bold text-lg text-ink-900 mt-0.5">${c.model} <span class="text-ink-500 font-medium text-sm">${c.trim}</span></div>
        </div>
        <div class="text-right shrink-0">
          ${priceBlock}
          <span class="inline-block mt-1 text-xs font-semibold px-2 py-0.5 rounded-full ${sig.cls}">● ${sig.label}</span>
        </div>
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mt-3 text-center">
        <div class="surface-sub rounded-lg py-2">
          <div class="text-[11px] text-ink-400">연비</div>
          <div class="font-bold text-sm text-ink-800 tabular-nums">${c.efficiency} <span class="text-[10px] text-ink-400">${effUnit}</span></div>
        </div>
        <div class="surface-sub rounded-lg py-2">
          <div class="text-[11px] text-ink-400">월 유지비</div>
          <div class="font-bold text-sm text-brand tabular-nums">${fmtMan(won2man(r.cost.monthly))}만</div>
        </div>
        <div class="surface-sub rounded-lg py-2">
          <div class="text-[11px] text-ink-400">5년 TCO</div>
          <div class="font-bold text-sm text-ink-800 tabular-nums">${fmtMan(won2man(r.tco.total))}만</div>
        </div>
        <div class="surface-sub rounded-lg py-2">
          <div class="text-[11px] text-ink-400">추천점수</div>
          <div class="font-bold text-sm text-ink-800 tabular-nums">${r.score.toFixed(0)}</div>
        </div>
      </div>

      <div class="flex flex-wrap items-center gap-1.5 mt-3">
        ${topBadges}
        ${moreCount > 0 ? `<span class="text-xs text-ink-400">외 ${moreCount}개</span>` : ''}
      </div>
    </button>`;
  }

  // ---------- 상세 (뷰 3) + TCO 분해 (뷰 8) ----------
  function renderDetail() {
    const c = CARS.find(x => x.id === state.detailId);
    if (!c) return;
    detailKm = state.km;
    let overlay = document.getElementById('detailOverlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'detailOverlay';
      document.body.appendChild(overlay);
    }
    overlay.className = 'fixed inset-0 z-40 flex items-end sm:items-center justify-center';
    overlay.innerHTML = `
      <div id="detailBackdrop" class="absolute inset-0 bg-ink-900/40"></div>
      <div class="relative w-full sm:max-w-lg surface rounded-t-3xl sm:rounded-3xl sheet-shadow sm:modal-shadow max-h-[92vh] overflow-y-auto fade-in">
        <div id="detailBody"></div>
      </div>`;
    document.getElementById('detailBackdrop').onclick = closeDetail;
    paintDetailBody(c);
  }

  function paintDetailBody(c) {
    const body = document.getElementById('detailBody');
    if (!body) return;
    const cb = costBreakdown(c, detailKm);
    const sig = budgetSignal(c);
    const sub = subsidyFor(c);
    const salaryWon = state.salary * 10000;
    const priceBurden = pct(effectivePrice(c) * 10000, salaryWon);
    const monthlyBurden = pct(cb.monthly, salaryWon / 12);
    const effUnit = c.fuel === 'EV' ? 'km/kWh' : 'km/L';
    const g = kncap(c);
    const mech = mechParkOk(c);
    const tb = taxBenefitManwon(c);

    const items = [
      { t: '연료비', v: cb.fuel, color: '#2560DE' },
      { t: '자동차세', v: cb.tax, color: '#14AE5C' },
      { t: '보험(추정)', v: cb.ins, color: '#FFB331' },
      { t: '정비(추정)', v: cb.maint, color: '#8A93A3' }
    ];
    const maxV = Math.max(...items.map(i => i.v), 1);
    const bars = items.map(i => `
      <div class="flex items-center gap-2 text-sm">
        <div class="w-16 text-ink-500 shrink-0">${i.t}</div>
        <div class="flex-1 h-5 surface-sub rounded-md overflow-hidden">
          <div class="h-full rounded-md" style="width:${Math.max(4,(i.v/maxV)*100)}%;background:${i.color}"></div>
        </div>
        <div class="w-20 text-right tabular-nums text-ink-700 font-semibold shrink-0">${fmtWon(i.v)}원</div>
      </div>`).join('');

    // v2: 보조금 분해 블록 (EV)
    const subsidyBlock = sub.isEv ? `
      <section class="rounded-2xl p-4 border border-emerald-500/30 bg-[#F0FBF5]">
        <div class="flex items-baseline justify-between mb-2">
          <div class="font-bold text-emerald-700">전기차 보조금 ${infoTip(FIN_DESC.subsidy, 'left')} <span class="text-xs font-normal text-emerald-600">[추정 2025]</span></div>
          <div class="text-emerald-700 font-bold tabular-nums">−${fmtMan(sub.sum)}만</div>
        </div>
        <div class="space-y-1 text-sm">
          <div class="flex justify-between"><span class="text-ink-500">정가</span><span class="tabular-nums text-ink-700">${fmtMan(c.price)}만</span></div>
          <div class="flex justify-between"><span class="text-ink-500">국고 보조금</span><span class="tabular-nums text-emerald-600">−${fmtMan(sub.national)}만</span></div>
          <div class="flex justify-between"><span class="text-ink-500">지자체 보조금 (${sub.region.name})</span><span class="tabular-nums text-emerald-600">−${fmtMan(sub.local)}만</span></div>
          <div class="flex justify-between border-t border-emerald-500/20 pt-1 mt-1"><span class="font-bold text-ink-800">실구매가 ${infoTip(FIN_DESC.realPrice, 'left')}</span><span class="tabular-nums font-bold text-ink-900">${fmtMan(sub.realPrice)}만</span></div>
        </div>
      </section>` : '';

    // v2: 세제 혜택 (EV·HEV)
    const taxBlock = (c.fuel === 'EV' || c.fuel === '하이브리드') && tb > 0 ? `
      <div class="surface-sub rounded-xl px-4 py-3 text-sm flex items-center justify-between">
        <span class="text-ink-600">친환경차 세제 감면 한도 <span class="text-xs text-ink-400">[추정]</span></span>
        <span class="font-bold text-brand tabular-nums">약 −${fmtMan(tb)}만 (취득 부대비)</span>
      </div>` : '';

    // v2: 5년 TCO 분해 (뷰 8)
    const tco = tco5(c);
    const tcoBlock = `
      <section class="surface-sub rounded-2xl p-4">
        <div class="flex items-baseline justify-between mb-1">
          <div class="font-bold text-ink-800">5년 총소유비용(TCO) ${infoTip(FIN_DESC.tco, 'left')} <span class="text-xs font-normal text-ink-400">[추정]</span></div>
          <div class="text-ink-900 font-bold tabular-nums">${fmtMan(won2man(tco.total))}만</div>
        </div>
        <div class="text-xs text-ink-400 mb-3">실구매가 + 5년 운영비 − 5년 잔존가치 (감가율 ${(tco.dep*100).toFixed(0)}%/년)</div>
        <div class="space-y-1.5 text-sm">
          <div class="flex justify-between"><span class="text-ink-500">실구매가</span><span class="tabular-nums text-ink-700">+ ${fmtMan(won2man(tco.real))}만</span></div>
          <div class="flex justify-between"><span class="text-ink-500">5년 운영비(연 ${fmtMan(won2man(tco.op5/5))}만×5)</span><span class="tabular-nums text-ink-700">+ ${fmtMan(won2man(tco.op5))}만</span></div>
          <div class="flex justify-between"><span class="text-ink-500">5년 잔존가치 회수</span><span class="tabular-nums text-emerald-600">− ${fmtMan(won2man(tco.residual))}만</span></div>
          <div class="flex justify-between border-t border-ink-200 pt-1.5 mt-1"><span class="font-bold text-ink-800">5년 TCO</span><span class="tabular-nums font-bold text-ink-900">${fmtMan(won2man(tco.total))}만</span></div>
        </div>
      </section>`;

    const matrix = GROUP_ORDER.map(grp => {
      const meta = GROUP_META[grp] || { label: grp, icon: '•' };
      const keys = OPTION_META.filter(o => o.group === grp);
      const rows = keys.map(o => {
        const has = !!(c.options && c.options[o.key]);
        return `
          <div class="flex items-center gap-1.5 py-1">
            <span class="w-5 h-5 rounded-md flex items-center justify-center text-xs shrink-0 ${has ? 'bg-brand text-white' : 'surface-sub text-ink-300'}">${has ? '✓' : '·'}</span>
            <span class="text-sm ${has ? 'text-ink-800' : 'text-ink-300 line-through'}">${o.label}</span>
            ${optionTip(o.key, 'left')}
            ${o.consumer ? `<span class="text-xs ${has?'text-ink-400':'text-ink-300'} truncate">${o.consumer}</span>` : ''}
          </div>`;
      }).join('');
      return `
        <div class="mb-3">
          <div class="text-xs font-bold text-ink-500 mb-1">${meta.icon} ${meta.label}</div>
          <div class="grid grid-cols-2 gap-x-3">${rows}</div>
        </div>`;
    }).join('');

    const inCompare = state.compare.includes(c.id);

    body.innerHTML = `
      <div class="sticky top-0 surface px-5 pt-4 pb-3 border-b border-ink-100 z-10">
        <div class="w-10 h-1 bg-ink-200 rounded-full mx-auto mb-3 sm:hidden"></div>
        <div class="flex items-start justify-between">
          <div>
            <div class="text-xs text-ink-400">${c.brand} · ${c.segment} · ${c.fuel} ${g ? `· <span class="text-amber-600">${stars(g)}</span>` : ''}</div>
            <div class="font-bold text-xl text-ink-900">${c.model} <span class="text-ink-500 text-sm font-medium">${c.trim}</span></div>
          </div>
          <button id="detailClose" class="text-ink-400 text-2xl leading-none px-1">×</button>
        </div>
      </div>

      <div class="px-5 py-4 space-y-5">
        <!-- 가격/신호등 -->
        <div class="flex items-end justify-between">
          <div>
            <div class="text-xs text-ink-400">${sub.isEv ? `실구매가 (보조금 반영) ${infoTip(FIN_DESC.realPrice, 'left')}` : '차량 가격'}</div>
            ${sub.isEv ? `<div class="text-xs text-ink-400 line-through tabular-nums">${fmtMan(c.price)}만원</div>` : ''}
            <div class="font-bold text-2xl text-ink-900 tabular-nums">${fmtMan(effectivePrice(c))}<span class="text-base text-ink-400">만원</span></div>
          </div>
          <span class="text-sm font-semibold px-3 py-1 rounded-full ${sig.cls}">● ${sig.label}</span>
        </div>

        ${subsidyBlock}
        ${taxBlock}

        <!-- 유지비 -->
        <section class="surface-sub rounded-2xl p-4">
          <div class="flex items-baseline justify-between mb-1">
            <div class="font-bold text-ink-800">예상 유지비</div>
            <div class="text-brand font-bold tabular-nums">월 ${fmtMan(won2man(cb.monthly))}만원</div>
          </div>
          <div class="text-xs text-ink-400 mb-3">연 ${fmtWon(cb.total)}원 · 주행 ${fmtMan(detailKm)}km 기준</div>
          <div class="flex items-baseline justify-between mb-2">
            <span class="text-xs font-semibold text-ink-500">주행거리 조정</span>
            <span class="text-xs text-brand font-bold tabular-nums">${fmtMan(detailKm)} km</span>
          </div>
          <input id="detailKmRange" type="range" min="0" max="40000" step="500" value="${detailKm}" class="w-full mb-4" />
          <div class="space-y-2">${bars}</div>
        </section>

        ${tcoBlock}

        <!-- 부담률 -->
        <section class="grid grid-cols-2 gap-3">
          <div class="surface-sub rounded-2xl p-4">
            <div class="text-xs text-ink-400">연봉 대비 ${sub.isEv ? '실구매가' : '차량가'} 부담률 ${infoTip(FIN_DESC.burden, 'left')}</div>
            <div class="font-bold text-xl text-ink-800 tabular-nums">${priceBurden}<span class="text-sm">%</span></div>
            <div class="h-1.5 surface rounded-full mt-2 overflow-hidden"><div class="h-full bg-brand" style="width:${Math.min(100,priceBurden)}%"></div></div>
          </div>
          <div class="surface-sub rounded-2xl p-4">
            <div class="text-xs text-ink-400">월소득 대비 유지비</div>
            <div class="font-bold text-xl text-ink-800 tabular-nums">${monthlyBurden}<span class="text-sm">%</span></div>
            <div class="h-1.5 surface rounded-full mt-2 overflow-hidden"><div class="h-full ${monthlyBurden>15?'bg-rose-500':'bg-emerald-500'}" style="width:${Math.min(100,monthlyBurden*3)}%"></div></div>
          </div>
        </section>

        <!-- v2: 치수 · 안전 · 기계식 주차 (B3) -->
        <section class="surface-sub rounded-2xl p-4 space-y-2 text-sm">
          <div class="font-bold text-ink-800 mb-1">제원 · 안전 · 주차</div>
          <div class="flex justify-between"><span class="text-ink-500">KNCAP 안전도</span><span class="font-semibold ${g===5?'text-emerald-600':'text-ink-700'}">${g ? `${stars(g)} (${g}등급) [추정]` : '정보 없음'}</span></div>
          <div class="flex justify-between"><span class="text-ink-500">전장 / 전폭</span><span class="tabular-nums text-ink-700">${c.lengthMm!=null?fmtMan(c.lengthMm):'-'} / ${c.widthMm!=null?fmtMan(c.widthMm):'-'} mm</span></div>
          <div class="flex justify-between"><span class="text-ink-500">공차중량</span><span class="tabular-nums text-ink-700">${c.weightKg!=null?fmtMan(c.weightKg):'-'} kg</span></div>
          <div class="flex justify-between"><span class="text-ink-500">기계식 주차 <span class="text-xs text-ink-400">[추정 기준]</span></span><span class="font-semibold ${mech?'text-emerald-600':'text-rose-500'}">${mech ? '✓ 가능' : '✕ 어려움'}</span></div>
        </section>

        <!-- 옵션 매트릭스 -->
        <section>
          <div class="font-bold text-ink-800 mb-2">옵션 매트릭스 <span class="text-xs text-ink-400 font-normal">(보유 ${carOptionCount(c)}/${OPTION_META.length})</span></div>
          ${matrix}
        </section>
      </div>

      <div class="sticky bottom-0 surface border-t border-ink-100 px-5 py-3">
        <button id="toggleCompareBtn" class="w-full font-bold ${inCompare ? 'surface-sub text-ink-700' : 'bg-brand hover:bg-brand-hover text-white'}">
          ${inCompare ? '비교함에서 빼기' : '비교함에 담기'}
        </button>
      </div>`;

    document.getElementById('detailClose').onclick = closeDetail;
    document.getElementById('detailKmRange').oninput = (e) => {
      detailKm = parseInt(e.target.value, 10);
      paintDetailBody(c);
    };
    document.getElementById('toggleCompareBtn').onclick = () => {
      toggleCompare(c.id);
      paintDetailBody(c);
    };
  }

  function closeDetail() {
    state.detailId = null;
    const o = document.getElementById('detailOverlay');
    if (o) o.remove();
  }

  function toggleCompare(id) {
    const i = state.compare.indexOf(id);
    if (i >= 0) state.compare.splice(i, 1);
    else {
      if (state.compare.length >= 3) state.compare.shift();
      state.compare.push(id);
    }
    saveState();
    const btn = document.getElementById('compareOpenBtn');
    if (btn) btn.innerHTML = `비교함 ${state.compare.length ? `<span class="ml-0.5 text-brand">${state.compare.length}</span>` : ''}`;
  }

  // ---------- 비교함 (뷰 4) ----------
  function renderCompare() {
    const cars = state.compare.map(id => CARS.find(c => c.id === id)).filter(Boolean);
    let overlay = document.getElementById('compareOverlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'compareOverlay';
      document.body.appendChild(overlay);
    }
    overlay.className = 'fixed inset-0 z-40 flex items-end sm:items-center justify-center';

    const body = !cars.length
      ? `<div class="py-20 text-center">
           <div class="text-4xl mb-3">⚖️</div>
           <p class="font-bold text-ink-700">비교함이 비어 있어요</p>
           <p class="text-sm text-ink-400 mt-1">차량 상세에서 "비교함에 담기"를 눌러 2~3대를 모아보세요.</p>
         </div>`
      : compareTable(cars);

    overlay.innerHTML = `
      <div id="compareBackdrop" class="absolute inset-0 bg-ink-900/40"></div>
      <div class="relative w-full sm:max-w-2xl surface rounded-t-3xl sm:rounded-3xl sheet-shadow sm:modal-shadow max-h-[92vh] overflow-y-auto fade-in">
        <div class="sticky top-0 surface px-5 pt-4 pb-3 border-b border-ink-100 flex items-center justify-between z-10">
          <div class="font-bold text-lg text-ink-900">비교함 <span class="text-brand">${cars.length}</span></div>
          <button id="compareClose" class="text-ink-400 text-2xl leading-none px-1">×</button>
        </div>
        <div class="px-4 py-4">${body}</div>
      </div>`;
    document.getElementById('compareBackdrop').onclick = closeCompare;
    document.getElementById('compareClose').onclick = closeCompare;
    overlay.querySelectorAll('[data-rm]').forEach(b => {
      b.onclick = () => { toggleCompare(b.getAttribute('data-rm')); renderCompare(); };
    });
  }

  function compareTable(cars) {
    const rows = [];
    const header = `<th class="p-2 text-left text-xs text-ink-400 font-semibold sticky left-0 surface">항목</th>` +
      cars.map(c => `<th class="p-2 text-left align-top min-w-[120px]">
        <div class="font-bold text-ink-900 text-sm">${c.model}</div>
        <div class="text-xs text-ink-400">${c.trim}</div>
        <button data-rm="${c.id}" class="mt-1 text-xs text-rose-500 font-semibold">빼기</button>
      </th>`).join('');

    const specRow = (label, fn) => `
      <tr class="border-t border-ink-100">
        <td class="p-2 text-xs text-ink-500 sticky left-0 surface font-semibold">${label}</td>
        ${cars.map(c => `<td class="p-2 text-sm text-ink-800 tabular-nums">${fn(c)}</td>`).join('')}
      </tr>`;

    rows.push(specRow('정가', c => `${fmtMan(c.price)}만`));
    rows.push(specRow('보조금', c => { const s = subsidyFor(c); return s.isEv ? `<span class="text-emerald-600">−${fmtMan(s.sum)}만</span>` : '–'; }));
    rows.push(specRow('실구매가', c => { const s = subsidyFor(c); return `<span class="font-bold text-brand">${fmtMan(s.realPrice)}만</span>`; }));
    rows.push(specRow('유종', c => c.fuel));
    rows.push(specRow('안전도', c => { const g = kncap(c); return g ? `<span class="text-amber-600">${stars(g)}</span>` : '-'; }));
    rows.push(specRow('연비', c => `${c.efficiency} ${c.fuel==='EV'?'km/kWh':'km/L'}`));
    rows.push(specRow('월 유지비', c => `<span class="text-brand font-bold">${fmtMan(won2man(costBreakdown(c, state.km).monthly))}만</span>`));
    rows.push(specRow('5년 TCO', c => `<span class="font-bold text-ink-900">${fmtMan(won2man(tco5(c).total))}만</span>`));
    rows.push(specRow('5년 잔존가치', c => `${fmtMan(won2man(tco5(c).residual))}만`));
    rows.push(specRow('승차정원', c => `${c.seats}인`));
    rows.push(specRow('전장', c => c.lengthMm ? `${fmtMan(c.lengthMm)}mm` : '-'));
    rows.push(specRow('기계식 주차', c => mechParkOk(c) ? '<span class="text-emerald-600">가능</span>' : '<span class="text-rose-500">어려움</span>'));
    rows.push(specRow('트렁크', c => c.trunkL != null ? `${c.trunkL}L` : '-'));
    rows.push(specRow('보유 옵션수', c => `${carOptionCount(c)}/${OPTION_META.length}`));

    GROUP_ORDER.forEach(g => {
      const meta = GROUP_META[g] || { label: g, icon: '' };
      const keys = OPTION_META.filter(o => o.group === g).map(o => o.key);
      rows.push(specRow(`${meta.icon} ${meta.label}`, c => {
        const n = keys.filter(k => c.options && c.options[k]).length;
        return `${n}/${keys.length}`;
      }));
    });

    return `<div class="overflow-x-auto"><table class="w-full border-collapse">
      <thead><tr>${header}</tr></thead>
      <tbody>${rows.join('')}</tbody>
    </table></div>`;
  }

  function closeCompare() {
    route = 'results';
    const o = document.getElementById('compareOverlay');
    if (o) o.remove();
  }

  // ---------- 프로필 (뷰 5, B5) ----------
  function uid() { return 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
  function currentScenario(name) {
    return {
      id: uid(), name: name,
      salary: state.salary, km: state.km, risk: state.risk, preset: state.preset,
      fuelPref: [...state.fuelPref], region: state.region, homeCharge: state.homeCharge
    };
  }
  function applyProfile(p) {
    state.salary = p.salary; state.km = p.km; state.risk = p.risk; state.preset = p.preset;
    state.fuelPref = [...(p.fuelPref || [])];
    state.region = REGIONS.some(r => r.code === p.region) ? p.region : REGIONS[0].code;
    state.homeCharge = !!p.homeCharge;
    state.activeProfileId = p.id;
    detailKm = state.km;
  }

      overlay.id = 'profilesOverlay';
      document.body.appendChild(overlay);
    }

              <div class="text-xs text-ink-400">성향 ${p.risk} · ${(PRESETS.find(x=>x.key===p.preset)||{}).label||p.preset} · 연료 ${(p.fuelPref&&p.fuelPref.length)?p.fuelPref.join('/'):'전체'}</div>

            </div>

      : `<div class="py-12 text-center">
           <div class="text-4xl mb-3">📁</div>

           <p class="text-sm text-ink-400 mt-1">지금 입력값을 이름 붙여 저장하면 나중에 한 번에 불러올 수 있어요.</p>
         </div>`;

    overlay.innerHTML = `
      <div id="profilesBackdrop" class="absolute inset-0 bg-ink-900/40"></div>
      <div class="relative w-full sm:max-w-lg surface rounded-t-3xl sm:rounded-3xl sheet-shadow sm:modal-shadow max-h-[92vh] overflow-y-auto fade-in">

            <div class="flex gap-2">
              <input id="profileName" type="text" placeholder="예: 출퇴근용 / 주말 차박" class="flex-1 surface rounded-xl border border-ink-200 px-3 py-2.5 text-sm" />
              <button id="profileSave" class="bg-brand hover:bg-brand-hover text-white font-bold rounded-xl px-4 text-sm">저장</button>
            </div>

          <div class="space-y-2">${list}</div>
        </div>
      </div>`;

    document.getElementById('profilesBackdrop').onclick = closeProfiles;
    document.getElementById('profilesClose').onclick = closeProfiles;
    const saveBtn = document.getElementById('profileSave');
    saveBtn.onclick = () => {
      const inp = document.getElementById('profileName');
      const name = (inp.value || '').trim() || `시나리오 ${state.profiles.length + 1}`;
      const sc = currentScenario(name);
      state.profiles.push(sc);
      state.activeProfileId = sc.id;
      saveState();
      toast(`"${name}" 저장했어요`);
      renderProfiles();
    };
    overlay.querySelectorAll('[data-apply]').forEach(b => b.onclick = () => {
      const p = state.profiles.find(x => x.id === b.getAttribute('data-apply'));
      if (p) { applyProfile(p); saveState(); toast(`"${p.name}" 으로 전환했어요`); closeProfiles(); render(); }

    overlay.querySelectorAll('[data-del]').forEach(b => b.onclick = () => {

      saveState();
      renderProfiles();
    });

  function closeProfiles() {
    route = state.submitted ? (route === 'profiles' ? 'input' : route) : 'input';
    // 입력화면에서 진입했으면 input 으로 복귀
    if (route === 'profiles') route = 'input';
    const o = document.getElementById('profilesOverlay');
    if (o) o.remove();
    render();

  // ---------- 데이터 동기화 (뷰 6, B6) ----------
  // Mock 외부 소스 — 실제 네트워크 없이 상수에서 로드 (오프라인)
  function mockSubsidyTable() {
    // 무공해차 누리집 mock: REGIONS 보조금 + 국고 한도 스냅샷
    return REGIONS.map(r => ({ region: r.name, local: r.evLocalManwon, national: (SUBSIDY.ev||{}).nationalMaxManwon }));
  }
  function mockFuelPrices() {
    // 오피넷 mock: COST.fuelPriceWon 스냅샷
    const m = COST.fuelPriceWon || { 가솔린: 1650, 디젤: 1550, LPG: 1050, EV: 320 };
    return Object.keys(m).map(k => ({ fuel: k, won: m[k] }));
  }
  function pushSync(source, count) {
    const entry = { ts: Date.now(), source, count };
    state.syncLog.unshift(entry);
    if (state.syncLog.length > 50) state.syncLog.length = 50;
    saveState();
    return entry;
  }

  function renderSync() {
    let overlay = document.getElementById('syncOverlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'syncOverlay';
      document.body.appendChild(overlay);
    }
    overlay.className = 'fixed inset-0 z-40 flex items-end sm:items-center justify-center';

    const logRows = state.syncLog.length
      ? state.syncLog.map(e => `
        <div class="flex items-center justify-between py-2 border-b border-ink-100 text-sm">
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full ${e.source.includes('보조금') ? 'bg-emerald-500' : 'bg-brand'}"></span>
            <span class="text-ink-700 font-semibold">${e.source}</span>
          </div>
          <div class="text-right">
            <div class="text-ink-800 font-semibold tabular-nums">${e.count}건</div>
            <div class="text-[11px] text-ink-400 tabular-nums">${fmtTs(e.ts)}</div>
          </div>
        </div>`).join('')
      : `<div class="py-10 text-center text-sm text-ink-400">아직 동기화 기록이 없어요. 위 버튼으로 동기화해 보세요.</div>`;

    overlay.innerHTML = `
      <div id="syncBackdrop" class="absolute inset-0 bg-ink-900/40"></div>
      <div class="relative w-full sm:max-w-lg surface rounded-t-3xl sm:rounded-3xl sheet-shadow sm:modal-shadow max-h-[92vh] overflow-y-auto fade-in">
        <div class="sticky top-0 surface px-5 pt-4 pb-3 border-b border-ink-100 flex items-center justify-between z-10">
          <div class="font-bold text-lg text-ink-900">데이터 동기화</div>
          <button id="syncClose" class="text-ink-400 text-2xl leading-none px-1">×</button>
        </div>
        <div class="px-5 py-4 space-y-4">
          <p class="text-xs text-ink-400">외부 공개 데이터를 불러와 보조금·유가 기준을 최신화해요. 데모에서는 오프라인 mock 으로 동작해요. <span class="text-ink-300">[추정/mock]</span></p>
          <div class="grid grid-cols-1 gap-2">
            <button id="syncSubsidy" class="w-full bg-brand hover:bg-brand-hover text-white font-bold text-sm flex items-center justify-center gap-2">🌿 보조금 테이블 동기화 <span class="text-xs font-normal opacity-80">(무공해차 누리집 mock)</span></button>
            <button id="syncFuel" class="w-full surface-sub text-ink-800 font-bold text-sm flex items-center justify-center gap-2">⛽ 유가 동기화 <span class="text-xs font-normal text-ink-400">(오피넷 mock)</span></button>
          </div>
          <div class="grid grid-cols-2 gap-2 text-xs">
            <div class="surface-sub rounded-xl p-3">
              <div class="text-ink-400">보조금 최근 동기화</div>
              <div class="font-semibold text-ink-700 tabular-nums">${state.syncedSubsidyAt ? fmtTs(state.syncedSubsidyAt) : '없음'}</div>
            </div>
            <div class="surface-sub rounded-xl p-3">
              <div class="text-ink-400">유가 최근 동기화</div>
              <div class="font-semibold text-ink-700 tabular-nums">${state.syncedFuelAt ? fmtTs(state.syncedFuelAt) : '없음'}</div>
            </div>
          </div>
          <div>
            <div class="text-sm font-bold text-ink-700 mb-1">동기화 로그</div>
            <div id="syncLogBox">${logRows}</div>
          </div>
        </div>
      </div>`;

    document.getElementById('syncBackdrop').onclick = closeSync;
    document.getElementById('syncClose').onclick = closeSync;
    document.getElementById('syncSubsidy').onclick = () => {
      const data = mockSubsidyTable();
      state.syncedSubsidyAt = Date.now();
      pushSync('보조금 테이블 (무공해차 누리집 mock)', data.length);
      toast(`보조금 테이블 ${data.length}건 동기화 완료`);
      renderSync();
    };
    document.getElementById('syncFuel').onclick = () => {
      const data = mockFuelPrices();
      state.syncedFuelAt = Date.now();
      pushSync('유가 (오피넷 mock)', data.length);
      toast(`유가 ${data.length}건 동기화 완료`);
      renderSync();
    };
  }
  function closeSync() {
    route = state.submitted ? 'results' : 'input';
    const o = document.getElementById('syncOverlay');
    if (o) o.remove();
    render();
  }

    const o = document.getElementById('subsidyOverlay');

  // ===== 이벤트 바인딩 =====
  function bindEvents() {
    if (route === 'input') bindInput();
    else bindResults();
  }

  function bindInput() {
    const salary = document.getElementById('salaryInput');
    if (salary) salary.oninput = (e) => {
      state.salary = Math.max(0, parseInt(e.target.value || '0', 10) || 0);
      saveState();
    };
    const km = document.getElementById('kmRange');
    if (km) km.oninput = (e) => { state.km = parseInt(e.target.value, 10); detailKm = state.km; saveState(); render(); };

    const region = document.getElementById('regionSelect');
    if (region) region.onchange = (e) => { state.region = e.target.value; saveState(); render(); };

    document.querySelectorAll('.charge-btn').forEach(b => b.onclick = () => {
      state.homeCharge = b.getAttribute('data-charge') === 'true'; saveState(); render();
    });
    document.querySelectorAll('.risk-btn').forEach(b => b.onclick = () => {
      state.risk = parseFloat(b.getAttribute('data-risk')); saveState(); render();
    });
    document.querySelectorAll('.preset-btn').forEach(b => b.onclick = () => {
      state.preset = b.getAttribute('data-preset'); saveState(); render();
    });
    document.querySelectorAll('.fuel-btn').forEach(b => b.onclick = () => {
      const f = b.getAttribute('data-fuel');
      const i = state.fuelPref.indexOf(f);
      if (i >= 0) state.fuelPref.splice(i, 1); else state.fuelPref.push(f);
      saveState(); render();
    });

    const profilesBtn = document.getElementById('profilesBtn');
    if (profilesBtn) profilesBtn.onclick = () => { renderProfiles(); };
    const syncBtn = document.getElementById('syncBtn');
    if (syncBtn) syncBtn.onclick = () => { renderSync(); };

    const find = document.getElementById('findBtn');
    if (find) find.onclick = () => {
      if (salary) state.salary = Math.max(0, parseInt(salary.value || '0', 10) || 0);
      state.submitted = true;
      route = 'results';
      saveState();
      render();
      window.scrollTo(0, 0);
    };
  }

  function bindResults() {
    const back = document.getElementById('backBtn');
    if (back) back.onclick = () => { route = 'input'; render(); window.scrollTo(0,0); };

    const cmpOpen = document.getElementById('compareOpenBtn');
    if (cmpOpen) cmpOpen.onclick = () => { renderCompare(); };

    const guideBtn = document.getElementById('subsidyGuideBtn');
    if (guideBtn) guideBtn.onclick = () => { renderSubsidyGuide(); };

    const sort = document.getElementById('sortSelect');
    if (sort) sort.onchange = (e) => { state.sort = e.target.value; saveState(); render(); };

    // v2 신규 필터
    const safe5 = document.getElementById('safe5Btn');
    if (safe5) safe5.onclick = () => { state.safe5Only = !state.safe5Only; saveState(); render(); };
    const mech = document.getElementById('mechParkBtn');
    if (mech) mech.onclick = () => { state.mechParkOnly = !state.mechParkOnly; saveState(); render(); };

    document.querySelectorAll('.facet-btn').forEach(b => b.onclick = () => {
      const dim = b.getAttribute('data-facet');
      const val = b.getAttribute('data-val');
      const arr = dim === 'fuel' ? state.facetFuel : state.facetSegment;
      const i = arr.indexOf(val);
      if (i >= 0) arr.splice(i, 1); else arr.push(val);
      saveState(); render();
    });

    document.querySelectorAll('.opt-btn').forEach(b => b.onclick = () => {
      const k = b.getAttribute('data-opt');
      const i = state.requiredOptions.indexOf(k);
      if (i >= 0) state.requiredOptions.splice(i, 1); else state.requiredOptions.push(k);
      saveState(); render();
    });
    const clearOpts = document.getElementById('clearOptsBtn');
    if (clearOpts) clearOpts.onclick = () => {
      state.requiredOptions = []; state.activePersonas = []; saveState(); render();
    };

    document.querySelectorAll('.persona-btn').forEach(b => b.onclick = () => {
      const tag = b.getAttribute('data-persona');
      const p = PERSONAS.find(x => x.tag === tag);
      if (!p) return;
      const i = state.activePersonas.indexOf(tag);
      if (i >= 0) {
        state.activePersonas.splice(i, 1);
        const keep = new Set();
        state.activePersonas.forEach(t => {
          const pp = PERSONAS.find(x => x.tag === t);
          if (pp) pp.options.forEach(o => keep.add(o));
        });
        p.options.forEach(o => {
          if (!keep.has(o)) {
            const idx = state.requiredOptions.indexOf(o);
            if (idx >= 0) state.requiredOptions.splice(idx, 1);
          }
        });
      } else {
        state.activePersonas.push(tag);
        p.options.forEach(o => { if (!state.requiredOptions.includes(o)) state.requiredOptions.push(o); });
      }
      saveState(); render();
    });

    const search = document.getElementById('searchInput');
    if (search) {
      search.oninput = (e) => {
        searchQuery = e.target.value;
        const keys = searchToOptionKeys(searchQuery);
        const hint = document.getElementById('searchHint');
        if (hint) {
          hint.innerHTML = searchQuery
            ? (keys.length
                ? `매칭 옵션: ${keys.map(k => OPTION_BY_KEY[k] ? OPTION_BY_KEY[k].label : k).join(', ')} <button id="applySearch" class="ml-1 text-brand font-semibold">필터 적용 ↵</button>`
                : `<span class="text-ink-400">매칭되는 기능이 없어요.</span>`)
            : '';
          const apply = document.getElementById('applySearch');
          if (apply) apply.onclick = () => applySearch(keys);
        }
      };
      search.onkeydown = (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          applySearch(searchToOptionKeys(searchQuery));
        }
      };
    }
  }

  function applySearch(keys) {
    keys.forEach(k => { if (!state.requiredOptions.includes(k)) state.requiredOptions.push(k); });
    searchQuery = '';
    saveState();
    render();
  }

  // 차량 카드 클릭 위임
  root.addEventListener('click', (e) => {
    const card = e.target.closest('.car-card');
    if (card) {
      state.detailId = card.getAttribute('data-car');
      renderDetail();
    }
  });

  // ===== 초기 구동 =====
  function boot() {
    if (!CARS.length) {
      root.innerHTML = `
        <div class="min-h-screen flex items-center justify-center p-6 text-center">
          <div>
            <div class="text-4xl mb-3">📂</div>
            <p class="font-bold text-ink-700">데이터를 불러오지 못했어요</p>
            <p class="text-sm text-ink-400 mt-1">data.js 가 함께 있어야 차량 정보를 보여드릴 수 있어요.</p>
          </div>
        </div>`;
      return;
    }
    render();
  }
  boot();
  </script>
</body>
</html>
