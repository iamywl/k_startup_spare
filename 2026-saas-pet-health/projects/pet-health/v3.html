<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>펫헬스북 v3 — 반려동물 토탈 헬스케어 플랫폼 (시리즈A 데모)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  /* ============ 디자인 토큰 (Apple × Toss / 동적 브랜드 = 펫 친근 인디고-틸) ============ */
  :root{
    --brand:#2f6df0; --brand-deep:#1f53c4; --brand-soft:#eaf1ff;
    --accent:#11b0a6; --accent-soft:#e1f7f4;
    --warn:#e8862b; --warn-soft:#fdf0e1;
    --danger:#e0474f; --danger-soft:#fdeced;
    --purple:#7c5cf0; --purple-soft:#efeafe;
    --ink:#14233d; --ink-2:#3f4f6b; --ink-3:#76839b;
    --line:#e7ebf2; --surface:#ffffff; --surface-2:#f5f7fb; --bg:#eef2f8;
    --radius:16px; --radius-sm:12px;
    --shadow-float:0 12px 34px rgba(20,35,61,.16);
    --shadow-card:0 1px 0 rgba(20,35,61,.04);
    --tab-h:64px;
    /* 역할 테마 (동적) */
    --role:#2f6df0; --role-soft:#eaf1ff;
  }
  body[data-role="vet"]{ --role:#11b0a6; --role-soft:#e1f7f4; }
  body[data-role="insurer"]{ --role:#7c5cf0; --role-soft:#efeafe; }
  body[data-role="hospital"]{ --role:#e8862b; --role-soft:#fdf0e1; }
  /* 언어 토글 */
  .lang-tog{display:inline-flex;background:rgba(255,255,255,.1);border-radius:9px;padding:3px;gap:2px;margin:8px 0}
  .lang-tog button{flex:1;height:30px;border-radius:7px;font-size:12px;font-weight:800;color:#a9bbdd}
  .lang-tog button.active{background:#fff;color:var(--ink)}
  .mtop .lang-tog{margin:0;background:var(--surface-2)}
  .mtop .lang-tog button{color:var(--ink-3);padding:0 8px;height:28px}
  .mtop .lang-tog button.active{background:var(--brand);color:#fff}
  /* 위험 예측 바 */
  .pred-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px dashed var(--line)}
  .pred-row:last-child{border-bottom:none}
  .pred-row .pn{flex:1;font-size:13.5px;font-weight:700}
  .pred-row .pb{flex:0 0 42%;height:9px;border-radius:6px;background:var(--surface-2);overflow:hidden}
  .pred-row .pb > i{display:block;height:100%;border-radius:6px}
  .pred-row .pv{flex:0 0 46px;text-align:right;font-weight:800;font-size:13.5px}
  /* 약물 상호작용 경고 */
  .ddi{display:flex;gap:10px;padding:12px;border-radius:12px;margin-bottom:8px;font-size:13.5px}
  .ddi.major{background:var(--danger-soft);color:#b22e36} .ddi.moderate{background:var(--warn-soft);color:#a85e15}
  .ddi.minor{background:var(--surface-2);color:var(--ink-2)} .ddi .di{font-size:18px}
  /* 단계 배지 */
  .ver-pill{display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:999px;font-size:10px;font-weight:800;background:var(--purple-soft);color:#5b3fc4;margin-left:6px;vertical-align:middle}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{max-width:100%;overflow-x:hidden}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",Roboto,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1100px 520px at 88% -8%, rgba(47,109,240,.10), transparent 60%),
      radial-gradient(900px 460px at 4% 4%, rgba(17,176,166,.09), transparent 60%),
      var(--bg);
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:16px}
  .visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}

  /* ============ 셸: 사이드바 + 본문 (PC) ============ */
  .app{display:flex;min-height:100vh}
  .sidebar{
    width:256px;flex:0 0 256px;
    background:linear-gradient(180deg,#142a52 0%, #122348 100%);
    color:#dbe4f4;padding:22px 16px;display:flex;flex-direction:column;gap:4px;
    position:sticky;top:0;height:100vh;overflow:auto;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 14px}
  .brand .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--brand),var(--accent));
    display:grid;place-items:center;font-size:20px;box-shadow:0 6px 16px rgba(47,109,240,.4)}
  .brand b{font-size:18px;color:#fff;letter-spacing:-.3px}
  .brand small{display:block;color:#9fb2d6;font-size:11px;font-weight:600}
  .nav-sec{font-size:11px;font-weight:800;color:#7e91ba;letter-spacing:.4px;padding:12px 10px 4px;text-transform:uppercase}
  .nav-btn{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;
    color:#c4d2ec;font-size:14.5px;font-weight:600;text-align:left;width:100%;transition:.16s}
  .nav-btn .ic{font-size:18px;width:21px;text-align:center}
  .nav-btn:hover{background:rgba(255,255,255,.07);color:#fff}
  .nav-btn.active{background:rgba(255,255,255,.14);color:#fff}
  .nav-btn .badge{margin-left:auto;background:var(--warn);color:#fff;font-size:11px;font-weight:800;
    min-width:20px;height:20px;border-radius:10px;display:grid;place-items:center;padding:0 6px}
  .sidebar .spacer{flex:1;min-height:8px}
  .side-foot{font-size:11px;color:#8a9cc0;padding:8px;line-height:1.5}

  /* 역할 스위처 (사이드바) */
  .role-switch{display:flex;gap:4px;background:rgba(255,255,255,.08);border-radius:12px;padding:4px;margin:4px 0 8px}
  .role-switch button{flex:1;height:38px;border-radius:9px;font-size:12px;font-weight:800;color:#a9bbdd;display:flex;flex-direction:column;gap:1px;align-items:center;justify-content:center}
  .role-switch button .re{font-size:15px}
  .role-switch button.active{background:#fff;color:var(--ink)}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .content{padding:26px 32px 56px;max-width:1120px;width:100%;margin:0 auto}
  .page-head{margin-bottom:20px}
  .page-head h1{font-size:25px;font-weight:800;letter-spacing:-.5px}
  .page-head p{color:var(--ink-3);font-size:14px;margin-top:4px}
  .role-banner{display:inline-flex;align-items:center;gap:7px;height:30px;padding:0 12px;border-radius:999px;
    font-size:12.5px;font-weight:800;background:var(--role-soft);color:var(--role);margin-bottom:12px}

  /* ============ 공통 컴포넌트 ============ */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-card)}
  .pad{padding:20px}
  .grid{display:grid;gap:16px}
  .kpis{grid-template-columns:repeat(4,1fr)}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .kpi .lbl{font-size:13px;color:var(--ink-3);font-weight:600}
  .kpi .val{font-size:30px;font-weight:800;letter-spacing:-1px;margin-top:6px}
  .kpi .val small{font-size:14px;font-weight:700;color:var(--ink-3)}
  .kpi.accent .val{color:var(--accent)} .kpi.warn .val{color:var(--warn)}
  .kpi.danger .val{color:var(--danger)} .kpi.purple .val{color:var(--purple)}
  .kpi.role .val{color:var(--role)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
    height:48px;padding:0 20px;border-radius:12px;font-size:15px;font-weight:700;
    background:var(--surface-2);color:var(--ink);transition:transform .08s,background .16s;border:1px solid var(--line)}
  .btn:active{transform:scale(.97)}
  .btn:focus-visible{outline:3px solid rgba(47,109,240,.5);outline-offset:2px}
  .btn.primary{background:var(--brand);color:#fff;border-color:transparent;box-shadow:0 6px 16px rgba(47,109,240,.28)}
  .btn.primary:hover{background:var(--brand-deep)}
  .btn.role{background:var(--role);color:#fff;border-color:transparent}
  .btn.accent{background:var(--accent);color:#fff;border-color:transparent}
  .btn.ghost{background:transparent;border-color:var(--line)}
  .btn.block{width:100%;height:52px}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .btn.sm{height:38px;padding:0 13px;font-size:13px;border-radius:10px}
  .btn.xs{height:32px;padding:0 11px;font-size:12.5px;border-radius:9px}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--ink-2);margin-bottom:6px}
  .field input,.field select,.field textarea{
    width:100%;height:48px;border:1px solid var(--line);border-radius:12px;padding:0 14px;
    background:var(--surface);color:var(--ink);transition:.16s}
  .field textarea{height:auto;min-height:84px;padding:12px 14px;resize:vertical}
  .field input:focus,.field select:focus,.field textarea:focus{
    outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(47,109,240,.16)}
  .field .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .field .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

  .chip{display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 12px;border-radius:999px;font-size:12.5px;font-weight:700}
  .chip.due{background:var(--warn-soft);color:#a85e15}
  .chip.over{background:var(--danger-soft);color:#b22e36}
  .chip.ok{background:var(--accent-soft);color:#0a7a72}
  .chip.dog{background:#eef2ff;color:#3a4cc0}
  .chip.cat{background:#fdeef6;color:#b33a86}
  .chip.purple{background:var(--purple-soft);color:#5b3fc4}
  .chip.brand{background:var(--brand-soft);color:var(--brand-deep)}
  .chip.gray{background:var(--surface-2);color:var(--ink-3)}

  .seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px;flex-wrap:wrap}
  .seg button{height:38px;padding:0 16px;border-radius:9px;font-size:14px;font-weight:700;color:var(--ink-3)}
  .seg button.active{background:var(--surface);color:var(--brand);box-shadow:0 1px 4px rgba(20,35,61,.12)}

  .pet-card{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--line);
    border-radius:14px;background:var(--surface);cursor:pointer;transition:.16s}
  .pet-card:hover{border-color:var(--brand);box-shadow:0 4px 14px rgba(20,35,61,.08)}
  .pet-card.sel{border-color:var(--brand);background:var(--brand-soft)}
  .avatar{width:54px;height:54px;border-radius:14px;object-fit:cover;background:var(--surface-2);
    display:grid;place-items:center;font-size:26px;flex:0 0 54px}
  .pet-card .meta b{font-size:16px}
  .pet-card .meta span{display:block;font-size:12.5px;color:var(--ink-3)}

  /* 타임라인 */
  .timeline{position:relative;padding-left:26px}
  .timeline::before{content:"";position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:var(--line)}
  .tl-item{position:relative;padding:0 0 18px 8px}
  .tl-item::before{content:"";position:absolute;left:-22px;top:4px;width:14px;height:14px;border-radius:50%;
    background:#fff;border:3px solid var(--brand)}
  .tl-item.weight::before{border-color:var(--accent)}
  .tl-item.symptom::before{border-color:var(--warn)}
  .tl-item.visit::before{border-color:var(--brand)}
  .tl-item.med::before{border-color:#8b5cf6}
  .tl-date{font-size:12px;color:var(--ink-3);font-weight:700}
  .tl-body{font-size:14.5px;margin-top:2px}
  .tl-body b{font-weight:700}

  .sched-row{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--line);
    border-radius:14px;margin-bottom:10px;background:var(--surface)}
  .sched-row .ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:21px;flex:0 0 42px}
  .sched-row .ic.vac{background:var(--accent-soft)}
  .sched-row .ic.med{background:#f1ecfe}
  .sched-row .ic.parasite{background:var(--brand-soft)}
  .sched-row .ic.clinic{background:var(--brand-soft)}
  .sched-row .grow{flex:1;min-width:0}
  .sched-row .grow b{font-size:15px}
  .sched-row .grow span{display:block;font-size:12.5px;color:var(--ink-3)}
  .dday{font-size:13px;font-weight:800;white-space:nowrap}
  .dday.over{color:var(--danger)} .dday.due{color:var(--warn)} .dday.ok{color:var(--accent)}

  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);
    background:rgba(20,35,61,.94);color:#fff;padding:13px 20px;border-radius:14px;font-weight:700;font-size:14px;
    box-shadow:var(--shadow-float);opacity:0;pointer-events:none;transition:.28s;z-index:200;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .empty{text-align:center;padding:34px 20px;color:var(--ink-3)}
  .empty .em{font-size:40px}
  .sec-title{font-size:16px;font-weight:800;margin:0 0 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .muted{color:var(--ink-3);font-size:13px}

  /* 모달/바텀시트 */
  .scrim{position:fixed;inset:0;background:rgba(20,35,61,.34);backdrop-filter:blur(3px);
    opacity:0;pointer-events:none;transition:.22s;z-index:150}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:50%;top:50%;transform:translate(-50%,-46%) scale(.97);
    width:min(580px,92vw);max-height:88vh;overflow:auto;background:var(--surface);border-radius:20px;
    box-shadow:var(--shadow-float);opacity:0;pointer-events:none;transition:.24s;z-index:160;padding:24px}
  .sheet.show{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
  .sheet h3{font-size:20px;font-weight:800;margin-bottom:4px}
  .sheet .sub{color:var(--ink-3);font-size:13.5px;margin-bottom:18px}
  .sheet .close{position:absolute;right:16px;top:16px;width:34px;height:34px;border-radius:10px;
    background:var(--surface-2);font-size:18px;color:var(--ink-3)}

  .chart-wrap{position:relative;height:240px;width:100%}
  .chart-wrap.sm{height:200px}
  .upload-prev{width:88px;height:88px;border-radius:16px;object-fit:cover;border:1px solid var(--line);
    background:var(--surface-2);display:grid;place-items:center;font-size:34px;color:var(--ink-3)}

  /* 데이터 테이블 (수의사/보험사) */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table.dt{width:100%;border-collapse:collapse;min-width:560px}
  table.dt th{font-size:12px;font-weight:800;color:var(--ink-3);text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
  table.dt td{font-size:13.5px;padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
  table.dt tr:hover td{background:var(--surface-2)}
  table.dt tr.click{cursor:pointer}

  /* 스코어 게이지 */
  .gauge{display:flex;align-items:center;gap:16px}
  .ring{--p:0;--c:var(--accent);width:96px;height:96px;border-radius:50%;flex:0 0 96px;
    background:conic-gradient(var(--c) calc(var(--p)*1%), var(--surface-2) 0);
    display:grid;place-items:center;position:relative}
  .ring::before{content:"";position:absolute;inset:9px;border-radius:50%;background:var(--surface)}
  .ring b{position:relative;font-size:24px;font-weight:800}
  .ring b small{font-size:12px;color:var(--ink-3);font-weight:700}

  .stat-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed var(--line);font-size:13.5px}
  .stat-row:last-child{border-bottom:none}
  .stat-row b{font-weight:800}
  .bar{height:8px;border-radius:6px;background:var(--surface-2);overflow:hidden;margin-top:5px}
  .bar > i{display:block;height:100%;border-radius:6px;background:var(--brand)}

  .pill-state{display:inline-flex;align-items:center;gap:5px;height:26px;padding:0 10px;border-radius:999px;font-size:12px;font-weight:800}
  .pill-state.draft{background:var(--surface-2);color:var(--ink-3)}
  .pill-state.submitted{background:var(--brand-soft);color:var(--brand-deep)}
  .pill-state.review{background:var(--warn-soft);color:#a85e15}
  .pill-state.approved{background:var(--accent-soft);color:#0a7a72}
  .pill-state.rejected{background:var(--danger-soft);color:#b22e36}

  .log-line{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--ink-2);
    padding:7px 10px;border-bottom:1px solid var(--line);white-space:pre-wrap;word-break:break-all}
  .log-line .t{color:var(--ink-3)} .log-line .ok{color:#0a7a72;font-weight:700}

  .notif{display:flex;gap:12px;padding:13px;border:1px solid var(--line);border-radius:13px;margin-bottom:9px;background:var(--surface)}
  .notif .ni{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:18px;flex:0 0 38px;background:var(--brand-soft)}
  .notif.unread{border-color:var(--brand)}
  .notif b{font-size:14px} .notif .sub{font-size:12.5px;color:var(--ink-3)}
  .notif time{font-size:11px;color:var(--ink-3);margin-left:auto;white-space:nowrap}

  /* ============ 모바일 셸 ============ */
  .mtop{display:none}
  .bottomnav{display:none}
  .drawer{display:none}
  @media (max-width:767px){
    .sidebar{display:none}
    .content{padding:14px 16px calc(var(--tab-h) + 26px);max-width:100%}
    .mtop{display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:120;
      padding:11px 14px;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(18px);
      border-bottom:1px solid var(--line)}
    .mtop .hb{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:19px;background:var(--surface-2);flex:0 0 38px}
    .mtop .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--accent));
      display:grid;place-items:center;font-size:16px;flex:0 0 30px}
    .mtop b{font-size:15px;letter-spacing:-.3px}
    .mtop .mt-title{margin-left:2px;font-weight:800}
    .mtop .mrole{margin-left:auto;font-size:11px;font-weight:800;color:var(--role);background:var(--role-soft);padding:5px 10px;border-radius:999px}
    .page-head h1{font-size:20px}
    .kpis{grid-template-columns:1fr 1fr}
    .kpi .val{font-size:24px}
    .field .row2,.field .row3{grid-template-columns:1fr}
    .bottomnav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:130;height:var(--tab-h);
      background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(20px);border-top:1px solid var(--line)}
    .bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
      min-height:var(--tab-h);font-size:10.5px;font-weight:700;color:var(--ink-3);position:relative;padding:0 2px}
    .bottomnav button .ic{font-size:20px}
    .bottomnav button.active{color:var(--brand)}
    .bottomnav button .badge{position:absolute;top:7px;right:calc(50% - 20px);background:var(--warn);color:#fff;
      font-size:10px;font-weight:800;min-width:16px;height:16px;border-radius:9px;display:grid;place-items:center;padding:0 4px}
    .sheet{top:auto;bottom:0;left:0;transform:translateY(18px);width:100%;max-width:100%;
      border-radius:22px 22px 0 0;max-height:90vh}
    .sheet.show{transform:translateY(0)}
    .toast{bottom:calc(var(--tab-h) + 18px)}
    .btn.row-grow{flex:1}
    /* 오프캔버스 드로어 (전체 메뉴·역할 전환) */
    .drawer{display:block;position:fixed;inset-block:0;left:0;width:82vw;max-width:300px;z-index:170;
      background:linear-gradient(180deg,#142a52,#122348);color:#dbe4f4;padding:20px 16px;
      transform:translateX(-100%);transition:transform .25s;overflow:auto}
    body.drawer-open .drawer{transform:translateX(0)}
    .drawer-scrim{position:fixed;inset:0;background:rgba(20,35,61,.45);z-index:165;opacity:0;pointer-events:none;transition:.22s}
    body.drawer-open .drawer-scrim{opacity:1;pointer-events:auto}
    table.dt{min-width:520px}
    .gauge{flex-direction:column;align-items:flex-start;gap:12px}
  }
  @media (max-width:767px){
    #homeGrid,#clinicGrid,#repGrid,#vetGrid,#insGrid,#predGrid,#hospGrid,.two-col{grid-template-columns:1fr!important}

/* =========================================================================

    guardian:"Guardian", vet:"Vet", insurer:"Insurer", hospital:"Hospital",
    nav_care:"Care", nav_insight:"Insights", nav_link:"Integrations", nav_clinic:"Clinic", nav_risk:"Risk", nav_admin:"Operations",
    home:"Home", pets:"Pets", records:"Health Records", schedule:"Vaccine·Med·Parasite",

let LANG = "ko";
const t = (k)=> (I18N[LANG] && I18N[LANG][k]) || (I18N.ko[k]||k);
const todayISO = ()=> new Date().toISOString().slice(0,10);
const fmtDate = (iso)=>{ if(!iso) return "-"; const d=new Date(iso+"T00:00:00"); return `${d.getMonth()+1}월 ${d.getDate()}일`; };
const fmtFull = (iso)=>{ const d=new Date(iso+"T00:00:00"); return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`; };
const daysBetween = (a,b)=> Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000);
const addDays = (iso,n)=>{ const d=new Date(iso+"T00:00:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
const uid = ()=> Math.random().toString(36).slice(2,9);
const won = (n)=> n.toLocaleString("ko-KR")+"원";
const nowStamp = ()=>{ const d=new Date(); return `${fmtFull(todayISO())} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; };

/* =========================================================================
   알고리즘 1: 견종·묘종별 접종/구충 프로토콜 엔진
   ========================================================================= */
const BREED_PROTOCOL = {
  dog:{
    base:[
      {key:"종합백신(DHPPL)", type:"vac", cycleDays:365, note:"성견 연 1회 추가접종"},
      {key:"광견병", type:"vac", cycleDays:365, note:"법정 예방접종(연 1회)"},
      {key:"심장사상충 예방", type:"med", cycleDays:30, note:"매월 1회 정기 투약"},
      {key:"외부구충(진드기·벼룩)", type:"parasite", cycleDays:30, note:"월 1회 외부기생충"},
      {key:"내부구충", type:"parasite", cycleDays:90, note:"분기 1회 내부기생충"},
    ],
    // 견종 위험 가중(슬개골·심장·관절 등) — 권장 검진 항목
    breedRisk:{
      "웰시코기":[{key:"척추(IVDD) 검진", type:"vac", cycleDays:365, note:"장요추 디스크 호발 견종 — 연 1회 정형 검진"}],
      "포메라니안":[{key:"슬개골 탈구 검진", type:"vac", cycleDays:365, note:"소형견 슬개골 호발 — 연 1회"}],
      "푸들":[{key:"슬개골 탈구 검진", type:"vac", cycleDays:365, note:"소형견 슬개골 호발 — 연 1회"}],
      "닥스훈트":[{key:"척추(IVDD) 검진", type:"vac", cycleDays:365, note:"디스크 호발 — 연 1회"}],
    },
  },
  cat:{
    base:[
      {key:"종합백신(FVRCP)", type:"vac", cycleDays:365, note:"성묘 연 1회 추가접종"},
      {key:"광견병", type:"vac", cycleDays:365, note:"연 1회 권장"},
      {key:"심장사상충 예방", type:"med", cycleDays:30, note:"매월 1회 정기 투약"},
      {key:"내·외부구충", type:"parasite", cycleDays:30, note:"월 1회 기생충 예방"},
    ],
    breedRisk:{
      "페르시안":[{key:"신장(PKD) 검진", type:"vac", cycleDays:180, note:"다낭성 신장질환 호발 — 6개월마다"}],
      "스코티시폴드":[{key:"관절(골연골이형성) 검진", type:"vac", cycleDays:365, note:"연골 이형성 호발 — 연 1회"}],
      "코리안숏헤어":[{key:"구강 스케일링 검진", type:"vac", cycleDays:365, note:"치주질환 예방 — 연 1회"}],
    },
  },
};
function protocolFor(species, breed){
  const p = BREED_PROTOCOL[species] || BREED_PROTOCOL.dog;
  const extra = (p.breedRisk && p.breedRisk[breed]) || [];
  return { base:p.base, breedExtra:extra };
}

/* =========================================================================
   알고리즘 2: BCS(체형) 평가 + 권장 사료량(RER/DER) 계산
   ========================================================================= */
const ACTIVITY_FACTOR = { neuter:1.6, intact:1.8, weightloss:1.0, senior:1.2, active:2.0 };
function calcBCS(pet){
  // 입력: 현재체중, 이상체중(품종/종 기반 추정), 활동계수
  const weights = (pet.records||[]).filter(r=>r.type==="weight").sort((a,b)=>a.date.localeCompare(b.date));
  const cur = weights.length ? weights[weights.length-1].kg : (pet.idealKg||null);
  const ideal = pet.idealKg || (pet.species==="cat"?4.5:7.0);
  let bcs=5, label="이상적", color="var(--accent)";
  if(cur){
    const ratio = cur/ideal;
    if(ratio<0.85){ bcs=3; label="저체중"; color="var(--warn)"; }
    else if(ratio<=1.10){ bcs=5; label="이상적"; color="var(--accent)"; }
    else if(ratio<=1.25){ bcs=7; label="과체중"; color="var(--warn)"; }
    else { bcs=9; label="비만"; color="var(--danger)"; }
  }
  // RER = 70 * (kg^0.75), DER = RER * 활동계수
  const af = pet.activity || (bcs>=7?ACTIVITY_FACTOR.weightloss:(pet.species==="cat"?ACTIVITY_FACTOR.neuter:ACTIVITY_FACTOR.neuter));
  const rer = cur ? 70*Math.pow(cur,0.75) : null;
  const der = rer ? rer*af : null;
  return { cur, ideal, bcs, label, color, rer, der, af };
}

/* =========================================================================
   알고리즘 3: 체중 추세 + 이상치 탐지 (이동평균 + 표준편차 밴드)
   ========================================================================= */
function weightTrend(pet){
  const w = (pet.records||[]).filter(r=>r.type==="weight").sort((a,b)=>a.date.localeCompare(b.date));
  if(w.length<3) return { points:w, ma:[], upper:[], lower:[], outliers:[], slope:0, trendLabel:"데이터 부족" };
  const vals = w.map(x=>x.kg);
  const win = 3; // 이동평균 윈도
  const ma=[], upper=[], lower=[], outliers=[];
  for(let i=0;i<vals.length;i++){
    const s=Math.max(0,i-win+1);
    const seg=vals.slice(s,i+1);
    const m=seg.reduce((a,b)=>a+b,0)/seg.length;
    const sd=Math.sqrt(seg.reduce((a,b)=>a+(b-m)**2,0)/seg.length) || 0.05;
    ma.push(+m.toFixed(2));
    upper.push(+(m+2*sd).toFixed(2));
    lower.push(+(m-2*sd).toFixed(2));
    // 직전 윈도(현재값 제외) 기준 ±2σ 밴드를 벗어나면 이상치
    if(i>=win){
      const prev=vals.slice(Math.max(0,i-win),i);
      const pm=prev.reduce((a,b)=>a+b,0)/prev.length;
      const psd=Math.sqrt(prev.reduce((a,b)=>a+(b-pm)**2,0)/prev.length) || 0.05;
      const band=Math.max(psd,0.12);
      if(Math.abs(vals[i]-pm) > 2*band) outliers.push({date:w[i].date, kg:vals[i], expected:+pm.toFixed(2)});
    }
  }
  // 선형 추세 기울기 (최소제곱, kg/30일)
  const n=vals.length;
  const xs=w.map((x,i)=>i);
  const mx=xs.reduce((a,b)=>a+b,0)/n, my=vals.reduce((a,b)=>a+b,0)/n;
  let num=0,den=0; xs.forEach((x,i)=>{ num+=(x-mx)*(vals[i]-my); den+=(x-mx)**2; });
  const slopePer=den?num/den:0; // kg per sample
  const slope=+(slopePer).toFixed(3);
  let trendLabel = Math.abs(slope)<0.05 ? "안정적" : (slope>0?"증가 추세":"감소 추세");
  return { points:w, ma, upper, lower, outliers, slope, trendLabel };
}

/* =========================================================================
   알고리즘 4: 건강 위험 스코어 (증상·연령·체형·스케줄 지연 가중)
   0~100, 높을수록 위험. 가중합 정규화.
   ========================================================================= */
function healthRisk(pet){
  const factors=[];
  let score=0;
  // (a) 연령 가중
  const ageY = pet.birth ? daysBetween(pet.birth,todayISO())/365 : 0;
  let ageScore = ageY<1?5 : ageY<7?2 : ageY<11?14 : 24;
  factors.push({name:"연령", detail:`${ageY.toFixed(1)}세`, w:ageScore, max:24});
  score+=ageScore;
  // (b) 체형(BCS)
  const b=calcBCS(pet);
  let bcsScore = b.bcs===5?2 : (b.bcs===3?12 : (b.bcs===7?14:24));
  factors.push({name:"체형(BCS)", detail:`${b.bcs}/9 ${b.label}`, w:bcsScore, max:24});
  score+=bcsScore;
  // (c) 최근 증상 빈도(최근 90일)
  const recentSym=(pet.records||[]).filter(r=>r.type==="symptom" && daysBetween(r.date,todayISO())<=90).length;
  let symScore=Math.min(recentSym*8,24);
  factors.push({name:"최근 증상(90일)", detail:`${recentSym}건`, w:symScore, max:24});
  score+=symScore;
  // (d) 스케줄 지연(지난 일정)
  const overdue=schedItems(pet).filter(s=>s.dday<0).length;
  let ovScore=Math.min(overdue*9,28);
  factors.push({name:"예방 일정 지연", detail:`${overdue}건 지남`, w:ovScore, max:28});
  score+=ovScore;
  score=Math.min(Math.round(score),100);
  let level = score<25?"양호" : score<50?"주의" : score<70?"경계":"위험";
  let color = score<25?"var(--accent)" : score<50?"var(--brand)" : score<70?"var(--warn)":"var(--danger)";
  // 권고 생성
  const recs=[];
  if(overdue>0) recs.push(`지난 예방 일정 ${overdue}건을 빠르게 처리하세요.`);
  if(b.bcs>=7) recs.push(`과체중 — 권장 칼로리 ${b.der?Math.round(b.der):"-"}kcal/일로 식이 조절.`);
  if(b.bcs===3) recs.push(`저체중 — 영양 보충 및 원인 진단 권장.`);
  if(recentSym>=2) recs.push(`최근 증상 반복 — 수의사 진료를 권합니다.`);
  if(ageY>=11) recs.push(`노령 — 6개월마다 정기 건강검진 권장.`);
  if(!recs.length) recs.push("현재 특이 위험 없음 — 현행 케어 유지.");
  return { score, level, color, factors, recs };
}

/* =========================================================================
   알고리즘 5 (v3): 질병 위험 예측 — 로지스틱 회귀 (mock 학습 계수)
   피처: 연령(정규화)·BCS 이탈·최근증상수·일정지연·견종 위험 가중 → 질환별 확률
   sigmoid(w·x+b). 계수는 수의학 도메인 휴리스틱으로 사전 설정(데모용 mock).
   ========================================================================= */
const sigmoid = (z)=> 1/(1+Math.exp(-z));
// 질환별 로지스틱 모델 (피처 가중 + 절편). 피처: [ageN, bcsDev, sym90, overdue, breedFlag]
const DISEASE_MODELS = {
  dog:[
    {key:"비만 관련 대사질환", w:[0.9, 2.6, 0.2, 0.1, 0.3], b:-2.4, breed:[]},
    {key:"치주질환", w:[1.8, 0.3, 0.4, 0.6, 0.2], b:-2.1, breed:[]},
    {key:"슬개골·관절 질환", w:[1.1, 0.6, 0.3, 0.2, 1.9], b:-2.3, breed:["푸들","포메라니안"]},
    {key:"심장질환", w:[2.4, 0.4, 0.5, 0.3, 0.2], b:-3.0, breed:[]},
    {key:"척추(IVDD)", w:[1.0, 0.5, 0.5, 0.2, 2.2], b:-2.6, breed:["웰시코기","닥스훈트"]},
  ],
  cat:[
    {key:"만성 신장질환(CKD)", w:[2.8, 0.4, 0.5, 0.4, 0.6], b:-2.9, breed:["페르시안"]},
    {key:"비만 관련 당뇨", w:[1.0, 2.8, 0.3, 0.1, 0.2], b:-2.6, breed:[]},
    {key:"치주·구강질환", w:[1.6, 0.3, 0.5, 0.7, 0.5], b:-2.0, breed:["코리안숏헤어"]},
    {key:"하부요로계질환(FLUTD)", w:[0.8, 1.4, 0.6, 0.2, 0.2], b:-2.4, breed:[]},
  ],
};
function diseasePredict(pet){
  const ageY = pet.birth ? daysBetween(pet.birth,todayISO())/365 : 1;
  const ageN = Math.min(ageY/15, 1);                       // 0~1 (15세 기준 정규화)
  const b = calcBCS(pet);
  const bcsDev = Math.abs(b.bcs-5)/4;                       // 0~1 이상체형 이탈
  const sym90 = Math.min((pet.records||[]).filter(r=>r.type==="symptom"&&daysBetween(r.date,todayISO())<=90).length/3,1);
  const overdue = Math.min(schedItems(pet).filter(s=>s.dday<0).length/3,1);
  const models = DISEASE_MODELS[pet.species] || DISEASE_MODELS.dog;
  return models.map(m=>{
    const breedFlag = m.breed.includes(pet.breed) ? 1 : 0;
    const x = [ageN, bcsDev, sym90, overdue, breedFlag];
    const z = m.w.reduce((a,wi,i)=>a+wi*x[i],0) + m.b;
    const p = sigmoid(z);
    return { key:m.key, prob:+(p*100).toFixed(1), breedFlag, x };
  }).sort((a,b)=>b.prob-a.prob);
}

/* =========================================================================
   알고리즘 6 (v3): 성장곡선 percentile — 품종 표준 체중 대비 위치(LMS 근사)
   품종 표준(성성숙 체중 평균·표준편차) 대비 z-score → percentile.
   ========================================================================= */
const BREED_STD = { // {adultKg 평균, sd}
  "웰시코기":{m:12,sd:1.8}, "푸들":{m:4,sd:1.6}, "포메라니안":{m:2.6,sd:0.6}, "닥스훈트":{m:7,sd:1.5},
  "코리안숏헤어":{m:4.4,sd:0.7}, "페르시안":{m:4.2,sd:0.8}, "스코티시폴드":{m:4.5,sd:0.8}, "믹스":{m:7,sd:2.5},
};
const erf = (x)=>{ const t=1/(1+0.3275911*Math.abs(x)); const y=1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t+0.254829592)*t*Math.exp(-x*x); return x>=0?y:-y; };
const normCdf = (z)=> 0.5*(1+erf(z/Math.SQRT2));
function growthCurve(pet){
  const std = BREED_STD[pet.breed] || (pet.species==="cat"?BREED_STD["코리안숏헤어"]:BREED_STD["믹스"]);
  const w = (pet.records||[]).filter(r=>r.type==="weight").sort((a,b)=>a.date.localeCompare(b.date));
  const pts = w.map(x=>{
    const ageMo = pet.birth ? Math.max(daysBetween(pet.birth,x.date)/30, 0) : 0;
    // 성장 시그모이드: 표준 성체 대비 월령별 기대 비율
    const matur = 1/(1+Math.exp(-(ageMo-6)/2.6));           // 성숙도 0~1
    const expected = +(std.m*matur).toFixed(2);
    const z = std.sd? (x.kg-(expected||std.m))/std.sd : 0;
    const pct = Math.round(normCdf(z)*100);
    return { date:x.date, ageMo:+ageMo.toFixed(1), kg:x.kg, expected, pct:Math.min(99,Math.max(1,pct)) };
  });
  const last = pts.length? pts[pts.length-1] : null;
  let band = "표준";
  if(last){ band = last.pct<15?"표준 미만(저체중 경향)" : last.pct>85?"표준 초과(과체중 경향)":"표준 범위"; }
  return { std, pts, last, band };
}

const DRUG_DB = {
  "하트가드":{cls:"심장사상충(ivermectin)"}, "레볼루션":{cls:"구충(selamectin)"},
  "넥스가드":{cls:"외부구충(afoxolaner)"}, "항생제(아목시실린)":{cls:"항생제"},
  "스테로이드(프레드니솔론)":{cls:"코르티코스테로이드"}, "NSAIDs(멜록시캄)":{cls:"비스테로이드 소염제"},
  "이뇨제(푸로세미드)":{cls:"이뇨제"}, "신경안정제(가바펜틴)":{cls:"진통·신경"},
};
const DDI_RULES = [
  {a:"코르티코스테로이드", b:"비스테로이드 소염제", sev:"major", msg:"스테로이드 + NSAIDs 병용은 위장관 궤양·출혈 위험을 크게 높입니다. 병용 금기."},
  {a:"이뇨제", b:"비스테로이드 소염제", sev:"moderate", msg:"이뇨제 + NSAIDs 병용 시 신장 부담 증가. 신기능 모니터링 필요."},
  {a:"심장사상충(ivermectin)", b:"외부구충(afoxolaner)", sev:"minor", msg:"동시 투여 가능하나 투여 간격·체중 확인 권장."},
  {a:"진통·신경", b:"코르티코스테로이드", sev:"moderate", msg:"진정 작용 가중 가능. 용량 조절 고려."},
];
function checkInteractions(drugNames){
  const classes = drugNames.map(n=>(DRUG_DB[n]&&DRUG_DB[n].cls)||n);
  const hits=[];
  for(let i=0;i<classes.length;i++) for(let j=i+1;j<classes.length;j++){
    DDI_RULES.forEach(r=>{
      if((classes[i]===r.a&&classes[j]===r.b)||(classes[i]===r.b&&classes[j]===r.a))
        hits.push({pair:[drugNames[i],drugNames[j]], sev:r.sev, msg:r.msg});
    });
  }
  return hits;
}

/* ---------- 상태 로드/저장 ---------- */
let state = load();
function load(){
  try{ const raw = localStorage.getItem(STORE_KEY); if(raw){ const s=JSON.parse(raw); LANG=s.lang||"ko"; return s; } }catch(e){}
  const s = seed(); LANG=s.lang||"ko"; localStorage.setItem(STORE_KEY, JSON.stringify(s)); return s;
}
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); refreshBadges(); }
const currentPet = ()=> state.pets.find(p=>p.id===state.selected) || state.pets[0];
const myPets = ()=> state.pets.filter(p=> p.owner===state.owner);

/* ---------- 스케줄 계산 엔진 ---------- */
function schedItems(pet){
  const t = todayISO();
  return (pet.schedule||[]).map(s=>{
    const next = addDays(s.last, s.cycleDays);
    const dday = daysBetween(t, next);
    let status = dday<0 ? "over" : (dday<=14 ? "due" : "ok");
    return {...s, next, dday, status};
  }).sort((a,b)=>a.dday-b.dday);
}
function upcomingAll(){
  let out=[];
  myPets().forEach(p=> schedItems(p).forEach(s=> out.push({...s, petName:p.name, petId:p.id, emoji:p.emoji})));
  return out.sort((a,b)=>a.dday-b.dday);
}
const alertCount = ()=> upcomingAll().filter(s=>s.dday<=14).length;
const unreadNotif = ()=> (state.notifications||[]).filter(n=>!n.read).length;

function switchRole(r){

/* 공통 헬퍼 */
function speciesKo(s){ return s==="dog"?"강아지":(s==="cat"?"고양이":"기타"); }
function ageText(birth){ if(!birth) return "-"; const d=daysBetween(birth,todayISO()); const y=Math.floor(d/365); const m=Math.floor((d%365)/30); return y>0?`${y}살 ${m}개월`:`${m}개월`; }
function petPickerHTML(){ return myPets().map(p=>`<button class="${p.id===state.selected?'active':''}" data-pick="${p.id}">${p.emoji} ${p.name}</button>`).join(""); }
function schedRowHTML(s, withPet){
  const ic = {vac:"vac",med:"med",parasite:"parasite"}[s.type]||"vac";
  const emo = {vac:"💉",med:"💊",parasite:"🪱"}[s.type]||"💉";
  const ddText = s.dday<0?`D+${-s.dday} 지남`:(s.dday===0?"D-DAY":`D-${s.dday}`);
  const petTag = withPet?`<span class="chip ${s.emoji==='🐕'?'dog':'cat'}">${s.emoji} ${s.petName}</span> `:"";
  const actions = withPet?"":`<button class="btn sm done-sched" data-id="${s.id}" data-pet="${currentPet().id}">완료</button>`;
  const remind = withPet?"":`<button class="btn xs ghost remind-sched" data-id="${s.id}" data-pet="${currentPet().id}">🔔 알림톡</button>`;
  return `<div class="sched-row">
    <div class="ic ${ic}">${emo}</div>
    <div class="grow"><b>${s.cat}</b><span>${petTag}다음 예정 ${fmtFull(s.next)} · ${s.note||""}</span></div>
    <div style="text-align:right;display:flex;flex-direction:column;gap:6px;align-items:flex-end">
      <span class="dday ${s.status}">${ddText}</span>
      <div style="display:flex;gap:6px">${remind}${actions}</div>
    </div></div>`;
}
function recordHTML(r){
  const map = {
    weight:["weight",`<b>${r.kg}kg</b> 측정${r.memo?` · ${r.memo}`:""}`],
    symptom:["symptom",`🩹 <b>${r.title}</b>${r.memo?` · ${r.memo}`:""}`],
    visit:["visit",`🏥 <b>${r.title}</b>${r.memo?` · ${r.memo}`:""}${r.vet?` · ${r.vet}`:""}${r.cost?` · ${won(r.cost)}`:""}`],
    med:["med",`💊 <b>${r.title}</b>${r.memo?` · ${r.memo}`:""}`],
  };
  const [cls,body] = map[r.type] || ["visit",r.title||""];
  return `<div class="tl-item ${cls}"><div class="tl-date">${fmtFull(r.date)}</div><div class="tl-body">${body}</div></div>`;
}

          <div style="margin-top:10px">
            ${r.factors.map(f=>`<div class="stat-row"><span>${f.name} <span class="muted">(${f.detail})</span></span><b>+${f.w}</b></div>`).join("")}

        </div>
      </div>

/* =========================================================================

   ========================================================================= */
function renderPredict(){
  const pet=currentPet();
  const preds=diseasePredict(pet);
  const gc=growthCurve(pet);
  const ddi=checkInteractions(pet.meds||[]);
  const en = LANG==='en';
  const colorFor=(p)=> p<15?'var(--accent)':p<35?'var(--brand)':p<55?'var(--warn)':'var(--danger)';
  const predRows=preds.map(p=>`<div class="pred-row">
    <span class="pn">${p.key}${p.breedFlag?` <span class="chip dog" style="height:22px">${en?'breed risk':'견종 위험'}</span>`:""}</span>
    <span class="pb"><i style="width:${p.prob}%;background:${colorFor(p.prob)}"></i></span>
    <span class="pv" style="color:${colorFor(p.prob)}">${p.prob}%</span></div>`).join("");
  const top=preds[0];
  const ddiHTML = (pet.meds&&pet.meds.length)
    ? (ddi.length? ddi.map(d=>`<div class="ddi ${d.sev}"><span class="di">${d.sev==='major'?'⛔':d.sev==='moderate'?'⚠️':'ℹ️'}</span>
        <div><b>${d.pair.join(' + ')}</b> <span class="chip ${d.sev==='major'?'over':d.sev==='moderate'?'due':'gray'}" style="height:20px">${d.sev}</span><div style="margin-top:3px">${d.msg}</div></div></div>`).join("")
        : `<div class="ddi minor"><span class="di">✅</span><div>${en?'No significant interactions among current medications.':'현재 투약 약물 간 유의한 상호작용이 없습니다.'}</div></div>`)
    : `<div class="empty" style="padding:18px"><div class="em">💊</div>${en?'No medications registered.':'등록된 투약 약물이 없습니다.'}</div>`;
  return `
  <div class="page-head"><div class="role-banner">🔮 ${en?'AI Disease Risk Prediction':'AI 질병 위험 예측'} <span class="ver-pill">v3</span></div>
    <h1>${t("predict")}</h1><p>${en?'Logistic-regression risk by disease, growth-curve percentile, and drug-interaction check.':'로지스틱 회귀로 질환별 발병 확률을 추정하고, 성장곡선 percentile·약물 상호작용을 점검합니다.'}</p></div>
  <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap"><div class="seg">${petPickerHTML()}</div></div>
  <div class="grid two-col" style="grid-template-columns:1.05fr .95fr;align-items:start" id="predGrid">
    <div class="card pad">
      <div class="sec-title">🔮 ${en?'Disease risk (logistic regression)':'질환별 발병 위험 (로지스틱 회귀)'}</div>
      <p class="muted" style="margin-bottom:8px">${en?'sigmoid(w·x+b) over age·BCS·symptoms·overdue·breed features.':'연령·체형(BCS)·최근 증상·일정 지연·견종 위험을 피처로 sigmoid(w·x+b) 계산.'}</p>

      <div style="margin-top:10px">
        <div class="stat-row"><span>${en?'Current percentile':'현재 percentile'}</span><b style="color:${gc.last&&(gc.last.pct<15||gc.last.pct>85)?'var(--warn)':'var(--accent)'}">${gc.last?gc.last.pct+'p':'-'}</b></div>
        <div class="stat-row"><span>${en?'Band':'판정'}</span><b>${gc.band}</b></div>

      <div class="sec-title">💊 ${en?'Drug interaction check':'약물 상호작용 체크'} <span class="chip gray" style="margin-left:auto">${(pet.meds||[]).length} ${en?'meds':'약물'}</span></div>

function bindView(){
  $$("[data-pick]").forEach(el=> el.addEventListener("click",()=>{ state.selected=el.dataset.pick; save(); render(); }));
  $$("[data-go]").forEach(el=> el.addEventListener("click",()=> setView(el.dataset.go)));
  $$("[data-vetpick]").forEach(el=> el.addEventListener("click",()=>{ vetSelPet=el.dataset.vetpick; render(); }));
  $$("[data-vetpet]").forEach(el=> el.addEventListener("click",()=>{ vetSelPet=el.dataset.vetpet; setView("vetpatients"); }));

  if(view==="home"){}
  if(view==="pets") $("#addPet")?.addEventListener("click", openAddPet);
  if(view==="records"){
    $("#addRec")?.addEventListener("click", openAddRecord);
    $("#exportRecCSV")?.addEventListener("click", ()=>exportRecordsCSV(currentPet()));
  }
  if(view==="schedule"){
    $("#addSched")?.addEventListener("click", openAddSched);
    $$(".done-sched").forEach(b=> b.addEventListener("click",()=>completeSched(b.dataset.pet,b.dataset.id)));
    $$(".remind-sched").forEach(b=> b.addEventListener("click",()=>sendSchedReminder(b.dataset.pet,b.dataset.id)));
  }
  if(view==="report") drawTrendChart();
  if(view==="predict"){ drawGrowthChart(); $("#addMed")?.addEventListener("click", openAddMed); }
  if(view==="hospdash"){ $("#emrSync")?.addEventListener("click", emrSync); }
  if(view==="hospsched"){
    $("#calSync")?.addEventListener("click", calendarSync);
    $$(".confirm-bk").forEach(b=> b.addEventListener("click",()=>confirmBooking(b.dataset.id)));
  }
  if(view==="clinic"){
    $("#bookForm")?.addEventListener("submit", submitBooking);
    $("#genPDF")?.addEventListener("click", ()=>genHealthPDF(currentPet()));
    $("#genVisitPDF")?.addEventListener("click", ()=>genVisitPDF(currentPet()));
    $$(".confirm-bk").forEach(b=> b.addEventListener("click",()=>confirmBooking(b.dataset.id)));
  }
  if(view==="claims"){
    $("#newClaim")?.addEventListener("click", openNewClaim);
    $$("[data-claim]").forEach(r=> r.addEventListener("click",()=>openClaimDetail(r.dataset.claim,false)));
  }
  if(view==="integrations"){
    $("#runNotifSweep")?.addEventListener("click", runNotifSweep);
    $("#expJSON")?.addEventListener("click", exportJSON);
    $("#expCSV")?.addEventListener("click", ()=>exportRecordsCSV(currentPet()));
    $("#impJSON")?.addEventListener("change", importJSON);
    $("#syncWearable")?.addEventListener("click", syncWearable);
    $("#oauthWearable")?.addEventListener("click", oauthWearable);
    drawActChart();
  }
  if(view==="notifs"){
    $("#readAll")?.addEventListener("click", ()=>{ (state.notifications||[]).forEach(n=>n.read=true); save(); render(); toast("모든 알림을 읽음 처리했어요."); });
    $$("[data-notif]").forEach(el=> el.addEventListener("click",()=>{ const n=state.notifications.find(x=>x.id===el.dataset.notif); if(n){n.read=true; save(); render();} }));
  }
  if(view==="vetwrite" || view==="vetpatients"){
    $("#vetForm")?.addEventListener("submit", submitVetRecord);
    $("#vetWriteHere")?.addEventListener("click", ()=>setView("vetwrite"));
  }
  if(view==="insclaims") $$("[data-insclaim]").forEach(r=> r.addEventListener("click",()=>openClaimDetail(r.dataset.insclaim,true)));
  if(view==="insrisk") drawRiskChart();
}

/* ---------- 차트 ---------- */
let trendObj, actObj, riskObj;
function drawTrendChart(){
  const pet=currentPet(); const tr=weightTrend(pet);
  const ctx=$("#trendChart"); if(!ctx) return; trendObj?.destroy();
  const labels=tr.points.map(x=>fmtDate(x.date));
  const outSet=new Set(tr.outliers.map(o=>o.date));
  trendObj=new Chart(ctx,{type:"line",
    data:{labels,datasets:[
      {label:"체중",data:tr.points.map(x=>x.kg),borderColor:"#11b0a6",backgroundColor:"rgba(17,176,166,.12)",fill:false,tension:.3,borderWidth:3,
        pointRadius:tr.points.map(x=>outSet.has(x.date)?7:4),
        pointBackgroundColor:tr.points.map(x=>outSet.has(x.date)?"#e0474f":"#11b0a6")},
      {label:"이동평균",data:tr.ma,borderColor:"#2f6df0",borderDash:[5,4],borderWidth:2,pointRadius:0,tension:.3},
      {label:"+2σ",data:tr.upper,borderColor:"rgba(232,134,43,.5)",borderWidth:1,pointRadius:0,fill:"+1",backgroundColor:"rgba(232,134,43,.06)"},
      {label:"-2σ",data:tr.lower,borderColor:"rgba(232,134,43,.5)",borderWidth:1,pointRadius:0},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,labels:{boxWidth:12,font:{size:11},color:"#76839b"}}},
      scales:{y:{grid:{color:"#eef1f6"},ticks:{color:"#76839b"}},x:{grid:{display:false},ticks:{color:"#76839b",maxRotation:0}}}}});
}
function drawActChart(){
  const pet=currentPet(); const log=(pet.activityLog||[]).slice(-7);

function completeSched(petId,id){

/* ---------- 외부통합 3: CSV/JSON 입출력 ---------- */
function download(filename,content,mime){ const blob=new Blob([content],{type:mime}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=filename; a.click(); URL.revokeObjectURL(url); }
function exportRecordsCSV(pet){
  const rows=[["날짜","유형","내용","메모/체중","진료비"]];
  (pet.records||[]).sort((a,b)=>a.date.localeCompare(b.date)).forEach(r=>{
    rows.push([r.date, r.type, r.title||(r.kg?r.kg+"kg":""), r.memo||"", r.cost||""]);
  });
  const csv="﻿"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  download(`건강기록_${pet.name}_${todayISO()}.csv`, csv, "text/csv;charset=utf-8");
  toast("⬇ 건강기록 CSV를 내보냈어요.");
}
function exportJSON(){ download(`펫헬스북_백업_${todayISO()}.json`, JSON.stringify(state,null,2), "application/json"); toast("⬇ 전체 데이터를 JSON으로 백업했어요."); }
function importJSON(e){
  const f=e.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=()=>{ try{ const obj=JSON.parse(r.result); if(!obj.pets) throw 0; state=obj; document.body.dataset.role=state.role||"guardian"; save(); toast("⬆ 백업을 가져왔어요."); renderShell(); render(); }
    catch(err){ toast("올바른 백업 파일이 아닙니다."); } };
  r.readAsText(f);
}

    state.notifications.push({id:uid(),icon:"🧾",title:`${c.petName} · 보험청구 제출`,sub:`${c.insurer} 접수번호 ${c.id}`,ts:todayISO(),read:false});
    // 자동으로 심사중 전이 (mock)
    setTimeout(()=>{ c.state="review"; save(); if(view==="claims") render(); },50);

  });
}
function openClaimDetail(id, asInsurer){
  const c=state.claims.find(x=>x.id===id); if(!c) return;
  const stateMap={draft:"작성중",submitted:"제출됨",review:"심사중",approved:"승인",rejected:"반려"};
  const steps=["submitted","review","approved"];
  const stepIdx=c.state==="rejected"?1:steps.indexOf(c.state);
  const flow=steps.map((s,i)=>`<div style="flex:1;text-align:center">
    <div style="width:30px;height:30px;border-radius:50%;margin:0 auto;display:grid;place-items:center;font-weight:800;font-size:13px;
      background:${i<=stepIdx?'var(--role)':'var(--surface-2)'};color:${i<=stepIdx?'#fff':'var(--ink-3)'}">${i+1}</div>
    <div class="muted" style="margin-top:5px;font-size:11.5px">${stateMap[s]}</div></div>`).join('<div style="flex:0 0 18px;align-self:flex-start;margin-top:14px;color:var(--ink-3)">→</div>');
  const insurerActions = asInsurer && (c.state==="submitted"||c.state==="review")
    ? `<div style="display:flex;gap:9px;margin-top:16px">
        <button class="btn role row-grow" id="clApprove">승인 (보험금 지급)</button>
        <button class="btn ghost row-grow" id="clReject" style="flex:1">반려</button></div>` : "";
  const guardianActions = !asInsurer
    ? `<button class="btn accent block" id="clPDF" style="margin-top:14px">📄 청구서 PDF 다운로드</button>` : "";
  openSheet(`
    <button class="close" onclick="window.__close()">✕</button>
    <h3>보험청구 상세</h3><div class="sub">접수번호 ${c.id} · ${c.insurer}</div>
    <div style="display:flex;align-items:flex-start;margin:6px 0 18px">${flow}</div>
    <div class="card pad" style="background:var(--surface-2);border:none">
      <div class="stat-row"><span>반려동물</span><b>${c.petName}</b></div>
      <div class="stat-row"><span>보호자</span><b>${c.owner}</b></div>
      <div class="stat-row"><span>진료일</span><b>${fmtFull(c.treatDate)}</b></div>
      <div class="stat-row"><span>진단·항목</span><b>${c.dx}</b></div>
      <div class="stat-row"><span>진료비</span><b>${won(c.amount)}</b></div>
      <div class="stat-row"><span>보장률</span><b>${Math.round(c.claimRate*100)}%</b></div>
      <div class="stat-row"><span>예상/지급 보험금</span><b style="color:var(--role)">${won(c.payout!=null?c.payout:Math.round(c.amount*c.claimRate))}</b></div>
      <div class="stat-row"><span>상태</span><span class="pill-state ${c.state}">${stateMap[c.state]}</span></div>
      ${c.note?`<div class="stat-row"><span>심사 메모</span><b>${c.note}</b></div>`:""}
    </div>
    ${guardianActions}${insurerActions}`);
  $("#clPDF")?.addEventListener("click",()=>genClaimPDF(c));
  $("#clApprove")?.addEventListener("click",()=>{ c.state="approved"; c.reviewedAt=todayISO(); c.payout=Math.round(c.amount*c.claimRate); c.note="보장 약관에 따라 승인";
    pushNotifLog("보험사 API(mock)",`${c.owner}님 휴대폰(알림톡)`,`[${c.insurer}] ${c.petName} 청구 ${c.id} 승인 · 보험금 ${won(c.payout)} 지급 예정`);
    state.notifications.push({id:uid(),icon:"✅",title:`${c.petName} · 청구 승인`,sub:`보험금 ${won(c.payout)} 지급`,ts:todayISO(),read:false});
    save(); closeSheet(); toast(`✅ 청구 승인 · 보험금 ${won(c.payout)}`); render(); });
  $("#clReject")?.addEventListener("click",()=>{ c.state="rejected"; c.reviewedAt=todayISO(); c.payout=0; c.note="보장 범위 외(약관 면책)";
    pushNotifLog("보험사 API(mock)",`${c.owner}님 휴대폰(알림톡)`,`[${c.insurer}] ${c.petName} 청구 ${c.id} 반려 · 사유: 보장 범위 외`);
    state.notifications.push({id:uid(),icon:"🚫",title:`${c.petName} · 청구 반려`,sub:`보장 범위 외`,ts:todayISO(),read:false});
    save(); closeSheet(); toast(`청구를 반려 처리했어요.`); render(); });
}

/* =========================================================================
   PDF — jsPDF (한글: canvas 렌더 방식 → 한글 깨짐 0)
   ========================================================================= */
function canvasToPDF(drawFn, filename){
  const { jsPDF } = window.jspdf;
  const scale=2, Wmm=210, Hmm=297;
  const cv=document.createElement("canvas");
  cv.width=Math.round(Wmm*3.78*scale); cv.height=Math.round(Hmm*3.78*scale);
  const g=cv.getContext("2d"); g.scale(scale,scale);
  const W=Wmm*3.78, H=Hmm*3.78;
  g.fillStyle="#ffffff"; g.fillRect(0,0,W,H); drawFn(g,W,H);
  const img=cv.toDataURL("image/png");
  const pdf=new jsPDF({orientation:"p",unit:"mm",format:"a4"});
  pdf.addImage(img,"PNG",0,0,Wmm,Hmm); pdf.save(filename);
}
const TEAL="#11b0a6", INK="#14233d", INK3="#76839b", BRAND="#2f6df0", PURPLE="#7c5cf0";
function pdfHeader(g,W,title,sub,color){
  g.fillStyle=color||BRAND; g.fillRect(0,0,W,84);
  g.fillStyle="#ffffff"; g.font="700 30px -apple-system,'Apple SD Gothic Neo',sans-serif"; g.fillText("🐾 펫헬스북",40,52);
  g.font="600 15px -apple-system,'Apple SD Gothic Neo',sans-serif"; g.fillText(title,40,72);
  g.textAlign="right"; g.font="400 12px sans-serif"; g.fillText(sub,W-40,72); g.textAlign="left";
}
function pdfLine(g,x,y,w){ g.strokeStyle="#e7ebf2"; g.lineWidth=1; g.beginPath(); g.moveTo(x,y); g.lineTo(x+w,y); g.stroke(); }
function genHealthPDF(pet){
  const recs=[...(pet.records||[])];
  const weights=recs.filter(r=>r.type==="weight").sort((a,b)=>a.date.localeCompare(b.date));
  const lastKg=weights.length?weights[weights.length-1].kg:"-";
  const sched=schedItems(pet); const risk=healthRisk(pet); const bcs=calcBCS(pet);
  canvasToPDF((g,W,H)=>{
    pdfHeader(g,W,"반려동물 건강수첩 (v2)",`발행일 ${fmtFull(todayISO())}`);
    let y=120;
    g.fillStyle=INK; g.font="700 22px -apple-system,'Apple SD Gothic Neo',sans-serif"; g.fillText(`${pet.emoji} ${pet.name}`,40,y);
    g.fillStyle=INK3; g.font="400 14px -apple-system,'Apple SD Gothic Neo',sans-serif";
    g.fillText(`${speciesKo(pet.species)} · ${pet.breed} · ${pet.sex} · ${ageText(pet.birth)}`,40,y+24);
    y+=58; pdfLine(g,40,y,W-80); y+=30;
    g.fillStyle=TEAL; g.font="700 16px sans-serif"; g.fillText("■ 건강 요약 (AI 분석)",40,y); y+=26;
    g.fillStyle=INK; g.font="400 14px -apple-system,'Apple SD Gothic Neo',sans-serif";
    [["최근 체중",`${lastKg} kg`],["건강 위험 스코어",`${risk.score}/100 (${risk.level})`],["체형(BCS)",`${bcs.bcs}/9 ${bcs.label}`],["권장 칼로리",`${bcs.der?Math.round(bcs.der):"-"} kcal/일`]].forEach((r,i)=>{
      const cx=40+(i%2)*(W/2-40); const cy=y+Math.floor(i/2)*26;
      g.fillStyle=INK3; g.fillText(r[0],cx,cy); g.fillStyle=INK; g.fillText(r[1],cx+140,cy);
    });
    y+=62; pdfLine(g,40,y,W-80); y+=30;
    g.fillStyle=TEAL; g.font="700 16px sans-serif"; g.fillText("■ 접종·구충 이력 및 다음 예정",40,y); y+=26;
    g.font="400 13.5px -apple-system,'Apple SD Gothic Neo',sans-serif";
    sched.forEach(s=>{ g.fillStyle=INK; g.fillText(`• ${s.cat}`,40,y);
      g.fillStyle=INK3; g.fillText(`최근 ${fmtFull(s.last)} → 다음 ${fmtFull(s.next)} (${s.dday<0?'지남':'D-'+s.dday})`,300,y); y+=24; });
    y+=10; pdfLine(g,40,y,W-80); y+=30;
    g.fillStyle=TEAL; g.font="700 16px sans-serif"; g.fillText("■ 최근 진료·증상 기록",40,y); y+=26;
    g.font="400 13.5px -apple-system,'Apple SD Gothic Neo',sans-serif";
    const notable=recs.filter(r=>r.type!=="weight").sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);
    notable.forEach(r=>{ g.fillStyle=INK3; g.fillText(fmtFull(r.date),40,y);
      g.fillStyle=INK; g.fillText(`${r.type==='visit'?'🏥':r.type==='med'?'💊':'🩹'} ${r.title}${r.memo?' · '+r.memo:''}`.slice(0,46),160,y); y+=24; });
    g.fillStyle=INK3; g.font="400 11px sans-serif"; g.fillText(`본 건강수첩은 펫헬스북 v2에서 ${fmtFull(todayISO())} 자동 발행. 위험스코어·BCS는 보호자 기록 기반 추정치입니다.`,40,H-40);
  }, `건강수첩_${pet.name}_${todayISO()}.pdf`);
  toast("📕 건강수첩 PDF를 다운로드했어요.");
}
function genVisitPDF(pet){
  const visits=(pet.records||[]).filter(r=>r.type==="visit"||r.type==="med").sort((a,b)=>b.date.localeCompare(a.date));
  canvasToPDF((g,W,H)=>{
    pdfHeader(g,W,"보험청구용 진료요약서",`발행일 ${fmtFull(todayISO())}`);
    let y=120; g.fillStyle=INK; g.font="700 20px -apple-system,'Apple SD Gothic Neo',sans-serif"; g.fillText(`${pet.emoji} ${pet.name} 진료내역 요약`,40,y); y+=30;
    g.fillStyle=INK3; g.font="400 13px -apple-system,'Apple SD Gothic Neo',sans-serif"; g.fillText(`${speciesKo(pet.species)} · ${pet.breed} · ${pet.sex} · ${ageText(pet.birth)}`,40,y); y+=30;
    pdfLine(g,40,y,W-80); y+=28;
    g.fillStyle=TEAL; g.font="700 14px sans-serif"; g.fillText("진료일",40,y); g.fillText("구분",170,y); g.fillText("내용",250,y); g.fillText("진료비",W-110,y); y+=10; pdfLine(g,40,y,W-80); y+=24;
    g.font="400 13px -apple-system,'Apple SD Gothic Neo',sans-serif";
    visits.forEach(r=>{ g.fillStyle=INK; g.fillText(fmtFull(r.date),40,y); g.fillStyle=INK3; g.fillText(r.type==="visit"?"진료":"투약",170,y);
      g.fillStyle=INK; g.fillText(`${r.title}`.slice(0,30),250,y); g.fillText(r.cost?won(r.cost):"-",W-110,y); y+=24; pdfLine(g,40,y-8,W-80); });
    y+=20; g.fillStyle=INK3; g.font="400 12px -apple-system,'Apple SD Gothic Neo',sans-serif"; g.fillText(`총 ${visits.length}건의 진료·투약 내역. 펫보험 청구 시 영수증·진단서와 함께 제출하세요.`,40,y);
    g.fillStyle=INK3; g.font="400 11px sans-serif"; g.fillText(`펫헬스북 자동 발행 · ${fmtFull(todayISO())}`,40,H-40);
  }, `진료요약_${pet.name}_${todayISO()}.pdf`);
  toast("🧾 보험청구용 진료요약 PDF를 다운로드했어요.");
}
function genClaimPDF(c){
  canvasToPDF((g,W,H)=>{
    pdfHeader(g,W,"펫보험 청구서",`접수번호 ${c.id}`,PURPLE);
    let y=120; g.fillStyle=INK; g.font="700 20px -apple-system,'Apple SD Gothic Neo',sans-serif"; g.fillText(`${c.insurer} 보험금 청구서`,40,y); y+=34; pdfLine(g,40,y,W-80); y+=28;
    g.font="400 15px -apple-system,'Apple SD Gothic Neo',sans-serif";
    [["반려동물",c.petName],["보호자",c.owner],["병원",c.hospital],["진료일",fmtFull(c.treatDate)],["진단·항목",c.dx],["총 진료비",won(c.amount)],["보장률",`${Math.round(c.claimRate*100)}%`],["청구 보험금",won(Math.round(c.amount*c.claimRate))]].forEach(r=>{
      g.fillStyle=INK3; g.fillText(r[0],40,y); g.fillStyle=INK; g.font="700 15px -apple-system,'Apple SD Gothic Neo',sans-serif"; g.fillText(r[1],240,y);
      g.font="400 15px -apple-system,'Apple SD Gothic Neo',sans-serif"; y+=30; pdfLine(g,40,y-10,W-80);
    });
    y+=20; g.fillStyle=INK3; g.font="400 12px -apple-system,'Apple SD Gothic Neo',sans-serif"; g.fillText(`펫헬스북에서 자동 생성된 청구서. 본 서류는 보험사 제출용이며 진료영수증 원본과 함께 제출합니다.`,40,y);
    g.fillText(`발행 ${fmtFull(todayISO())} · 펫헬스북 v2`,40,H-40);
  }, `보험청구서_${c.petName}_${c.id}.pdf`);
  toast("📄 청구서 PDF를 다운로드했어요.");
}
