<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>스몰박스 SMB — 통합 백오피스 v3 (시리즈A 데모)</title>
<script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script>
  // 디자인 토큰 재매핑 (Apple × Toss) — design-guide/디자인_애플_토스.md
  tailwind.config = { theme: { extend: {
    fontFamily: { sans: ['Pretendard','-apple-system','BlinkMacSystemFont','Apple SD Gothic Neo','sans-serif'] },
    colors: {
      // 바이올렛-인디고 브랜드 (WCAG 조정) — primary #4F46E5 흰텍스트 6.29:1
      brand:   { DEFAULT:'#4F46E5', hover:'#4338CA', light:'#EEF0FF' },
      blue:    {50:'#EEF0FF',100:'#E0E3FF',200:'#C7CCFE',300:'#A5ABFA',400:'#7C82F2',500:'#5B5BD6',600:'#4F46E5',700:'#4338CA',800:'#372FA8',900:'#2E2A85'},
      indigo:  {50:'#EEF0FF',100:'#E0E3FF',200:'#C7CCFE',300:'#A5ABFA',400:'#7C82F2',500:'#5B5BD6',600:'#4F46E5',700:'#4338CA',800:'#372FA8',900:'#2E2A85'},
      sky:     {50:'#EEF0FF',100:'#E0E3FF',200:'#C7CCFE',300:'#A5ABFA',400:'#7C82F2',500:'#5B5BD6',600:'#4F46E5',700:'#4338CA',800:'#372FA8',900:'#2E2A85'},
      // 잉크 그레이 — 인디고 hue 미세 혼합, 순흑 금지(주텍스트 700+ ≥11:1, 보조 600 7.34:1)
      slate:   {50:'#F7F7FB',100:'#F0F0F6',200:'#E5E5EE',300:'#D2D1DE',400:'#9B98AD',500:'#75728C',600:'#56536F',700:'#3A3756',800:'#26243A',900:'#1C1B2E'},
      gray:    {50:'#F7F7FB',100:'#F0F0F6',200:'#E5E5EE',300:'#D2D1DE',400:'#9B98AD',500:'#75728C',600:'#56536F',700:'#3A3756',800:'#26243A',900:'#1C1B2E'},
      zinc:    {50:'#F7F7FB',100:'#F0F0F6',200:'#E5E5EE',300:'#D2D1DE',400:'#9B98AD',500:'#75728C',600:'#56536F',700:'#3A3756',800:'#26243A',900:'#1C1B2E'},
      neutral: {50:'#F7F7FB',100:'#F0F0F6',200:'#E5E5EE',300:'#D2D1DE',400:'#9B98AD',500:'#75728C',600:'#56536F',700:'#3A3756',800:'#26243A',900:'#1C1B2E'},
      emerald: {50:'#E7F8EF',100:'#D2F2E0',300:'#7BD9A6',400:'#14AE5C',500:'#14AE5C',600:'#14AE5C',700:'#0E8A48'},
      green:   {50:'#E7F8EF',100:'#D2F2E0',300:'#7BD9A6',400:'#14AE5C',500:'#14AE5C',600:'#14AE5C',700:'#0E8A48'},
      teal:    {50:'#E7F8EF',100:'#D2F2E0',400:'#14AE5C',500:'#14AE5C',600:'#14AE5C',700:'#0E8A48'},
      amber:   {50:'#FFF6E5',100:'#FFE9C2',300:'#FFB331',400:'#FFB331',500:'#FFB331',600:'#E2991C',700:'#C77F12'},
      yellow:  {50:'#FFF6E5',100:'#FFE9C2',300:'#FFB331',400:'#FFB331',500:'#FFB331',600:'#E2991C'},
      orange:  {50:'#FFF6E5',100:'#FFE9C2',400:'#FFB331',500:'#FFB331',600:'#E2991C'},
      rose:    {50:'#FEECEE',100:'#FCD9DD',300:'#F8A4AC',400:'#F04452',500:'#F04452',600:'#F04452',700:'#D6303D'},
      red:     {50:'#FEECEE',100:'#FCD9DD',300:'#F8A4AC',400:'#F04452',500:'#F04452',600:'#F04452',700:'#D6303D'},
    }
  } } }

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<!-- 한글 PDF: v2 번들 재사용(오프라인 자체완결). 키/네트워크 부재 시 latin 폴백 -->
<script src="./nanum-font.js"></script>
<style>
  @media (max-width: 767px){ #sidebar{ display:none; } #bottomnav{ display:flex; } #main{ padding-bottom:5rem; } }
  @media (min-width: 768px){ #bottomnav{ display:none; } }
  .chat-bubble-me{ background:#4F46E5; color:#fff; border-radius:14px 14px 2px 14px; }
  .chat-bubble-bot{ background:#F2F4F6; color:#191F28; border-radius:14px 14px 14px 2px; }

  /* ===== design-tone-components (guide §6·§7) ===== */
  button, [role="button"], a.w-full, input[type="submit"], input[type="button"] {
    transition: transform .12s cubic-bezier(.3,0,0,1), opacity .15s ease, box-shadow .15s ease, background-color .15s ease;
  }
  button:active:not(:disabled), [role="button"]:active, a.w-full:active,
  input[type="submit"]:active, input[type="button"]:active { transform: scale(.97); }
  button:disabled, button[disabled], [role="button"][aria-disabled="true"] { opacity: .35; cursor: not-allowed; }
  input:focus-visible, textarea:focus-visible, select:focus-visible {
    outline: none; border-color: #4F46E5; box-shadow: 0 0 0 1.5px #4F46E5;
  }
  button.w-full, button[type="submit"].w-full, a.w-full[class*="bg-"] {
    min-height: 52px; border-radius: 12px;
  }

  /* glass-material — guide §5 (frosted glass on floating layers only; content cards stay flat) */
  body { background-color: #EEF2F9; }
  body::before {
    content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(72% 56% at 8% -2%, rgba(79,70,229,0.20), transparent 60%),
      radial-gradient(64% 52% at 98% 10%, rgba(20,174,92,0.14), transparent 60%),
      radial-gradient(80% 62% at 50% 104%, rgba(124,130,242,0.18), transparent 60%);
  }
  /* 사이드바 — frosted 0.55 + sheen */
  #sidebar {
    background-color: rgba(255,255,255,0.55) !important;
    -webkit-backdrop-filter: saturate(200%) blur(26px);
            backdrop-filter: saturate(200%) blur(26px);
    border-right: 1px solid rgba(255,255,255,0.55);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
  }
  /* 모바일 하단 내비 — 스티키 바, frosted 0.55 + sheen */
  #bottomnav {
    background-color: rgba(255,255,255,0.55) !important;
    -webkit-backdrop-filter: saturate(200%) blur(26px);
            backdrop-filter: saturate(200%) blur(26px);
    border-top: 1px solid rgba(255,255,255,0.55);
    box-shadow: 0 -8px 24px rgba(25,31,40,0.10), inset 0 1px 0 rgba(255,255,255,0.6);
  }
  /* 토스트 — 잉크 글래스 + sheen */
  #toast:not(.hidden) {
    background-color: rgba(25,31,40,0.78) !important;
    -webkit-backdrop-filter: saturate(180%) blur(20px);
            backdrop-filter: saturate(180%) blur(20px);
    box-shadow: 0 8px 24px rgba(25,31,40,0.24);
  }
  /* 모달·다이얼로그(있을 경우) — frosted 0.58 + sheen */
  dialog[open] {
    background-color: rgba(255,255,255,0.58);
    -webkit-backdrop-filter: saturate(200%) blur(26px);
            backdrop-filter: saturate(200%) blur(26px);
    border: 1px solid rgba(255,255,255,0.55);
    box-shadow: 0 8px 24px rgba(25,31,40,0.12), inset 0 1px 0 rgba(255,255,255,0.65);
  }
  /* 오버레이 딤 — 약하게(ink 0.18) + blur(2px) */
  dialog::backdrop {
    background: rgba(25,31,40,0.18) !important;
    -webkit-backdrop-filter: blur(2px);
            backdrop-filter: blur(2px);
  }
  /* 폴백: backdrop-filter 미지원 또는 투명도 감소 선호 시 불투명 표면 */
  @supports not ((-webkit-backdrop-filter: blur(1px)) or (backdrop-filter: blur(1px))) {
    #sidebar, #bottomnav { background-color: #FFFFFF !important; }
    #toast:not(.hidden) { background-color: #191F28 !important; }
    dialog[open] { background-color: #FFFFFF; }
    dialog::backdrop { background: rgba(25,31,40,0.40) !important; }
  }
  @media (prefers-reduced-transparency: reduce) {
    #sidebar, #bottomnav { background-color: #FFFFFF !important; -webkit-backdrop-filter:none; backdrop-filter:none; }
    #toast:not(.hidden) { background-color: #191F28 !important; -webkit-backdrop-filter:none; backdrop-filter:none; }
    dialog[open] { background-color: #FFFFFF; -webkit-backdrop-filter:none; backdrop-filter:none; }
    dialog::backdrop { background: rgba(25,31,40,0.40) !important; -webkit-backdrop-filter:none; backdrop-filter:none; }
    body::before { display:none; }
  }
  /* 반응형: 모바일 390px 가로 overflow 방지 */
  @media (max-width: 480px){
    #main { padding-left: 1rem; padding-right: 1rem; }
    table { display:block; width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  }
  </style>
</head>
<body class="bg-slate-100 text-slate-900">
<div class="min-h-screen flex">
  <aside id="sidebar" class="w-60 bg-white border-r p-5 shrink-0">
    <div class="flex items-center justify-between">
      <div class="text-lg font-semibold">스몰박스 <span class="text-blue-600">SMB</span></div>
      <button id="lang-btn" class="text-xs border rounded-md px-2 py-1 font-semibold text-slate-600 hover:bg-slate-50">EN</button>
    </div>
    <div id="app-sub" class="text-xs text-slate-500 mt-1">시트당 9,900원/월 · v3.0 시리즈A 데모</div>

    <div class="mt-5">
      <div id="lbl-company" class="text-xs font-semibold text-slate-700 mb-1">회사 전환</div>
      <select id="tenant-switch" class="w-full border rounded-lg p-2 text-sm bg-slate-50"></select>
      <div id="tenant-meta" class="text-[11px] text-slate-400 mt-1"></div>
    </div>

    <div class="mt-4">
      <div id="lbl-role" class="text-xs font-semibold text-slate-700 mb-1">권한</div>
      <select id="role-switch" class="w-full border rounded-lg p-2 text-sm bg-slate-50"></select>
    </div>

    <nav id="nav" class="mt-6 space-y-1 text-sm"></nav>

    <div class="mt-8 text-xs text-slate-500">
      <div class="font-semibold text-slate-700">demo@smb.kr</div>
      <div id="lbl-guest" class="mt-1 text-emerald-600">게스트 · 로그인 없이 둘러봐요</div>
    </div>
    <div class="mt-6 text-xs text-slate-400">v3.0 · i18n · RBAC · 다중회사</div>
  </aside>
  <main id="main" class="flex-1 p-6 md:p-8 max-w-full overflow-x-hidden"></main>
</div>

<nav id="bottomnav" class="fixed bottom-0 inset-x-0 bg-white border-t z-40 justify-around py-1 text-[11px]"></nav>
<div id="toast" class="fixed bottom-20 md:bottom-6 right-6 hidden bg-slate-900 text-white px-4 py-2 rounded-lg shadow-lg text-sm z-50"></div>

<script src="./app-v3.js"></script>
</body>
</html>
