<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>스몰박스 SMB — 통합 백오피스 v2</title>
<script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

      slate:   {50:'#F9FAFB',100:'#F2F4F6',200:'#E5E8EB',300:'#D1D6DB',400:'#8B95A1',500:'#8B95A1',600:'#4E5968',700:'#333D4B',800:'#191F28',900:'#191F28'},

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<!-- QR: 경량 라이브러리 (룰: CDN 라이브러리는 외부통합 카운트 아님) -->
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<!-- 한글 폰트: 로컬 번들(오프라인 자체완결). 실패 시 CDN 폰트 fetch 폴백 -->
<script src="./nanum-font.js"></script>
<style>
  /* 모바일에서 데스크톱 사이드바 숨김, Bottom Nav 노출 */
  @media (max-width: 767px){ #sidebar{ display:none; } #bottomnav{ display:flex; } #main{ padding-bottom:5rem; } }
  @media (min-width: 768px){ #bottomnav{ display:none; } }
  .chat-bubble-me{ background:#3182F6; color:#fff; border-radius:14px 14px 2px 14px; }
  .chat-bubble-bot{ background:#F2F4F6; color:#191F28; border-radius:14px 14px 14px 2px; }

  /* ===== design-tone-components (guide §6·§7) ===== */
  button, [role="button"], a.w-full, input[type="submit"], input[type="button"] {
    transition: transform .12s cubic-bezier(.3,0,0,1), opacity .15s ease, box-shadow .15s ease, background-color .15s ease;
  }
  button:active:not(:disabled), [role="button"]:active, a.w-full:active,
  input[type="submit"]:active, input[type="button"]:active { transform: scale(.97); }
  button:disabled, button[disabled], [role="button"][aria-disabled="true"] { opacity: .35; cursor: not-allowed; }
  input:focus-visible, textarea:focus-visible, select:focus-visible {
    outline: none; border-color: #3182F6; box-shadow: 0 0 0 1.5px #3182F6;
  }
  button.w-full, button[type="submit"].w-full, a.w-full[class*="bg-"] {
    min-height: 52px; border-radius: 12px;
  }
  </style>
</head>
<body class="bg-slate-100 text-slate-900">
<div class="min-h-screen flex">
  <aside id="sidebar" class="w-60 bg-white border-r p-5 shrink-0">
    <div class="text-lg font-semibold">스몰박스 <span class="text-blue-600">SMB</span></div>
    <div class="text-xs text-slate-500 mt-1">시트당 9,900원/월 · v2.0</div>
    <!-- 회사(테넌트) 스위처 -->
    <div class="mt-5">
      <div class="text-xs font-semibold text-slate-700 mb-1">회사 전환</div>
      <select id="tenant-switch" class="w-full border rounded-lg p-2 text-sm bg-slate-50"></select>
      <div id="tenant-meta" class="text-[11px] text-slate-400 mt-1"></div>
    </div>
    <nav id="nav" class="mt-6 space-y-1 text-sm"></nav>
    <div class="mt-8 text-xs text-slate-500">
      <div class="font-semibold text-slate-700">로그인 계정</div>
      <div class="mt-1">demo@smb.kr (게스트)</div>
      <div class="mt-1 text-emerald-600">로그인 없이 바로 둘러봐요</div>
    </div>
    <div class="mt-6 text-xs text-slate-400">v2.0 · 반응형 · 다중 테넌트</div>
  </aside>
  <main id="main" class="flex-1 p-6 md:p-8 max-w-full overflow-x-hidden"></main>
</div>

<!-- 모바일 Bottom Nav -->
<nav id="bottomnav" class="fixed bottom-0 inset-x-0 bg-white border-t z-40 justify-around py-1 text-[11px]"></nav>

<div id="toast" class="fixed bottom-20 md:bottom-6 right-6 hidden bg-slate-900 text-white px-4 py-2 rounded-lg shadow-lg text-sm z-50"></div>

<script src="./app.js"></script>
</body>
</html>
