<script>
/* ============================================================
   캐시브릿지 — 소상공인 카드매출 선정산 · 현금흐름 · 임베디드 대출 SaaS
   단일 HTML 오프라인 데모 (v1). 로그인 없음, API 키 없음(전부 mock).
   실 알고리즘: 한도산정·리스크스코어(로지스틱)·현금흐름예측·수수료/상환스케줄.
   실 동작: localStorage 지속, jsPDF 한글 정산서/약정서, CSV 입출력, mock webhook 로그.
   ============================================================ */

const KRW = n => '₩' + Math.round(n).toLocaleString('ko-KR');
const KRW0 = n => Math.round(n).toLocaleString('ko-KR');
const PCT = n => (n*100).toFixed(1) + '%';
const todayISO = () => new Date().toISOString().slice(0,10);
const uid = p => p + '-' + Math.random().toString(36).slice(2,8);
const clamp = (v,a,b)=> Math.max(a, Math.min(b,v));
const daysBetween = (a,b)=> Math.round((new Date(b)-new Date(a))/864e5);

/* ============================== 시드 데이터 ============================== */
const PG_LIST = ['토스페이먼츠','KG이니시스','NHN KCP','나이스페이먼츠'];
const MCC = {
  '음식점':{base:0.022, risk:0.9, seasonality:1.05},
  '카페':{base:0.020, risk:0.8, seasonality:1.0},
  '편의점':{base:0.013, risk:0.6, seasonality:0.98},
  '미용실':{base:0.024, risk:1.0, seasonality:1.0},
  '의류소매':{base:0.026, risk:1.2, seasonality:1.15},
  '학원':{base:0.018, risk:0.7, seasonality:1.0}
};

function seed(){
  const merchants = [
    mkMerchant('상도동 김밥천국','음식점', 38_500_000, 14, 0),
    mkMerchant('연남 로스터스','카페', 22_300_000, 9, 1),
    mkMerchant('망원 셀렉트샵','의류소매', 41_200_000, 23, 2),
    mkMerchant('역삼 헤어라운지','미용실', 17_900_000, 6, 0),
    mkMerchant('신촌 24편의점','편의점', 53_600_000, 4, 0),
    mkMerchant('대치 수학의정석','학원', 29_400_000, 0, 0),
  ];
  // 각 가맹점 12개월 카드매출 이력 생성 + 정산 스케줄(T+2)
  merchants.forEach(m => {
    m.history = genHistory(m);
    m.settlements = genSettlements(m);
  });
  return {
    _role:'owner', _merchant: merchants[0].id, _theme:'auto',
    merchants,
    advances:[],          // 선정산 약정/실행
    repayments:[],        // 상환 내역
    webhooks: seedWebhooks(),
    notices:[],
    settings:{ company:'캐시브릿지㈜', autoRepay:true, alimtalk:true, baseRate:0.035, riskMargin:0.04, maxAdvanceRate:0.80, defaultFeeRate:0.018 },
    feed:[],
  };
}
function mkMerchant(name, mcc, monthly, dpd, defaults){
  return { id:uid('mch'), name, mcc, bizNo:rndBizNo(), pg:PG_LIST[Math.floor(Math.random()*PG_LIST.length)],
    monthlyAvg:monthly, dpdHistory:dpd, defaultCount:defaults, monthsActive: 14 + Math.floor(Math.random()*30),
    chargebackRate: +(Math.random()*0.012).toFixed(4), bank:'국민은행', acct:'***-**-'+(1000+Math.floor(Math.random()*8999)) };
}
function rndBizNo(){ const r=()=>Math.floor(Math.random()*10); return `${r()}${r()}${r()}-${r()}${r()}-${r()}${r()}${r()}${r()}${r()}`; }
function genHistory(m){
  const arr=[]; const now=new Date();
  for(let i=11;i>=0;i--){
    const d=new Date(now.getFullYear(), now.getMonth()-i, 1);
    const season = 1 + Math.sin((d.getMonth()/12)*Math.PI*2)*0.12*MCC[m.mcc].seasonality;
    const noise = 0.9 + Math.random()*0.2;
    arr.push({ ym:d.toISOString().slice(0,7), sales: Math.round(m.monthlyAvg*season*noise) });
  }
  return arr;
}
function genSettlements(m){
  const arr=[]; const now=new Date();
  for(let i=20;i>=0;i--){
    const d=new Date(now); d.setDate(d.getDate()-i);
    const daily = Math.round(m.monthlyAvg/30 * (0.7+Math.random()*0.7));
    const fee = Math.round(daily*0.012);
    const settleDate=new Date(d); settleDate.setDate(settleDate.getDate()+2);
    arr.push({ id:uid('stl'), tradeDate:d.toISOString().slice(0,10), settleDate:settleDate.toISOString().slice(0,10),
      pg:m.pg, gross:daily, pgFee:fee, net:daily-fee, status: i>2?'정산완료': (i>0?'정산예정':'승인'), count: 30+Math.floor(Math.random()*120) });
  }
  return arr;
}
function seedWebhooks(){
  return [
    { id:uid('wh'), ts:Date.now()-3600e3*5, type:'PG.settlement.confirmed', src:'토스페이먼츠', payload:{amount:1284000,date:todayISO()}, status:200 },
    { id:uid('wh'), ts:Date.now()-3600e3*2, type:'OpenBanking.deposit', src:'금융결제원', payload:{amount:980000}, status:200 },
  ];
}

/* ============================== 저장 ============================== */
const STORE_KEY='cashbridge-v1';
const DB = {
  load(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)) }catch(e){ return null } },
  save(s){ localStorage.setItem(STORE_KEY, JSON.stringify(s)); },
};
let S = DB.load() || seed();
function persist(){ DB.save(S); }
function curMerchant(){ return S.merchants.find(m=>m.id===S._merchant) || S.merchants[0]; }

/* ============================================================
   실 알고리즘 모듈 (외부 LLM 아님 — 통계/룰 기반)
   ============================================================ */

/* 1) 카드매출 통계: 최근 N개월 평균/표준편차/추세 회귀 */
function salesStats(m){
  const ys = m.history.map(h=>h.sales);
  const n = ys.length;
  const mean = ys.reduce((a,b)=>a+b,0)/n;
  const variance = ys.reduce((a,b)=>a+(b-mean)**2,0)/n;
  const std = Math.sqrt(variance);
  // 최소제곱 선형회귀(추세): x=0..n-1
  let sx=0,sy=0,sxx=0,sxy=0;
  ys.forEach((y,x)=>{ sx+=x; sy+=y; sxx+=x*x; sxy+=x*y; });
  const slope = (n*sxy - sx*sy) / (n*sxx - sx*sx);
  const intercept = (sy - slope*sx)/n;
  const cv = std/mean; // 변동계수
  return { mean, std, cv, slope, intercept, nextForecast: intercept + slope*n };
}

/* 2) 리스크 스코어: 로지스틱 회귀 (mock 가중치 — 부도확률 PD 추정)
   features: dpd, defaultCount, chargebackRate, cv(매출변동), monthsActive, slope */
const RISK_W = { bias:-2.4, dpd:0.085, defaults:0.95, chargeback:38.0, cv:2.1, tenure:-0.018, trend:-0.0000006 };
function riskScore(m){
  const st = salesStats(m);
  const z = RISK_W.bias
    + RISK_W.dpd*m.dpdHistory
    + RISK_W.defaults*m.defaultCount
    + RISK_W.chargeback*m.chargebackRate
    + RISK_W.cv*st.cv
    + RISK_W.tenure*m.monthsActive
    + RISK_W.trend*st.slope;
  const pd = 1/(1+Math.exp(-z));               // 부도확률 0~1
  const score = Math.round(clamp(900 - pd*640 - st.cv*120, 320, 900)); // 신용점수 320~900
  const grade = score>=800?'A': score>=700?'B': score>=600?'C': score>=500?'D':'E';
  return { pd, score, grade, z,
    factors:[
      {k:'연체일수(DPD)', v:m.dpdHistory, contrib:RISK_W.dpd*m.dpdHistory},
      {k:'과거 부도', v:m.defaultCount, contrib:RISK_W.defaults*m.defaultCount},
      {k:'매출변동(CV)', v:st.cv.toFixed(2), contrib:RISK_W.cv*st.cv},
      {k:'거래기간(개월)', v:m.monthsActive, contrib:RISK_W.tenure*m.monthsActive},
      {k:'차지백률', v:PCT(m.chargebackRate), contrib:RISK_W.chargeback*m.chargebackRate},
    ].sort((a,b)=>Math.abs(b.contrib)-Math.abs(a.contrib))
  };
}

/* 3) 선정산 한도 산정: 매출 기반 LTV + 리스크 감산 + 업종 계수 */
function limitCalc(m){
  const st = salesStats(m);
  const risk = riskScore(m);
  const base = st.mean;                         // 월평균 매출
  const mccAdj = MCC[m.mcc].risk;               // 업종 위험계수
  const ltv = S.settings.maxAdvanceRate;        // 기본 선정산율(매출 대비)
  // 리스크 등급별 한도 배수 (월매출 × 배수)
  const gradeMult = {A:1.6,B:1.3,C:1.0,D:0.7,E:0.4}[risk.grade];
  const dpdPenalty = clamp(1 - m.dpdHistory*0.02, 0.4, 1);
  const cvPenalty = clamp(1 - st.cv*0.5, 0.5, 1);
  const limit = Math.round(base*gradeMult*dpdPenalty*cvPenalty*mccAdj/1e5)*1e5;
  const available = Math.max(0, limit - outstandingPrincipal(m.id));
  return { limit, available, base, ltv, gradeMult, dpdPenalty, cvPenalty, mccAdj, risk, st };
}

/* 4) 수수료·금리 산출: 기준금리 + 리스크마진(등급) + 기간 */
function pricing(m, amount, termDays){
  const risk = riskScore(m);
  const gradeMargin = {A:0.015,B:0.028,C:0.045,D:0.072,E:0.110}[risk.grade];
  const annualRate = S.settings.baseRate + gradeMargin;        // 연이율
  const periodRate = annualRate * (termDays/365);             // 기간이자율
  const interest = Math.round(amount*periodRate);
  const platformFee = Math.round(amount*S.settings.defaultFeeRate); // 플랫폼 수수료
  const total = amount + interest + platformFee;
  return { annualRate, gradeMargin, periodRate, interest, platformFee, total, risk };
}

/* 5) 상환 스케줄: 정산대금 자동 차감(원리금균등 분할 mock) */
function repaymentSchedule(amount, interest, platformFee, termDays, installments){
  const principalPer = amount/installments;
  const totalFee = interest+platformFee;
  const feePer = totalFee/installments;
  const rows=[];
  let bal = amount;
  for(let i=1;i<=installments;i++){
    const d = new Date(); d.setDate(d.getDate()+Math.round(termDays*i/installments));
    bal -= principalPer;
    rows.push({ no:i, date:d.toISOString().slice(0,10), principal:Math.round(principalPer), fee:Math.round(feePer),
      pay:Math.round(principalPer+feePer), balance:Math.max(0,Math.round(bal)) });
  }
  return rows;
}

/* 6) 현금흐름 예측: 미래 정산 유입 + 상환 유출 + 고정비 시뮬레이션 */
function cashflowForecast(m, days=30){
  const st = salesStats(m);
  const dailyIn = st.nextForecast/30 * 0.988;      // PG수수료 차감 후 일평균 정산
  const fixedOut = m.monthlyAvg*0.62/30;           // 고정비(임대·인건·재료) [추정]
  const repays = S.repayments.filter(r=>r.merchantId===m.id);
  const series=[]; let bal = 4_200_000;            // 기초 현금잔고 [추정]
  for(let d=0; d<days; d++){
    const date=new Date(); date.setDate(date.getDate()+d);
    const iso=date.toISOString().slice(0,10);
    const weekend = [0,6].includes(date.getDay());
    const inflow = dailyIn*(weekend?0.7:1.08);
    let outflow = fixedOut;
    // 예정 상환 차감
    S.advances.filter(a=>a.merchantId===m.id && a.status==='실행').forEach(a=>{
      (a.schedule||[]).forEach(s=>{ if(s.date===iso) outflow += s.pay; });
    });
    bal += inflow - outflow;
    series.push({ date:iso, inflow:Math.round(inflow), outflow:Math.round(outflow), balance:Math.round(bal) });
  }
  const minBal = Math.min(...series.map(s=>s.balance));
  const shortfallDay = series.find(s=>s.balance<0);
  return { series, minBal, shortfallDay, dailyIn, fixedOut };
}
function outstandingPrincipal(mid){
  return S.advances.filter(a=>a.merchantId===mid && a.status==='실행')
    .reduce((sum,a)=> sum + Math.max(0, a.amount - (a.repaid||0)), 0);
}

}

function stepper(step){
  const steps=['한도 산정','리스크 심사','약정','실행'];
  return `<div class="flex items-center gap-1 md:gap-2 overflow-x-auto">${steps.map((s,i)=>{
    const n=i+1; const done=n<step, cur=n===step;
    return `<div class="flex items-center gap-1 md:gap-2 shrink-0">
      <div class="step-dot ${done?'bg-pos text-white':cur?'bg-brand-600 text-white':'bg-surface-sub text-ink-3'}">${done?'✓':n}</div>
      <span class="text-[12px] md:text-[13px] font-semibold ${cur?'text-ink':'text-ink-3'}">${s}</span>
      ${n<4?`<div class="w-5 md:w-10 h-px ${done?'bg-pos':'bg-surface-line'}"></div>`:''}</div>`;
  }).join('')}</div>`;
}

/* ---------- 5. 상환·연체 ---------- */
function vRepay(root){
  setTitle('상환·연체 관리', '선정산 약정의 상환 진행과 연체를 관리해요.');
  const mid = S._role==='owner'? curMerchant().id : null;
  let advs = S.advances.filter(a=>a.status==='실행' || a.status==='상환완료');
  if(mid) advs=advs.filter(a=>a.merchantId===mid);
  const totalOut=advs.reduce((a,b)=>a+Math.max(0,b.amount-(b.repaid||0)),0);
  const overdue=advs.filter(a=>a.overdue);
  root.innerHTML=`
  ${S._role==='owner'?`<div class="mb-4">${merchantPicker()}</div>`:''}
  <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-4">
    ${kpi('상환 잔액', KRW(totalOut), `${advs.filter(a=>a.status==='실행').length}건 진행`,'')}
    ${kpi('연체', overdue.length+'건', overdue.length?'관리 필요':'정상', overdue.length?'neg':'pos')}
    ${kpi('이번주 상환예정', KRW(weeklyDue(advs)),'7일 이내','warn')}
  </div>
  ${advs.length? advs.map(a=>repayCard(a)).join('') : `<div class="card p-8 text-center text-ink-3">진행 중인 선정산 약정이 없어요. <button class="text-brand-600 font-bold" onclick="go('advance')">선정산 신청 →</button></div>`}`;
}
function weeklyDue(advs){ let s=0; advs.forEach(a=>(a.schedule||[]).forEach(r=>{ const dd=daysBetween(todayISO(),r.date); if(dd>=0&&dd<=7&&r.balance+r.pay>(a.repaid||0)) s+=r.pay; })); return s; }
function repayCard(a){
  const out=Math.max(0,a.amount-(a.repaid||0));
  const prog=(a.repaid||0)/a.amount*100;
  const nextDue=(a.schedule||[]).find(r=> (a.paidNos||[]).indexOf(r.no)<0 );
  return `<div class="card p-4 md:p-5 mb-3">
    <div class="flex items-center justify-between mb-2">
      <div><div class="font-extrabold">${a.merchantName}</div><div class="text-[12px] text-ink-3">${a.id} · ${a.grade}등급 · 연 ${PCT(a.annualRate)}</div></div>
      ${a.overdue?statusBadge('연체'):statusBadge(a.status)}
    </div>
    <div class="grid grid-cols-3 gap-2 text-[13px] num mb-3">
      <div><div class="text-ink-3 text-[11px]">실행액</div><div class="font-bold">${KRW0(a.amount)}</div></div>
      <div><div class="text-ink-3 text-[11px]">상환완료</div><div class="font-bold text-pos">${KRW0(a.repaid||0)}</div></div>
      <div><div class="text-ink-3 text-[11px]">잔액</div><div class="font-bold ${out>0?'text-neg':''}">${KRW0(out)}</div></div>
    </div>
    <div class="h-2 rounded-full bg-surface-sub overflow-hidden mb-3"><div class="h-full bg-pos" style="width:${prog}%"></div></div>
    <div class="flex flex-wrap gap-2">
      ${nextDue&&out>0?`<button class="press flex-1 min-w-[120px] h-10 rounded-xl bg-brand-600 text-white text-sm font-bold" onclick="payInstallment('${a.id}','${nextDue.no}')">${nextDue.no}회차 상환 ${KRW(nextDue.pay)}</button>`:''}
      ${out>0?`<button class="press flex-1 min-w-[120px] h-10 rounded-xl bg-white border border-brand-600 text-brand-600 text-sm font-bold" onclick="autoDeduct('${a.id}')">정산대금 자동차감</button>`:''}
      ${out>0&&!a.overdue?`<button class="press h-10 px-3 rounded-xl bg-surface-sub text-sm font-semibold" onclick="markOverdue('${a.id}')">연체 처리(시뮬)</button>`:''}
      <button class="press h-10 px-3 rounded-xl bg-surface-sub text-sm font-semibold" onclick="showSchedule('${a.id}')">스케줄</button>
    </div>
  </div>`;
}
window.payInstallment=function(aid,no){
  const a=S.advances.find(x=>x.id===aid); const r=a.schedule.find(s=>s.no==no); if(!a||!r) return;
  a.repaid=(a.repaid||0)+r.principal; a.paidNos=(a.paidNos||[]).concat(+no);
  if(a.repaid>=a.amount-1000){ a.status='상환완료'; a.overdue=false; addNotice('상환 완료', `${a.merchantName} 약정 ${a.id} 전액 상환 완료.`,'success'); }

function ensureUnderwriteQueue(){
  if(S.advances.some(a=>['심사중','승인대기'].includes(a.status))) return;
  if(S._uwSeeded) return; S._uwSeeded=true;
  [S.merchants[2],S.merchants[4]].forEach(m=>{ const lc=limitCalc(m); const amt=Math.round(lc.available*0.4/1e5)*1e5||3_000_000;
    const p=pricing(m,amt,14);
    S.advances.push({ id:uid('ADV'), merchantId:m.id, merchantName:m.name, amount:amt, termDays:14, installments:2,
      interest:p.interest, platformFee:p.platformFee, total:p.total, annualRate:p.annualRate, grade:p.risk.grade, pd:p.risk.pd,
      status:'승인대기', createdAt:todayISO(), repaid:0, schedule:repaymentSchedule(amt,p.interest,p.platformFee,14,2) }); });
  persist();
}
function uwCard(a){
  const m=S.merchants.find(x=>x.id===a.merchantId); const auto=a.pd<0.06;
  return `<div class="card p-4 md:p-5 mb-3">
    <div class="flex items-center justify-between mb-2">

    </div>
    <div class="text-[12px] ${auto?'text-pos':'text-warn'} mb-3">${auto?'✓ 자동승인 기준 충족 (PD<6%)':'⚠ 수동검토 권고 (PD≥6%)'}</div>
    <div class="flex gap-2">

/* ============================================================
   CSV / PDF (실 생성)
   ============================================================ */
function downloadCSV(rows, filename){
  const csv = rows.map(r=>r.map(c=>{ const s=String(c??''); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(',')).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click(); URL.revokeObjectURL(a.href);
}
// 한글 PDF: 기본 폰트가 한글 미지원이므로 텍스트를 캔버스로 렌더해 이미지로 삽입
function krTextBlock(lines, opt={}){
  const W=opt.w||760, lh=opt.lh||30, pad=opt.pad||0;
  const cvs=document.createElement('canvas'); const scale=2;
  cvs.width=W*scale; cvs.height=(lines.length*lh+pad*2)*scale; const ctx=cvs.getContext('2d');
  ctx.scale(scale,scale); ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,cvs.height);
  ctx.textBaseline='top';
  lines.forEach((ln,i)=>{ const t=typeof ln==='string'?{t:ln}:ln;
    ctx.font=`${t.b?'700':'400'} ${t.size||15}px Pretendard, sans-serif`;
    ctx.fillStyle=t.color||'#161b29';
    const x = t.align==='right'? W-pad-ctx.measureText(t.t).width : (t.x||pad);
    ctx.fillText(t.t, x, pad+i*lh);
  });
  return { dataURL:cvs.toDataURL('image/png'), w:W, h:lines.length*lh+pad*2 };
}
function pdfFromLines(lines, title, filename){
  const { jsPDF }=window.jspdf; const pdf=new jsPDF('p','mm','a4');
  const block=krTextBlock(lines,{w:760,lh:28,pad:0});
  const pw=210, margin=16, imgW=pw-margin*2, imgH=imgW*block.h/block.w;
  pdf.setFillColor(58,109,240); pdf.rect(0,0,pw,4,'F');
  pdf.addImage(block.dataURL,'PNG',margin,18,imgW,imgH);
  pdf.save(filename);
}
