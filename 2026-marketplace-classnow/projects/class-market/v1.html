<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>클래스나우 — 원데이클래스 양면 마켓 (v1)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
/* ===== 클래스나우 v1 — 양면 원데이클래스 마켓 ===== */
/* 디자인 톤: Apple×Toss / 브랜드 hue = warm coral-amber (커뮤니티·창작·따뜻함) */
:root{
  --brand:#f2613f;          /* 단일 포인트 — 코랄 */
  --brand-2:#ff8a5b;
  --ink:#2b211e;            /* hue 섞인 부드러운 잉크 */
  --ink-2:#6b5f5a;
  --ink-3:#9a8f8a;
  --line:#efe7e2;
  --surf:#ffffff;
  --surf-2:#faf6f3;
  --surf-3:#f4ede8;
  --ok:#1f9d63; --warn:#d98a00; --bad:#d8413a; --info:#2f6df0;
  --r:14px; --r-lg:20px;
  --shadow:0 8px 28px rgba(43,33,30,.12);
  --sb:248px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",system-ui,"Segoe UI",Roboto,sans-serif;
  color:var(--ink); background:
    radial-gradient(1200px 600px at 110% -10%, rgba(242,97,63,.08), transparent 60%),
    radial-gradient(900px 500px at -10% 20%, rgba(255,138,91,.06), transparent 55%),
    var(--surf-2);
  -webkit-font-smoothing:antialiased; line-height:1.5; min-height:100vh;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
a{color:inherit}
.app{display:flex;min-height:100vh}

/* ===== 사이드바 (데스크톱) ===== */
#sidebar{
  width:var(--sb);flex:0 0 var(--sb);position:sticky;top:0;height:100vh;
  background:var(--surf);border-right:1px solid var(--line);
  display:flex;flex-direction:column;padding:18px 14px;gap:4px;overflow-y:auto;
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 14px}
.brand .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--brand-2));
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:18px;box-shadow:0 4px 12px rgba(242,97,63,.35)}
.brand b{font-size:18px;letter-spacing:-.4px}
.brand small{display:block;color:var(--ink-3);font-size:11px;font-weight:600;margin-top:-2px}
.role-switch{background:var(--surf-3);border-radius:12px;padding:4px;display:flex;gap:2px;margin:2px 4px 10px}
.role-switch button{flex:1;padding:8px 4px;border-radius:9px;font-size:12px;font-weight:700;color:var(--ink-2);transition:.18s}
.role-switch button.on{background:var(--surf);color:var(--brand);box-shadow:0 2px 8px rgba(43,33,30,.10)}
.navlabel{font-size:11px;font-weight:700;color:var(--ink-3);padding:10px 10px 4px;letter-spacing:.3px}
.nav{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;font-size:14.5px;font-weight:600;color:var(--ink-2);transition:.15s;width:100%;text-align:left}
.nav .ic{width:20px;text-align:center;font-size:16px}
.nav:hover{background:var(--surf-2)}
.nav.on{background:linear-gradient(135deg,rgba(242,97,63,.12),rgba(255,138,91,.08));color:var(--brand)}
.nav .badge{margin-left:auto;background:var(--brand);color:#fff;font-size:11px;font-weight:800;border-radius:20px;padding:1px 7px}
.sb-foot{margin-top:auto;padding:10px 8px;border-top:1px solid var(--line);font-size:11.5px;color:var(--ink-3)}

/* ===== 메인 ===== */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:12px;padding:12px 22px;
  background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(18px);-webkit-backdrop-filter:saturate(180%) blur(18px);
  border-bottom:1px solid var(--line)}
.topbar h1{font-size:19px;margin:0;letter-spacing:-.4px;font-weight:800}
.topbar .sub{color:var(--ink-3);font-size:12.5px;font-weight:600}
.grow{flex:1}
.searchbar{display:flex;align-items:center;gap:8px;background:var(--surf-2);border:1px solid var(--line);border-radius:12px;padding:8px 12px;min-width:0;flex:1;max-width:420px}
.searchbar input{border:none;background:none;outline:none;flex:1;min-width:0}
.pill{background:var(--surf-3);border-radius:20px;padding:5px 11px;font-size:12px;font-weight:700;color:var(--ink-2)}
.content{padding:22px;max-width:1180px;width:100%;margin:0 auto}

/* 모바일 앱바/드로어 — 데스크톱 숨김 */
#mobileTop{display:none}
#drawer,#backdrop{display:none}
#bottomnav{display:none}

/* ===== 컴포넌트 ===== */
.card{background:var(--surf);border:1px solid var(--line);border-radius:var(--r);padding:16px}
.grid{display:grid;gap:14px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpi{background:var(--surf);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px}
.kpi .lab{font-size:12px;color:var(--ink-3);font-weight:700}
.kpi .val{font-size:26px;font-weight:800;letter-spacing:-1px;margin-top:2px}
.kpi .dl{font-size:11.5px;font-weight:700;margin-top:3px}
.up{color:var(--ok)} .down{color:var(--bad)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--brand);color:#fff;font-weight:700;
  padding:11px 16px;border-radius:12px;font-size:14.5px;transition:transform .08s, opacity .15s}
.btn:active{transform:scale(.97)}
.btn.full{width:100%;min-height:52px}
.btn.ghost{background:var(--surf);color:var(--ink);border:1px solid var(--line)}
.btn.soft{background:rgba(242,97,63,.12);color:var(--brand)}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:10px}
.btn.danger{background:var(--bad)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--surf-3);color:var(--ink-2)}
.tag.ok{background:rgba(31,157,99,.12);color:var(--ok)}
.tag.warn{background:rgba(217,138,0,.14);color:var(--warn)}
.tag.bad{background:rgba(216,65,58,.12);color:var(--bad)}
.tag.info{background:rgba(47,109,240,.12);color:var(--info)}
.tag.brand{background:rgba(242,97,63,.12);color:var(--brand)}
.muted{color:var(--ink-3)}
.sec-h{display:flex;align-items:center;gap:10px;margin:24px 4px 12px}
.sec-h h2{font-size:17px;margin:0;font-weight:800;letter-spacing:-.3px}
.sec-h .grow{flex:1}
.row{display:flex;align-items:center;gap:10px}
.wrap{flex-wrap:wrap}
hr.sep{border:none;border-top:1px solid var(--line);margin:14px 0}

/* 클래스 카드 그리드 */
.class-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:16px}
.cls{background:var(--surf);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;display:flex;flex-direction:column;transition:transform .12s, box-shadow .15s;cursor:pointer}
.cls:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.cls .thumb{height:148px;position:relative;display:grid;place-items:center;font-size:46px;color:#fff}
.cls .thumb .heart{position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.85);display:grid;place-items:center;font-size:16px;backdrop-filter:blur(4px)}
.cls .thumb .pricebadge{position:absolute;bottom:10px;left:10px;background:rgba(43,33,30,.78);color:#fff;font-weight:800;font-size:13px;padding:4px 10px;border-radius:10px}
.cls .body{padding:13px 14px 15px;display:flex;flex-direction:column;gap:6px;flex:1}
.cls .ttl{font-weight:800;font-size:15px;letter-spacing:-.3px;line-height:1.3}
.cls .meta{font-size:12px;color:var(--ink-3);font-weight:600;display:flex;gap:8px;flex-wrap:wrap}
.cls .host{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-2);font-weight:600;margin-top:auto}
.cls .av{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;color:#fff}
.stars{color:var(--brand);font-weight:800;font-size:12.5px}

/* 필터바 */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chip{padding:7px 13px;border-radius:20px;background:var(--surf);border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--ink-2);transition:.15s}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.chip:active{transform:scale(.96)}
.range{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink-2)}
input[type=range]{accent-color:var(--brand)}
select.sel{border:1px solid var(--line);background:var(--surf);border-radius:10px;padding:8px 10px;font-weight:600;color:var(--ink-2)}

/* 테이블 */
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line)}
th{font-size:11.5px;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
tr:last-child td{border-bottom:none}
.tbl-wrap{background:var(--surf);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.tbl-scroll{overflow-x:auto}

/* 시트/모달 */
#sheetWrap{position:fixed;inset:0;z-index:80;display:none}
#sheetWrap.open{display:block}
.sheet-dim{position:absolute;inset:0;background:rgba(43,33,30,.35);backdrop-filter:blur(3px)}
.sheet{position:absolute;right:0;top:0;height:100%;width:480px;max-width:94vw;background:var(--surf);box-shadow:var(--shadow);
  display:flex;flex-direction:column;animation:slideIn .25s cubic-bezier(.2,.8,.2,1)}
@keyframes slideIn{from{transform:translateX(30px);opacity:.5}to{transform:none;opacity:1}}
.sheet-h{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surf);z-index:2}
.sheet-h h3{margin:0;font-size:16px;font-weight:800}
.sheet-h .close{margin-left:auto;width:34px;height:34px;border-radius:50%;background:var(--surf-3);display:grid;place-items:center;font-size:17px}
.sheet-b{padding:18px;overflow-y:auto;flex:1}
.sheet-f{padding:14px 18px;border-top:1px solid var(--line);background:var(--surf)}

/* 스텝퍼 */
.steps{display:flex;gap:6px;margin-bottom:16px}
.steps .st{flex:1;height:5px;border-radius:5px;background:var(--surf-3)}
.steps .st.on{background:var(--brand)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-2);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 12px;background:var(--surf-2);outline:none;transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand);background:var(--surf);box-shadow:0 0 0 3px rgba(242,97,63,.12)}
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.slot{border:1px solid var(--line);border-radius:11px;padding:10px;text-align:center;font-weight:700;font-size:13px;transition:.15s}
.slot small{display:block;color:var(--ink-3);font-weight:600;font-size:11px;margin-top:2px}
.slot.on{border-color:var(--brand);background:rgba(242,97,63,.08);color:var(--brand)}
.slot.full{opacity:.4;pointer-events:none}
.qty{display:inline-flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:12px;padding:6px 10px}
.qty button{width:32px;height:32px;border-radius:8px;background:var(--surf-3);font-size:18px;font-weight:800}
.summ{background:var(--surf-2);border-radius:12px;padding:14px;font-size:13.5px}
.summ .ln{display:flex;justify-content:space-between;padding:4px 0}
.summ .tot{display:flex;justify-content:space-between;padding-top:8px;margin-top:6px;border-top:1px dashed var(--line);font-weight:800;font-size:16px}

/* 리뷰 */
.rev{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
.rev .av{width:38px;height:38px;flex:0 0 38px}
.starpick{font-size:26px;color:var(--ink-3);cursor:pointer;letter-spacing:3px}
.starpick .f{color:var(--brand)}

/* 메시지 */
.msg-layout{display:grid;grid-template-columns:260px 1fr;gap:0;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--surf);height:560px}
.msg-list{border-right:1px solid var(--line);overflow-y:auto}
.msg-item{display:flex;gap:10px;padding:13px 14px;border-bottom:1px solid var(--line);cursor:pointer}
.msg-item.on{background:var(--surf-2)}
.msg-thread{display:flex;flex-direction:column}
.msg-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.bub{max-width:75%;padding:9px 13px;border-radius:14px;font-size:13.5px}
.bub.me{align-self:flex-end;background:var(--brand);color:#fff;border-bottom-right-radius:4px}
.bub.them{align-self:flex-start;background:var(--surf-3);border-bottom-left-radius:4px}
.msg-input{display:flex;gap:8px;padding:12px;border-top:1px solid var(--line)}
.msg-input input{flex:1;border:1px solid var(--line);border-radius:20px;padding:10px 14px;background:var(--surf-2);outline:none}

/* 영수증/상세 */
.detail-hero{height:220px;border-radius:var(--r-lg);display:grid;place-items:center;font-size:72px;color:#fff;margin-bottom:16px;position:relative}
.av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-weight:800;color:#fff;font-size:12px;flex:0 0 auto}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:13px 20px;border-radius:14px;font-weight:700;font-size:14px;z-index:200;box-shadow:var(--shadow);opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.progress{height:8px;background:var(--surf-3);border-radius:8px;overflow:hidden}
.progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand-2))}
.chartbox{position:relative;height:260px}
.emptyv{text-align:center;padding:50px 20px;color:var(--ink-3)}
.emptyv .em{font-size:46px}
.split{display:grid;grid-template-columns:1.6fr 1fr;gap:16px}
.list-row{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--line);border-radius:var(--r);background:var(--surf);margin-bottom:10px}
.notice{display:flex;gap:10px;padding:12px 14px;background:rgba(47,109,240,.07);border:1px solid rgba(47,109,240,.18);border-radius:12px;font-size:13px;color:var(--ink-2)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}

/* ===== 반응형 ===== */
@media(max-width:880px){
  .split{grid-template-columns:1fr}
  .msg-layout{grid-template-columns:1fr;height:auto}
  .msg-list{max-height:200px}
}
@media(max-width:767px){
  #sidebar{display:none}
  .main{padding-bottom:74px}
  #mobileTop{display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:40;padding:11px 16px;
    background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(16px);-webkit-backdrop-filter:saturate(180%) blur(16px);border-bottom:1px solid var(--line)}
  #mobileTop .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--brand-2));display:grid;place-items:center;color:#fff;font-weight:800}
  #mobileTop b{font-size:16px}
  #mobileTop .hb{margin-left:auto;width:38px;height:38px;border-radius:10px;background:var(--surf-3);display:grid;place-items:center;font-size:18px}
  .topbar{padding:10px 14px}
  .topbar h1{font-size:16px}
  .topbar .desk-only{display:none}
  .content{padding:14px}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .class-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px}
  .cls .thumb{height:118px;font-size:36px}
  .detail-hero{height:160px;font-size:54px}
  .sheet{width:100%;max-width:100%}
  .split{grid-template-columns:1fr}

  /* 바텀 탭바 */
  #bottomnav{display:flex;position:fixed;bottom:0;inset-inline:0;z-index:60;background:rgba(255,255,255,.92);
    backdrop-filter:saturate(180%) blur(18px);-webkit-backdrop-filter:saturate(180%) blur(18px);border-top:1px solid var(--line);
    padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
  #bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-height:48px;justify-content:center;
    font-size:10.5px;font-weight:700;color:var(--ink-3);border-radius:10px}
  #bottomnav button .ic{font-size:19px}
  #bottomnav button.on{color:var(--brand)}

  /* 오프캔버스 드로어 (역할/전체메뉴) */
  #backdrop{display:block;position:fixed;inset:0;background:rgba(43,33,30,.42);z-index:70;opacity:0;pointer-events:none;transition:.25s}
  body.drawer-open #backdrop{opacity:1;pointer-events:auto}
  #drawer{display:flex;flex-direction:column;position:fixed;inset-block:0;left:0;width:82vw;max-width:310px;z-index:71;
    background:var(--surf);transform:translateX(-100%);transition:transform .26s cubic-bezier(.2,.8,.2,1);padding:18px 14px;overflow-y:auto}
  body.drawer-open #drawer{transform:none}
}
.hide{display:none!important}
</style>
</head>
<body>
<div class="app">

  <!-- ===== 사이드바 (데스크톱) ===== -->
  <aside id="sidebar">
    <div class="brand">
      <div class="logo">C</div>
      <div><b>클래스나우</b><small>원데이클래스 마켓</small></div>
    </div>
    <div class="role-switch" id="roleSwitch">
      <button data-role-pick="guest" class="on">수강생</button>
      <button data-role-pick="host">강사</button>
      <button data-role-pick="admin">관리자</button>
    </div>
    <div id="navHost"></div>
    <div class="sb-foot">
      v1 데모 · mock 모드<br/>로그인 없이 시연 · 키 불필요
    </div>
  </aside>

  <!-- ===== 메인 ===== -->
  <div class="main">
    <div id="mobileTop">
      <div class="logo">C</div><b>클래스나우</b>
      <button class="hb" id="hbBtn">☰</button>
    </div>
    <header class="topbar">
      <div>
        <h1 id="pageTitle">탐색</h1>
        <div class="sub" id="pageSub">오늘 열리는 원데이클래스</div>
      </div>
      <div class="grow"></div>
      <div class="searchbar desk-only" id="searchWrap">
        <span>🔎</span><input id="globalSearch" placeholder="클래스·강사·지역 검색" />
      </div>
      <span class="pill desk-only" id="roleBadge">수강생 모드</span>
    </header>
    <main class="content" id="view"></main>
  </div>
</div>

<!-- 모바일 드로어 -->
<div id="backdrop"></div>
<aside id="drawer">
  <div class="brand"><div class="logo">C</div><div><b>클래스나우</b><small>메뉴 · 역할</small></div></div>
  <div class="role-switch" id="roleSwitchM">
    <button data-role-pick="guest" class="on">수강생</button>
    <button data-role-pick="host">강사</button>
    <button data-role-pick="admin">관리자</button>
  </div>
  <div id="navHostM"></div>
</aside>

<!-- 바텀 탭바 -->
<nav id="bottomnav"></nav>

<!-- 시트 -->
<div id="sheetWrap"><div class="sheet-dim"></div><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================

// 1) 베이지안 가중 평점 (소수 리뷰 편향 보정)
const GLOBAL_MEAN = 4.3, BAYES_C = 8;
function bayesRating(c){
  if(c.nRev===0) return GLOBAL_MEAN*0.7;
  return (BAYES_C*GLOBAL_MEAN + c.ratingSum) / (BAYES_C + c.nRev);
}
function rawRating(c){ return c.nRev? c.ratingSum/c.nRev : 0; }

// 2) 수요/인기 랭킹 — 조회·찜·예약률·신선도 결합 점수
function demandScore(c){
  const bookedRatio = bookingFill(c);
  const recency = 1; // 데모: 전부 신상
  const wish = c.wishCount + (DB.wishlist.includes(c.id)?1:0);
  return Math.log1p(c.views)*0.9 + wish*0.6 + bookedRatio*5 + bayesRating(c)*1.4 + recency*0.5;
}
function bookingFill(c){
  const tot=c.slots.reduce((a,s)=>a+s.cap,0), bk=c.slots.reduce((a,s)=>a+s.booked,0);
  return tot? bk/tot : 0;
}

// 3) 콘텐츠 기반 추천 — 관심 카테고리·지역·평점·가격적합 코사인풍 가중
function recoScore(c){
  const interest = DB.interests.includes(c.cat)? 1 : 0.25;
  const regionMatch = c.region===DB.myRegion ? 1 : (c.region.split(" ")[0]===DB.myRegion.split(" ")[0]?0.6:0.2);
  const rating = bayesRating(c)/5;
  const priceFit = 1 - Math.min(1, Math.abs(c.price-45000)/90000); // 중가대 선호 가정
  const demand = Math.min(1, demandScore(c)/14);
  return interest*0.34 + regionMatch*0.22 + rating*0.22 + priceFit*0.10 + demand*0.12;
}
function recoReasons(c){
  const r=[];
  if(DB.interests.includes(c.cat)) r.push("관심 카테고리");
  if(c.region===DB.myRegion) r.push("내 지역");
  else if(c.region.split(" ")[0]===DB.myRegion.split(" ")[0]) r.push("가까운 지역");
  if(bayesRating(c)>=4.4) r.push("높은 평점");
  if(bookingFill(c)>=0.6) r.push("인기 마감임박");
  return r.slice(0,3);
}

// 4) 정산 — 수수료/PG/순지급 계산
function settle(gross, rate){
  const r = (rate!=null)? rate : (typeof DB!=="undefined" && DB ? DB.policy.feeRate : FEE_RATE);
  const fee = Math.round(gross*r);
  const pg = Math.round(gross*PG_RATE);
  const net = gross - fee - pg;
  return {gross, fee, pg, net};
}
function computePayouts(db){
  // 확정 예약을 호스트별로 묶어 정산 스케줄 생성(주간)
  db.hosts.forEach(h=>h.balance=0);
  const byHost={};
  db.bookings.filter(b=>["확정","완료"].includes(b.status)).forEach(b=>{
    (byHost[b.host]=byHost[b.host]||[]).push(b);
  });
  db.payouts = Object.entries(byHost).map(([host,bks])=>{
    const gross = bks.reduce((a,b)=>a+b.total,0);
    const s = settle(gross, db.policy.feeRate);
    const h = db.hosts.find(x=>x.id===host); if(h) h.balance += s.net;
    return {id:uid("po"), host, count:bks.length, ...s, status:"지급예정", payDate: addDays(todayISO(), 7-(new Date().getDay()))};
  });
}

function filteredClasses(){
  const f=DB.filters;
  let arr=DB.classes.filter(c=>{
    if(f.cat!=="all" && c.cat!==f.cat) return false;
    if(f.region!=="all" && c.region!==f.region) return false;
    if(c.price>f.maxPrice) return false;
    if(f.q){ const q=f.q.toLowerCase();
      const hay=(c.title+" "+catOf(c.cat).name+" "+c.region+" "+getHost(c.host).name).toLowerCase();
      if(!hay.includes(q)) return false; }
    return true;
  });
  const sorters={
    reco:(a,b)=>recoScore(b)-recoScore(a),
    popular:(a,b)=>demandScore(b)-demandScore(a),
    rating:(a,b)=>bayesRating(b)-bayesRating(a),
    priceLow:(a,b)=>a.price-b.price,
    priceHigh:(a,b)=>b.price-a.price,
  };
  arr.sort(sorters[f.sort]||sorters.reco);
  return arr;
}

/* ============================================================

let bookCtx=null;
function openBooking(c){
  bookCtx={ cls:c, step:1, slot:null, qty:1, note:"", method:"card" };
  renderBooking();
  openSheet();
}
function renderBooking(){
  const {cls,step}=bookCtx;
  const sheet=$("#sheet");
  let body="";
  if(step===1){
    body=`<div class="field"><label>일정 선택</label>
      <div class="slot-grid">${cls.slots.map(s=>{
        const left=s.cap-s.booked, full=left<=0;
        return `<button class="slot ${full?'full':''} ${bookCtx.slot===s.id?'on':''}" data-slot="${s.id}">
          ${fmtDate(s.date)}<small>${s.time} · ${full?'마감':left+'자리'}</small></button>`;}).join("")}</div></div>`;
  } else if(step===2){
    const s=cls.slots.find(x=>x.id===bookCtx.slot); const left=s.cap-s.booked;
    body=`<div class="field"><label>인원</label>
      <div class="qty"><button id="qMinus">−</button><b id="qVal" style="font-size:18px;min-width:24px;text-align:center">${bookCtx.qty}</b><button id="qPlus">+</button></div>
      <div class="muted" style="font-size:12px;margin-top:6px">잔여 ${left}자리 · 최대 ${Math.min(left,4)}명</div></div>
      <div class="field"><label>강사에게 요청사항 (선택)</label><textarea id="bnote" rows="3" placeholder="예: 비건 옵션, 휠체어 접근 필요 등">${bookCtx.note}</textarea></div>`;
  } else if(step===3){
    const sub=cls.price*bookCtx.qty;
    body=`<div class="field"><label>결제 수단 (mock)</label>
      <div class="filters">${["card","kakaopay","tosspay","trans"].map(m=>{
        const lab={card:"💳 신용카드",kakaopay:"💛 카카오페이",tosspay:"💙 토스페이",trans:"🏦 계좌이체"}[m];
        return `<button class="chip ${bookCtx.method===m?'on':''}" data-pay="${m}">${lab}</button>`;}).join("")}</div></div>
      <div class="summ">
        <div class="ln"><span>${cls.title}</span><span>${won(cls.price)}</span></div>
        <div class="ln"><span>인원</span><span>× ${bookCtx.qty}</span></div>
        <div class="ln muted"><span>플랫폼 수수료(고객 무료)</span><span>₩0</span></div>
        <div class="tot"><span>결제 금액</span><span>${won(sub)}</span></div>
      </div>
      <div class="notice" style="margin-top:12px">🔒 데모 결제입니다. 실제 청구 없음 — mock PG 승인 처리.</div>`;
  } else if(step===4){
    const bk=bookCtx.result;
    body=`<div style="text-align:center;padding:14px 0">
      <div style="font-size:54px">🎉</div>
      <h3 style="margin:8px 0">예약이 확정됐어요!</h3>
      <div class="muted">예약번호 ${bk.code}</div>
      <div class="summ" style="text-align:left;margin:16px 0">
        <div class="ln"><span>클래스</span><b>${cls.title}</b></div>
        <div class="ln"><span>일정</span><b>${fmtDate(bk.date)} ${bk.time}</b></div>
        <div class="ln"><span>인원</span><b>${bk.qty}명</b></div>
        <div class="tot"><span>결제완료</span><span>${won(bk.total)}</span></div>
      </div>
      <button class="btn full" id="dlReceipt">영수증 PDF 받기</button>
      <button class="btn ghost full" style="margin-top:8px" id="goBookings">내 예약 보기</button>
    </div>`;
  }
  sheet.innerHTML=`
    <div class="sheet-h"><h3>${["일정 선택","인원·요청","결제","완료"][step-1]}</h3><button class="close" onclick="closeSheet()">✕</button></div>
    <div class="sheet-b">
      ${step<4?`<div class="steps">${[1,2,3].map(i=>`<div class="st ${i<=step?'on':''}"></div>`).join("")}</div>`:""}
      ${body}
    </div>
    ${step<4?`<div class="sheet-f"><button class="btn full" id="bookNext" ${step===1&&!bookCtx.slot?'disabled':''}>${step===3?'결제하기 '+won(cls.price*bookCtx.qty):'다음'}</button></div>`:""}`;
  // 핸들러
  $$("[data-slot]").forEach(b=>b.onclick=()=>{bookCtx.slot=b.dataset.slot;renderBooking();});
  $$("[data-pay]").forEach(b=>b.onclick=()=>{bookCtx.method=b.dataset.pay;renderBooking();});
  if($("#qMinus")) $("#qMinus").onclick=()=>{bookCtx.qty=Math.max(1,bookCtx.qty-1);renderBooking();};
  if($("#qPlus")){ const s=cls.slots.find(x=>x.id===bookCtx.slot);
    $("#qPlus").onclick=()=>{bookCtx.qty=Math.min(Math.min(s.cap-s.booked,4),bookCtx.qty+1);renderBooking();};}
  if($("#bnote")) $("#bnote").oninput=e=>bookCtx.note=e.target.value;
  if($("#bookNext")) $("#bookNext").onclick=bookingNext;
  if($("#dlReceipt")) $("#dlReceipt").onclick=()=>receiptPDF(bookCtx.result);
  if($("#goBookings")) $("#goBookings").onclick=()=>{closeSheet();setView("bookings");};
}
function bookingNext(){
  if(bookCtx.step===1 && !bookCtx.slot) return;
  if(bookCtx.step<3){ bookCtx.step++; renderBooking(); return; }
  // step3 → 결제(mock) → 확정
  const {cls}=bookCtx, slot=cls.slots.find(s=>s.id===bookCtx.slot);
  const total=cls.price*bookCtx.qty;
  const bk={ id:uid("bk"), code:"CN"+Date.now().toString().slice(-7), classId:cls.id, classTitle:cls.title,
    host:cls.host, hostName:getHost(cls.host).name, cat:cls.cat, date:slot.date, time:slot.time,
    qty:bookCtx.qty, unit:cls.price, total, note:bookCtx.note, method:bookCtx.method,
    status:"확정", paidAt:new Date().toISOString(), createdAt:new Date().toISOString(), checkedIn:false, refund:null };
  slot.booked=Math.min(slot.cap, slot.booked+bookCtx.qty);
  cls.views++;
  DB.bookings.unshift(bk); computePayouts(DB); save();
  bookCtx.result=bk; bookCtx.step=4; renderBooking(); renderNav();
  toast("결제 완료 · 예약이 확정됐어요 🎉");
}

function canCancel(b){
  const days=Math.round((new Date(b.date)-new Date())/86400000);
  if(days>=DB.policy.cancelFull) return {full:true, rate:1, days};
  if(days>=DB.policy.cancelHalf) return {full:false, rate:0.5, days};
  return {full:false, rate:0, days};
}

      <div class="summ" style="margin-top:12px">
        <div class="ln"><span>결제액</span><span>${won(b.total)}</span></div>

function autoReply(v){
  if(/환불|취소/.test(v)) return "환불 규정은 3일 전 100%입니다. 마이예약에서 진행하실 수 있어요!";
  if(/주차/.test(v)) return "네, 건물 지하 주차장 2시간 무료입니다 :)";
  if(/시간|일정/.test(v)) return "현재 예약 가능한 일정은 클래스 상세에서 확인하실 수 있어요.";
  return "문의 감사합니다! 곧 자세히 답변드릴게요 :)";
}

function withHangulFont(doc){
  // jsPDF 기본 폰트는 한글 미지원 → canvas 렌더로 한글 텍스트를 이미지화하는 헬퍼
  return (text, x, y, opt={})=>{
    const size=opt.size||12, bold=opt.bold, color=opt.color||"#2b211e", align=opt.align||"left";
    const cv=document.createElement("canvas"); const sc=3; const ctx=cv.getContext("2d");
    ctx.font=`${bold?"700":"400"} ${size}px -apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif`;
    const w=Math.ceil(ctx.measureText(text).width)+4, h=Math.ceil(size*1.5);
    cv.width=w*sc; cv.height=h*sc; ctx.scale(sc,sc);
    ctx.font=`${bold?"700":"400"} ${size}px -apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif`;
    ctx.fillStyle=color; ctx.textBaseline="top"; ctx.fillText(text,2,2);
    const mmW=w*0.2646, mmH=h*0.2646;
    let dx=x; if(align==="right") dx=x-mmW; if(align==="center") dx=x-mmW/2;
    doc.addImage(cv.toDataURL("image/png"), "PNG", dx, y, mmW, mmH);
    return y+mmH;
  };
}
