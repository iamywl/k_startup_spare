<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>세이프온 — 건설현장 안전관리 SaaS (v1)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  /* 동적 브랜드 컬러: 안전/건설 → 세이프티 오렌지 액센트 + 딥 슬레이트, WCAG AA */
  :root{
    --brand:#e2601a;          /* 세이프티 오렌지 — CTA·핵심 수치 */
    --brand-strong:#b94c10;
    --brand-soft:#fdeee2;
    --ink:#1b2027;            /* 부드러운 잉크(순흑 금지) */
    --ink-2:#4d5662;
    --ink-3:#828b97;
    --bg:#f4f6f8;
    --surface:#ffffff;
    --surface-2:#eef1f4;
    --line:#e2e7ec;
    --ok:#157a4a; --ok-soft:#e1f3e9;
    --warn:#9a6400; --warn-soft:#fbf0d9;
    --danger:#bd2d33; --danger-soft:#fbe3e4;
    --radius:14px;
    --shadow-float:0 12px 32px rgba(27,32,39,.16);
    --sidebar-w:250px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;max-width:100%;overflow-x:hidden}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",Roboto,sans-serif;
    background:radial-gradient(1100px 480px at 10% -10%, rgba(226,96,26,.06), transparent 60%), var(--bg);
    color:var(--ink); -webkit-font-smoothing:antialiased; line-height:1.45;
  }
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  .app{display:flex;min-height:100vh}

  /* 사이드바(데스크톱) */
  .sidebar{
    width:var(--sidebar-w);flex:0 0 var(--sidebar-w);
    background:#1b2330;color:#e9edf2;display:flex;flex-direction:column;gap:3px;
    padding:20px 13px;position:sticky;top:0;height:100vh;overflow-y:auto;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:4px 8px 16px}
  .brand .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#f2843f,#e2601a);
    display:grid;place-items:center;font-weight:800;color:#fff;font-size:18px}
  .brand b{font-size:17px;letter-spacing:-.2px}
  .brand small{display:block;color:#97a2b4;font-size:11px;font-weight:600}
  .nav-sec{color:#69748a;font-size:10.5px;font-weight:800;letter-spacing:.5px;padding:14px 12px 6px;text-transform:uppercase}
  .nav-btn{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:0;
    background:transparent;color:#c2cad8;padding:11px 12px;border-radius:11px;font-size:14px;font-weight:600;
    transition:background .15s,color .15s}
  .nav-btn .ic{width:20px;text-align:center;font-size:15px}
  .nav-btn:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav-btn.active{background:var(--brand);color:#fff}
  .nav-btn .badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:800;border-radius:9px;padding:1px 6px}
  .role-box{margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,.08)}
  .role-box label{color:#8a94a6;font-size:11px;font-weight:700;display:block;margin:0 4px 6px}
  .role-box select{width:100%;background:#26303f;color:#e9edf2;border:1px solid #34404f;border-radius:9px;padding:9px;font-size:13px;font-weight:600}

  /* 메인 */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:12px;padding:14px 22px;background:rgba(255,255,255,.8);
    backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .topbar h1{font-size:17px;margin:0;font-weight:800;letter-spacing:-.3px}
  .topbar .site-pill{margin-left:6px;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;
    padding:5px 12px;font-size:12px;font-weight:700;color:var(--ink-2)}
  .topbar .spacer{flex:1}
  .hamb{display:none;background:var(--surface);border:1px solid var(--line);border-radius:10px;width:40px;height:40px;font-size:18px}
  .bell{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:10px;width:40px;height:40px;font-size:17px}
  .bell .dot{position:absolute;top:-5px;right:-5px;background:var(--danger);color:#fff;font-size:10px;font-weight:800;border-radius:9px;padding:1px 5px}
  .content{padding:22px;max-width:1140px;width:100%}

  /* 뷰 */
  .view{display:none}.view.active{display:block;animation:fade .2s}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .page-h{margin:0 0 4px;font-size:22px;font-weight:800;letter-spacing:-.4px}
  .page-sub{color:var(--ink-2);font-size:13.5px;margin:0 0 18px}

  /* 카드·KPI */
  .grid{display:grid;gap:14px}
  .kpis{grid-template-columns:repeat(4,1fr)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .kpi .lbl{color:var(--ink-3);font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
  .kpi .val{font-size:27px;font-weight:800;letter-spacing:-.5px;margin-top:6px}
  .kpi .val small{font-size:13px;font-weight:700;color:var(--ink-3)}
  .kpi.alert .val{color:var(--danger)}
  .kpi.good .val{color:var(--ok)}
  .two-col{grid-template-columns:1.4fr 1fr}
  .sec-h{font-size:15px;font-weight:800;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .sec-h .more{margin-left:auto;font-size:12px;font-weight:700;color:var(--brand);background:none;border:0}

  /* 리스트/행 */
  .row{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:0}
  .row .av{width:34px;height:34px;border-radius:9px;background:var(--surface-2);display:grid;place-items:center;font-weight:800;font-size:13px;color:var(--ink-2)}
  .row .nm{font-weight:700;font-size:13.5px}
  .row .meta{color:var(--ink-3);font-size:11.5px}
  .row .rt{margin-left:auto;text-align:right}
  .chip{display:inline-block;font-size:11px;font-weight:800;border-radius:999px;padding:3px 9px}
  .chip.ok{background:var(--ok-soft);color:var(--ok)}
  .chip.warn{background:var(--warn-soft);color:var(--warn)}
  .chip.danger{background:var(--danger-soft);color:var(--danger)}
  .chip.muted{background:var(--surface-2);color:var(--ink-2)}
  .chip.brand{background:var(--brand-soft);color:var(--brand-strong)}

  /* 버튼 */
  .btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:11px;padding:10px 15px;font-size:13.5px;font-weight:700;transition:.12s}
  .btn:hover{background:var(--surface-2)}
  .btn.pri{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn.pri:hover{background:var(--brand-strong)}
  .btn.sm{padding:7px 11px;font-size:12.5px;border-radius:9px}
  .btn.ghost{background:none;border:0;color:var(--brand);font-weight:800}
  .btn[disabled]{opacity:.45;cursor:not-allowed}
  .btn-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}

  /* 폼 */
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-2);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:14px;background:var(--surface)}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--brand);outline-offset:0;border-color:var(--brand)}
  .field textarea{min-height:78px;resize:vertical}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  /* 스텝퍼 */
  .steps{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
  .step{flex:1;min-width:64px;text-align:center;font-size:11.5px;font-weight:700;color:var(--ink-3);padding-bottom:9px;border-bottom:3px solid var(--line)}
  .step.on{color:var(--brand);border-color:var(--brand)}
  .step.done{color:var(--ok);border-color:var(--ok)}
  .step b{display:block;font-size:14px}

  /* 위험성평가 표 */
  table.tbl{width:100%;border-collapse:collapse;font-size:13px}
  table.tbl th,table.tbl td{border:1px solid var(--line);padding:9px 10px;text-align:left}
  table.tbl th{background:var(--surface-2);font-weight:800;font-size:12px;color:var(--ink-2)}
  table.tbl td.c{text-align:center}
  .risk-cell{font-weight:800;border-radius:7px;padding:2px 8px;font-size:12px;display:inline-block;min-width:30px;text-align:center}

  /* TBM 체크 */
  .check-item{display:flex;align-items:center;gap:11px;padding:12px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px}
  .check-item input{width:20px;height:20px;accent-color:var(--brand)}
  .check-item .t{font-weight:700;font-size:13.5px}
  .check-item .d{color:var(--ink-3);font-size:11.5px}
  .check-item.checked{border-color:var(--ok);background:var(--ok-soft)}

  /* 서명 캔버스 */
  .sign-wrap{border:2px dashed var(--line);border-radius:12px;background:#fff;padding:8px;text-align:center}
  canvas#signpad{width:100%;height:150px;touch-action:none;border-radius:8px;background:#fcfcfd}
  .sign-thumb{display:flex;align-items:center;gap:10px;padding:8px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
  .sign-thumb img{height:40px;border:1px solid var(--line);border-radius:6px;background:#fff}

  /* 사진 업로드 */
  .photo-drop{border:2px dashed var(--line);border-radius:12px;padding:22px;text-align:center;color:var(--ink-3);font-weight:700;font-size:13px}
  .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;margin-top:12px}
  .photo-grid img{width:100%;height:96px;object-fit:cover;border-radius:10px;border:1px solid var(--line)}

  /* 모달 */
  .overlay{position:fixed;inset:0;background:rgba(20,24,30,.5);z-index:60;display:none;align-items:center;justify-content:center;padding:18px}
  .overlay.on{display:flex}
  .modal{background:var(--surface);border-radius:18px;max-width:520px;width:100%;max-height:88vh;overflow:auto;padding:22px}
  .modal h3{margin:0 0 4px;font-size:18px;font-weight:800}
  .modal .x{float:right;border:0;background:var(--surface-2);border-radius:9px;width:32px;height:32px;font-size:16px}

  /* 토스트 */
  #toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);background:#1b2330;color:#fff;
    padding:12px 18px;border-radius:12px;font-size:13.5px;font-weight:700;opacity:0;transition:.25s;z-index:90;box-shadow:var(--shadow-float);max-width:90vw}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  /* 미니 막대 차트 */
  .bars{display:flex;align-items:flex-end;gap:9px;height:120px;padding-top:8px}
  .bars .b{flex:1;background:var(--brand-soft);border-radius:7px 7px 0 0;position:relative;min-height:6px}
  .bars .b span{position:absolute;top:-18px;left:0;right:0;text-align:center;font-size:11px;font-weight:800;color:var(--ink-2)}
  .bars .b small{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:10.5px;color:var(--ink-3);font-weight:700}
  .bars .b.hot{background:var(--brand)}

  /* 진행바 */
  .pbar{height:9px;background:var(--surface-2);border-radius:99px;overflow:hidden}
  .pbar i{display:block;height:100%;background:var(--ok);border-radius:99px}

  /* 결재 라인 */
  .appr-line{display:flex;align-items:center;gap:0;margin:10px 0}
  .appr-node{flex:1;text-align:center;font-size:11.5px}
  .appr-node .dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--line);margin:0 auto 5px;display:grid;place-items:center;font-size:13px;background:#fff}
  .appr-node.done .dot{border-color:var(--ok);background:var(--ok-soft);color:var(--ok)}
  .appr-node.cur .dot{border-color:var(--brand);background:var(--brand-soft);color:var(--brand)}
  .appr-arrow{color:var(--ink-3);font-size:13px;padding:0 2px;align-self:flex-start;margin-top:9px}

  /* 모바일 바텀탭 + 드로어 */
  .bottomnav{display:none;position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(255,255,255,.94);
    backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:6px 4px 9px;grid-template-columns:repeat(5,1fr)}
  .bottomnav button{border:0;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;
    font-size:10.5px;font-weight:700;color:var(--ink-3);padding:5px 2px}
  .bottomnav button .ic{font-size:18px}
  .bottomnav button.active{color:var(--brand)}
  .scrim{display:none;position:fixed;inset:0;background:rgba(20,24,30,.5);z-index:55}
  .scrim.on{display:block}

  @media(max-width:860px){
    .kpis{grid-template-columns:1fr 1fr}
    .two-col{grid-template-columns:1fr}
    .grid2{grid-template-columns:1fr}
    .sidebar{position:fixed;left:0;top:0;z-index:60;transform:translateX(-100%);transition:transform .22s;height:100dvh}
    body.drawer-open .sidebar{transform:none;box-shadow:var(--shadow-float)}
    body.drawer-open .scrim{display:block}
    .main{width:100%}
    .hamb{display:grid;place-items:center}
    .content{padding:16px 14px 90px}
    .bottomnav{display:grid}
    .page-h{font-size:20px}
    table.tbl{font-size:11.5px}
    table.tbl th,table.tbl td{padding:7px 6px}
    #toast{bottom:96px}
  }
</style>
</head>
<body>
<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<div class="app">
  <!-- 사이드바 -->
  <aside class="sidebar" id="sidebar">
    <div class="brand"><div class="logo">S</div><div><b>세이프온</b><small>건설현장 안전관리</small></div></div>
    <div class="nav-sec">현황</div>
    <button class="nav-btn" data-view="dashboard" onclick="go('dashboard')"><span class="ic">▥</span>안전 대시보드</button>
    <div class="nav-sec">현장 기록</div>
    <button class="nav-btn" data-view="risk" onclick="go('risk')"><span class="ic">▦</span>위험성평가</button>
    <button class="nav-btn" data-view="tbm" onclick="go('tbm')"><span class="ic">✎</span>TBM 작업전점검</button>
    <button class="nav-btn" data-view="incident" onclick="go('incident')"><span class="ic">⚠</span>아차사고 신고</button>
    <button class="nav-btn" data-view="edu" onclick="go('edu')"><span class="ic">◉</span>안전교육 이수</button>
    <div class="nav-sec">서류·결재</div>
    <button class="nav-btn" data-view="docs" onclick="go('docs')"><span class="ic">▤</span>법정 안전서류</button>
    <button class="nav-btn" data-view="approval" onclick="go('approval')"><span class="ic">✓</span>전자결재함<span class="badge" id="apprBadge" style="display:none">0</span></button>
    <button class="nav-btn" data-view="settings" onclick="go('settings')"><span class="ic">⚙</span>현장 설정</button>
    <div class="role-box">
      <label>로그인 역할 (데모 전환)</label>
      <select id="roleSel" onchange="setRole(this.value)">
        <option value="manager">현장소장 / 안전관리책임자</option>
        <option value="worker">작업자 / 반장</option>
        <option value="ceo">대표이사 (경영책임자)</option>
      </select>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="hamb" onclick="openDrawer()">☰</button>
      <h1 id="topTitle">안전 대시보드</h1>
      <span class="site-pill" id="sitePill">현장: —</span>
      <div class="spacer"></div>
      <button class="bell" onclick="go('approval')">🔔<span class="dot" id="bellDot" style="display:none">0</span></button>
    </header>
    <div class="content" id="content"><!-- 뷰 주입 --></div>
  </div>
</div>

<!-- 바텀탭(모바일) -->
<nav class="bottomnav" id="bottomnav">
  <button data-view="dashboard" onclick="go('dashboard')"><span class="ic">▥</span>현황</button>
  <button data-view="risk" onclick="go('risk')"><span class="ic">▦</span>위험성평가</button>
  <button data-view="tbm" onclick="go('tbm')"><span class="ic">✎</span>TBM</button>
  <button data-view="incident" onclick="go('incident')"><span class="ic">⚠</span>아차사고</button>
  <button onclick="openDrawer()"><span class="ic">☰</span>더보기</button>
</nav>

<div class="overlay" id="overlay"><div class="modal" id="modalBody"></div></div>
<div id="toast"></div>

<script>
"use strict";
/* ───────────────────────── 상태/저장 ───────────────────────── */
const LS_KEY = "safeon-v1";
const STD_RISK = [ // 위험성평가 라이브러리(공정별 표준 위험요인)
  {proc:"철근·거푸집", haz:"개구부·단부 추락", base:[4,4]},
  {proc:"고소작업", haz:"이동식 비계 전도·추락", base:[4,3]},
  {proc:"양중·인양", haz:"줄걸이 탈락 낙하물", base:[4,3]},
  {proc:"굴착", haz:"흙막이 붕괴·매몰", base:[5,2]},
  {proc:"전기", haz:"가설전선 감전", base:[4,2]},
  {proc:"용접·화기", haz:"불티 화재·질식", base:[3,3]},
];
const TBM_ITEMS = [
  {t:"작업 내용·순서 공유", d:"금일 공정·작업 위치·인원 배치 전달"},
  {t:"보호구 착용 확인", d:"안전모·안전대·안전화·보안경 지급·착용"},
  {t:"위험요인 주지", d:"오늘의 핵심 위험요인 및 대책 설명"},
  {t:"작업자 건강상태 확인", d:"음주·피로·고혈압 등 이상 유무"},
  {t:"안전시설 점검", d:"안전난간·개구부 덮개·비계 고정 상태"},
  {t:"비상연락·대피경로", d:"사고 시 119·관리자 연락 및 대피 동선"},
];
const EDU_COURSES = [
  {nm:"건설업 기초안전보건교육(4h)", legal:true},
  {nm:"정기 안전보건교육(분기)", legal:true},
  {nm:"특별안전보건교육(고소·밀폐)", legal:true},
  {nm:"MSDS·화학물질 취급교육", legal:false},
];

function seed(){
  const workers = [
    {id:"w1", nm:"김현장", trade:"철근공", role:"반장"},
    {id:"w2", nm:"이성호", trade:"형틀목공", role:"작업자"},
    {id:"w3", nm:"박정수", trade:"전기공", role:"작업자"},
    {id:"w4", nm:"최영길", trade:"비계공", role:"작업자"},
    {id:"w5", nm:"정민재", trade:"용접공", role:"작업자"},
    {id:"w6", nm:"한동욱", trade:"보통인부", role:"작업자"},
  ];
  // 교육 이수 시드(일부 미이수 → 알림 트리거)
  const edu = [];
  workers.forEach((w,i)=>EDU_COURSES.forEach((c,j)=>{
    const done = !((i+j)%4===0); // 약 1/4 미이수
    edu.push({wid:w.id, course:c.nm, legal:c.legal, done, date: done? "2026-04-1"+((i+j)%9): ""});
  }));
  return {

    <table class="tbl"><thead><tr><th>위험요인</th><th class="c">빈도</th><th class="c">강도</th><th class="c">위험성</th></tr></thead><tbody>

function rwProc(p){ RW.proc=p; RW.items=STD_RISK.filter(r=>r.proc===p).map(r=>({haz:r.haz,p:r.base[0],s:r.base[1],act:""})); go("risk"); }
function rwSet(i,k,v){ RW.items[i][k]=(k==='act')?v:+v; if(k!=='act'){const g=riskGrade(RW.items[i].p,RW.items[i].s);const el=$("#rg"+i);if(el){el.textContent=g.v+" "+g.lvl;el.className="risk-cell chip "+g.cls;}} }

/* ───────────────────────── 뷰: TBM(체크 + 서명) ───────────────────────── */
let TW=null;
VIEWS.tbm = ()=>{
  if(TW) return tbmWizard();
  return `<h2 class="page-h">TBM 작업전점검</h2>
  <p class="page-sub">작업 시작 전 위험요인을 공유하고 참석자 전원이 서명합니다. 타임스탬프·서명이 함께 기록됩니다.</p>

function startTbm(){ TW={step:0, proc:"철근·거푸집", checks:TBM_ITEMS.map(()=>false), hazard:"", signs:[]}; go("tbm"); }
function tbmWizard(){

      <div class="card"><div class="meta">점검 진행률</div><div class="pbar" style="margin-top:8px"><i style="width:${TW.checks.filter(c=>c).length/TBM_ITEMS.length*100}%"></i></div></div>`;

function tbmCheck(i,v){ TW.checks[i]=v; $("#ci"+i).classList.toggle("checked",v); }
function twNav(d){ TW.step=Math.max(0,Math.min(2,TW.step+d)); go("tbm"); if(TW.step===2) initSign(); }
let SIGN=null;
function initSign(){
  const c=$("#signpad"); if(!c) return;
  const ratio=window.devicePixelRatio||1;
  c.width=c.offsetWidth*ratio; c.height=c.offsetHeight*ratio;
  const x=c.getContext("2d"); x.scale(ratio,ratio); x.lineWidth=2.4; x.lineCap="round"; x.strokeStyle="#1b2330";
  let drawing=false,empty=true;
  const pos=e=>{const r=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return [t.clientX-r.left,t.clientY-r.top];};
  const start=e=>{drawing=true;empty=false;const[a,b]=pos(e);x.beginPath();x.moveTo(a,b);e.preventDefault();};
  const move=e=>{if(!drawing)return;const[a,b]=pos(e);x.lineTo(a,b);x.stroke();e.preventDefault();};
  const end=()=>drawing=false;
  c.onmousedown=start;c.onmousemove=move;window.addEventListener("mouseup",end);
  c.ontouchstart=start;c.ontouchmove=move;c.ontouchend=end;
  SIGN={canvas:c,isEmpty:()=>empty,clear:()=>{x.clearRect(0,0,c.width,c.height);empty=true;}};
}
function clearSign(){ SIGN&&SIGN.clear(); }
function addSign(){
  const nm=$("#signName").value.trim();
  if(!nm) return toast("참석자 이름을 입력하세요");
  if(!SIGN||SIGN.isEmpty()) return toast("서명을 입력하세요");
  TW.signs.push({nm, img:SIGN.canvas.toDataURL("image/png")});
  $("#signName").value=""; toast(nm+" 서명 추가됨"); go("tbm"); TW.step=2; go("tbm"); initSign();

/* ───────────────────────── PDF 생성 (jsPDF, 한글=캔버스 이미지) ───────────────────────── */
function pdfReady(){ return window.jspdf && window.jspdf.jsPDF; }
// 한글 깨짐 방지: 텍스트를 캔버스에 그려 이미지로 삽입
function koCanvasPage(lines){
  const W=794, pad=48; let H=120 + lines.length*30 + 80;
  const c=document.createElement("canvas"); const sc=2; c.width=W*sc; c.height=H*sc;
  const x=c.getContext("2d"); x.scale(sc,sc); x.fillStyle="#fff"; x.fillRect(0,0,W,H);
  x.fillStyle="#1b2330";
  x.font="bold 24px -apple-system,'Apple SD Gothic Neo',sans-serif";
  let y=64; x.fillText(lines[0], pad, y); y+=14;
  x.strokeStyle="#e2601a"; x.lineWidth=3; x.beginPath(); x.moveTo(pad,y); x.lineTo(W-pad,y); x.stroke(); y+=36;
  for(let i=1;i<lines.length;i++){
    const ln=lines[i];
    if(ln.startsWith("##")){ x.font="bold 17px sans-serif"; x.fillStyle="#b94c10"; x.fillText(ln.slice(2).trim(),pad,y); y+=30; }
    else if(ln.startsWith("--")){ x.strokeStyle="#e2e7ec";x.lineWidth=1;x.beginPath();x.moveTo(pad,y-10);x.lineTo(W-pad,y-10);x.stroke(); y+=6; }
    else { x.font="14px sans-serif"; x.fillStyle="#1b2027"; x.fillText(ln,pad,y); y+=28; }
  }
  x.font="12px sans-serif"; x.fillStyle="#828b97";
  x.fillText("본 문서는 세이프온(SafeOn)에서 자동 생성된 법정 안전서류입니다. 생성일 "+today(), pad, H-32);
  return {dataUrl:c.toDataURL("image/jpeg",0.92), W, H};
}
function makePdf(lines, fname){
  if(!pdfReady()){ toast("PDF 라이브러리 미로딩 — 오프라인 폴백: 텍스트 다운로드"); downloadFile(lines.join("\n"),fname.replace(".pdf",".txt"),"text/plain"); return; }
  const {jsPDF}=window.jspdf; const doc=new jsPDF({unit:"pt",format:"a4"});
  const {dataUrl,W,H}=koCanvasPage(lines);
  const pw=doc.internal.pageSize.getWidth(); const ph=pw*(H/W);
  doc.addImage(dataUrl,"JPEG",0,0,pw,ph); doc.save(fname); toast("PDF 생성 완료: "+fname);
}
function genDocPdf(id){ const d=S.docs.find(x=>x.id===id); if(!d)return; if(d.refKind==="risk")return genRiskDoc(d.refId); if(d.refKind==="tbm")return genTbmDoc(d.refId); }
function genRiskDoc(rid){
  const r=S.risks.find(x=>x.id===rid); if(!r) return toast("대상 없음");
  const L=["위험성평가표 — "+S.site.name, "## 평가 개요", "공정: "+r.proc+"    평가일: "+r.date, "평가방법: 빈도(1~5) × 강도(1~5)", "--", "## 위험요인 및 감소대책"];
  r.items.forEach((i,n)=>{ const g=riskGrade(i.p,i.s); L.push((n+1)+". "+i.haz+"  [빈도 "+i.p+" × 강도 "+i.s+" = "+g.v+" "+g.lvl+"]"); L.push("   감소대책: "+(i.act||"-")); });
  L.push("--","## 결재","안전관리자 (서명)        현장소장 (서명)        경영책임자 (서명)");
  makePdf(L,"위험성평가표_"+r.proc+".pdf");
}
function genTbmDoc(tid){
  const t=S.tbms.find(x=>x.id===tid); if(!t) return toast("대상 없음");
  const L=["TBM(작업전점검) 일지 — "+S.site.name, "## 개요", "공정: "+t.proc+"    일시: "+t.date+" "+t.time, "위험요인: "+(t.hazard||"-"), "--", "## 점검항목"];
  TBM_ITEMS.forEach((it,i)=>L.push((t.checks[i]?"[V] ":"[ ] ")+it.t));
  L.push("--","## 참석자 서명 ("+t.signs.length+"명)", t.signs.map(s=>s.nm).join(", "));
  makePdf(L,"TBM일지_"+t.date+".pdf");
}

function genIncDoc(){
  const L=["아차사고 대장 — "+S.site.name, "## 신고 내역", "작성일: "+today(), "--"];
  if(!S.incidents.length) L.push("접수된 아차사고 없음");
  S.incidents.forEach((i,n)=>{ L.push((n+1)+". ["+i.date+"] "+i.type+" / 위험 "+i.severity+" / "+i.where); L.push("   "+(i.desc||"-")+"  ("+i.status+")"); });
  makePdf(L,"아차사고대장.pdf");
}
