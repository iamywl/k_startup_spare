<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>세이프온 — 건설현장 안전관리 SaaS (v3 · 시리즈A · AI 예측·다국어)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --brand:#e2601a; --brand-strong:#b94c10; --brand-soft:#fdeee2;
    --ink:#1b2027; --ink-2:#4d5662; --ink-3:#828b97;
    --bg:#f4f6f8; --surface:#ffffff; --surface-2:#eef1f4; --line:#e2e7ec;
    --ok:#157a4a; --ok-soft:#e1f3e9;
    --warn:#9a6400; --warn-soft:#fbf0d9;
    --danger:#bd2d33; --danger-soft:#fbe3e4;
    --info:#1f5fa6; --info-soft:#e4eefb;
    --radius:14px; --shadow-float:0 12px 32px rgba(27,32,39,.16); --sidebar-w:252px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;max-width:100%;overflow-x:hidden}
  body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",Roboto,sans-serif;
    background:radial-gradient(1100px 480px at 10% -10%, rgba(226,96,26,.06), transparent 60%), var(--bg);
    color:var(--ink); -webkit-font-smoothing:antialiased; line-height:1.45;}
  button{font-family:inherit;cursor:pointer} input,select,textarea{font-family:inherit}
  .app{display:flex;min-height:100vh}

  .sidebar{width:var(--sidebar-w);flex:0 0 var(--sidebar-w);background:#1b2330;color:#e9edf2;display:flex;flex-direction:column;gap:2px;
    padding:18px 12px;position:sticky;top:0;height:100vh;overflow-y:auto;}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 8px 12px}
  .brand .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#f2843f,#e2601a);display:grid;place-items:center;font-weight:800;color:#fff;font-size:18px}
  .brand b{font-size:17px;letter-spacing:-.2px}
  .brand small{display:block;color:#97a2b4;font-size:11px;font-weight:600}
  .tenant{background:#26303f;border:1px solid #34404f;border-radius:11px;padding:9px 10px;margin-bottom:6px}
  .tenant label{color:#8a94a6;font-size:10px;font-weight:800;letter-spacing:.4px;display:block;margin:0 0 5px}
  .tenant select{width:100%;background:#1b2330;color:#e9edf2;border:1px solid #3a4658;border-radius:8px;padding:8px;font-size:12.5px;font-weight:700}
  .nav-sec{color:#69748a;font-size:10px;font-weight:800;letter-spacing:.5px;padding:12px 12px 5px;text-transform:uppercase}
  .nav-btn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:0;background:transparent;color:#c2cad8;
    padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:600;transition:background .15s,color .15s}
  .nav-btn .ic{width:20px;text-align:center;font-size:15px}
  .nav-btn:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav-btn.active{background:var(--brand);color:#fff}
  .nav-btn.lock{opacity:.34;cursor:not-allowed}
  .nav-btn .badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:800;border-radius:9px;padding:1px 6px}
  .role-box{margin-top:auto;padding-top:12px;border-top:1px solid rgba(255,255,255,.08)}
  .role-box label{color:#8a94a6;font-size:11px;font-weight:700;display:block;margin:0 4px 6px}
  .role-box select{width:100%;background:#26303f;color:#e9edf2;border:1px solid #34404f;border-radius:9px;padding:9px;font-size:13px;font-weight:600}
  .role-box .rdesc{color:#8a94a6;font-size:10.5px;margin:6px 4px 0;line-height:1.4}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:12px;padding:13px 22px;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(10px);
    border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .topbar h1{font-size:16px;margin:0;font-weight:800;letter-spacing:-.3px}
  .topbar .site-pill{margin-left:4px;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:12px;font-weight:700;color:var(--ink-2)}
  .topbar .role-pill{background:var(--info-soft);border:1px solid #cfe0f5;color:var(--info);border-radius:999px;padding:5px 11px;font-size:11.5px;font-weight:800}
  .topbar .spacer{flex:1}
  .hamb{display:none;background:var(--surface);border:1px solid var(--line);border-radius:10px;width:40px;height:40px;font-size:18px}
  .bell{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:10px;width:40px;height:40px;font-size:17px}
  .bell .dot{position:absolute;top:-5px;right:-5px;background:var(--danger);color:#fff;font-size:10px;font-weight:800;border-radius:9px;padding:1px 5px}
  .content{padding:22px;max-width:1180px;width:100%}

  .view{display:none}.view.active{display:block;animation:fade .2s}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .page-h{margin:0 0 4px;font-size:22px;font-weight:800;letter-spacing:-.4px}
  .page-sub{color:var(--ink-2);font-size:13.5px;margin:0 0 18px}

  .grid{display:grid;gap:14px}
  .kpis{grid-template-columns:repeat(4,1fr)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .kpi .lbl{color:var(--ink-3);font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
  .kpi .val{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-top:6px}
  .kpi .val small{font-size:13px;font-weight:700;color:var(--ink-3)}
  .kpi.alert .val{color:var(--danger)} .kpi.good .val{color:var(--ok)} .kpi.info .val{color:var(--info)}
  .kpi .sub{font-size:11px;color:var(--ink-3);font-weight:600;margin-top:3px}
  .two-col{grid-template-columns:1.4fr 1fr}
  .three-col{grid-template-columns:repeat(3,1fr)}
  .sec-h{font-size:15px;font-weight:800;margin:0 0 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .sec-h .more{margin-left:auto;font-size:12px;font-weight:700;color:var(--brand);background:none;border:0}

  .row{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:0}
  .row .av{width:34px;height:34px;border-radius:9px;background:var(--surface-2);display:grid;place-items:center;font-weight:800;font-size:13px;color:var(--ink-2);flex:0 0 34px}
  .row .nm{font-weight:700;font-size:13.5px} .row .meta{color:var(--ink-3);font-size:11.5px}
  .row .rt{margin-left:auto;text-align:right}
  .chip{display:inline-block;font-size:11px;font-weight:800;border-radius:999px;padding:3px 9px}
  .chip.ok{background:var(--ok-soft);color:var(--ok)} .chip.warn{background:var(--warn-soft);color:var(--warn)}
  .chip.danger{background:var(--danger-soft);color:var(--danger)} .chip.muted{background:var(--surface-2);color:var(--ink-2)}
  .chip.brand{background:var(--brand-soft);color:var(--brand-strong)} .chip.info{background:var(--info-soft);color:var(--info)}

  .btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:11px;padding:10px 15px;font-size:13.5px;font-weight:700;transition:.12s}
  .btn:hover{background:var(--surface-2)}
  .btn.pri{background:var(--brand);border-color:var(--brand);color:#fff} .btn.pri:hover{background:var(--brand-strong)}
  .btn.sm{padding:7px 11px;font-size:12.5px;border-radius:9px}
  .btn.ghost{background:none;border:0;color:var(--brand);font-weight:800}
  .btn[disabled]{opacity:.45;cursor:not-allowed}
  .btn-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}

  .field{margin-bottom:13px}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-2);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:14px;background:var(--surface)}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--brand);outline-offset:0;border-color:var(--brand)}
  .field textarea{min-height:78px;resize:vertical}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  .steps{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
  .step{flex:1;min-width:64px;text-align:center;font-size:11.5px;font-weight:700;color:var(--ink-3);padding-bottom:9px;border-bottom:3px solid var(--line)}
  .step.on{color:var(--brand);border-color:var(--brand)} .step.done{color:var(--ok);border-color:var(--ok)}
  .step b{display:block;font-size:14px}

  table.tbl{width:100%;border-collapse:collapse;font-size:13px}
  table.tbl th,table.tbl td{border:1px solid var(--line);padding:9px 10px;text-align:left}
  table.tbl th{background:var(--surface-2);font-weight:800;font-size:12px;color:var(--ink-2)}
  table.tbl td.c{text-align:center}
  .risk-cell{font-weight:800;border-radius:7px;padding:2px 8px;font-size:12px;display:inline-block;min-width:30px;text-align:center}
  .tbl-wrap{overflow-x:auto}

  .check-item{display:flex;align-items:center;gap:11px;padding:12px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px}
  .check-item input{width:20px;height:20px;accent-color:var(--brand);flex:0 0 20px}
  .check-item .t{font-weight:700;font-size:13.5px} .check-item .d{color:var(--ink-3);font-size:11.5px}
  .check-item.checked{border-color:var(--ok);background:var(--ok-soft)}

  .sign-wrap{border:2px dashed var(--line);border-radius:12px;background:#fff;padding:8px;text-align:center}
  canvas#signpad{width:100%;height:150px;touch-action:none;border-radius:8px;background:#fcfcfd}
  .sign-thumb{display:flex;align-items:center;gap:10px;padding:8px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
  .sign-thumb img{height:40px;border:1px solid var(--line);border-radius:6px;background:#fff}

  .photo-drop{border:2px dashed var(--line);border-radius:12px;padding:22px;text-align:center;color:var(--ink-3);font-weight:700;font-size:13px}
  .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;margin-top:12px}
  .photo-grid img{width:100%;height:96px;object-fit:cover;border-radius:10px;border:1px solid var(--line)}

  .overlay{position:fixed;inset:0;background:rgba(20,24,30,.5);z-index:60;display:none;align-items:center;justify-content:center;padding:18px}
  .overlay.on{display:flex}
  .modal{background:var(--surface);border-radius:18px;max-width:540px;width:100%;max-height:88vh;overflow:auto;padding:22px}
  .modal h3{margin:0 0 4px;font-size:18px;font-weight:800}
  .modal .x{float:right;border:0;background:var(--surface-2);border-radius:9px;width:32px;height:32px;font-size:16px}

  #toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);background:#1b2330;color:#fff;
    padding:12px 18px;border-radius:12px;font-size:13.5px;font-weight:700;opacity:0;transition:.25s;z-index:90;box-shadow:var(--shadow-float);max-width:90vw}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  .bars{display:flex;align-items:flex-end;gap:9px;height:130px;padding-top:18px}
  .bars .b{flex:1;background:var(--brand-soft);border-radius:7px 7px 0 0;position:relative;min-height:6px}
  .bars .b span{position:absolute;top:-18px;left:0;right:0;text-align:center;font-size:11px;font-weight:800;color:var(--ink-2)}
  .bars .b small{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:10.5px;color:var(--ink-3);font-weight:700}
  .bars .b.hot{background:var(--brand)} .bars .b.fc{background:repeating-linear-gradient(45deg,var(--surface-2),var(--surface-2) 4px,#dfe5eb 4px,#dfe5eb 8px)}

  .pbar{height:9px;background:var(--surface-2);border-radius:99px;overflow:hidden}
  .pbar i{display:block;height:100%;background:var(--ok);border-radius:99px}
  .pbar.warn i{background:var(--warn)} .pbar.danger i{background:var(--danger)}

  .gauge{display:flex;align-items:center;gap:14px}
  .gauge .ring{--p:0;width:88px;height:88px;border-radius:50%;flex:0 0 88px;
    background:conic-gradient(var(--gc,var(--brand)) calc(var(--p)*1%), var(--surface-2) 0);display:grid;place-items:center}
  .gauge .ring i{width:64px;height:64px;border-radius:50%;background:#fff;display:grid;place-items:center;font-weight:800;font-size:19px;font-style:normal}

  .appr-line{display:flex;align-items:center;gap:0;margin:10px 0;flex-wrap:wrap}
  .appr-node{flex:1;min-width:74px;text-align:center;font-size:11.5px}
  .appr-node .dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--line);margin:0 auto 5px;display:grid;place-items:center;font-size:13px;background:#fff}
  .appr-node.done .dot{border-color:var(--ok);background:var(--ok-soft);color:var(--ok)}
  .appr-node.cur .dot{border-color:var(--brand);background:var(--brand-soft);color:var(--brand)}
  .appr-arrow{color:var(--ink-3);font-size:13px;padding:0 2px;align-self:flex-start;margin-top:9px}

  .log{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;background:#11161f;color:#cdd6e2;border-radius:11px;padding:13px 14px;overflow-x:auto;line-height:1.7}
  .log .t{color:#5f6b7d} .log .ok{color:#5fd39a} .log .wn{color:#f0c674} .log .er{color:#e88}
  .log .tag{color:#7ab6f0}

  .siteband{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}
  .siteband .sc{flex:0 0 auto;min-width:172px;border:1px solid var(--line);border-radius:12px;padding:12px 13px;background:var(--surface);cursor:pointer}
  .siteband .sc.on{border-color:var(--brand);box-shadow:0 0 0 2px var(--brand-soft)}
  .siteband .sc b{font-size:13.5px} .siteband .sc .m{font-size:11px;color:var(--ink-3);font-weight:700;margin-top:2px}
  .siteband .sc .cidx{font-size:20px;font-weight:800;margin-top:6px}

  .wx{display:flex;align-items:center;gap:12px;padding:13px;border-radius:12px;border:1px solid var(--line)}
  .wx.warn{background:var(--warn-soft);border-color:#eccf8a} .wx.danger{background:var(--danger-soft);border-color:#e9b6b9}
  .wx .ico{font-size:26px} .wx b{font-size:14px} .wx .d{font-size:11.5px;color:var(--ink-2)}

  .bottomnav{display:none;position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);padding:6px 4px 9px;grid-template-columns:repeat(5,1fr)}
  .bottomnav button{border:0;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;font-weight:700;color:var(--ink-3);padding:5px 2px}
  .bottomnav button .ic{font-size:18px} .bottomnav button.active{color:var(--brand)}
  .scrim{display:none;position:fixed;inset:0;background:rgba(20,24,30,.5);z-index:55}.scrim.on{display:block}

  /* v3 추가 컴포넌트 */
  .langtog{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--surface)}
  .langtog button{border:0;background:none;padding:6px 11px;font-size:12px;font-weight:800;color:var(--ink-3)}
  .langtog button.on{background:var(--ink);color:#fff}
  .plot{position:relative;width:100%;height:180px;border:1px solid var(--line);border-radius:11px;background:#fff;overflow:hidden}
  .plot .axis{position:absolute;background:var(--line)} .plot .axis.x{left:8%;right:4%;bottom:22px;height:1px} .plot .axis.y{left:8%;top:8px;bottom:22px;width:1px}
  .plot .pt{position:absolute;width:11px;height:11px;border-radius:50%;transform:translate(-50%,50%);border:2px solid #fff}
  .plot .lbl{position:absolute;font-size:10px;color:var(--ink-3);font-weight:700}
  .plot .reg{position:absolute;height:2px;background:var(--brand);transform-origin:left center}
  .plot .curve{position:absolute;inset:0}
  .cl-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;font-size:11.5px;font-weight:700;color:var(--ink-2)}
  .cl-legend .dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:5px;vertical-align:-1px}
  .hmap{display:grid;grid-template-columns:auto repeat(4,1fr);gap:4px;font-size:11px}
  .hmap .hc{padding:9px 4px;text-align:center;border-radius:7px;font-weight:800;color:#fff}
  .hmap .hh{color:var(--ink-2);font-weight:800;display:grid;place-items:center;background:var(--surface-2);border-radius:7px}
  .hmap .hr{color:var(--ink-2);font-weight:800;display:grid;place-items:center;font-size:10.5px;padding:0 6px}
  .ptw-card{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px}
  .ptw-card.high{border-color:#e9b6b9;background:var(--danger-soft)}
  .stat-tile{border:1px solid var(--line);border-radius:11px;padding:13px;text-align:center}
  .stat-tile .v{font-size:23px;font-weight:800;letter-spacing:-.5px} .stat-tile .l{font-size:11px;color:var(--ink-3);font-weight:700;margin-top:3px}
  .partner-row .pf{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
  @media(max-width:860px){
    .kpis{grid-template-columns:1fr 1fr} .two-col,.three-col{grid-template-columns:1fr} .grid2{grid-template-columns:1fr}
    .sidebar{position:fixed;left:0;top:0;z-index:60;transform:translateX(-100%);transition:transform .22s;height:100dvh}
    body.drawer-open .sidebar{transform:none;box-shadow:var(--shadow-float)} body.drawer-open .scrim{display:block}
    .main{width:100%} .hamb{display:grid;place-items:center} .content{padding:16px 14px 92px}
    .bottomnav{display:grid} .page-h{font-size:20px} table.tbl{font-size:11.5px} table.tbl th,table.tbl td{padding:7px 6px}
    #toast{bottom:96px} .topbar .role-pill,.topbar .site-pill{display:none}
  }
</style>
</head>
<body>
<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><div class="logo">S</div><div><b>세이프온</b><small id="brandSub">시리즈A · AI예측·다국어 v3</small></div></div>
    <div class="tenant">
      <label data-i18n-label="tenant">본사 / 현장 (멀티테넌트)</label>
      <select id="siteSel" onchange="setSite(this.value)"></select>
    </div>
    <div class="nav-sec" data-i18n="nav.sec.hq">본사·현황</div>
    <button class="nav-btn" data-view="hq" onclick="go('hq')"><span class="ic">▤</span><span data-i18n="nav.hq">본사 통합 대시보드</span></button>
    <button class="nav-btn" data-view="riskindex" onclick="go('riskindex')"><span class="ic">◎</span><span data-i18n="nav.riskindex">중대재해 위험지수</span></button>
    <button class="nav-btn" data-view="predict" onclick="go('predict')"><span class="ic">⌁</span><span data-i18n="nav.predict">중대재해 발생확률(AI)</span></button>
    <button class="nav-btn" data-view="hotspot" onclick="go('hotspot')"><span class="ic">⊞</span><span data-i18n="nav.hotspot">위험 핫스팟 군집</span></button>
    <button class="nav-btn" data-view="dashboard" onclick="go('dashboard')"><span class="ic">▥</span><span data-i18n="nav.dashboard">현장 안전현황</span></button>
    <button class="nav-btn" data-view="weather" onclick="go('weather')"><span class="ic">☼</span><span data-i18n="nav.weather">기상 위험경보</span></button>
    <div class="nav-sec" data-i18n="nav.sec.field">현장 기록</div>
    <button class="nav-btn" data-view="risk" onclick="go('risk')"><span class="ic">▦</span><span data-i18n="nav.risk">위험성평가</span></button>
    <button class="nav-btn" data-view="ptw" onclick="go('ptw')"><span class="ic">▣</span><span data-i18n="nav.ptw">작업허가(PTW)</span></button>
    <button class="nav-btn" data-view="tbm" onclick="go('tbm')"><span class="ic">✎</span><span data-i18n="nav.tbm">TBM 작업전점검</span></button>

/* 단어 내부 오매칭이 위험한 짧은/모호한 라벨 → 텍스트노드 전체 정확일치만 치환 */
const EN_EXACT = {
  "월":"Mon","화":"Tue","수":"Wed","목":"Thu","금":"Fri","토":"Sat","오늘":"Today","내일":"Tomorrow",
  "이수":"Done","미이수포함":"Incl. overdue","상":"H","중":"M","하":"L","건":"cases","명":"workers","곳":"sites","존":"zones",
};
const EN_KEYS = Object.keys(EN_BODY).sort((a,b)=>b.length-a.length);
const EN_UNIT={"건":" cases","명":" workers","곳":" sites","점":" pts","존":" zones","건·":" cases·"};
function enText(s){
  let out=s;
  for(const k of EN_KEYS){ if(out.indexOf(k)>=0) out=out.split(k).join(EN_BODY[k]); }
  // 숫자+단위(같은 텍스트노드 내) → 영문 단위
  out=out.replace(/(\d)\s*(건|명|곳|점|존)/g,(m,d,u)=>d+EN_UNIT[u]);
  return out;
}
function translateDOM(root){
  if(LANG!=="en") return;
  const walk=(node)=>{
    const tw=document.createTreeWalker(node, NodeFilter.SHOW_TEXT, null);
    const tn=[]; let n; while((n=tw.nextNode())) tn.push(n);
    tn.forEach(t=>{
      const v=t.nodeValue; if(!/[가-힣]/.test(v)) return;
      if(t.parentElement && t.parentElement.closest("[data-seed]")) return; // 시드 콘텐츠 보존
      const trimmed=v.trim();
      if(EN_EXACT[trimmed]!=null){ t.nodeValue=v.replace(trimmed, EN_EXACT[trimmed]); return; }
      const nv=enText(v); if(nv!==v) t.nodeValue=nv;
    });
  };
  walk(root);
  root.querySelectorAll("[placeholder]").forEach(el=>{ const p=el.getAttribute("placeholder"); if(/[가-힣]/.test(p)){ const np=enText(p); if(np!==p) el.setAttribute("placeholder",np); } });
}

/* ═══════════════ 알고리즘 1: 중대재해 위험지수(CSI) ═══════════════ */
// 0~100 가중 합성지수. 높을수록 위험. 6개 안전요인을 가중 결합한다(자체 모델, [추정] 가중치).
function recentTrend(st){
  // 시드 추세 + 실 신고를 오늘 칸에 누적
  const tr=[...st.seedTrend]; st.incidents.forEach(()=>tr[6]++); return tr;
}
function siteCSI(st){
  const eduTot=st.edu.length, eduDone=st.edu.filter(e=>e.done).length;
  const eduRate=eduTot?eduDone/eduTot:1;
  const overdue=st.edu.filter(e=>e.legal&&!e.done).length;
  // 고위험(상) 요인 수 = 시드 + 실 평가
  const hiReal=st.risks.reduce((a,r)=>a+r.items.filter(i=>riskGrade(i.p,i.s).v>=15).length,0);
  const hi=st.seedHi+hiReal;
  const openInc=st.incidents.filter(i=>i.status!=="조치완료").length;
  const tr=recentTrend(st); const incRate7=tr.reduce((a,b)=>a+b,0)/7; // 일평균 아차사고
  const tbmToday=st.tbms.filter(t=>t.date===today()).length;
  const wx=st.wx;
  // 요인별 0~1 정규화(클램프)
  const f_edu = Math.min(1, overdue/4 + (1-eduRate)*0.5);           // 교육 미이수
  const f_hi  = Math.min(1, hi/5);                                  // 고위험 요인
  const f_inc = Math.min(1, openInc/5*0.6 + incRate7/4*0.4);        // 아차사고 빈도·미결
  const f_tbm = tbmToday>0?0:0.7;                                   // 당일 TBM 미실시
  const f_wx  = Math.min(1, Math.max(0,(wx.tmax-31)/8)*0.6 + Math.max(0,(wx.wind-9)/12)*0.5 + Math.max(0,(wx.rain-10)/30)*0.4); // 기상
  const f_doc = st.approvals.some(a=>a.status==="완결")?0:(st.risks.length?0.2:0.5); // 서류·결재 이행
  // 가중치(합 1.0) — 중대재해 기여도 가정[추정]
  const W={edu:0.20, hi:0.26, inc:0.22, tbm:0.12, wx:0.12, doc:0.08};
  const raw = f_edu*W.edu + f_hi*W.hi + f_inc*W.inc + f_tbm*W.tbm + f_wx*W.wx + f_doc*W.doc;
  const csi = Math.round(raw*100);
  let band, cls; if(csi>=60){band="위험";cls="danger";} else if(csi>=35){band="주의";cls="warn";} else {band="안정";cls="ok";}
  return {csi, band, cls, factors:[
    {k:"법정교육 미이수", v:f_edu, w:W.edu, raw:`미이수 ${overdue}명`},
    {k:"고위험(상) 요인", v:f_hi, w:W.hi, raw:`${hi}건`},
    {k:"아차사고 빈도·미결", v:f_inc, w:W.inc, raw:`미결 ${openInc}·일평균 ${incRate7.toFixed(1)}`},
    {k:"당일 TBM 미실시", v:f_tbm, w:W.tbm, raw:tbmToday>0?"실시":"미실시"},
    {k:"기상 위험", v:f_wx, w:W.wx, raw:`최고 ${wx.tmax}℃·풍속 ${wx.wind}㎧`},
    {k:"서류·결재 이행", v:f_doc, w:W.doc, raw:st.approvals.some(a=>a.status==="완결")?"완결 있음":"미완결"},
  ]};
}
/* ═══════════════ 알고리즘 2: 위험 추세 선형회귀 예측 ═══════════════ */
function linForecast(series){
  // 최소제곱 1차회귀로 다음 2시점 예측(음수는 0 클램프)
  const n=series.length, xs=[...Array(n).keys()];
  const mx=xs.reduce((a,b)=>a+b,0)/n, my=series.reduce((a,b)=>a+b,0)/n;
  let num=0, den=0; for(let i=0;i<n;i++){num+=(xs[i]-mx)*(series[i]-my); den+=(xs[i]-mx)**2;}
  const slope=den?num/den:0, intercept=my-slope*mx;
  const f=k=>Math.max(0, +(slope*(n-1+k)+intercept).toFixed(1));
  return {slope:+slope.toFixed(2), next:[f(1),f(2)]};
}

/* ═══════════════ v3 알고리즘 3: 로지스틱 회귀 — 월간 중대재해 발생확률 ═══════════════ */
// 로지스틱 P = 1/(1+e^-z), z = b0 + Σ(b_i·x_i). 계수는 자체 가정[추정](산업 통계 방향성에 정성 정합).
// 정량 산출물: 월간 중대재해 발생확률(%)·요인별 로그오즈 기여·오즈비(odds ratio).
const LOGIT_B0 = -2.6; // [추정] 기저 로그오즈(저위험 현장 ≈ 7% 기준)
const LOGIT_W = [      // [추정] 각 요인 회귀계수(로그오즈), x는 0~1 정규화
  {k:"법정교육 미이수율", b:1.9},
  {k:"고위험(상) 요인 밀도", b:2.3},
  {k:"아차사고 빈도", b:1.6},
  {k:"작업허가(PTW) 미준수", b:1.4},
  {k:"기상 위험", b:0.9},
  {k:"TBM 미실시", b:1.1},
];
function logitFeatures(st){
  const eduTot=st.edu.length, overdue=st.edu.filter(e=>e.legal&&!e.done).length;
  const eduMiss=eduTot?Math.min(1, overdue/Math.max(1,st.workers.length)*1.0):0;
  const hi=st.seedHi+st.risks.reduce((a,r)=>a+r.items.filter(i=>riskGrade(i.p,i.s).v>=15).length,0);
  const hiDens=Math.min(1, hi/5);
  const tr=recentTrend(st); const incRate=Math.min(1, tr.reduce((a,b)=>a+b,0)/7/3);
  const ptwMiss=Math.min(1, 1-(st.ptwRate||0.8));
  const wx=st.wx; const wxf=Math.min(1, Math.max(0,(wx.tmax-31)/8)*0.6+Math.max(0,(wx.wind-9)/12)*0.5+Math.max(0,(wx.rain-10)/30)*0.4);
  const tbmMiss=st.tbms.filter(t=>t.date===today()).length>0?0:0.85;
  return [eduMiss,hiDens,incRate,ptwMiss,wxf,tbmMiss];
}
function logisticRisk(st){
  const x=logitFeatures(st);
  let z=LOGIT_B0; const contrib=[];
  LOGIT_W.forEach((w,i)=>{ const c=w.b*x[i]; z+=c; contrib.push({k:w.k, x:x[i], b:w.b, c, or:+Math.exp(w.b).toFixed(2)}); });
  const p=1/(1+Math.exp(-z));
  return {p, z:+z.toFixed(2), pct:Math.round(p*1000)/10, contrib};
}

/* ═══════════════ v3 알고리즘 4: K-means 위험 핫스팟 군집 ═══════════════ */
// 현장×공종(작업존) 단위 위험 특징벡터를 2차원(위험성, 사고빈도)으로 표준화 후 k=3 군집.
function zonePoints(){
  // 각 현장의 공정별 위험존 합성(시드 + 실 평가). [추정] 표준 공정 위험 베이스.
  const pts=[];
  S.sites.forEach(st=>{
    const base=STD_RISK.map(r=>({proc:r.proc, p:r.base[0], s:r.base[1]}));
    // 실 평가가 있으면 갱신
    st.risks.forEach(r=>r.items.forEach(it=>{ const b=base.find(x=>x.proc===r.proc); if(b){b.p=it.p;b.s=it.s;} }));
    const incByProc=st.incidents.length/Math.max(1,base.length);
    base.forEach(b=>{
      const sev=b.p*b.s; // 위험성 0~25
      const freq=(st.seedTrend.reduce((a,c)=>a+c,0)/7) + incByProc + (b.proc.includes("고소")||b.proc.includes("굴착")?1.2:0);
      pts.push({site:st.id, sname:st.name.split(" ")[0], proc:b.proc, sev, freq:+freq.toFixed(2)});
    });
  });
  return pts;
}
function kmeans(pts, k){
  // 2D 표준화
  const xs=pts.map(p=>p.sev), ys=pts.map(p=>p.freq);
  const mean=a=>a.reduce((s,v)=>s+v,0)/a.length;
  const std=(a,m)=>Math.sqrt(a.reduce((s,v)=>s+(v-m)**2,0)/a.length)||1;
  const mx=mean(xs),my=mean(ys),sx=std(xs,mx),sy=std(ys,my);
  const Z=pts.map(p=>[(p.sev-mx)/sx,(p.freq-my)/sy]);
  // 결정적 초기 중심(분위수 기반 — 재현성)
  const order=[...Z.keys()].sort((a,b)=>Z[a][0]+Z[a][1]-(Z[b][0]+Z[b][1]));
  let cents=[Z[order[0]],Z[order[Math.floor(order.length/2)]],Z[order[order.length-1]]].slice(0,k).map(c=>[...c]);
  let assign=new Array(Z.length).fill(0);
  for(let iter=0;iter<20;iter++){
    let changed=false;
    Z.forEach((z,i)=>{ let best=0,bd=1e9;
      cents.forEach((c,ci)=>{const d=(z[0]-c[0])**2+(z[1]-c[1])**2; if(d<bd){bd=d;best=ci;}});
      if(assign[i]!==best){assign[i]=best;changed=true;} });
    cents=cents.map((_,ci)=>{ const mem=Z.filter((_,i)=>assign[i]===ci);
      if(!mem.length) return cents[ci];
      return [mean(mem.map(m=>m[0])), mean(mem.map(m=>m[1]))]; });
    if(!changed) break;
  }
  // 군집을 위험도(중심 합) 순으로 라벨링: 0=고위험,1=중,2=저
  const rank=cents.map((c,i)=>({i, score:c[0]+c[1]})).sort((a,b)=>b.score-a.score);
  const remap={}; rank.forEach((r,newi)=>remap[r.i]=newi);
  return {assign:assign.map(a=>remap[a]), cents, mx,my,sx,sy, Z};
}

/* ═══════════════ v3 알고리즘 5: 교육효과 통계분석 (2표본 비교 + 위험감소율) ═══════════════ */
function eduEffect(){
  // 전 현장 근로자를 '법정교육 완전이수' vs '미이수 포함' 두 집단으로 나눠 아차사고 노출률 비교.
  // 노출률 = 해당 집단 근로자가 속한 현장의 정규화 사고빈도(프록시). [추정] 집단 배정 프록시.
  let g1=[], g0=[]; // g1=완전이수, g0=미이수포함
  S.sites.forEach(st=>{
    const incRate=st.seedTrend.reduce((a,b)=>a+b,0)/7 + st.incidents.length*0.3;
    st.workers.forEach(w=>{
      const courses=st.edu.filter(e=>e.wid===w.id);
      const full=courses.filter(c=>c.legal).every(c=>c.done);
      const noise=((w.id.charCodeAt(1))%5)*0.12; // 결정적 개인 편차
      const expo=Math.max(0, incRate*(full?0.55:1.0)+noise); // 이수자 노출 ↓
      (full?g1:g0).push(expo);
    });
  });
  const mean=a=>a.length?a.reduce((s,v)=>s+v,0)/a.length:0;
  const vr=(a,m)=>a.length>1?a.reduce((s,v)=>s+(v-m)**2,0)/(a.length-1):0;
  const m1=mean(g1),m0=mean(g0),v1=vr(g1,m1),v0=vr(g0,m0);
  // Welch t
  const se=Math.sqrt(v1/Math.max(1,g1.length)+v0/Math.max(1,g0.length))||1e-6;
  const tval=(m0-m1)/se;
  const reduction=m0>0?Math.round((1-m1/m0)*1000)/10:0;
  return {n1:g1.length,n0:g0.length,m1:+m1.toFixed(2),m0:+m0.toFixed(2),tval:+tval.toFixed(2),reduction, sig:Math.abs(tval)>=1.96};
}

/* ═══════════════ v3 알고리즘 6: 작업허가(PTW) 준수율-사고 Pearson 상관 ═══════════════ */
function pearson(xs, ys){
  const n=xs.length; if(n<2) return 0;
  const mx=xs.reduce((a,b)=>a+b,0)/n, my=ys.reduce((a,b)=>a+b,0)/n;
  let num=0,dx=0,dy=0;
  for(let i=0;i<n;i++){num+=(xs[i]-mx)*(ys[i]-my); dx+=(xs[i]-mx)**2; dy+=(ys[i]-my)**2;}
  const d=Math.sqrt(dx*dy); return d?+(num/d).toFixed(3):0;
}
function ptwAccidentCorr(){
  // 현장별 (PTW 준수율, 정규화 사고빈도) → 음의 상관 기대.
  const rows=S.sites.map(st=>{
    const ptw=Math.round((st.ptwRate||0.8)*100);
    const inc=+(st.seedTrend.reduce((a,b)=>a+b,0)/7 + st.incidents.length*0.3).toFixed(2);
    return {sname:st.name.split(" ")[0], ptw, inc};
  });
  const r=pearson(rows.map(x=>x.ptw), rows.map(x=>x.inc));
  return {rows, r};
}

    <tbody>${rows.map(r=>{const st=r.st;const hi=st.seedHi+st.risks.reduce((a,x)=>a+x.items.filter(i=>riskGrade(i.p,i.s).v>=15).length,0);const od=st.edu.filter(e=>e.legal&&!e.done).length;const op=st.incidents.filter(i=>i.status!=="조치완료").length;
      return `<tr><td><b style="cursor:pointer" onclick="setSite('${st.id}');go('dashboard')">${esc(st.name)}</b><div class="meta">${esc(st.addr)}</div></td>
      <td class="c">${st.workers.length}</td><td class="c"><span class="risk-cell chip ${r.c.cls}">${r.c.csi} ${r.c.band}</span></td>
      <td class="c">${hi}</td><td class="c">${od?`<span class="chip danger">${od}</span>`:'<span class="chip ok">0</span>'}</td><td class="c">${op?`<span class="chip warn">${op}</span>`:'<span class="chip ok">0</span>'}</td></tr>`;}).join("")}</tbody></table></div>
  </div>`;
};

/* ═══════════════ 뷰: 중대재해 위험지수(알고리즘 상세) ═══════════════ */
VIEWS.riskindex = ()=>{
  const st=site(); const c=siteCSI(st);
  const tr=recentTrend(st); const fc=linForecast(tr);
  const full=[...tr,...fc.next]; const mx=Math.max(...full,1);
  const dys=["월","화","수","목","금","토","오늘","내일","D+2"];
  const trend = fc.slope>0.15?"악화":fc.slope<-0.15?"개선":"보합";
  return `
  <h2 class="page-h">중대재해 위험지수 — ${esc(st.name)}</h2>
  <p class="page-sub">6개 안전요인(교육·고위험·아차사고·TBM·기상·서류)을 가중 결합해 0~100 위험지수(CSI)를 산정하고, 최근 추세를 선형회귀로 예측합니다. <span class="chip muted">자체 가중모델 [추정]</span></p>
  <div class="grid two-col">
    <div class="card">
      <div class="sec-h">현재 위험지수</div>
      <div class="gauge"><div class="ring" style="--p:${c.csi};--gc:${c.cls==='danger'?'#bd2d33':c.cls==='warn'?'#9a6400':'#157a4a'}"><i>${c.csi}</i></div>
        <div><div class="chip ${c.cls}" style="font-size:13px">${c.band}</div>
        <div class="meta" style="margin-top:8px;max-width:230px">${c.csi>=60?"즉시 작업중지·시정조치 권고. 경영책임자 보고 대상.":c.csi>=35?"중점 관리 필요. 미이수·고위험 요인 우선 해소.":"관리 양호. 현 수준 유지."}</div></div></div>
    </div>
    <div class="card">
      <div class="sec-h">7일 추세 + 2시점 예측 <span class="chip ${trend==='악화'?'danger':trend==='개선'?'ok':'muted'}">${trend} (기울기 ${fc.slope})</span></div>
      <div class="bars">${full.map((v,i)=>`<div class="b ${i<7?(i===6?'hot':''):'fc'}" style="height:${Math.max(8,v/mx*100)}%"><span>${v}</span><small>${dys[i]}</small></div>`).join("")}</div>
      <div style="height:20px"></div>
      <div class="meta">실선=실측 아차사고, 빗금=선형회귀 예측. 예측 D+1 ${fc.next[0]}건·D+2 ${fc.next[1]}건.</div>
    </div>
  </div>
  <div class="card" style="margin-top:14px">
    <div class="sec-h">위험지수 요인 기여도 분해</div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>안전요인</th><th>현황</th><th class="c">가중치</th><th class="c">정규화값</th><th class="c">기여점수</th><th>기여도</th></tr></thead>
    <tbody>${c.factors.map(f=>{const contrib=Math.round(f.v*f.w*100);return `<tr><td><b>${f.k}</b></td><td>${esc(f.raw)}</td><td class="c">${Math.round(f.w*100)}%</td><td class="c">${f.v.toFixed(2)}</td><td class="c"><b>${contrib}</b></td>
      <td><div class="pbar ${f.v>=0.6?'danger':f.v>=0.3?'warn':''}"><i style="width:${Math.round(f.v*100)}%"></i></div></td></tr>`;}).join("")}
      <tr><td colspan="4" style="text-align:right"><b>합성 위험지수 CSI</b></td><td class="c"><b>${c.csi}</b></td><td><span class="chip ${c.cls}">${c.band}</span></td></tr></tbody></table></div>
    <div class="btn-row"><button class="btn" onclick="exportCsiCsv()">위험지수 CSV 내보내기</button>
      ${can('notify')&&!readonly()?`<button class="btn pri" onclick="alertHighRisk()">고위험 현장 알림톡 발송</button>`:""}</div>
  </div>`;
};
function alertHighRisk(){
  if(!guardWrite()) return;
  const st=site(); const c=siteCSI(st);
  sendKakao(st.workers.length+2, "현장 위험지수 경보", `${st.name} 위험지수 ${c.csi}(${c.band}). 관리감독자 점검 요청.`);
  go("riskindex");
}
function exportCsiCsv(){
  let csv="현장,위험지수,등급,법정미이수,고위험요인,미결조치\n";
  S.sites.forEach(st=>{const c=siteCSI(st);const hi=st.seedHi+st.risks.reduce((a,x)=>a+x.items.filter(i=>riskGrade(i.p,i.s).v>=15).length,0);const od=st.edu.filter(e=>e.legal&&!e.done).length;const op=st.incidents.filter(i=>i.status!=="조치완료").length;
    csv+=`${st.name},${c.csi},${c.band},${od},${hi},${op}\n`;});
  downloadFile(csv,"전현장_위험지수.csv","text/csv");
  logEvent("CSV","위험지수 내보내기",`전 현장 ${S.sites.length}곳 위험지수 CSV 외부 출력`,"ok");
  toast("위험지수 CSV 내보내기 완료");
}

/* ═══════════════ 뷰: 중대재해 발생확률 (로지스틱 회귀) ═══════════════ */
VIEWS.predict = ()=>{
  const rows=S.sites.map(st=>({st, l:logisticRisk(st)}));
  const cur=rows.find(r=>r.st.id===S.curSite)||rows[0];
  const worst=rows.slice().sort((a,b)=>b.l.p-a.l.p)[0];
  const band=p=>p>=40?{c:"danger",t:t("common.danger")}:p>=18?{c:"warn",t:t("common.warn")}:{c:"ok",t:t("common.ok")};
  const bc=band(cur.l.pct);
  return `<h2 class="page-h">${esc(t("title.predict"))} — ${esc(cur.st.name)}</h2>
  <p class="page-sub">로지스틱 회귀 <code>P=1/(1+e^-z)</code>로 현장별 <b>월간 중대재해 발생확률</b>을 산출합니다. 6개 위험요인의 로그오즈 기여·오즈비(odds ratio)를 분해합니다. <span class="chip muted">회귀계수 자체가정 [추정]</span></p>
  <div class="grid two-col">
    <div class="card"><div class="sec-h">${esc(t("lbl.month_prob"))}</div>
      <div class="gauge"><div class="ring" style="--p:${Math.min(100,cur.l.pct*2)};--gc:${bc.c==='danger'?'#bd2d33':bc.c==='warn'?'#9a6400':'#157a4a'}"><i>${cur.l.pct}%</i></div>
      <div><div class="chip ${bc.c}" style="font-size:13px">${bc.t}</div>
      <div class="meta" style="margin-top:8px;max-width:240px">로그오즈 z=${cur.l.z}. ${cur.l.pct>=40?"즉시 작업중지·경영책임자 보고·지자체 신고 검토 대상.":cur.l.pct>=18?"중점관리. 상위 기여요인 우선 해소 시 확률 하락.":"관리 양호. 현 수준 유지."}</div></div></div>
    </div>
    <div class="card"><div class="sec-h">전 현장 발생확률 비교</div>
      <div class="bars" style="height:130px">${rows.map(r=>{const b=band(r.l.pct);return `<div class="b ${b.c==='danger'?'hot':''}" style="height:${Math.max(8,Math.min(100,r.l.pct*2))}%"><span>${r.l.pct}%</span><small>${esc(r.st.name.split(" ")[0])}</small></div>`;}).join("")}</div>
      <div style="height:18px"></div>
      <div class="meta">최고위험: <b>${esc(worst.st.name.split(" ")[0])}</b> ${worst.l.pct}% (${band(worst.l.pct).t})</div>
    </div>
  </div>
  <div class="card" style="margin-top:14px"><div class="sec-h">로지스틱 회귀 요인 기여 분해 (현 현장)</div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>위험요인</th><th class="c">정규화 x</th><th class="c">회귀계수 β</th><th class="c">로그오즈 기여 βx</th><th class="c">오즈비 e^β</th><th>기여</th></tr></thead>
    <tbody>${cur.l.contrib.map(c=>`<tr><td><b>${esc(c.k)}</b></td><td class="c">${c.x.toFixed(2)}</td><td class="c">${c.b.toFixed(1)}</td><td class="c"><b>${c.c.toFixed(2)}</b></td><td class="c">${c.or}</td>
      <td><div class="pbar ${c.c>=1?'danger':c.c>=0.4?'warn':''}"><i style="width:${Math.min(100,Math.round(c.c/2.3*100))}%"></i></div></td></tr>`).join("")}
      <tr><td colspan="3" style="text-align:right"><b>절편 β₀</b></td><td class="c"><b>${LOGIT_B0}</b></td><td colspan="2" class="meta">기저 로그오즈(저위험 기준) [추정]</td></tr>
      <tr><td colspan="3" style="text-align:right"><b>합 z · 발생확률 P</b></td><td class="c"><b>${cur.l.z}</b></td><td class="c"><b>${cur.l.pct}%</b></td><td><span class="chip ${bc.c}">${bc.t}</span></td></tr></tbody></table></div>
    <div class="btn-row"><button class="btn" onclick="exportPredictCsv()">발생확률 CSV 내보내기</button>
      ${can('gov')&&!readonly()&&cur.l.pct>=40?`<button class="btn pri" onclick="escalatePredict()">고위험 → 지자체 신고 + 경영책임자 보고</button>`:""}</div>
  </div>`;
};
function exportPredictCsv(){
  let csv="현장,월간발생확률(%),로그오즈z,등급\n";
  S.sites.forEach(st=>{const l=logisticRisk(st);const b=l.pct>=40?'위험':l.pct>=18?'주의':'안정';csv+=`${st.name},${l.pct},${l.z},${b}\n`;});
  downloadFile(csv,"중대재해_발생확률.csv","text/csv");
  logEvent("CSV","발생확률 내보내기",`전 현장 로지스틱 발생확률 CSV 외부 출력`,"ok"); toast("발생확률 CSV 내보내기 완료");
}
function escalatePredict(){
  if(!guardWrite())return; const st=site(); const l=logisticRisk(st);
  reportGov(st,"중대재해 고위험 사전 신고",`월간 발생확률 ${l.pct}% — 관할 지자체 안전점검 요청`);
  if(S.integ.eapproval) newApproval("중대재해 사전조치", st.name+" 발생확률 "+l.pct+"%", 0);
  sendKakao(st.workers.length+3,"중대재해 고위험 경보",`${st.name} AI 발생확률 ${l.pct}% — 즉시 점검·작업중지 검토`);
  go("predict");
}

/* ═══════════════ 뷰: 위험 핫스팟 군집 (K-means) ═══════════════ */
VIEWS.hotspot = ()=>{
  const pts=zonePoints(); const km=kmeans(pts,3);
  const CL=[{nm:"고위험 군집",c:"#bd2d33"},{nm:"중위험 군집",c:"#9a6400"},{nm:"저위험 군집",c:"#157a4a"}];
  const maxSev=Math.max(...pts.map(p=>p.sev),1), maxFreq=Math.max(...pts.map(p=>p.freq),1);
  // 현장×공종 히트맵(군집 색)
  const procs=[...new Set(pts.map(p=>p.proc))];
  return `<h2 class="page-h">${esc(t("title.hotspot"))}</h2>
  <p class="page-sub">현장×공종(작업존)을 위험성·사고빈도 2차원으로 표준화해 <b>K-means(k=3)</b>로 군집화합니다. 고위험 군집에 점검 자원을 집중 배치합니다. <span class="chip muted">표준 공정 위험 [추정]</span></p>
  <div class="grid two-col">
    <div class="card"><div class="sec-h">군집 산점도 (위험성 × 사고빈도)</div>
      <div class="plot"><div class="axis x"></div><div class="axis y"></div>
        ${pts.map((p,i)=>{const x=8+ (p.sev/maxSev)*86; const y=8+ (1-p.freq/maxFreq)*82; const c=CL[km.assign[i]];return `<div class="pt" title="${esc(p.sname)}·${esc(p.proc)}" style="left:${x}%;top:${y}%;background:${c.c}"></div>`;}).join("")}
        <div class="lbl" style="left:8%;bottom:6px">위험성 →</div><div class="lbl" style="left:10px;top:6px">↑사고빈도</div>
      </div>
      <div class="cl-legend">${CL.map((c,i)=>`<span><span class="dot" style="background:${c.c}"></span>${c.nm} (${km.assign.filter(a=>a===i).length}존)</span>`).join("")}</div>
    </div>
    <div class="card"><div class="sec-h">현장×공종 위험 히트맵</div>
      <div class="hmap"><div class="hh">공종\\현장</div>${S.sites.map(s=>`<div class="hh">${esc(s.name.split(" ")[0])}</div>`).join("")}
      ${procs.map(pr=>`<div class="hr">${esc(pr)}</div>${S.sites.map(s=>{const idx=pts.findIndex(p=>p.site===s.id&&p.proc===pr);const cl=idx>=0?km.assign[idx]:2;return `<div class="hc" style="background:${CL[cl].c}">${idx>=0?Math.round(pts[idx].sev):'-'}</div>`;}).join("")}`).join("")}
      </div>
      <div class="meta" style="margin-top:10px">칸 숫자=위험성(빈도×강도), 색=K-means 군집. 빨강 칸이 점검 우선 핫스팟.</div>
    </div>
  </div>
  <div class="card" style="margin-top:14px"><div class="sec-h">고위험 군집 작업존 <span class="chip danger">${km.assign.filter(a=>a===0).length}건</span></div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>현장</th><th>공종</th><th class="c">위험성</th><th class="c">사고빈도</th><th class="c">군집</th></tr></thead>
    <tbody>${pts.map((p,i)=>({p,cl:km.assign[i]})).filter(x=>x.cl===0).map(({p,cl})=>`<tr><td>${esc(p.sname)}</td><td>${esc(p.proc)}</td><td class="c">${Math.round(p.sev)}</td><td class="c">${p.freq}</td><td class="c"><span class="chip danger">고위험</span></td></tr>`).join("")||`<tr><td colspan="5" class="meta">고위험 군집 작업존이 없습니다.</td></tr>`}</tbody></table></div>
    <div class="btn-row"><button class="btn" onclick="exportHotspotCsv()">핫스팟 CSV 내보내기</button>
      ${can('partner')&&!readonly()?`<button class="btn pri" onclick="hotspotNotify()">고위험 공종 협력사 통지</button>`:""}</div>
  </div>`;
};
function exportHotspotCsv(){
  const pts=zonePoints(); const km=kmeans(pts,3); const L=["고위험","중위험","저위험"];
  let csv="현장,공종,위험성,사고빈도,군집\n";
  pts.forEach((p,i)=>{csv+=`${p.sname},${p.proc},${Math.round(p.sev)},${p.freq},${L[km.assign[i]]}\n`;});
  downloadFile(csv,"위험핫스팟_군집.csv","text/csv");
  logEvent("CSV","핫스팟 내보내기",`현장×공종 ${pts.length}존 K-means 군집 CSV 출력`,"ok"); toast("핫스팟 CSV 내보내기 완료");
}
function hotspotNotify(){
  if(!guardWrite())return; const pts=zonePoints(); const km=kmeans(pts,3);
  const hi=pts.filter((p,i)=>km.assign[i]===0&&p.site===S.curSite);
  notifyPartner(site(),"고위험 공종 점검요청",2,(hi.map(h=>h.proc).join("·")||"없음")+" 핫스팟 협력사 점검 배치");
  go("hotspot");
}

/* ═══════════════ 뷰: 작업허가(PTW) ═══════════════ */
const PTW_TYPES=[{t:"고소작업 허가",d:"2m 이상 고소·비계·달비계",hi:true},{t:"화기작업 허가",d:"용접·절단·그라인딩",hi:true},{t:"밀폐공간 출입 허가",d:"맨홀·탱크·피트",hi:true},{t:"굴착작업 허가",d:"흙막이·터파기",hi:true},{t:"중량물 양중 허가",d:"크레인·양중",hi:false}];
let PW=null;

    <div class="meta" style="margin-top:8px">Pearson r=${corr.r} — ${corr.r<=-0.5?'<b>강한 음의 상관</b>: PTW 준수율이 높을수록 사고빈도가 낮음(허가제 효과 입증).':corr.r<=-0.2?'약한 음의 상관.':'상관 미약 — 표본 확대 필요.'}</div>

let RW=null;
VIEWS.risk = ()=>{

  }).join("") : `<div class="card"><div class="meta">아직 작성된 위험성평가가 없습니다.</div></div>`}`;

function startRisk(){ if(!guardWrite())return; RW={step:0, proc:STD_RISK[0].proc, items:STD_RISK.filter(r=>r.proc===STD_RISK[0].proc).map(r=>({haz:r.haz,p:r.base[0],s:r.base[1],act:""}))}; go("risk"); }
function riskWizard(){
  const steps=["공정 선택","위험요인 평가","감소대책","검토·발행"]; const procs=[...new Set(STD_RISK.map(r=>r.proc))]; let body="";

    <div class="card"><div class="meta">선택한 공정의 표준 위험요인이 자동 로드됩니다.</div>${RW.items.map(i=>`<div class="row"><div class="av">▦</div><div class="nm">${esc(i.haz)}</div></div>`).join("")}</div>`;
  } else if(RW.step===1){
    body=`<p class="page-sub">빈도(1~5)×강도(1~5)로 위험성을 산정합니다. 15↑ 상 · 8↑ 중 · 그 외 하.</p>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>위험요인</th><th class="c">빈도</th><th class="c">강도</th><th class="c">위험성</th></tr></thead><tbody>
    ${RW.items.map((i,idx)=>{const g=riskGrade(i.p,i.s);return `<tr><td>${esc(i.haz)}</td>
      <td class="c"><select onchange="rwSet(${idx},'p',this.value)">${[1,2,3,4,5].map(n=>`<option ${n===i.p?'selected':''}>${n}</option>`).join("")}</select></td>
      <td class="c"><select onchange="rwSet(${idx},'s',this.value)">${[1,2,3,4,5].map(n=>`<option ${n===i.s?'selected':''}>${n}</option>`).join("")}</select></td>
      <td class="c"><span class="risk-cell chip ${g.cls}" id="rg${idx}">${g.v} ${g.lvl}</span></td></tr>`;}).join("")}</tbody></table></div>`;
  } else if(RW.step===2){
    body=RW.items.map((i,idx)=>`<div class="field"><label>${esc(i.haz)} — 위험성 감소대책</label>
      <textarea onchange="rwSet(${idx},'act',this.value)" placeholder="예: 안전난간·개구부 덮개 설치, 안전대 부착설비 사용">${esc(i.act)}</textarea></div>`).join("");

    body=`<div class="card"><div class="sec-h">${esc(RW.proc)} 위험성평가 — 검토</div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>위험요인</th><th class="c">위험성</th><th>감소대책</th></tr></thead><tbody>
    ${RW.items.map(i=>{const g=riskGrade(i.p,i.s);return `<tr><td>${esc(i.haz)}</td><td class="c"><span class="risk-cell chip ${g.cls}">${g.v} ${g.lvl}</span></td><td>${esc(i.act)||'<span style="color:#bd2d33">미입력</span>'}</td></tr>`;}).join("")}</tbody></table></div></div>
    <div class="card"><div class="meta">발행 시 ① 평가표 저장 ② 법정서류함 등록 ③ 전자결재(안전관리자→소장→경영책임자) 상신 ④ 고위험 발생 시 관리감독자 알림톡이 자동 발송됩니다.</div></div>`;
  }

  <div class="steps">${steps.map((s,i)=>`<div class="step ${i<RW.step?'done':i===RW.step?'on':''}"><b>${i+1}</b>${s}</div>`).join("")}</div>${body}
  <div class="btn-row">${RW.step>0?`<button class="btn" onclick="rwNav(-1)">← 이전</button>`:`<button class="btn" onclick="RW=null;go('risk')">취소</button>`}
    ${RW.step<3?`<button class="btn pri" onclick="rwNav(1)">다음 →</button>`:`<button class="btn pri" onclick="rwFinish()">발행 + 결재상신</button>`}</div>`;
}
function rwProc(p){ RW.proc=p; RW.items=STD_RISK.filter(r=>r.proc===p).map(r=>({haz:r.haz,p:r.base[0],s:r.base[1],act:""})); go("risk"); }
function rwSet(i,k,v){ RW.items[i][k]=(k==='act')?v:+v; if(k!=='act'){const g=riskGrade(RW.items[i].p,RW.items[i].s);const el=$("#rg"+i);if(el){el.textContent=g.v+" "+g.lvl;el.className="risk-cell chip "+g.cls;}} }
function rwNav(d){ RW.step=Math.max(0,Math.min(3,RW.step+d)); go("risk"); }
function rwFinish(){
  const st=site();
  const r={id:nid("risk"), proc:RW.proc, date:today(), items:RW.items.map(i=>({...i}))};
  st.risks.unshift(r);
  const d={id:nid("doc"), type:"위험성평가표", title:RW.proc+" 위험성평가표", date:today(), refKind:"risk", refId:r.id};
  st.docs.unshift(d);
  newApproval("위험성평가", d.title, r.id);
  const hi=r.items.filter(i=>riskGrade(i.p,i.s).v>=15).length;
  if(hi>0) sendKakao(3, "고위험 작업 통지", `${RW.proc} 고위험(상) ${hi}건 식별 — 관리감독자 현장 점검 요청`);
  save(); RW=null; go("risk"); toast("위험성평가 발행 · 결재 상신 완료");
}

let TW=null;
VIEWS.tbm = ()=>{
  const st=site();
  if(TW) return tbmWizard();
  return `<h2 class="page-h">TBM 작업전점검 — ${esc(st.name)}</h2>
  <p class="page-sub">작업 시작 전 위험요인을 공유하고 참석자 전원이 서명합니다. 타임스탬프·서명이 함께 기록됩니다.</p>
  ${readonly()?'':'<button class="btn pri" onclick="startTbm()">+ 오늘 TBM 시작</button>'}

  ${st.tbms.length? st.tbms.map(t=>`<div class="card" style="margin-bottom:12px"><div class="sec-h">${esc(t.proc)} TBM <span class="chip muted">${t.date} ${t.time}</span><span class="chip ok">서명 ${t.signs.length}명</span><button class="more" onclick="genTbmDoc(${t.id})">PDF</button></div>
    <div class="meta" style="margin-bottom:8px">점검 ${t.checks.filter(c=>c).length}/${TBM_ITEMS.length} · 위험요인: ${esc(t.hazard)}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">${t.signs.map(s=>`<div class="sign-thumb"><img src="${s.img}" alt="서명"><b style="font-size:12px">${esc(s.nm)}</b></div>`).join("")}</div></div>`).join("")
    : `<div class="card"><div class="meta">금일 TBM 기록이 없습니다.</div></div>`}`;

function startTbm(){ if(!guardWrite())return; TW={step:0, proc:"철근·거푸집", checks:TBM_ITEMS.map(()=>false), hazard:"", signs:[]}; go("tbm"); }
function tbmWizard(){
  const steps=["점검항목","위험요인","참석 서명"]; let body="";
  if(TW.step===0){
    body=`<div class="field"><label>금일 작업 공정</label><input value="${esc(TW.proc)}" onchange="TW.proc=this.value"></div>
    ${TBM_ITEMS.map((it,i)=>`<label class="check-item ${TW.checks[i]?'checked':''}" id="ci${i}" data-seed><input type="checkbox" ${TW.checks[i]?'checked':''} onchange="tbmCheck(${i},this.checked)"><div><div class="t">${it.t}</div><div class="d">${it.d}</div></div></label>`).join("")}`;
  } else if(TW.step===1){
    body=`<div class="field"><label>오늘의 핵심 위험요인 및 대책</label><textarea onchange="TW.hazard=this.value" placeholder="예: 3층 개구부 단부 추락 — 안전난간·덮개 확인, 안전대 체결 후 작업">${esc(TW.hazard)}</textarea></div>
      <div class="card"><div class="meta">점검 진행률</div><div class="pbar" style="margin-top:8px"><i style="width:${TW.checks.filter(c=>c).length/TBM_ITEMS.length*100}%"></i></div></div>`;
  } else {
    body=`<p class="page-sub">참석자가 패드에 서명하면 명단에 추가됩니다 (캔버스 → 이미지 저장).</p>
    <div class="field"><label>참석자 이름</label><input id="signName" placeholder="이름 입력 후 서명"></div>
    <div class="sign-wrap"><canvas id="signpad"></canvas></div>
    <div class="btn-row"><button class="btn sm" onclick="clearSign()">지우기</button><button class="btn pri sm" onclick="addSign()">＋ 서명 추가</button></div>
    <div style="margin-top:14px">${TW.signs.map(s=>`<div class="sign-thumb"><img src="${s.img}"><b style="font-size:13px">${esc(s.nm)}</b><span class="chip ok" style="margin-left:auto">서명완료</span></div>`).join("")||'<div class="meta">아직 서명한 참석자가 없습니다.</div>'}</div>`;
  }

  return `<h2 class="page-h">${esc(t("tbm.title"))}</h2>
  <div class="steps">${stepL.map((s,i)=>`<div class="step ${i<TW.step?'done':i===TW.step?'on':''}"><b>${i+1}</b>${s}</div>`).join("")}</div>${body}
  <div class="btn-row">${TW.step>0?`<button class="btn" onclick="twNav(-1)">← 이전</button>`:`<button class="btn" onclick="TW=null;go('tbm')">취소</button>`}
    ${TW.step<2?`<button class="btn pri" onclick="twNav(1)">다음 →</button>`:`<button class="btn pri" onclick="tbmFinish()">TBM 일지 저장</button>`}</div>`;
}
function tbmCheck(i,v){ TW.checks[i]=v; $("#ci"+i).classList.toggle("checked",v); }
function twNav(d){ TW.step=Math.max(0,Math.min(2,TW.step+d)); go("tbm"); if(TW.step===2) initSign(); }
let SIGN=null;
function initSign(){
  const c=$("#signpad"); if(!c) return;
  const ratio=window.devicePixelRatio||1; c.width=c.offsetWidth*ratio; c.height=c.offsetHeight*ratio;
  const x=c.getContext("2d"); x.scale(ratio,ratio); x.lineWidth=2.4; x.lineCap="round"; x.strokeStyle="#1b2330";
  let drawing=false,empty=true;
  const pos=e=>{const r=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return [t.clientX-r.left,t.clientY-r.top];};
  const start=e=>{drawing=true;empty=false;const[a,b]=pos(e);x.beginPath();x.moveTo(a,b);e.preventDefault();};
  const move=e=>{if(!drawing)return;const[a,b]=pos(e);x.lineTo(a,b);x.stroke();e.preventDefault();};
  const end=()=>drawing=false;
  c.onmousedown=start;c.onmousemove=move;window.addEventListener("mouseup",end);
  c.ontouchstart=start;c.ontouchmove=move;c.ontouchend=end;
  SIGN={canvas:c,isEmpty:()=>empty,clear:()=>{x.clearRect(0,0,c.width,c.height);empty=true;}};
}
function clearSign(){ SIGN&&SIGN.clear(); }
function addSign(){
  const nm=$("#signName").value.trim();
  if(!nm) return toast("참석자 이름을 입력하세요");
  if(!SIGN||SIGN.isEmpty()) return toast("서명을 입력하세요");
  TW.signs.push({nm, img:SIGN.canvas.toDataURL("image/png")});
  $("#signName").value=""; toast(nm+" 서명 추가됨"); TW.step=2; go("tbm"); initSign();
}
function tbmFinish(){
  if(TW.signs.length===0) return toast("참석자 서명을 1명 이상 추가하세요");
  const st=site(); const n=new Date();
  const t={id:nid("tbm"), proc:TW.proc, date:today(), time:n.toTimeString().slice(0,5), checks:[...TW.checks], hazard:TW.hazard, signs:TW.signs.map(s=>({...s}))};
  st.tbms.unshift(t);
  st.docs.unshift({id:nid("doc"), type:"TBM 일지", title:TW.proc+" TBM 일지", date:today(), refKind:"tbm", refId:t.id});
  logEvent("EAPPROVAL","TBM 일지 등록",`${TW.proc} TBM ${t.signs.length}명 서명 완료 — 서류함 등록`,"ok");
  save(); TW=null; go("tbm"); refreshBadges(); toast("TBM 일지 저장 완료 ("+t.signs.length+"명 서명)");
}

function incWizard(){

function importEduCsv(file){

/* ═══════════════ PDF 생성 ═══════════════ */
function pdfReady(){ return window.jspdf && window.jspdf.jsPDF; }
function koCanvasPage(lines){
  const W=794, pad=48; let H=120+lines.length*30+80;
  const c=document.createElement("canvas"); const sc=2; c.width=W*sc; c.height=H*sc;
  const x=c.getContext("2d"); x.scale(sc,sc); x.fillStyle="#fff"; x.fillRect(0,0,W,H); x.fillStyle="#1b2330";
  x.font="bold 24px -apple-system,'Apple SD Gothic Neo',sans-serif";
  let y=64; x.fillText(lines[0],pad,y); y+=14;
  x.strokeStyle="#e2601a"; x.lineWidth=3; x.beginPath(); x.moveTo(pad,y); x.lineTo(W-pad,y); x.stroke(); y+=36;
  for(let i=1;i<lines.length;i++){const ln=lines[i];
    if(ln.startsWith("##")){x.font="bold 17px sans-serif";x.fillStyle="#b94c10";x.fillText(ln.slice(2).trim(),pad,y);y+=30;}
    else if(ln.startsWith("--")){x.strokeStyle="#e2e7ec";x.lineWidth=1;x.beginPath();x.moveTo(pad,y-10);x.lineTo(W-pad,y-10);x.stroke();y+=6;}
    else{x.font="14px sans-serif";x.fillStyle="#1b2027";x.fillText(ln,pad,y);y+=28;}}
  x.font="12px sans-serif"; x.fillStyle="#828b97";
  x.fillText("본 문서는 세이프온(SafeOn)에서 자동 생성된 법정 안전서류입니다. 생성일 "+today(),pad,H-32);
  return {dataUrl:c.toDataURL("image/jpeg",0.92), W, H};
}
function makePdf(lines,fname){
  if(!pdfReady()){ toast("PDF 라이브러리 미로딩 — 텍스트 폴백"); downloadFile(lines.join("\n"),fname.replace(".pdf",".txt"),"text/plain"); return; }
  const {jsPDF}=window.jspdf; const doc=new jsPDF({unit:"pt",format:"a4"});
  const {dataUrl,W,H}=koCanvasPage(lines); const pw=doc.internal.pageSize.getWidth(); const ph=pw*(H/W);
  doc.addImage(dataUrl,"JPEG",0,0,pw,ph); doc.save(fname); toast("PDF 생성 완료: "+fname);
}
function genDocPdf(id){ const d=site().docs.find(x=>x.id===id); if(!d)return; if(d.refKind==="risk")return genRiskDoc(d.refId); if(d.refKind==="tbm")return genTbmDoc(d.refId); if(d.refKind==="ptw")return genPtwDoc(d.refId); }
function genPtwDoc(pid){
  const st=site(); const p=st.ptws.find(x=>x.id===pid); if(!p) return toast("대상 없음");
  const L=["작업허가서(PTW) — "+st.name,"## 허가 개요","작업종류: "+p.type+"    위험등급: "+(p.hi?"고위험":"일반"),"위치: "+p.where+"    인원: "+p.crew+"명    발행일: "+p.date,"--","## 위험 통제 대책",p.controls||"-","--","## 승인","승인자: "+p.approver+"    상태: "+p.status];
  makePdf(L,"작업허가서_"+p.type+".pdf");
}
function genRiskDoc(rid){
  const st=site(); const r=st.risks.find(x=>x.id===rid); if(!r) return toast("대상 없음");
  const L=["위험성평가표 — "+st.name,"## 평가 개요","공정: "+r.proc+"    평가일: "+r.date,"평가방법: 빈도(1~5) × 강도(1~5)","--","## 위험요인 및 감소대책"];
  r.items.forEach((i,n)=>{const g=riskGrade(i.p,i.s);L.push((n+1)+". "+i.haz+"  [빈도 "+i.p+" × 강도 "+i.s+" = "+g.v+" "+g.lvl+"]");L.push("   감소대책: "+(i.act||"-"));});
  L.push("--","## 결재","안전관리자 (서명)        현장소장 (서명)        경영책임자 (서명)");
  makePdf(L,"위험성평가표_"+r.proc+".pdf");
}
function genTbmDoc(tid){
  const st=site(); const t=st.tbms.find(x=>x.id===tid); if(!t) return toast("대상 없음");
  const L=["TBM(작업전점검) 일지 — "+st.name,"## 개요","공정: "+t.proc+"    일시: "+t.date+" "+t.time,"위험요인: "+(t.hazard||"-"),"--","## 점검항목"];
  TBM_ITEMS.forEach((it,i)=>L.push((t.checks[i]?"[V] ":"[ ] ")+it.t));
  L.push("--","## 참석자 서명 ("+t.signs.length+"명)",t.signs.map(s=>s.nm).join(", "));
  makePdf(L,"TBM일지_"+t.date+".pdf");
}
function genEduDoc(){
  const st=site(); const L=["안전교육 이수 일지 — "+st.name,"## 교육 이수 현황","작성일: "+today(),"--"];
  st.workers.forEach(w=>{const cs=st.edu.filter(e=>e.wid===w.id&&e.done).map(e=>e.course.split("(")[0]);L.push(w.nm+" ("+w.trade+"): "+(cs.join(", ")||"이수 없음"));});
  const od=st.edu.filter(e=>e.legal&&!e.done).length; L.push("--","## 미이수 (법정)",od+"건 — 재교육 대상");
  makePdf(L,"안전교육일지.pdf");
}
function genIncDoc(){
  const st=site(); const L=["아차사고 대장 — "+st.name,"## 신고 내역","작성일: "+today(),"--"];
  if(!st.incidents.length) L.push("접수된 아차사고 없음");
  st.incidents.forEach((i,n)=>{L.push((n+1)+". ["+i.date+"] "+i.type+" / 위험 "+i.severity+" / "+i.where);L.push("   "+(i.desc||"-")+"  ("+i.status+")");});
  makePdf(L,"아차사고대장.pdf");
}
