<script>
/* =========================================================================
   임대지기 v2 — 포트폴리오 임대관리 SaaS (단일 HTML, 오프라인 구동)
   v1(뷰5) 위에 추가:
   - 다중 역할(임대인/관리소장/임차인) + 권한 분기 + 역할 스위처
   - 다중 건물(포트폴리오) + 건물 필터
   - 실 알고리즘: 연체 위험 스코어링 / 수익률 분석(Cap rate·NOI·ROI) / 적정 임대료 추정(시세 회귀 보정)
   - 외부 통합: 카카오 알림톡 mock 발송 로그 / CSV 입출력 / 전자계약 서명 흐름 mock
   ========================================================================= */
const KRW = n => (Math.round(n)||0).toLocaleString('ko-KR') + '원';
const KRWk = n => { n=Math.round(n); return n>=100000000? (n/100000000).toFixed(n%100000000?1:0)+'억' : n>=10000? Math.round(n/10000).toLocaleString()+'만원' : (n||0).toLocaleString()+'원'; };
const PCT = n => (Math.round(n*10)/10)+'%';
const uid = () => Math.random().toString(36).slice(2,9);
const todayISO = () => '2026-06-16';
const TODAY = new Date('2026-06-16');
const fmtDate = s => s? s.replaceAll('-','.').slice(2) : '-';
const MONTH = '2026-06';
const monthLabel = m => { const [y,mm]=m.split('-'); return `${y}년 ${+mm}월`; };
const daysBetween = (a,b) => Math.round((new Date(a)-new Date(b))/86400000);

/* ---------- 저장소 ---------- */
const DB = {
  key:'rental-jigi-v2',
  load(){ try{ return JSON.parse(localStorage.getItem(this.key)) }catch(e){ return null } },
  save(s){ localStorage.setItem(this.key, JSON.stringify(s)); },
};

/* ---------- 시드 데이터 (다중 건물·포트폴리오) ---------- */
function seed(){
  const buildings = [
    { id:'b1', name:'행복빌라', addr:'대구 남구 대명동', purchase:480000000, loan:200000000, mgmtFee:1200000 }, // 매입가/대출/연 관리비
    { id:'b2', name:'대명원룸', addr:'대구 남구 봉덕동', purchase:620000000, loan:300000000, mgmtFee:1800000 },
  ];
  const units = [
    { id:'u1', b:'b1', name:'201호', type:'월세', deposit:10000000, rent:550000, mgmt:70000, area:18, market:560000 },
    { id:'u2', b:'b1', name:'202호', type:'월세', deposit:5000000,  rent:480000, mgmt:60000, area:16, market:520000 },
    { id:'u3', b:'b1', name:'301호', type:'월세', deposit:20000000, rent:650000, mgmt:80000, area:24, market:640000 },
    { id:'u4', b:'b2', name:'B102',  type:'월세', deposit:3000000,  rent:420000, mgmt:50000, area:14, market:470000 },
    { id:'u5', b:'b2', name:'B103',  type:'전세', deposit:90000000, rent:0,      mgmt:50000, area:15, market:0 },
    { id:'u6', b:'b2', name:'B104',  type:'공실', deposit:0,        rent:430000, mgmt:50000, area:14, market:470000 },
    { id:'u7', b:'b2', name:'B201',  type:'월세', deposit:5000000,  rent:450000, mgmt:50000, area:15, market:470000 },
  ];
  const tenants = [
    { id:'t1', unit:'u1', name:'김민준', phone:'010-1234-5678', start:'2025-03-01', months:24, payday:5 },
    { id:'t2', unit:'u2', name:'이서연', phone:'010-2222-3333', start:'2024-11-15', months:24, payday:15 },
    { id:'t3', unit:'u3', name:'박도윤', phone:'010-4444-5555', start:'2025-07-10', months:12, payday:10 },
    { id:'t4', unit:'u4', name:'최지우', phone:'010-6666-7777', start:'2025-01-20', months:24, payday:25 },
    { id:'t5', unit:'u5', name:'정하준', phone:'010-8888-9999', start:'2024-09-01', months:24, payday:1 },
    { id:'t7', unit:'u7', name:'한소율', phone:'010-3030-4040', start:'2025-10-01', months:24, payday:20 },
  ];
  // 6월 청구·수납
  const charges = [
    { id:'c1', unit:'u1', tenant:'t1', month:MONTH, rent:550000, mgmt:70000, due:'2026-06-05', paid:true,  paidAt:'2026-06-04' },
    { id:'c2', unit:'u2', tenant:'t2', month:MONTH, rent:480000, mgmt:60000, due:'2026-06-15', paid:false, paidAt:null },
    { id:'c3', unit:'u3', tenant:'t3', month:MONTH, rent:650000, mgmt:80000, due:'2026-06-10', paid:true,  paidAt:'2026-06-09' },
    { id:'c4', unit:'u4', tenant:'t4', month:MONTH, rent:420000, mgmt:50000, due:'2026-06-25', paid:false, paidAt:null },
    { id:'c5', unit:'u5', tenant:'t5', month:MONTH, rent:0,      mgmt:50000, due:'2026-06-01', paid:true,  paidAt:'2026-06-01' },
    { id:'c7', unit:'u7', tenant:'t7', month:MONTH, rent:450000, mgmt:50000, due:'2026-06-20', paid:false, paidAt:null },
  ];
  // 임차인별 과거 6개월 납부 이력(연체 스코어링 입력) — delayDays>0 면 지연일수
  const payHist = {
    t1:[{m:'2026-05',delay:0},{m:'2026-04',delay:0},{m:'2026-03',delay:1},{m:'2026-02',delay:0},{m:'2026-01',delay:0},{m:'2025-12',delay:0}],
    t2:[{m:'2026-05',delay:8},{m:'2026-04',delay:12},{m:'2026-03',delay:5},{m:'2026-02',delay:15},{m:'2026-01',delay:7},{m:'2025-12',delay:9}],
    t3:[{m:'2026-05',delay:0},{m:'2026-04',delay:2},{m:'2026-03',delay:0},{m:'2026-02',delay:0},{m:'2026-01',delay:3},{m:'2025-12',delay:0}],
    t4:[{m:'2026-05',delay:3},{m:'2026-04',delay:6},{m:'2026-03',delay:4},{m:'2026-02',delay:2},{m:'2026-01',delay:5},{m:'2025-12',delay:3}],
    t5:[{m:'2026-05',delay:0},{m:'2026-04',delay:0},{m:'2026-03',delay:0},{m:'2026-02',delay:0},{m:'2026-01',delay:0},{m:'2025-12',delay:0}],
    t7:[{m:'2026-05',delay:18},{m:'2026-04',delay:22},{m:'2026-03',delay:10},{m:'2026-02',delay:14},{m:'2026-01',delay:20},{m:'2025-12',delay:11}],
  };
  const history = [
    { month:'2026-01', collected:2700000 },{ month:'2026-02', collected:2820000 },
    { month:'2026-03', collected:2750000 },{ month:'2026-04', collected:2880000 },
    { month:'2026-05', collected:2810000 },
  ];
  const repairs = [
    { id:'r1', b:'b1', unit:'u1', tenant:'t1', title:'싱크대 배수구 누수', status:'접수', priority:'높음', created:'2026-06-12', photo:null, note:'주방 하부장 물고임', by:'tenant' },
    { id:'r2', b:'b1', unit:'u3', tenant:'t3', title:'보일러 온수 미작동', status:'진행', priority:'긴급', created:'2026-06-10', photo:null, note:'기사 방문 예약 완료', by:'manager' },
    { id:'r3', b:'b1', unit:'u2', tenant:'t2', title:'현관 도어락 건전지', status:'완료', priority:'낮음', created:'2026-06-03', photo:null, note:'교체 완료', by:'tenant' },
    { id:'r4', b:'b2', unit:'u7', tenant:'t7', title:'창문 결로·곰팡이', status:'접수', priority:'높음', created:'2026-06-14', photo:null, note:'북향 창측 곰팡이', by:'tenant' },
  ];
  return { buildings, units, tenants, charges, payHist, history, repairs, contracts:[], notices:[] };
}

let S = DB.load() || seed();
// 마이그레이션 가드: 구조 누락 시 시드로 복구
if(!S.buildings || !S.payHist) { S = seed(); }
const persist = () => DB.save(S);

/* ---------- 역할/건물 상태 ---------- */
const ROLES = {
  owner:   { id:'owner',   label:'임대인',   icon:'👤', chip:'bg-brand-50 text-brand-700',   desc:'집주인 — 전체 권한' },
  manager: { id:'manager', label:'관리소장', icon:'🧰', chip:'bg-amber-50 text-amber-700',    desc:'건물 운영·하자·수납' },
  tenant:  { id:'tenant',  label:'임차인',   icon:'🧑', chip:'bg-emerald-50 text-emerald-600', desc:'세입자 — 내 방·청구·하자' },
};
let role = (S._role) || 'owner';
let curBuilding = (S._building) || 'all';     // 'all' = 전체 포트폴리오 (owner)
const DEMO_TENANT = 't2';                      // 임차인 역할 시 고정 데모 세입자

/* 역할별 메뉴 정의 (권한 분기) */
const MENUS = {
  owner: [
    { id:'portfolio', label:'포트폴리오', icon:'📊', title:'포트폴리오 대시보드', desc:'전체 건물의 수익·연체·하자를 한눈에 봐요.' },
    { id:'units',     label:'건물·세대',   icon:'🏢', title:'건물·세대 관리', desc:'보유 건물과 세대·임차인을 관리해요.' },
    { id:'rent',      label:'청구·수납',   icon:'💸', title:'청구·수납 추적', desc:'청구·수납·미납을 추적하고 독촉해요.' },
    { id:'risk',      label:'연체 관리',   icon:'⚠️', title:'연체 위험 관리', desc:'임차인별 연체 위험을 점수로 진단해요.' },
    { id:'contract',  label:'계약·서명',   icon:'📄', title:'계약·전자서명', desc:'계약·갱신·전자서명을 관리해요.' },

/* ============================================================
   실 알고리즘 1 — 연체 위험 스코어링
   입력: 과거 지연일수 이력 + 미납 횟수 + 잔여 계약개월
   출력: 0~100 점수 + 등급(A안전/B주의/C경고/D고위험)
   ============================================================ */
function riskScore(tenant){
  const hist = S.payHist[tenant.id] || [];
  const n = hist.length || 1;
  const avgDelay = hist.reduce((a,h)=>a+h.delay,0)/n;          // 평균 지연일
  const lateCnt  = hist.filter(h=>h.delay>0).length;           // 지연 횟수
  const lateRate = lateCnt/n;                                  // 지연 비율
  const maxDelay = hist.reduce((a,h)=>Math.max(a,h.delay),0);  // 최대 지연
  // 최근 가중(최근 3개월 가중 1.5)
  const recent = hist.slice(0,3).reduce((a,h)=>a+h.delay,0)/Math.min(3,n);
  const u=unitById(tenant.unit);
  const end = addMonths(tenant.start, tenant.months);
  const remainMonths = Math.max(0, Math.round(daysBetween(end,'2026-06-16')/30));
  // 현재 미납 여부
  const unpaid = S.charges.some(c=>c.tenant===tenant.id && c.month===MONTH && !c.paid && new Date(c.due)<TODAY);
  // 가중합 (위험이 높을수록 ↑)
  let risk = 0;
  risk += Math.min(35, avgDelay*2.2);        // 평균 지연 (최대 35)
  risk += lateRate*22;                       // 지연 빈도 (최대 22)
  risk += Math.min(15, maxDelay*0.6);        // 최악 지연 (최대 15)
  risk += Math.min(12, recent*1.0);          // 최근 가중 (최대 12)
  risk += unpaid? 14:0;                       // 현재 미납 (14)
  risk += remainMonths<3? 2:0;                // 계약 만료 임박 소폭 가중
  risk = Math.min(100, Math.round(risk));
  let grade,gc,advice;
  if(risk<20){ grade='A'; gc='bg-emerald-50 text-emerald-600'; advice='안정 — 통상 관리로 충분해요.'; }
  else if(risk<45){ grade='B'; gc='bg-brand-50 text-brand-700'; advice='주의 — 납기 D-3 사전 안내를 추천해요.'; }
  else if(risk<70){ grade='C'; gc='bg-amber-50 text-amber-700'; advice='경고 — 납기 전 알림톡 + 입금 확인 필수.'; }
  else { grade='D'; gc='bg-rose-50 text-rose-600'; advice='고위험 — 보증금 점검·분할납부 협의를 검토하세요.'; }
  return { risk, grade, gc, advice, avgDelay:Math.round(avgDelay*10)/10, lateCnt, n, maxDelay, remainMonths, unpaid };
}

/* ============================================================
   실 알고리즘 2 — 적정 임대료 추정 (시세 회귀 보정)
   기준: 동일 건물 입주 세대의 (월세/면적) 중앙값 = 단가
         + 면적 보정 + 시장가 가중(0.5) → 추정 임대료
   출력: 추정 월세, 현재 대비 갭(%), 권고
   ============================================================ */
function rentEstimate(unit){
  const peers = S.units.filter(u=>u.b===unit.b && u.type==='월세' && u.rent>0 && u.area>0);
  if(!peers.length) return null;
  const perArea = peers.map(u=>u.rent/u.area).sort((a,b)=>a-b);
  const med = perArea[Math.floor(perArea.length/2)];     // 단가 중앙값(원/㎡)
  const base = med * unit.area;                            // 면적 기반 추정
  const market = unit.market||base;
  const est = Math.round((base*0.5 + market*0.5)/1000)*1000; // 시장가 50% 가중, 천원 단위
  const cur = unit.rent||0;
  const gap = cur? (est-cur)/cur : 0;
  let advice;
  if(!cur) advice='공실 — 추정가를 출발선으로 책정하세요.';
  else if(gap>0.05) advice=`현재가가 시세 대비 ${PCT(gap*100)} 낮아요. 갱신 시 인상 여지.`;
  else if(gap<-0.05) advice=`현재가가 시세 대비 높아요. 공실 위험 점검.`;
  else advice='현재가가 시세에 적정 범위예요.';
  return { est, perArea:Math.round(med), base:Math.round(base), market, cur, gap, advice };
}

/* ============================================================
   실 알고리즘 3 — 수익률 분석 (Cap rate·NOI·ROI)
   GPI=연 임대료, EGI=GPI*(1-공실률), OpEx=연관리비+추정유지비,
   NOI=EGI-OpEx, Cap rate=NOI/매입가, ROI=(NOI-이자)/자기자본
   ============================================================ */
function yieldAnalysis(building){
  const us = S.units.filter(u=>u.b===building.id);
  const annualRent = us.filter(u=>u.type==='월세').reduce((a,u)=>a+(u.rent||0),0)*12;
  const vacancy = us.filter(u=>u.type==='공실').length / Math.max(1,us.length);
  const gpi = annualRent / (1-vacancy || 1);   // 잠재총소득(공실 제외 전 환산)
  const egi = annualRent;                       // 유효총소득(현 임대료 합)
  const opex = (building.mgmtFee||0) + annualRent*0.08; // 관리비 + 유지보수 추정 8%
  const noi = egi - opex;
  const capRate = building.purchase? noi/building.purchase : 0;
  const equity = building.purchase - (building.loan||0);
  const interest = (building.loan||0)*0.045;   // 대출이자 4.5% 가정
  const cashflow = noi - interest;
  const roi = equity? cashflow/equity : 0;
  return { annualRent, vacancy, gpi, egi, opex, noi, capRate, equity, interest, cashflow, roi, units:us.length, purchase:building.purchase, loan:building.loan };
}

function exportCSV(){
  const rows=[['건물','세대','임차인','대상월','임대료','관리비','합계','상태','입금일']];
  visibleCharges().forEach(c=>{
    const u=unitById(c.unit), b=buildingById(u.b), t=tenantById(c.tenant);
    rows.push([b?.name,u?.name,t?.name||'',c.month,c.rent,c.mgmt,chargeTotal(c),c.paid?'수납':'미납',c.paidAt||'']);
  });
  const csv='﻿'+rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`임대장부_${MONTH}.csv`; a.click(); URL.revokeObjectURL(a.href);
  toast(`수납내역 ${rows.length-1}건을 CSV로 내보냈어요.`);
}
function importCSVText(text){
  // 간이 CSV 파서: 헤더 [세대명, 임차인, 대상월, 임금액?] → 매칭되는 청구 수납 처리
  const lines=text.replace(/^﻿/,'').split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2) return {matched:0,total:0};
  const body=lines.slice(1);
  let matched=0;
  body.forEach(line=>{
    const cells=line.split(',').map(s=>s.replace(/^"|"$/g,'').trim());
    const [unitName, , month] = cells;
    const u=S.units.find(x=>x.name===unitName);
    if(!u) return;
    const c=S.charges.find(x=>x.unit===u.id && x.month===(month||MONTH));
    if(c && !c.paid){ c.paid=true; c.paidAt='2026-06-16'; matched++; }
  });
  persist();
  return {matched, total:body.length};
}

function summary(){
  const cs=visibleCharges().filter(c=>c.month===MONTH);
  const billed=cs.reduce((a,c)=>a+chargeTotal(c),0);
  const collected=cs.filter(c=>c.paid).reduce((a,c)=>a+chargeTotal(c),0);
  const overdue=cs.filter(c=>!c.paid).reduce((a,c)=>a+chargeTotal(c),0);
  const rate= billed? Math.round(collected/billed*100):0;
  const us=visibleUnits();
  const occupied=us.filter(u=>u.type!=='공실').length;
  const occRate= us.length? Math.round(occupied/us.length*100):0;
  const openRepairs=visibleRepairs().filter(r=>r.status!=='완료').length;
  return { billed, collected, overdue, rate, occupied, occRate, openRepairs, total:us.length };
}

    <div class="grid grid-cols-4 gap-2 mb-3">
      <div class="text-center"><div class="text-xl font-extrabold text-emerald-600">${dist.A}</div><div class="text-[11px] text-ink-3">A 안전</div></div>
      <div class="text-center"><div class="text-xl font-extrabold text-brand-700">${dist.B}</div><div class="text-[11px] text-ink-3">B 주의</div></div>
      <div class="text-center"><div class="text-xl font-extrabold text-amber-700">${dist.C}</div><div class="text-[11px] text-ink-3">C 경고</div></div>
      <div class="text-center"><div class="text-xl font-extrabold text-rose-600">${dist.D}</div><div class="text-[11px] text-ink-3">D 고위험</div></div>

/* ============================================================
   뷰 — 5. 계약·전자서명 (외부 통합 3: 전자서명 흐름 mock)
   ============================================================ */
function viewContract(){
  const ts=S.tenants.filter(t=>visibleUnits().some(u=>u.id===t.unit));
  const rows=ts.map(t=>{
    const u=unitById(t.unit), b=buildingById(u.b);
    const end=addMonths(t.start,t.months);
    const dleft=daysBetween(end,'2026-06-16');
    const renew=dleft<=60;
    const c=S.contracts.find(x=>x.tenant===t.id);
    const signed = c && c.signed;
    return `<div class="card p-4 mb-3">
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0"><div class="font-bold truncate">${b?.name} ${u?.name||'-'}</div>
          <div class="text-[13px] text-ink-2 mt-0.5">${t.name} · ${u?.type||''} ${u?.type==='전세'?'':'/ 월세 '+KRWk(u?.rent||0)}</div>
          <div class="text-[12px] text-ink-3 mt-1">계약 ${fmtDate(t.start)} ~ ${fmtDate(end)} (${t.months}개월)</div></div>
        <div class="flex flex-col items-end gap-1 shrink-0">
          ${ renew? `<span class="badge bg-amber-50 text-amber-700">갱신 ${dleft<=0?'만료':dleft+'일 전'}</span>` : `<span class="badge bg-emerald-50 text-emerald-600">유효</span>` }
          ${ signed? `<span class="badge bg-brand-50 text-brand-700">전자서명 완료</span>`:'' }
        </div>
      </div>
      <div class="flex gap-2 mt-3">
        <button data-contract="${t.id}" class="press flex-1 h-10 rounded-xl bg-brand-600 text-white font-semibold text-sm">📄 계약서 PDF</button>
        <button data-sign="${t.id}" class="press flex-1 h-10 rounded-xl bg-white border border-surface-line font-semibold text-sm">${signed?'✓ 서명됨':'✍ 전자서명'}</button>
        ${ renew? `<button data-renew="${t.id}" class="press h-10 px-3 rounded-xl bg-surface-sub font-semibold text-sm">갱신</button>`:'' }
      </div>
    </div>`;
  }).join('');
  return `<p class="text-[13px] text-ink-2 mb-3">계약 만료 60일 전이면 갱신 알림이 떠요. 전자서명은 임차인 동의 → 서명 캡처 흐름으로 진행돼요(mock).</p>${rows}`;
}
function addMonths(iso,m){ const d=new Date(iso); d.setMonth(d.getMonth()+m); return d.toISOString().slice(0,10); }

/* 전자서명 흐름 mock: 동의 → 캔버스 서명 → 완료 */
function openSign(tid){
  const t=tenantById(tid), u=unitById(t.unit), b=buildingById(u.b);
  modal(`<h3 class="text-lg font-extrabold mb-1">전자서명</h3>
    <p class="text-[13px] text-ink-2 mb-3">${b?.name} ${u?.name} · ${t.name} 임대차계약</p>
    <div class="card p-3 mb-3 text-[12px] text-ink-2 leading-relaxed bg-surface-sub">
      ① 임차인에게 계약서 링크 발송(알림톡) → ② 임차인 동의 체크 → ③ 서명 입력 → ④ 양측 서명본 보관.<br>본 데모는 ②~③ 단계를 시연해요.</p>
    <label class="flex items-center gap-2 mb-3 text-[13px]"><input type="checkbox" id="signAgree" class="w-4 h-4"> 계약 조항을 확인했고 전자서명에 동의합니다.</label>
    <div class="text-[12px] text-ink-2 mb-1">서명란 (마우스/터치로 그리기)</div>
    <canvas id="signPad" width="480" height="150" class="w-full rounded-xl border border-surface-line bg-white touch-none" style="height:150px"></canvas>
    <div class="flex gap-2 mt-3">
      <button id="signClear" class="press h-11 px-3 rounded-xl bg-surface-sub font-semibold">지우기</button>
      <button id="signDo" class="press flex-1 h-11 rounded-xl bg-brand-600 text-white font-semibold">서명 완료</button>
    </div>`);
  const cv=document.getElementById('signPad'), ctx=cv.getContext('2d');
  ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.strokeStyle='#10213a';
  let drawing=false, has=false;
  const pos=e=>{ const r=cv.getBoundingClientRect(); const cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left; const cy=(e.touches?e.touches[0].clientY:e.clientY)-r.top; return [cx*cv.width/r.width, cy*cv.height/r.height]; };
  const down=e=>{ drawing=true; has=true; const[x,y]=pos(e); ctx.beginPath(); ctx.moveTo(x,y); e.preventDefault(); };
  const move=e=>{ if(!drawing)return; const[x,y]=pos(e); ctx.lineTo(x,y); ctx.stroke(); e.preventDefault(); };
  const up=()=>drawing=false;
  cv.onmousedown=down; cv.onmousemove=move; window.addEventListener('mouseup',up);
  cv.ontouchstart=down; cv.ontouchmove=move; cv.ontouchend=up;
  document.getElementById('signClear').onclick=()=>{ ctx.clearRect(0,0,cv.width,cv.height); has=false; };
  document.getElementById('signDo').onclick=()=>{
    if(!document.getElementById('signAgree').checked){ toast('전자서명 동의에 체크해 주세요.'); return; }
    if(!has){ toast('서명을 입력해 주세요.'); return; }
    const data=cv.toDataURL('image/png');
    const ex=S.contracts.find(x=>x.tenant===tid);
    if(ex){ ex.signed=true; ex.sign=data; ex.signedAt=todayISO(); }
    else S.contracts.push({ id:uid(), tenant:tid, signed:true, sign:data, signedAt:todayISO() });
    sendKakao(t.phone, t.name, '계약체결안내', `[임대지기] ${u.name} 임대차계약 전자서명이 완료되었습니다.`);
    persist(); closeModal(); toast('전자서명을 완료했어요. 계약서에 반영돼요.'); render();
  };
}

function viewTax(){
  const blds=(curBuilding==='all'? S.buildings : S.buildings.filter(b=>b.id===curBuilding));
  const us=visibleUnits();
  // 연 임대소득 추정 (월세 합 ×12), 분리과세 기준(연 2천만원) 안내
  const annualRent=us.filter(u=>u.type==='월세').reduce((a,u)=>a+(u.rent||0),0)*12;
  const annualMgmt=us.reduce((a,u)=>a+(u.mgmt||0),0)*12;
  const taxBase=annualRent; // 임대료 기준
  const sep = taxBase<=20000000; // 분리과세 대상
  // 월별 실 수납 집계(history + 현재월)
  const months=[...S.history.map(h=>h.month), MONTH];
  const monthRows=months.map(m=>{
    const got = m===MONTH? visibleCharges().filter(c=>c.month===m&&c.paid).reduce((a,c)=>a+chargeTotal(c),0)
      : (S.history.find(h=>h.month===m)?.collected||0);
    return `<tr class="border-b border-surface-line last:border-0"><td class="py-2">${monthLabel(m)}</td><td class="text-right num font-semibold">${KRW(got)}</td></tr>`;
  }).join('');
  return `
  <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4">
    ${kpiCard('연 임대료(추정)', KRWk(annualRent), '월세 합 ×12', 'text-brand-600')}
    ${kpiCard('연 관리비 수입', KRWk(annualMgmt), '월 관리비 ×12', '')}
    ${kpiCard('분리과세 대상', sep?'해당':'비해당', '연 2천만원 기준', sep?'text-emerald-600':'text-amber-700')}
  </div>

  </div>
  <div class="card p-4 text-[13px] text-ink-2 leading-relaxed">
    <b class="text-ink">세무 안내</b><br>
    주택임대소득은 연 2천만원 이하도 분리과세 신고 대상입니다(국세청 2019 귀속분부터). 본 리포트는 임대료 집계 보조용이며 실제 신고 금액·필요경비는 세무 전문가 확인이 필요합니다.

}

  document.querySelectorAll('[data-unit]').forEach(b=>b.onclick=()=>unitDetail(b.dataset.unit));
  document.querySelectorAll('[data-contract]').forEach(b=>b.onclick=()=>makeContractPDF(b.dataset.contract));
  document.querySelectorAll('[data-sign]').forEach(b=>b.onclick=()=>openSign(b.dataset.sign));
  document.querySelectorAll('[data-renew]').forEach(b=>b.onclick=()=>renewContract(b.dataset.renew));

  document.querySelectorAll('[data-repairview]').forEach(b=>b.onclick=()=>repairDetail(b.dataset.repairview));
  document.querySelectorAll('[data-riskremind]').forEach(b=>b.onclick=()=>riskRemind(b.dataset.riskremind));
  document.querySelectorAll('[data-riskdetail]').forEach(b=>b.onclick=()=>riskDetail(b.dataset.riskdetail));

/* ---- 수납 워크플로 ---- */
function markPaid(id){
  const c=S.charges.find(x=>x.id===id); if(!c) return;
  c.paid=true; c.paidAt=todayISO(); persist();
  toast('수납 처리했어요. 영수증을 만들 수 있어요.'); render();
}
function sendRemind(id){
  const c=S.charges.find(x=>x.id===id); if(!c) return;
  const t=tenantById(c.tenant), u=unitById(c.unit);
  sendKakao(t.phone, t.name, '월세납부독촉', `[임대지기] ${u?.name} ${monthLabel(c.month)} 임대료 ${KRW(chargeTotal(c))} 미납 안내드립니다.`);
  toast(`${t?.name} 님께 알림톡 독촉을 발송했어요.`);
  if(['rent','portfolio'].includes(curView)) render();
}
function remindAll(){
  const un=visibleCharges().filter(c=>c.month===MONTH&&!c.paid);
  if(!un.length){ toast('미납 건이 없어요.'); return; }
  un.forEach(c=>{ const t=tenantById(c.tenant),u=unitById(c.unit);
    sendKakao(t.phone,t.name,'월세납부독촉',`[임대지기] ${u?.name} ${monthLabel(c.month)} 임대료 ${KRW(chargeTotal(c))} 미납 안내드립니다.`); });
  toast(`미납 ${un.length}건에 알림톡을 일괄 발송했어요.`); render();
}
function riskRemind(id){
  const t=tenantById(id), u=unitById(t.unit);
  sendKakao(t.phone, t.name, '납기사전안내', `[임대지기] ${u?.name} ${monthLabel(MONTH)} 임대료 납기 사전 안내드립니다. 기한 내 납부 부탁드려요.`);
  toast(`${t.name} 님께 사전 안내 알림톡을 보냈어요.`);
}
function genNextMonth(){
  const next=addMonths(MONTH+'-01',1).slice(0,7);
  if(S.charges.some(c=>c.month===next)){ toast(`${monthLabel(next)} 청구는 이미 생성됐어요.`); return; }
  S.tenants.forEach(t=>{ const u=unitById(t.unit); if(!u||u.type==='공실') return;
    S.charges.push({ id:uid(), unit:u.id, tenant:t.id, month:next, rent:u.rent, mgmt:u.mgmt,
      due:`${next}-${String(t.payday).padStart(2,'0')}`, paid:false, paidAt:null }); });
  persist(); toast(`${monthLabel(next)} 청구서를 자동 생성했어요.`);
}

function openCSVImport(){

/* ============================== PDF 생성(실 동작) ============================== */
async function renderPDF(html, filename){
  const stage=document.getElementById('pdfStage');
  stage.innerHTML=`<div style="padding:40px 44px;font-family:Pretendard,'Malgun Gothic',sans-serif;color:#1a2230;width:760px;box-sizing:border-box">${html}</div>`;
  await new Promise(r=>setTimeout(r,60));
  const canvas=await html2canvas(stage.firstElementChild,{ scale:2, backgroundColor:'#ffffff', width:760 });
  const { jsPDF }=window.jspdf;
  const pdf=new jsPDF('p','mm','a4');
  const w=210, h=canvas.height*w/canvas.width;
  pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,0,w,h);
  pdf.save(filename);
  stage.innerHTML='';
}

        <tr><td style="padding:7px 0;color:#525a68">납부일</td><td>매월 ${t.payday}일</td></tr>
      </table>
      <p><b>제3조 (계약기간)</b> ${fmtDate(t.start)} 부터 ${fmtDate(end)} 까지 (${t.months}개월)로 한다.</p>
      <p style="margin-top:8px"><b>제4조 (수선·관리)</b> 임대인은 목적물의 주요 설비 하자에 대해 수선 의무를 부담하며, 임차인은 통상의 관리 의무를 진다.</p>
      <p style="margin-top:8px"><b>제5조 (특약사항)</b> ＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿</p>
    </div>
    <table style="width:100%;font-size:13px;margin-top:36px;border-top:1px solid #e7ebf1;padding-top:16px">
      <tr><td style="padding:10px 0;width:50%">임대인 성명 ＿＿＿＿＿＿ (인)</td>
        <td style="padding:10px 0">임차인 성명 ${t.name} ${c&&c.signed?`<img src="${c.sign}" style="height:30px;vertical-align:middle;margin-left:6px">`:'(인)'}</td></tr>
      <tr><td style="padding:6px 0">연락처 ＿＿＿＿＿＿＿＿</td><td style="padding:6px 0">연락처 ${t.phone}${c&&c.signed?` · 전자서명 ${c.signedAt}`:''}</td></tr>
    </table>
    <div style="text-align:center;margin-top:24px;font-size:13px;color:#525a68">${todayISO()}</div>`;
  await renderPDF(html, `임대차계약서_${u?.name}_${t.name}.pdf`);
  toast('계약서 PDF를 내려받았어요.');
}

/* ============================== 모달/시트 ============================== */
function field(id,label,ph,type='text'){
  return `<label class="block"><span class="text-[12px] text-ink-2">${label}</span>
    <input id="${id}" type="${type}" placeholder="${ph}" class="mt-1 w-full h-11 rounded-xl border border-surface-line px-3"></label>`;
}
function modalActions(submitLabel){
  return `<div class="flex gap-2 mt-5">
    <button id="mdCancel" class="press flex-1 h-12 rounded-xl bg-surface-sub font-semibold">취소</button>
    <button id="mdSubmit" class="press flex-1 h-12 rounded-xl bg-brand-600 text-white font-semibold">${submitLabel}</button></div>`;
}
const val=id=>{ const e=document.getElementById(id); return e? (e.value||'').trim():''; };
function modal(html, onSubmit){
  document.getElementById('modalCard').innerHTML=html;
  document.getElementById('modalWrap').classList.remove('hidden');
  const c=document.getElementById('mdCancel'); if(c) c.onclick=closeModal;
  const s=document.getElementById('mdSubmit'); if(s&&onSubmit) s.onclick=()=>{ const ok=onSubmit(); if(ok!==false) closeModal(); };
}
function closeModal(){ document.getElementById('modalWrap').classList.add('hidden'); }
document.getElementById('modalDim').onclick=closeModal;

/* 바텀시트(빠른 작업) — 역할별 액션 */
function renderSheet(){
  const acts = {
    owner:[ {k:'unit',i:'🏢',t:'세대 등록',d:'새 임대 물건'},{k:'tenant',i:'🧑',t:'임차인 배정',d:'계약·입주'},
            {k:'charge',i:'💸',t:'다음 달 청구',d:'청구 생성'},{k:'repair',i:'🛠️',t:'하자 접수',d:'사진 첨부'} ],
    manager:[ {k:'charge',i:'💸',t:'다음 달 청구',d:'청구 생성'},{k:'repair',i:'🛠️',t:'하자 접수',d:'사진 첨부'},
              {k:'rent',i:'✅',t:'수납 처리',d:'입금 확인'},{k:'notice',i:'🔔',t:'독촉 발송',d:'일괄 알림톡'} ],
    tenant:[ {k:'repair',i:'🛠️',t:'하자 신고',d:'사진 첨부'},{k:'bill',i:'💳',t:'청구 보기',d:'납부 상태'} ],
  };
  const a=acts[role]||acts.owner;
  document.getElementById('sheetDesc').textContent = ROLES[role].label+' 자주 쓰는 작업';
  document.getElementById('sheetGrid').innerHTML = a.map(x=>`<button data-quick="${x.k}" class="press card p-4 text-left"><div class="text-2xl mb-1">${x.i}</div><div class="font-bold">${x.t}</div><div class="text-[12px] text-ink-2">${x.d}</div></button>`).join('');
  document.querySelectorAll('[data-quick]').forEach(b=>b.onclick=()=>{
    closeSheet();
    setTimeout(()=>{ const k=b.dataset.quick;
      if(k==='unit') openUnitForm(); else if(k==='tenant') openTenantForm();
      else if(k==='charge'){ go('rent'); genNextMonth(); } else if(k==='repair') openRepairForm();
      else if(k==='rent') go('rent'); else if(k==='notice') remindAll(); else if(k==='bill') go('tbill');
    },300);
  });
}
function openSheet(){ renderSheet(); const w=document.getElementById('sheetWrap'), s=document.getElementById('sheet');
  w.classList.remove('hidden'); requestAnimationFrame(()=>s.classList.remove('sheet-enter')); }
function closeSheet(){ const w=document.getElementById('sheetWrap'), s=document.getElementById('sheet');
  s.classList.add('sheet-enter'); setTimeout(()=>w.classList.add('hidden'),280); }
document.getElementById('sheetClose').onclick=closeSheet;
document.getElementById('sheetDim').onclick=closeSheet;
document.getElementById('mAdd').onclick=openSheet;
document.getElementById('dAdd').onclick=openSheet;

/* 드로어(모바일 더보기) */
function openDrawer(){ document.getElementById('drawer').classList.add('open'); document.getElementById('drawerBackdrop').classList.remove('hidden'); }
function closeDrawer(){ document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerBackdrop').classList.add('hidden'); }
document.getElementById('drawerClose').onclick=closeDrawer;
document.getElementById('drawerBackdrop').onclick=closeDrawer;

/* 모바일 역할 버튼 → 드로어 역할 영역으로 */
document.getElementById('mRoleBtn').onclick=()=>{ openDrawer(); };

/* ============================== 부팅 ============================== */
renderRoleSwitch();
renderBuildingPick();
document.getElementById('mRoleLabel').textContent=ROLES[role].label+' 화면';
go(curView);

/* 데모 리셋(쿼리 ?reset) */
if(location.search.includes('reset')){ S=seed(); role='owner'; curBuilding='all'; persist(); renderRoleSwitch(); renderBuildingPick(); go('portfolio'); }
window.__rentalReset=()=>{ S=seed(); role='owner'; curBuilding='all'; persist(); renderRoleSwitch(); renderBuildingPick(); go('portfolio'); };
</script>
