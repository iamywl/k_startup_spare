      extend: {
        colors: {
          // 동적 브랜드 컬러: 신뢰감의 인디고-틸(부동산/금융 톤). WCAG AA 이상 계산.
          brand: { 50:'#eef4fb',100:'#d7e6f6',500:'#1f6fd6',600:'#1a5fbb',700:'#154e9c' },

        fontFamily: { sans:['Pretendard','-apple-system','BlinkMacSystemFont','Apple SD Gothic Neo','sans-serif'] }

<style>
  *{ -webkit-tap-highlight-color:transparent; }
  body{ font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif; color:#1a2230; background:
    radial-gradient(1200px 600px at 100% -10%, rgba(31,111,214,.06), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(31,111,214,.05), transparent 60%), #f5f7fa; }
  .press{ transition:transform .12s cubic-bezier(.2,.7,.3,1); }
  .press:active{ transform:scale(.97); }
  .card{ background:#fff; border:1px solid #e7ebf1; border-radius:16px; }
  .glass{ background:rgba(255,255,255,.78); backdrop-filter:saturate(185%) blur(20px); -webkit-backdrop-filter:saturate(185%) blur(20px); }
  @supports not (backdrop-filter:blur(2px)){ .glass{ background:#fff; } }
  .navbtn{ transition:background .15s,color .15s; }
  .navbtn.active{ background:rgba(31,111,214,.12); color:#154e9c; }
  ::-webkit-scrollbar{ width:10px;height:10px } ::-webkit-scrollbar-thumb{ background:#d7dde6;border-radius:8px }

  @media(min-width:768px){ #sidebar{ display:flex } #bottomnav{ display:none } #mobileAppbar{ display:none } #main{ padding-bottom:0 } }
  .sheet-enter{ transform:translateY(100%); }
  .badge{ font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px }
  table th{ font-weight:600 }

<body class="text-ink">

<!-- ===== 모바일 상단 앱바 ===== -->
<header id="mobileAppbar" class="glass fixed top-0 inset-x-0 z-30 h-14 items-center justify-between px-4 border-b border-surface-line">
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 rounded-xl bg-brand-600 text-white grid place-items-center font-extrabold">집</div>
    <span class="font-extrabold text-[17px]">임대지기</span>
  </div>
  <button id="mAdd" class="press w-10 h-10 rounded-xl bg-brand-600 text-white grid place-items-center text-xl font-bold" aria-label="빠른 등록">＋</button>
</header>

<div class="md:flex md:min-h-screen">
  <!-- ===== 데스크톱 사이드바 ===== -->
  <aside id="sidebar" class="w-64 shrink-0 flex-col bg-[#10213a] text-white sticky top-0 h-screen p-4">
    <div class="flex items-center gap-2 px-2 pt-1 pb-6">
      <div class="w-9 h-9 rounded-xl bg-white/15 grid place-items-center font-extrabold">집</div>
      <div><div class="font-extrabold text-lg leading-none">임대지기</div><div class="text-[11px] text-white/50 mt-1">소규모 임대관리</div></div>
    </div>
    <nav class="flex-1 space-y-1" id="navDesktop"></nav>
    <div class="mt-4 p-3 rounded-xl bg-white/5 text-[12px] text-white/60 leading-relaxed">
      <div class="text-white/80 font-semibold mb-1">데모 모드</div>
      로그인 없이 모든 기능을 쓸 수 있어요. 데이터는 브라우저에 저장돼요.
    </div>
  </aside>

  <!-- ===== 본문 ===== -->
  <main id="main" class="flex-1 min-w-0 pt-14 md:pt-0 pb-24 md:pb-10">
    <div class="hidden md:flex items-center justify-between px-8 pt-7 pb-2">
      <div>
        <h1 id="pageTitle" class="text-2xl font-extrabold">수입 대시보드</h1>

<!-- ===== 모바일 바텀 탭바 ===== -->

<!-- ===== 바텀시트(빠른 등록) ===== -->

  <div id="sheet" class="glass sheet-enter absolute bottom-0 inset-x-0 rounded-t-3xl p-5 pb-8 max-w-[560px] mx-auto transition-transform duration-300 shadow-2xl" style="border:1px solid #e7ebf1">
    <div class="w-10 h-1.5 rounded-full bg-ink-3/40 mx-auto mb-4"></div>
    <h3 class="text-lg font-extrabold mb-1">빠른 등록</h3>
    <p class="text-ink-2 text-[13px] mb-4">자주 쓰는 작업을 바로 시작해요.</p>
    <div class="grid grid-cols-2 gap-3">
      <button data-quick="unit" class="press card p-4 text-left"><div class="text-2xl mb-1">🚪</div><div class="font-bold">호실 등록</div><div class="text-[12px] text-ink-2">새 임대 물건</div></button>
      <button data-quick="tenant" class="press card p-4 text-left"><div class="text-2xl mb-1">🧑</div><div class="font-bold">임차인 배정</div><div class="text-[12px] text-ink-2">계약·입주</div></button>

      <button data-quick="repair" class="press card p-4 text-left"><div class="text-2xl mb-1">🛠️</div><div class="font-bold">하자 접수</div><div class="text-[12px] text-ink-2">사진 첨부</div></button>

<!-- PDF 렌더 영역(화면 밖) -->
<div id="pdfStage" style="position:fixed;left:-9999px;top:0;width:760px;background:#fff;"></div>

<script>
/* =========================================================================
   임대지기 v1 — 1인·소규모 임대인용 임대관리 SaaS PoC (단일 HTML, 오프라인 구동)
   - 실 동작: localStorage 지속, jsPDF+html2canvas 실 PDF, 사진 실 업로드/미리보기
   - 다단계 워크플로: 호실→임차인→청구→수납→독촉
   ========================================================================= */
const KRW = n => (n||0).toLocaleString('ko-KR') + '원';
const KRWk = n => (n>=10000? Math.round(n/10000)+'만' : (n||0).toLocaleString())+'원';
const uid = () => Math.random().toString(36).slice(2,9);
const todayISO = () => new Date().toISOString().slice(0,10);
const fmtDate = s => s? s.replaceAll('-','.').slice(2) : '-';
const MONTH = '2026-06';
const monthLabel = m => { const [y,mm]=m.split('-'); return `${y}년 ${+mm}월`; };

/* ---------- 저장소 ---------- */
const DB = {
  key:'rental-jigi-v1',
  load(){ try{ return JSON.parse(localStorage.getItem(this.key)) }catch(e){ return null } },
  save(s){ localStorage.setItem(this.key, JSON.stringify(s)); },
};

/* ---------- 시드 데이터 ---------- */
function seed(){
  const units = [
    { id:'u1', name:'행복빌라 201호', type:'월세', deposit:10000000, rent:550000, mgmt:70000, addr:'대구 남구 대명동' },
    { id:'u2', name:'행복빌라 202호', type:'월세', deposit:5000000,  rent:480000, mgmt:60000, addr:'대구 남구 대명동' },
    { id:'u3', name:'행복빌라 301호', type:'월세', deposit:20000000, rent:650000, mgmt:80000, addr:'대구 남구 대명동' },
    { id:'u4', name:'대명원룸 B102', type:'월세', deposit:3000000,  rent:420000, mgmt:50000, addr:'대구 남구 봉덕동' },
    { id:'u5', name:'대명원룸 B103', type:'전세', deposit:90000000, rent:0,      mgmt:50000, addr:'대구 남구 봉덕동' },
    { id:'u6', name:'대명원룸 B104', type:'공실', deposit:0,        rent:430000, mgmt:50000, addr:'대구 남구 봉덕동' },
  ];
  const tenants = [
    { id:'t1', unit:'u1', name:'김민준', phone:'010-1234-5678', start:'2025-03-01', months:24, payday:5 },
    { id:'t2', unit:'u2', name:'이서연', phone:'010-2222-3333', start:'2024-11-15', months:24, payday:15 },
    { id:'t3', unit:'u3', name:'박도윤', phone:'010-4444-5555', start:'2025-07-10', months:12, payday:10 },
    { id:'t4', unit:'u4', name:'최지우', phone:'010-6666-7777', start:'2025-01-20', months:24, payday:25 },
    { id:'t5', unit:'u5', name:'정하준', phone:'010-8888-9999', start:'2024-09-01', months:24, payday:1 },
  ];
  // 6월 청구·수납
  const charges = [
    { id:'c1', unit:'u1', tenant:'t1', month:MONTH, rent:550000, mgmt:70000, due:'2026-06-05', paid:true,  paidAt:'2026-06-04' },
    { id:'c2', unit:'u2', tenant:'t2', month:MONTH, rent:480000, mgmt:60000, due:'2026-06-15', paid:false, paidAt:null },
    { id:'c3', unit:'u3', tenant:'t3', month:MONTH, rent:650000, mgmt:80000, due:'2026-06-10', paid:true,  paidAt:'2026-06-09' },
    { id:'c4', unit:'u4', tenant:'t4', month:MONTH, rent:420000, mgmt:50000, due:'2026-06-25', paid:false, paidAt:null },
    { id:'c5', unit:'u5', tenant:'t5', month:MONTH, rent:0,      mgmt:50000, due:'2026-06-01', paid:true,  paidAt:'2026-06-01' },
  ];
  // 지난 5개월 수입(추세 차트용)
  const history = [
    { month:'2026-01', collected:2700000 },{ month:'2026-02', collected:2820000 },
    { month:'2026-03', collected:2750000 },{ month:'2026-04', collected:2880000 },
    { month:'2026-05', collected:2810000 },
  ];
  const repairs = [
    { id:'r1', unit:'u1', tenant:'t1', title:'싱크대 배수구 누수', status:'접수', priority:'높음', created:'2026-06-12', photo:null, note:'주방 하부장 물고임' },
    { id:'r2', unit:'u3', tenant:'t3', title:'보일러 온수 미작동', status:'진행', priority:'긴급', created:'2026-06-10', photo:null, note:'기사 방문 예약 완료' },
    { id:'r3', unit:'u2', tenant:'t2', title:'현관 도어락 건전지', status:'완료', priority:'낮음', created:'2026-06-03', photo:null, note:'교체 완료' },
  ];
  return { units, tenants, charges, history, repairs, contracts:[], notices:[] };
}

let S = DB.load() || seed();
const persist = () => DB.save(S);

/* ---------- 헬퍼 조회 ---------- */
const unitById = id => S.units.find(u=>u.id===id);
const tenantById = id => S.tenants.find(t=>t.id===id);
const tenantOfUnit = uid => S.tenants.find(t=>t.unit===uid);
const chargeTotal = c => (c.rent||0)+(c.mgmt||0);

/* ---------- 토스트 ---------- */
let toastT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.remove('hidden');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.add('hidden'),2200);
}

/* ---------- 네비게이션 ---------- */
const NAV = [
  { id:'dashboard', label:'대시보드', icon:'📊', title:'수입 대시보드', desc:'이번 달 수납 현황을 한눈에 확인해요.' },
  { id:'units',     label:'호실·임차인', icon:'🚪', title:'호실·임차인 관리', desc:'보유 물건과 임차인을 관리해요.' },
  { id:'rent',      label:'월세 수납', icon:'💸', title:'월세 수납 추적', desc:'이번 달 청구·수납·미납을 추적해요.' },
  { id:'contract',  label:'계약', icon:'📄', title:'계약 관리', desc:'계약·갱신을 관리하고 계약서를 만들어요.' },
  { id:'repair',    label:'하자보수', icon:'🛠️', title:'하자보수 요청', desc:'수리 요청을 접수·처리해요.' },
];
let curView = 'dashboard';

function renderNav(){
  const dk = NAV.map(n=>`<button data-view="${n.id}" class="navbtn ${n.id===curView?'active':''} w-full text-left px-3 py-2.5 rounded-xl flex items-center gap-3 text-[14px] text-white/85 hover:bg-white/5">
    <span class="text-lg">${n.icon}</span><span class="font-medium">${n.label}</span></button>`).join('');
  document.getElementById('navDesktop').innerHTML = dk;
  // 모바일 5탭
  const mb = NAV.map(n=>`<button data-view="${n.id}" class="flex-1 flex flex-col items-center justify-center gap-0.5 min-h-[44px] ${n.id===curView?'text-brand-600':'text-ink-3'}">
    <span class="text-[19px] leading-none">${n.icon}</span><span class="text-[10px] font-semibold">${n.label}</span></button>`).join('');
  document.getElementById('bottomnav').innerHTML = mb;
  document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>go(b.dataset.view));
}

function go(v){
  curView=v;
  const meta=NAV.find(n=>n.id===v);
  document.getElementById('pageTitle').textContent=meta.title;
  document.getElementById('pageDesc').textContent=meta.desc;
  document.getElementById('pageTitleM').textContent=meta.title;
  document.getElementById('pageDescM').textContent=meta.desc;
  renderNav();
  render();
  document.getElementById('main').scrollTo?.(0,0);
  window.scrollTo(0,0);
}

/* ============================== 렌더 ============================== */
function render(){
  const el=document.getElementById('views');
  if(curView==='dashboard') el.innerHTML=viewDashboard();
  else if(curView==='units') el.innerHTML=viewUnits();
  else if(curView==='rent') el.innerHTML=viewRent();
  else if(curView==='contract') el.innerHTML=viewContract();
  else if(curView==='repair') el.innerHTML=viewRepair();
  bindView();
  if(curView==='dashboard') drawDashCharts();
}

/* ---------- 집계 ---------- */
function summary(){
  const cs=S.charges.filter(c=>c.month===MONTH);
  const billed=cs.reduce((a,c)=>a+chargeTotal(c),0);
  const collected=cs.filter(c=>c.paid).reduce((a,c)=>a+chargeTotal(c),0);
  const overdue=cs.filter(c=>!c.paid).reduce((a,c)=>a+chargeTotal(c),0);
  const rate= billed? Math.round(collected/billed*100):0;
  const occupied=S.units.filter(u=>u.type!=='공실').length;
  const occRate=Math.round(occupied/S.units.length*100);
  const openRepairs=S.repairs.filter(r=>r.status!=='완료').length;
  return { billed, collected, overdue, rate, occupied, occRate, openRepairs, total:S.units.length };
}

/* ---------- 1. 대시보드 ---------- */
function viewDashboard(){
  const s=summary();
  const overdueList=S.charges.filter(c=>c.month===MONTH&&!c.paid);
  const kpi=(label,val,sub,accent)=>`<div class="card p-4 md:p-5">
    <div class="text-[12px] text-ink-2">${label}</div>
    <div class="text-[22px] md:text-[26px] font-extrabold mt-1 num ${accent||''}">${val}</div>
    <div class="text-[12px] text-ink-3 mt-0.5">${sub}</div></div>`;
  return `
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
    ${kpi('이번 달 수납', KRWk(s.collected), monthLabel(MONTH)+' 입금', 'text-brand-600')}
    ${kpi('미납 금액', KRWk(s.overdue), `미납 ${overdueList.length}건`, s.overdue>0?'text-rose-600':'')}
    ${kpi('수납률', s.rate+'%', `청구 ${KRWk(s.billed)}`, '')}
    ${kpi('입주율', s.occRate+'%', `${s.occupied}/${s.total}호 입주`, '')}
  </div>

  <div class="grid md:grid-cols-2 gap-4 mt-4">
    <div class="card p-4 md:p-5">
      <div class="flex items-center justify-between mb-3"><h3 class="font-bold">월별 수입 추세</h3><span class="text-[12px] text-ink-3">최근 6개월</span></div>
      <div style="height:220px"><canvas id="chTrend"></canvas></div>
    </div>
    <div class="card p-4 md:p-5">
      <div class="flex items-center justify-between mb-3"><h3 class="font-bold">이번 달 수납 구성</h3><span class="text-[12px] text-ink-3">${monthLabel(MONTH)}</span></div>
      <div style="height:220px"><canvas id="chDonut"></canvas></div>
    </div>
  </div>

  <div class="grid md:grid-cols-2 gap-4 mt-4">
    <div class="card p-4 md:p-5">
      <div class="flex items-center justify-between mb-3"><h3 class="font-bold">미납 알림</h3>
        ${overdueList.length?`<span class="badge bg-rose-50 text-rose-600">${overdueList.length}건</span>`:`<span class="badge bg-emerald-50 text-emerald-600">완납</span>`}</div>
      ${overdueList.length? overdueList.map(c=>{
        const t=tenantById(c.tenant), u=unitById(c.unit);
        const od = Math.max(0, Math.round((new Date('2026-06-16')-new Date(c.due))/86400000));
        return `<div class="flex items-center justify-between py-2.5 border-b border-surface-line last:border-0">
          <div><div class="font-semibold text-[14px]">${u?.name||'-'} · ${t?.name||'-'}</div>
            <div class="text-[12px] text-ink-3">납기 ${fmtDate(c.due)} · ${od>0?`<span class="text-rose-600">${od}일 연체</span>`:'기한 임박'}</div></div>
          <div class="text-right"><div class="font-bold num text-rose-600">${KRW(chargeTotal(c))}</div>
            <button data-remind="${c.id}" class="press text-[12px] mt-1 px-2.5 py-1 rounded-lg bg-brand-50 text-brand-700 font-semibold">독촉 발송</button></div>
        </div>`;
      }).join('') : `<div class="text-ink-2 text-sm py-6 text-center">미납 건이 없어요. 모두 수납됐어요. 👏</div>`}
    </div>
    <div class="card p-4 md:p-5">
      <div class="flex items-center justify-between mb-3"><h3 class="font-bold">처리할 하자보수</h3>

function addMonths(iso,m){ const d=new Date(iso); d.setMonth(d.getMonth()+m); return d.toISOString().slice(0,10); }

function bindView(){
  document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>go(b.dataset.view));
  // 대시보드 독촉
  document.querySelectorAll('[data-remind]').forEach(b=>b.onclick=()=>sendRemind(b.dataset.remind));
  // 수납
  document.querySelectorAll('[data-pay]').forEach(b=>b.onclick=()=>markPaid(b.dataset.pay));
  document.querySelectorAll('[data-receipt]').forEach(b=>b.onclick=()=>makeReceiptPDF(b.dataset.receipt));
  document.querySelectorAll('[data-unit]').forEach(b=>b.onclick=()=>unitDetail(b.dataset.unit));
  document.querySelectorAll('[data-contract]').forEach(b=>b.onclick=()=>makeContractPDF(b.dataset.contract));
  document.querySelectorAll('[data-renew]').forEach(b=>b.onclick=()=>renewContract(b.dataset.renew));
  document.querySelectorAll('[data-advance]').forEach(b=>b.onclick=()=>advanceRepair(b.dataset.advance));
  document.querySelectorAll('[data-repairview]').forEach(b=>b.onclick=()=>repairDetail(b.dataset.repairview));
  const ge=document.getElementById('genCharges'); if(ge) ge.onclick=genNextMonth;
  const ra=document.getElementById('remindAll'); if(ra) ra.onclick=remindAll;
  const au=document.getElementById('addUnit'); if(au) au.onclick=()=>openUnitForm();
  const at=document.getElementById('addTenant'); if(at) at.onclick=()=>openTenantForm();
  const ar=document.getElementById('addRepair'); if(ar) ar.onclick=()=>openRepairForm();
}

/* ---- 수납 워크플로 ---- */
function markPaid(id){
  const c=S.charges.find(x=>x.id===id); if(!c) return;
  c.paid=true; c.paidAt=todayISO(); persist();
  toast('수납 처리했어요. 영수증을 만들 수 있어요.');
  render();
}
function sendRemind(id){
  const c=S.charges.find(x=>x.id===id); if(!c) return;
  const t=tenantById(c.tenant), u=unitById(c.unit);
  const msg=`[임대지기] ${u?.name} ${monthLabel(c.month)} 임대료 ${KRW(chargeTotal(c))} 미납 안내드립니다.`;
  S.notices.push({ at:new Date().toLocaleString('ko-KR',{hour12:false}), to:`${t?.name}(${t?.phone})`, msg }); persist();
  toast(`${t?.name} 님께 독촉 알림을 발송했어요(mock).`);
  if(curView==='rent') render();
}
function remindAll(){
  const un=S.charges.filter(c=>c.month===MONTH&&!c.paid);
  if(!un.length){ toast('미납 건이 없어요.'); return; }
  un.forEach(c=>sendRemind(c.id));
  toast(`미납 ${un.length}건에 독촉을 일괄 발송했어요(mock).`);
}
function genNextMonth(){
  const next=addMonths(MONTH+'-01',1).slice(0,7);
  if(S.charges.some(c=>c.month===next)){ toast(`${monthLabel(next)} 청구는 이미 생성됐어요.`); return; }
  S.tenants.forEach(t=>{
    const u=unitById(t.unit); if(!u||u.type==='공실') return;
    S.charges.push({ id:uid(), unit:u.id, tenant:t.id, month:next, rent:u.rent, mgmt:u.mgmt,
      due:`${next}-${String(t.payday).padStart(2,'0')}`, paid:false, paidAt:null });
  });
  persist();
  toast(`${monthLabel(next)} 청구서를 자동 생성했어요.`);
}

    <div class="space-y-3">
      <label class="block"><span class="text-[12px] text-ink-2">호실</span>
        <select id="rUnit" class="mt-1 w-full h-11 rounded-xl border border-surface-line px-3">${opts}</select></label>
      ${field('rTitle','증상','예: 화장실 천장 누수')}
      <label class="block"><span class="text-[12px] text-ink-2">우선순위</span>
        <select id="rPriority" class="mt-1 w-full h-11 rounded-xl border border-surface-line px-3"><option>낮음</option><option selected>높음</option><option>긴급</option></select></label>
      <label class="block"><span class="text-[12px] text-ink-2">메모</span>
        <textarea id="rNote" class="mt-1 w-full rounded-xl border border-surface-line px-3 py-2 h-20" placeholder="상세 상황"></textarea></label>
      <div>
        <span class="text-[12px] text-ink-2">증빙 사진</span>
        <label class="mt-1 flex items-center justify-center h-28 rounded-xl border-2 border-dashed border-surface-line cursor-pointer bg-surface-sub press" id="rPhotoLabel">
          <input type="file" id="rPhoto" accept="image/*" class="hidden"><span class="text-ink-3 text-sm">📷 사진 선택(업로드)</span></label>
        <img id="rPreview" class="hidden mt-2 rounded-xl w-full max-h-40 object-cover border border-surface-line">
      </div>
    </div>
    ${modalActions('접수하기')}`,()=>{
    const title=val('rTitle'); if(!title){ toast('증상을 입력해 주세요.'); return false; }
    const u=unitById(val('rUnit')); const t=tenantOfUnit(u.id);
    S.repairs.push({ id:uid(), unit:u.id, tenant:t?.id, title, status:'접수', priority:val('rPriority'),
      created:todayISO(), photo:window._repairPhoto||null, note:val('rNote')||'' });
    window._repairPhoto=null; persist(); toast('하자보수를 접수했어요.'); go('repair'); return true;
  });
  // 실 사진 업로드 + 미리보기
  window._repairPhoto=null;
  document.getElementById('rPhoto').onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const fr=new FileReader();
    fr.onload=ev=>{ window._repairPhoto=ev.target.result;
      const img=document.getElementById('rPreview'); img.src=ev.target.result; img.classList.remove('hidden');
      document.getElementById('rPhotoLabel').querySelector('span').textContent='✓ 사진 업로드됨 (다시 선택 가능)'; };
    fr.readAsDataURL(f);
  };
}
function advanceRepair(id){
  const r=S.repairs.find(x=>x.id===id); if(!r) return;
  r.status = r.status==='접수'?'진행':'완료'; persist();

  modal(`<h3 class="text-lg font-extrabold">${r.title}</h3>

function renewContract(id){

/* ============================== PDF 생성(실 동작) ============================== */
async function renderPDF(html, filename){
  const stage=document.getElementById('pdfStage');
  stage.innerHTML=`<div style="padding:40px 44px;font-family:Pretendard,'Malgun Gothic',sans-serif;color:#1a2230;width:760px;box-sizing:border-box">${html}</div>`;
  await new Promise(r=>setTimeout(r,60));
  const canvas=await html2canvas(stage.firstElementChild,{ scale:2, backgroundColor:'#ffffff', width:760 });
  const { jsPDF }=window.jspdf;
  const pdf=new jsPDF('p','mm','a4');
  const w=210, h=canvas.height*w/canvas.width;
  pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,0,w,h);
  pdf.save(filename);
  stage.innerHTML='';
}

/* ============================== 모달/시트 ============================== */
function field(id,label,ph,type='text'){
  return `<label class="block"><span class="text-[12px] text-ink-2">${label}</span>
    <input id="${id}" type="${type}" placeholder="${ph}" class="mt-1 w-full h-11 rounded-xl border border-surface-line px-3"></label>`;
}
function modalActions(submitLabel){
  return `<div class="flex gap-2 mt-5">
    <button id="mdCancel" class="press flex-1 h-12 rounded-xl bg-surface-sub font-semibold">취소</button>
    <button id="mdSubmit" class="press flex-1 h-12 rounded-xl bg-brand-600 text-white font-semibold">${submitLabel}</button></div>`;
}
const val=id=>{ const e=document.getElementById(id); return e? (e.value||'').trim():''; };
function modal(html, onSubmit){
  document.getElementById('modalCard').innerHTML=html;
  document.getElementById('modalWrap').classList.remove('hidden');
  const c=document.getElementById('mdCancel'); if(c) c.onclick=closeModal;
  const s=document.getElementById('mdSubmit'); if(s&&onSubmit) s.onclick=()=>{ const ok=onSubmit(); if(ok!==false) closeModal(); };
}
function closeModal(){ document.getElementById('modalWrap').classList.add('hidden'); }
document.getElementById('modalDim').onclick=closeModal;

/* 바텀시트(빠른 등록) */
function openSheet(){
  const w=document.getElementById('sheetWrap'), s=document.getElementById('sheet');
  w.classList.remove('hidden'); requestAnimationFrame(()=>s.classList.remove('sheet-enter'));
}
function closeSheet(){
  const w=document.getElementById('sheetWrap'), s=document.getElementById('sheet');
  s.classList.add('sheet-enter'); setTimeout(()=>w.classList.add('hidden'),280);
}
document.getElementById('sheetClose').onclick=closeSheet;
document.getElementById('sheetDim').onclick=closeSheet;
document.getElementById('mAdd').onclick=openSheet;
document.getElementById('dAdd').onclick=openSheet;
document.querySelectorAll('[data-quick]').forEach(b=>b.onclick=()=>{
  closeSheet();
  setTimeout(()=>{ const k=b.dataset.quick;
    if(k==='unit') openUnitForm(); else if(k==='tenant') openTenantForm();
    else if(k==='charge'){ go('rent'); genNextMonth(); } else if(k==='repair') openRepairForm(); },300);
});

/* ============================== 부팅 ============================== */
renderNav();
go('dashboard');

/* 데모 리셋(쿼리 ?reset) */
if(location.search.includes('reset')){ S=seed(); persist(); go('dashboard'); }
window.__rentalReset=()=>{ S=seed(); persist(); go('dashboard'); };
