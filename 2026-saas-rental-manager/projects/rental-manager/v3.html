/* ============================================================
   알고리즘 1 — 연체 위험 스코어링 (v2 유지)
   ============================================================ */
function riskScore(tenant){
  const hist = S.payHist[tenant.id] || []; const n = hist.length || 1;
  const avgDelay = hist.reduce((a,h)=>a+h.delay,0)/n;
  const lateCnt  = hist.filter(h=>h.delay>0).length; const lateRate = lateCnt/n;
  const maxDelay = hist.reduce((a,h)=>Math.max(a,h.delay),0);
  const recent = hist.slice(0,3).reduce((a,h)=>a+h.delay,0)/Math.min(3,n);
  const end = addMonths(tenant.start, tenant.months);
  const remainMonths = Math.max(0, Math.round(daysBetween(end,'2026-06-16')/30));
  const unpaid = S.charges.some(c=>c.tenant===tenant.id && !c.paid && new Date(c.due)<TODAY);
  let risk = 0;
  risk += Math.min(35, avgDelay*2.2); risk += lateRate*22; risk += Math.min(15, maxDelay*0.6);
  risk += Math.min(12, recent*1.0); risk += unpaid? 14:0; risk += remainMonths<3? 2:0;
  risk = Math.min(100, Math.round(risk));
  let grade,gc,advice;
  if(risk<20){ grade='A'; gc='bg-emerald-50 text-emerald-600'; advice=LANG==='ko'?'안정 — 통상 관리로 충분해요.':'Stable — routine management is enough.'; }
  else if(risk<45){ grade='B'; gc='bg-brand-50 text-brand-700'; advice=LANG==='ko'?'주의 — 납기 D-3 사전 안내를 추천해요.':'Watch — send a D-3 pre-notice.'; }
  else if(risk<70){ grade='C'; gc='bg-amber-50 text-amber-700'; advice=LANG==='ko'?'경고 — 납기 전 알림톡 + 입금 확인 필수.':'Warn — pre-due AlimTalk + verify deposit.'; }
  else { grade='D'; gc='bg-rose-50 text-rose-600'; advice=LANG==='ko'?'고위험 — 보증금 점검·분할납부 협의.':'High-risk — review deposit / installment plan.'; }
  return { risk, grade, gc, advice, avgDelay:Math.round(avgDelay*10)/10, lateCnt, n, maxDelay, remainMonths, unpaid };
}

/* ============================================================
   알고리즘 2 (v3 심화) — 다변수 임대료 회귀
   추정 = 면적단가 × 면적 × (층 가중 × 연식 가중 × 역세권 가중) 를
   peer 회귀(동일 건물 입주세대의 보정후 단가 중앙값)와 시장가로 혼합
   ============================================================ */
function floorFactor(f){ return 1 + ((f||1)-1)*0.02; }                 // 층당 +2%
function ageFactor(year){ const age=2026-(year||2010); return Math.max(0.82, 1 - age*0.006); } // 연식 1년당 -0.6%
function stationFactor(km){ const d=km==null?0.6:km; return d<=0.5?1.06 : d<=1.0?1.0 : 0.95; }  // 역세권 가중
function rentRegression(unit){
  const b=buildingById(unit.b);
  const peers = S.units.filter(u=>u.b===unit.b && u.type==='월세' && u.rent>0 && u.area>0);
  if(!peers.length) return null;
  // peer 보정단가: 각 peer의 월세를 자신의 (층·연식·역세권) 가중으로 나눠 "기준단가"로 정규화
  const norm = peers.map(u=> (u.rent/u.area) / (floorFactor(u.floor)*ageFactor(b.year)*stationFactor(b.station)) ).sort((a,b)=>a-b);
  const medUnit = norm[Math.floor(norm.length/2)];                      // 정규화 기준단가(원/㎡)
  const adj = floorFactor(unit.floor)*ageFactor(b.year)*stationFactor(b.station);
  const modeled = medUnit * unit.area * adj;                            // 회귀 추정
  const market = unit.market||modeled;
  const est = Math.round((modeled*0.6 + market*0.4)/1000)*1000;         // 회귀 60% + 시장가 40%
  const cur = unit.rent||0; const gap = cur? (est-cur)/cur : 0;
  let advice;
  if(!cur) advice = LANG==='ko'?'공실 — 추정가를 출발선으로 책정하세요.':'Vacant — use the estimate as a baseline.';
  else if(gap>0.05) advice = LANG==='ko'?`현재가가 시세 대비 ${PCT(gap*100)} 낮아요. 갱신 시 인상 여지.`:`Below market by ${PCT(gap*100)}. Room to raise at renewal.`;
  else if(gap<-0.05) advice = LANG==='ko'?'현재가가 시세 대비 높아요. 공실 위험 점검.':'Above market. Check vacancy risk.';
  else advice = LANG==='ko'?'현재가가 시세에 적정 범위예요.':'Within the fair market range.';
  return { est, modeled:Math.round(modeled), market, cur, gap, advice,
    factors:{ floor:floorFactor(unit.floor), age:ageFactor(b.year), station:stationFactor(b.station), perArea:Math.round(medUnit) } };
}

/* ============================================================
   알고리즘 3 — 수익률 분석 (v2 유지)
   ============================================================ */
function yieldAnalysis(building){
  const us = S.units.filter(u=>u.b===building.id);
  const annualRent = us.filter(u=>u.type==='월세').reduce((a,u)=>a+(u.rent||0),0)*12;
  const vacancy = us.filter(u=>u.type==='공실').length / Math.max(1,us.length);
  const egi = annualRent; const opex = (building.mgmtFee||0) + annualRent*0.08;
  const noi = egi - opex; const capRate = building.purchase? noi/building.purchase : 0;
  const equity = building.purchase - (building.loan||0); const interest = (building.loan||0)*0.045;
  const cashflow = noi - interest; const roi = equity? cashflow/equity : 0;
  return { annualRent, vacancy, egi, opex, noi, capRate, equity, interest, cashflow, roi, units:us.length, purchase:building.purchase, loan:building.loan };
}

/* ============================================================
   알고리즘 4 (v3 신규) — 12개월 현금흐름 시뮬레이션
   월별: 임대수입(공실·연체 반영) − 관리비 − 대출이자 − 유지보수 적립 ± 일회성(보증금/수선)
   ============================================================ */
function cashflowSim(buildings){
  const blds = buildings;
  const months=[]; for(let i=0;i<12;i++){ months.push(addMonths(MONTH+'-01', i+1).slice(0,7)); }
  let cumulative=0; const rows=[];
  // 연체 위험에 따른 회수율 가중(고위험 임차인 수익 일부 지연)
  blds.forEach(()=>{});
  months.forEach((m,idx)=>{
    let income=0, mgmt=0, interest=0, maint=0, oneoff=0;
    blds.forEach(b=>{
      const us=S.units.filter(u=>u.b===b.id);
      us.forEach(u=>{
        if(u.type==='월세'){
          const t=tenantOfUnit(u.id); const rk=t?riskScore(t).risk:0;
          // 고위험일수록 그 달 회수 확률 하락(시뮬)
          const collectP = rk>=70?0.6 : rk>=45?0.85 : 0.98;
          income += (u.rent||0) * collectP;
        }
        mgmt += (u.mgmt||0)*0.0; // 관리비는 통과(수입·비용 상계) — 단순화
      });
      interest += (b.loan||0)*0.045/12;
      maint += b.mgmtFee/12 + (us.filter(u=>u.type==='월세').reduce((a,u)=>a+(u.rent||0),0))*0.08/12;
      // 일회성: 4개월 후 b1 수선 1회 가정
      if(b.id==='b1' && idx===3) oneoff -= 1500000;
      if(b.id==='b2' && idx===6) oneoff += 5000000; // 공실 B104 신규 임대 보증금 유입 가정
    });
    const net = income - interest - maint + oneoff;
    cumulative += net;
    rows.push({ month:m, income:Math.round(income), interest:Math.round(interest), maint:Math.round(maint), oneoff, net:Math.round(net), cumulative:Math.round(cumulative) });
  });
  const minNet = Math.min(...rows.map(r=>r.net));
  const negMonths = rows.filter(r=>r.net<0).length;
  return { rows, minNet, negMonths, endCumulative:rows[rows.length-1].cumulative };
}

/* ============================================================
   알고리즘 5 (v3 신규) — 임대소득 세금 자동계산
   분리과세(14%, 필요경비 50%·기본공제 200만) vs 종합과세(누진) 비교 + 간주임대료(보증금)
   ============================================================ */
function deemedRent(){ // 간주임대료(3주택 이상·보증금 합계 3억 초과분 × 이자율 2.9% × 60%)
  const totalDeposit = S.units.reduce((a,u)=>a+(u.deposit||0),0);
  const excess = Math.max(0, totalDeposit - 300000000);
  return Math.round(excess * 0.029 * 0.6);
}
function progressiveTax(base){
  // 2026 가정 종합소득세 누진 구간(원)
  const br=[[12000000,0.06,0],[46000000,0.15,1080000],[88000000,0.24,5220000],[150000000,0.35,14900000],[300000000,0.38,19400000],[500000000,0.40,25400000],[1000000000,0.42,35400000],[Infinity,0.45,65400000]];
  for(const [cap,rate,ded] of br){ if(base<=cap) return Math.max(0, Math.round(base*rate-ded)); }
  return 0;
}
function taxCalc(units){
  const annualRent = units.filter(u=>u.type==='월세').reduce((a,u)=>a+(u.rent||0),0)*12;
  const deemed = deemedRent();
  const gross = annualRent + deemed;
  // 분리과세: 필요경비 50%(등록임대 60% 가정 일반 50%) + 기본공제 200만(타소득 2천만 이하 가정)
  const sepBase = Math.max(0, gross*0.5 - 2000000);
  const sepTax = Math.round(sepBase*0.14);
  // 종합과세: 다른 근로/사업소득 가정(기본값 3,000만) 합산 후 누진 — 데모 가정
  const otherIncome = 30000000;
  const compBase = otherIncome + gross*0.5; // 단순화: 임대 필요경비 50%
  const compTaxTotal = progressiveTax(compBase);
  const compTaxOther = progressiveTax(otherIncome);
  const compTax = Math.max(0, compTaxTotal - compTaxOther); // 임대분 한계세액
  const recommend = sepTax<=compTax ? 'separate' : 'global';
  return { annualRent, deemed, gross, sepBase, sepTax, otherIncome, compBase, compTax, recommend, saving:Math.abs(sepTax-compTax), eligibleSeparate: gross<=20000000 };
}

/* ============================================================
   알고리즘 6 (v3 신규) — 포트폴리오 수익률-공실 최적화
   각 건물 공실 호실을 (a)현 공실 유지 (b)시세대로 임대 (c)회귀추정가로 임대 시나리오 비교
   ============================================================ */
function optimizeScenarios(building){
  const us=S.units.filter(u=>u.b===building.id);
  const base=yieldAnalysis(building);
  const vac=us.filter(u=>u.type==='공실');
  const fill=(useEst)=>{
    const addRent=vac.reduce((a,u)=>{ const est=rentRegression({...u,type:'월세',rent:u.market||450000}); return a + (useEst&&est?est.est:(u.market||450000)); },0);
    const egi=(base.annualRent + addRent*12);
    const opex=(building.mgmtFee||0)+egi*0.08; const noi=egi-opex;
    const cap=building.purchase?noi/building.purchase:0;
    const cf=noi-(building.loan||0)*0.045; const roi=base.equity?cf/base.equity:0;
    return { addRent, egi, noi, cap, roi };
  };
  return { base, vacCount:vac.length, asis:{cap:base.capRate,roi:base.roi,noi:base.noi}, market:fill(false), estimate:fill(true) };
}

/* ============================================================
   알고리즘 7 (v3 신규) — 연체 단계별 자동 독촉 룰엔진
   미납 경과일에 따라 D+1 사전안내 → D+7 독촉(알림톡) → D+30 내용증명(mock) 자동 트리거
   ============================================================ */
const DUNNING_RULES = [
  { stage:1, minDays:1, key:'사전안내', en:'Pre-notice', channel:'카카오 알림톡', color:'bg-brand-50 text-brand-700' },
  { stage:2, minDays:7, key:'독촉', en:'Dunning', channel:'카카오 알림톡', color:'bg-amber-50 text-amber-700' },
  { stage:3, minDays:30, key:'내용증명', en:'Cert. mail', channel:'내용증명(mock)', color:'bg-rose-50 text-rose-600' },

function dunningStage(days){ let s=null; DUNNING_RULES.forEach(r=>{ if(days>=r.minDays) s=r; }); return s; }
function runDunningEngine(){
  const overdue = visibleCharges().filter(c=>!c.paid && new Date(c.due)<TODAY);
  let fired=0;
  overdue.forEach(c=>{
    const days=daysBetween('2026-06-16', c.due);
    const rule=dunningStage(days); if(!rule) return;
    const t=tenantById(c.tenant), u=unitById(c.unit);
    const already = S.escalations.find(e=>e.charge===c.id && e.stage===rule.stage);
    if(already) return;
    S.escalations.push({ id:uid(), charge:c.id, tenant:c.tenant, unit:c.unit, stage:rule.stage, key:rule.key, days, at:new Date('2026-06-16T11:'+String(10+S.escalations.length).padStart(2,'0')+':00').toLocaleString('ko-KR',{hour12:false}) });
    if(rule.channel==='카카오 알림톡')
      sendKakao(t.phone,t.name, rule.key, `[임대지기] ${u?.name} 임대료 ${days}일 연체 — ${rule.key} 발송`);
    else { S.notices.push({ id:uid(), at:new Date('2026-06-16T11:30:00').toLocaleString('ko-KR',{hour12:false}), channel:'내용증명(mock)', to:t.phone, name:t.name, template:'내용증명', msg:`[임대지기] ${u?.name} ${days}일 연체 내용증명 발송 처리(mock)`, status:'발송완료' }); }
    fired++;
  });
  persist();
  return fired;
}

function exportCSV(){
  const rows=[['건물','세대','임차인','대상월','임대료','관리비','합계','상태','입금일']];
  visibleCharges().forEach(c=>{ const u=unitById(c.unit), b=buildingById(u.b), t=tenantById(c.tenant);
    rows.push([b?.name,u?.name,t?.name||'',c.month,c.rent,c.mgmt,chargeTotal(c),c.paid?'수납':'미납',c.paidAt||'']); });
  const csv='﻿'+rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=`임대장부_${MONTH}.csv`; a.click(); URL.revokeObjectURL(a.href);
  toast(LANG==='ko'?`수납내역 ${rows.length-1}건을 CSV로 내보냈어요.`:`Exported ${rows.length-1} rows to CSV.`);
}
function importCSVText(text){
  const lines=text.replace(/^﻿/,'').split(/\r?\n/).filter(l=>l.trim()); if(lines.length<2) return {matched:0,total:0};
  const body=lines.slice(1); let matched=0;
  body.forEach(line=>{ const cells=line.split(',').map(s=>s.replace(/^"|"$/g,'').trim());
    const [unitName, , month] = cells; const u=S.units.find(x=>x.name===unitName); if(!u) return;
    const c=S.charges.find(x=>x.unit===u.id && x.month===(month||MONTH)); if(c && !c.paid){ c.paid=true; c.paidAt='2026-06-16'; matched++; } });
  persist(); return {matched, total:body.length};
}

function molitFetch(building){
  // 결정적 mock: 건물 역세권·연식 기반 ±변동으로 최근 실거래 단가 생성
  const seedN = (building.year + Math.round(building.station*100)) % 7;
  const base = 32000 - building.station*4000 + (2026-building.year)*-180; // 원/㎡ 월세 환산 단가(mock)
  const recs = [];
  for(let i=0;i<5;i++){ const area=14+i*2; const per=Math.round(base*(1+((seedN+i)%5-2)*0.03)/100)*100;
    recs.push({ apt:bName(building), area, rent:Math.round(per*area/1000)*1000, deposit:(5+i)*1000000, date:`2026-0${5-(i%3)}-${10+i}` }); }
  return { source:'국토교통부 실거래가 공개시스템 (mock)', avgPerArea:Math.round(base), recs };
}

  const cs=visibleCharges().filter(c=>c.month===MONTH);
  const billed=cs.reduce((a,c)=>a+chargeTotal(c),0);
  const collected=cs.filter(c=>c.paid).reduce((a,c)=>a+chargeTotal(c),0);
  const overdue=cs.filter(c=>!c.paid).reduce((a,c)=>a+chargeTotal(c),0);
  const rate= billed? Math.round(collected/billed*100):0;
  const us=visibleUnits(); const occupied=us.filter(u=>u.type!=='공실').length;
  const occRate= us.length? Math.round(occupied/us.length*100):0;
  const openRepairs=visibleRepairs().filter(r=>r.status!=='완료').length;
  return { billed, collected, overdue, rate, occupied, occRate, openRepairs, total:us.length };
}

function viewContract(){

  const rows=ts.map(t=>{ const u=unitById(t.unit), b=buildingById(u.b); const end=addMonths(t.start,t.months); const dleft=daysBetween(end,'2026-06-16'); const renew=dleft<=60;

      <div class="text-[13px] text-ink-2 mt-0.5">${t.name} · ${u?.type||''} ${u?.type==='전세'?'':'/ '+KRWk(u?.rent||0)}</div>
      <div class="text-[12px] text-ink-3 mt-1">${fmtDate(t.start)} ~ ${fmtDate(end)} (${t.months}${L('개월','mo')})</div></div>
      <div class="flex flex-col items-end gap-1 shrink-0">${ renew? `<span class="badge bg-amber-50 text-amber-700">${L('갱신','Renew')} ${dleft<=0?L('만료','exp'):dleft+L('일 전','d')}</span>` : `<span class="badge bg-emerald-50 text-emerald-600">${L('유효','Active')}</span>` }${ signed? `<span class="badge bg-brand-50 text-brand-700">${L('서명 완료','Signed')}</span>`:'' }</div></div>
      <div class="flex gap-2 mt-3"><button data-contract="${t.id}" class="press flex-1 h-10 rounded-xl bg-brand-600 text-white font-semibold text-sm">📄 ${L('계약서 PDF','Contract PDF')}</button><button data-sign="${t.id}" class="press flex-1 h-10 rounded-xl bg-white border border-surface-line font-semibold text-sm">${signed?'✓ '+L('서명됨','Signed'):'✍ '+L('전자서명','e-Sign')}</button>${ renew? `<button data-renew="${t.id}" class="press h-10 px-3 rounded-xl bg-surface-sub font-semibold text-sm">${L('갱신','Renew')}</button>`:'' }</div></div>`;
  }).join('');
  return `<p class="text-[13px] text-ink-2 mb-3">${L('계약 만료 60일 전이면 갱신 알림이 떠요. 전자서명은 동의 → 서명 캡처 흐름이에요.','Renewal alerts at 60 days before expiry. E-sign is consent → signature capture.')}</p>${rows}`;

function openSign(tid){
  const t=tenantById(tid), u=unitById(t.unit), b=buildingById(u.b);
  modal(`<h3 class="text-lg font-extrabold mb-1">${L('전자서명','E-signature')}</h3><p class="text-[13px] text-ink-2 mb-3">${bName(b)} ${u?.name} · ${t.name}</p>
    <div class="card p-3 mb-3 text-[12px] text-ink-2 leading-relaxed bg-surface-sub">${L('① 알림톡 발송 → ② 동의 → ③ 서명 → ④ 양측 보관. 본 데모는 ②~③을 시연.','① AlimTalk → ② consent → ③ sign → ④ store. Demo shows ②~③.')}</div>
    <label class="flex items-center gap-2 mb-3 text-[13px]"><input type="checkbox" id="signAgree" class="w-4 h-4"> ${L('전자서명에 동의합니다.','I agree to e-sign.')}</label>
    <div class="text-[12px] text-ink-2 mb-1">${L('서명란 (마우스/터치)','Sign (mouse/touch)')}</div>
    <canvas id="signPad" width="480" height="150" class="w-full rounded-xl border border-surface-line bg-white touch-none" style="height:150px"></canvas>
    <div class="flex gap-2 mt-3"><button id="signClear" class="press h-11 px-3 rounded-xl bg-surface-sub font-semibold">${L('지우기','Clear')}</button><button id="signDo" class="press flex-1 h-11 rounded-xl bg-brand-600 text-white font-semibold">${L('서명 완료','Sign')}</button></div>`);
  const cv=document.getElementById('signPad'), ctx=cv.getContext('2d'); ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.strokeStyle='#10213a';
  let drawing=false, has=false;
  const pos=e=>{ const r=cv.getBoundingClientRect(); const cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left; const cy=(e.touches?e.touches[0].clientY:e.clientY)-r.top; return [cx*cv.width/r.width, cy*cv.height/r.height]; };
  const down=e=>{ drawing=true; has=true; const[x,y]=pos(e); ctx.beginPath(); ctx.moveTo(x,y); e.preventDefault(); };
  const move=e=>{ if(!drawing)return; const[x,y]=pos(e); ctx.lineTo(x,y); ctx.stroke(); e.preventDefault(); };
  const up=()=>drawing=false;
  cv.onmousedown=down; cv.onmousemove=move; window.addEventListener('mouseup',up); cv.ontouchstart=down; cv.ontouchmove=move; cv.ontouchend=up;
  document.getElementById('signClear').onclick=()=>{ ctx.clearRect(0,0,cv.width,cv.height); has=false; };
  document.getElementById('signDo').onclick=()=>{
    if(!document.getElementById('signAgree').checked){ toast(L('동의에 체크해 주세요.','Please consent.')); return; }
    if(!has){ toast(L('서명을 입력해 주세요.','Please sign.')); return; }
    const data=cv.toDataURL('image/png'); const ex=S.contracts.find(x=>x.tenant===tid);
    if(ex){ ex.signed=true; ex.sign=data; ex.signedAt=todayISO(); } else S.contracts.push({ id:uid(), tenant:tid, signed:true, sign:data, signedAt:todayISO() });

function bindView(){
  document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>go(b.dataset.view));
  document.querySelectorAll('[data-remind]').forEach(b=>b.onclick=()=>sendRemind(b.dataset.remind));
  document.querySelectorAll('[data-pay]').forEach(b=>b.onclick=()=>markPaid(b.dataset.pay));
  document.querySelectorAll('[data-receipt]').forEach(b=>b.onclick=()=>makeReceiptPDF(b.dataset.receipt));
  document.querySelectorAll('[data-taxinv]').forEach(b=>b.onclick=()=>doTaxInvoice(b.dataset.taxinv));
  document.querySelectorAll('[data-unit]').forEach(b=>b.onclick=()=>unitDetail(b.dataset.unit));
  document.querySelectorAll('[data-contract]').forEach(b=>b.onclick=()=>makeContractPDF(b.dataset.contract));
  document.querySelectorAll('[data-sign]').forEach(b=>b.onclick=()=>openSign(b.dataset.sign));
  document.querySelectorAll('[data-renew]').forEach(b=>b.onclick=()=>renewContract(b.dataset.renew));
  document.querySelectorAll('[data-advance]').forEach(b=>b.onclick=()=>advanceRepair(b.dataset.advance));
  document.querySelectorAll('[data-repairview]').forEach(b=>b.onclick=()=>repairDetail(b.dataset.repairview));
  document.querySelectorAll('[data-riskremind]').forEach(b=>b.onclick=()=>riskRemind(b.dataset.riskremind));
  document.querySelectorAll('[data-riskdetail]').forEach(b=>b.onclick=()=>riskDetail(b.dataset.riskdetail));
  const get=id=>document.getElementById(id);
  if(get('genCharges')) get('genCharges').onclick=genNextMonth;
  if(get('remindAll')) get('remindAll').onclick=remindAll;
  if(get('csvExport')) get('csvExport').onclick=exportCSV;
  if(get('csvImport')) get('csvImport').onclick=openCSVImport;
  if(get('addUnit')) get('addUnit').onclick=()=>openUnitForm();
  if(get('addTenant')) get('addTenant').onclick=()=>openTenantForm();
  if(get('addRepair')) get('addRepair').onclick=()=>openRepairForm();
  if(get('runEngine')) get('runEngine').onclick=()=>{ const n=runDunningEngine(); toast(n? L(`룰엔진이 ${n}건을 단계별로 자동 발송했어요.`,`Engine auto-sent ${n} item(s).`) : L('새로 발동할 단계가 없어요.','No new stage to fire.')); render(); };
  if(get('fireWebhook')) get('fireWebhook').onclick=()=>{ const ev=bankWebhook(); toast(ev.length? L(`입금 webhook ${ev.length}건 수신 → 자동 수납했어요.`,`Received ${ev.length} deposit event(s).`) : L('미납 청구가 없어요.','No unpaid bills.')); render(); };
  if(get('oauthLogout')) get('oauthLogout').onclick=()=>{ S._oauth=null; persist(); openLoginGate(); };
}
function markPaid(id){ const c=S.charges.find(x=>x.id===id); if(!c) return; c.paid=true; c.paidAt=todayISO(); persist(); toast(L('수납 처리했어요.','Marked paid.')); render(); }
function sendRemind(id){ const c=S.charges.find(x=>x.id===id); if(!c) return; const t=tenantById(c.tenant), u=unitById(c.unit);
  sendKakao(t.phone, t.name, '월세납부독촉', `[임대지기] ${u?.name} ${monthLabel(c.month)} 임대료 ${KRW(chargeTotal(c))} 미납 안내`); toast(L(`${t?.name} 님께 독촉 발송`,`Dunning sent to ${t?.name}`)); if(['rent','portfolio','risk'].includes(curView)) render(); }
function remindAll(){ const un=visibleCharges().filter(c=>c.month===MONTH&&!c.paid); if(!un.length){ toast(L('미납 건이 없어요.','No arrears.')); return; }
  un.forEach(c=>{ const t=tenantById(c.tenant),u=unitById(c.unit); sendKakao(t.phone,t.name,'월세납부독촉',`[임대지기] ${u?.name} ${monthLabel(c.month)} 임대료 ${KRW(chargeTotal(c))} 미납 안내`); }); toast(L(`미납 ${un.length}건 일괄 발송`,`Sent ${un.length} dunning`)); render(); }
function riskRemind(id){ const t=tenantById(id), u=unitById(t.unit); sendKakao(t.phone, t.name, '납기사전안내', `[임대지기] ${u?.name} ${monthLabel(MONTH)} 임대료 납기 사전 안내`); toast(L(`${t.name} 님께 사전 안내`,`Pre-notice to ${t.name}`)); }
function genNextMonth(){ const next=addMonths(MONTH+'-01',1).slice(0,7); if(S.charges.some(c=>c.month===next)){ toast(L(`${monthLabel(next)} 청구는 이미 생성됨`,'Already generated')); return; }
  S.tenants.forEach(t=>{ const u=unitById(t.unit); if(!u||u.type==='공실') return; S.charges.push({ id:uid(), unit:u.id, tenant:t.id, month:next, rent:u.rent, mgmt:u.mgmt, due:`${next}-${String(t.payday).padStart(2,'0')}`, paid:false, paidAt:null }); }); persist(); toast(L(`${monthLabel(next)} 청구 자동 생성`,'Generated next month')); }
function doTaxInvoice(id){ const c=S.charges.find(x=>x.id===id); if(!c) return; const inv=issueTaxInvoice(c); toast(L(`전자세금계산서 ${inv.id} 발행`,`e-Tax invoice ${inv.id} issued`)); }

function openCSVImport(){

  modal(`<h3 class="text-lg font-extrabold mb-1">${L('CSV 입금대사','CSV reconcile')}</h3><p class="text-[13px] text-ink-2 mb-3">${L('은행 입금내역 CSV를 붙여넣으면 세대·대상월로 매칭해 자동 수납해요.','Paste bank CSV; auto-reconcile by unit/month.')}</p>
    <div class="text-[12px] text-ink-2 mb-1">${L('형식','Format')}: 세대,임차인,대상월</div>
    <textarea id="csvText" class="w-full h-32 rounded-xl border border-surface-line px-3 py-2 text-[13px] font-mono" placeholder="${sample}"></textarea>
    <button id="csvSample" class="press text-[12px] mt-2 px-3 h-8 rounded-lg bg-surface-sub font-semibold">${L('예시 채우기','Fill sample')}</button>
    <div class="flex gap-2 mt-4"><button id="mdCancel" class="press flex-1 h-12 rounded-xl bg-surface-sub font-semibold">${T('action.cancel')}</button><button id="csvDo" class="press flex-1 h-12 rounded-xl bg-brand-600 text-white font-semibold">${L('대사 실행','Run')}</button></div>`);
  document.getElementById('mdCancel').onclick=closeModal;
  document.getElementById('csvSample').onclick=()=>document.getElementById('csvText').value=sample;
  document.getElementById('csvDo').onclick=()=>{ const txt=document.getElementById('csvText').value.trim(); if(!txt){ toast(L('CSV를 입력해 주세요.','Enter CSV.')); return; }
    const {matched,total}=importCSVText(txt); closeModal(); render(); toast(matched? L(`${total}행 중 ${matched}건 자동 수납`,`${matched}/${total} reconciled`) : L('매칭되는 미납이 없어요.','No match.')); };

function openRepairForm(){

    ${modalActions(role==='tenant'?L('신고하기','Report'):L('접수하기','Submit'))}`,()=>{ const title=val('rTitle'); if(!title){ toast(L('증상을 입력해 주세요.','Enter symptom.')); return false; }
    const u=unitById(val('rUnit')); const t=tenantOfUnit(u.id); S.repairs.push({ id:uid(), b:u.b, unit:u.id, tenant:t?.id, title, status:'접수', priority:val('rPriority'), created:todayISO(), photo:window._repairPhoto||null, note:val('rNote')||'', by:role });

    window._repairPhoto=null; persist(); toast(role==='tenant'?L('하자를 신고했어요.','Reported.'):L('하자보수를 접수했어요.','Submitted.')); go(role==='tenant'?'trepair':'repair'); return true; });

/* ===== PDF ===== */
async function renderPDF(html, filename){
  const stage=document.getElementById('pdfStage'); stage.innerHTML=`<div style="padding:40px 44px;font-family:Pretendard,'Malgun Gothic',sans-serif;color:#1a2230;width:760px;box-sizing:border-box">${html}</div>`;
  await new Promise(r=>setTimeout(r,60)); const canvas=await html2canvas(stage.firstElementChild,{ scale:2, backgroundColor:'#ffffff', width:760 });
  const { jsPDF }=window.jspdf; const pdf=new jsPDF('p','mm','a4'); const w=210, h=canvas.height*w/canvas.width; pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,0,w,h); pdf.save(filename); stage.innerHTML='';
}

async function makeContractPDF(tid){ const t=tenantById(tid), u=unitById(t.unit), b=buildingById(u.b); const end=addMonths(t.start,t.months); const c=S.contracts.find(x=>x.tenant===tid); toast(L('계약서 PDF 생성 중…','Building contract…'));

    <table style="width:100%;font-size:13px;margin-top:36px;border-top:1px solid #e7ebf1;padding-top:16px"><tr><td style="padding:10px 0;width:50%">임대인 성명 ＿＿＿＿＿＿ (인)</td><td style="padding:10px 0">임차인 성명 ${t.name} ${c&&c.signed?`<img src="${c.sign}" style="height:30px;vertical-align:middle;margin-left:6px">`:'(인)'}</td></tr><tr><td style="padding:6px 0">연락처 ＿＿＿＿＿＿＿＿</td><td style="padding:6px 0">연락처 ${t.phone}${c&&c.signed?` · 전자서명 ${c.signedAt}`:''}</td></tr></table><div style="text-align:center;margin-top:24px;font-size:13px;color:#525a68">${todayISO()}</div>`;

// PDF는 항상 한국어 표기(법정 서식)
const KRWko = n => (Math.round(n)||0).toLocaleString('ko-KR')+'원';
const monthLabelKo = m => { const[y,mm]=m.split('-'); return `${y}년 ${+mm}월`; };

/* ===== 모달/시트/드로어 ===== */
function field(id,label,ph,type='text'){ return `<label class="block"><span class="text-[12px] text-ink-2">${label}</span><input id="${id}" type="${type}" placeholder="${ph}" class="mt-1 w-full h-11 rounded-xl border border-surface-line px-3"></label>`; }
function modalActions(submitLabel){ return `<div class="flex gap-2 mt-5"><button id="mdCancel" class="press flex-1 h-12 rounded-xl bg-surface-sub font-semibold">${T('action.cancel')}</button><button id="mdSubmit" class="press flex-1 h-12 rounded-xl bg-brand-600 text-white font-semibold">${submitLabel}</button></div>`; }
const val=id=>{ const e=document.getElementById(id); return e? (e.value||'').trim():''; };
function modal(html, onSubmit){ document.getElementById('modalCard').innerHTML=html; document.getElementById('modalWrap').classList.remove('hidden');
  const c=document.getElementById('mdCancel'); if(c) c.onclick=closeModal; const s=document.getElementById('mdSubmit'); if(s&&onSubmit) s.onclick=()=>{ const ok=onSubmit(); if(ok!==false) closeModal(); }; }
function closeModal(){ document.getElementById('modalWrap').classList.add('hidden'); }
document.getElementById('modalDim').onclick=closeModal;

function renderSheet(){
  const acts = { owner:[ {k:'unit',i:'🏢',t:L('세대 등록','Add unit')},{k:'tenant',i:'🧑',t:L('임차인 배정','Add tenant')},{k:'charge',i:'💸',t:L('다음 달 청구','Next bills')},{k:'repair',i:'🛠️',t:L('하자 접수','Add repair')} ],
    manager:[ {k:'charge',i:'💸',t:L('다음 달 청구','Next bills')},{k:'repair',i:'🛠️',t:L('하자 접수','Add repair')},{k:'rent',i:'✅',t:L('수납 처리','Collect')},{k:'notice',i:'🔔',t:L('독촉 발송','Dun all')} ],
    tenant:[ {k:'repair',i:'🛠️',t:L('하자 신고','Report')},{k:'bill',i:'💳',t:L('청구 보기','Bills')} ] };

}

function closeSheet(){ const w=document.getElementById('sheetWrap'), s=document.getElementById('sheet'); s.classList.add('sheet-enter'); setTimeout(()=>w.classList.add('hidden'),280); }
document.getElementById('sheetClose').onclick=closeSheet; document.getElementById('sheetDim').onclick=closeSheet;

document.getElementById('langBtn').onclick=toggleLang; document.getElementById('mLangBtn').onclick=toggleLang;

document.documentElement.lang=LANG;

go(curView);

</script>
