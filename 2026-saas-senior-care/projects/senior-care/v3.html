<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>돌봄노트 · 장기요양기관 운영 SaaS (v3)</title>
<!-- jsPDF (오프라인 폴백: 없으면 mock 안내) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    /* 케어 도메인 브랜드 — 신뢰의 틸/그린, WCAG AA 계산 톤 */
    --brand:#0e8f7e; --brand-d:#0a6d60; --brand-l:#e6f5f2;
    --ink:#15302c; --sec:#4d6a64; --ter:#86a09a;
    --bg:#f4f8f7; --surf:#ffffff; --surf2:#eef4f3; --line:#dfe9e7;
    --ok:#1f9d57; --okbg:#e7f6ee; --warn:#c98a00; --warnbg:#fdf3da;
    --bad:#d24b4b; --badbg:#fbeaea; --info:#2f6fd0; --infobg:#e8f0fb;
    --r:14px; --r2:18px;
    --sb:248px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;max-width:100%;overflow-x:hidden}
  body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;
    background:linear-gradient(180deg,#eef6f4,#f4f8f7 240px);color:var(--ink);font-size:15px;line-height:1.5}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:15px}
  h1,h2,h3,h4{margin:0;line-height:1.25}
  .muted{color:var(--sec)} .ter{color:var(--ter)}
  .hidden{display:none!important}
  /* ===== layout ===== */
  .app{display:flex;min-height:100vh}
  .sidebar{width:var(--sb);flex:0 0 var(--sb);background:var(--surf);border-right:1px solid var(--line);
    position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:18px 12px;gap:4px;overflow-y:auto}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 14px}
  .brand .logo{width:34px;height:34px;border-radius:10px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800;font-size:18px}
  .brand b{font-size:18px}
  .navsec{font-size:11px;font-weight:700;color:var(--ter);padding:12px 10px 4px;letter-spacing:.04em}
  .nav{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:11px;color:var(--sec);font-weight:600;font-size:14px;transition:.12s;width:100%;text-align:left}
  .nav:hover{background:var(--surf2)}
  .nav.active{background:var(--brand-l);color:var(--brand-d)}
  .nav .ic{width:20px;text-align:center}
  .nav .badge{margin-left:auto;background:var(--bad);color:#fff;font-size:11px;font-weight:700;border-radius:9px;padding:1px 7px}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:12px;padding:12px 22px;
    background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(18px);border-bottom:1px solid var(--line)}
  @supports not (backdrop-filter:blur(1px)){.topbar{background:#fff}}
  .topbar h2{font-size:18px}
  .grow{flex:1}
  .content{padding:22px;max-width:1180px;width:100%;margin:0 auto}
  /* role chip */
  .rolepick{display:flex;gap:4px;background:var(--surf2);border-radius:11px;padding:4px}
  .rolepick button{padding:7px 11px;border-radius:8px;font-size:13px;font-weight:600;color:var(--sec)}
  .rolepick button.on{background:var(--surf);color:var(--brand-d);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .tenantpick{display:flex;flex-direction:column;gap:4px;margin-bottom:4px}
  .tenantpick button{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:10px;font-size:13px;font-weight:600;color:var(--sec);text-align:left;border:1px solid transparent}
  .tenantpick button::before{content:"";width:8px;height:8px;border-radius:3px;background:var(--ter);flex:0 0 auto}
  .tenantpick button.on{background:var(--brand-l);color:var(--brand-d);border-color:var(--brand)}
  .tenantpick button.on::before{background:var(--brand)}
  .iconbtn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:17px;color:var(--sec);background:var(--surf2)}
  .iconbtn:active{transform:scale(.95)}
  /* cards */
  .card{background:var(--surf);border:1px solid var(--line);border-radius:var(--r2);padding:18px}
  .grid{display:grid;gap:14px}
  .g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
  .kpi .v{font-size:26px;font-weight:800;letter-spacing:-.02em}
  .kpi .l{font-size:13px;color:var(--sec);font-weight:600}
  .kpi .d{font-size:12px;margin-top:3px}
  .row{display:flex;align-items:center;gap:10px}
  .sp{justify-content:space-between}
  .wrap{flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:3px 9px;border-radius:999px}
  .pill.ok{background:var(--okbg);color:var(--ok)} .pill.warn{background:var(--warnbg);color:var(--warn)}
  .pill.bad{background:var(--badbg);color:var(--bad)} .pill.info{background:var(--infobg);color:var(--info)}
  .pill.brand{background:var(--brand-l);color:var(--brand-d)} .pill.gray{background:var(--surf2);color:var(--sec)}
  .grade{display:inline-grid;place-items:center;width:30px;height:30px;border-radius:9px;font-weight:800;font-size:14px;background:var(--brand-l);color:var(--brand-d)}
  .grade.g1{background:#fbeaea;color:#c0392b}.grade.g2{background:#fdf0e0;color:#c98a00}.grade.g3{background:#fdf8e0;color:#a08600}
  .grade.g4{background:#eaf6ee;color:#1f9d57}.grade.g5{background:#e8f0fb;color:#2f6fd0}.grade.gc{background:#efeafb;color:#6a3fb5}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 15px;border-radius:11px;font-weight:700;font-size:14px;background:var(--surf2);color:var(--ink);transition:.12s}
  .btn:active{transform:scale(.97)} .btn.pri{background:var(--brand);color:#fff} .btn.pri:hover{background:var(--brand-d)}
  .btn.dang{background:var(--badbg);color:var(--bad)} .btn.sm{padding:6px 11px;font-size:13px;border-radius:9px}
  .btn.gho{background:transparent;border:1px solid var(--line)}
  .btn:disabled{opacity:.4;pointer-events:none}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{font-size:12px;color:var(--ter);font-weight:700}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--brand-l);color:var(--brand-d);display:grid;place-items:center;font-weight:700;font-size:13px;flex:0 0 auto}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
  .field label{font-size:13px;font-weight:600;color:var(--sec)}

  .seg{display:flex;gap:6px;flex-wrap:wrap}

  .seg button.on{background:var(--brand);color:#fff}
  .progress{height:8px;background:var(--surf2);border-radius:99px;overflow:hidden}
  .progress > i{display:block;height:100%;background:var(--brand);border-radius:99px}
  /* modal & sheet */
  .ovl{position:fixed;inset:0;z-index:60;background:rgba(21,48,44,.32);display:grid;place-items:center;padding:18px}
  .modal{background:var(--surf);border-radius:20px;max-width:560px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.22)}

  .modal .bd{padding:18px}
  .modal .ft{position:sticky;bottom:0;background:var(--surf);padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}

  #toasts{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
  .toast{background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;transform:translateY(8px);transition:.25s}
  .toast.show{opacity:1;transform:none}
  /* charts */
  .bars{display:flex;align-items:flex-end;gap:8px;height:140px}
  .bars .bar{flex:1;background:var(--brand-l);border-radius:8px 8px 0 0;position:relative;min-height:4px}
  .bars .bar > i{position:absolute;bottom:0;left:0;right:0;background:var(--brand);border-radius:8px 8px 0 0}
  .bars .bar span{position:absolute;top:-18px;left:0;right:0;text-align:center;font-size:11px;font-weight:700;color:var(--sec)}
  .bars .lbl{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:11px;color:var(--ter)}
  .donut{width:120px;height:120px;border-radius:50%;flex:0 0 auto}
  .checkitem{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line)}
  .checkbox{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex:0 0 auto;display:grid;place-items:center;color:#fff;font-size:13px}
  .checkbox.on{background:var(--brand);border-color:var(--brand)}
  .photoslot{aspect-ratio:1;border-radius:12px;background:var(--surf2);border:1.5px dashed var(--line);display:grid;place-items:center;overflow:hidden;color:var(--ter);font-size:12px;text-align:center}
  .photoslot img{width:100%;height:100%;object-fit:cover}
  .tl{position:relative;padding-left:22px}
  .tl::before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
  .tl .it{position:relative;padding:0 0 14px}
  .tl .it::before{content:"";position:absolute;left:-21px;top:4px;width:11px;height:11px;border-radius:50%;background:var(--brand);border:2px solid var(--surf)}
  /* mobile chrome */
  .mtop{display:none}
  .bottomnav{display:none}
  .drawer,.drawerbd{display:none}
  /* ===== responsive ===== */
  @media (max-width:860px){
    .sidebar{display:none}
    .topbar{display:none}
    .mtop{display:flex;position:sticky;top:0;z-index:40;align-items:center;gap:10px;padding:11px 14px;
      background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(18px);border-bottom:1px solid var(--line)}
    .mtop .logo{width:30px;height:30px;border-radius:9px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800}
    .mtop b{font-size:16px}
    .content{padding:14px 14px 96px;max-width:100%}
    .g2,.g3,.g4{grid-template-columns:1fr}
    .g2.keep{grid-template-columns:1fr 1fr}
    .g3.imgrid{grid-template-columns:repeat(3,1fr)}
    .bottomnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.92);
      backdrop-filter:saturate(180%) blur(18px);border-top:1px solid var(--line);padding:6px 4px 8px;justify-content:space-around}
    .bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:11px;font-weight:600;color:var(--ter);padding:5px 2px;position:relative}
    .bottomnav button.on{color:var(--brand-d)}
    .bottomnav .ic{font-size:19px}
    .bottomnav .badge{position:absolute;top:0;right:18%;background:var(--bad);color:#fff;font-size:9px;border-radius:8px;padding:0 5px;font-weight:700}
    .drawerbd{display:block;position:fixed;inset:0;z-index:70;background:rgba(21,48,44,.34)}
    .drawer{display:flex;flex-direction:column;position:fixed;top:0;bottom:0;right:0;width:84%;max-width:320px;z-index:71;
      background:var(--surf);padding:16px 12px;overflow-y:auto;box-shadow:-12px 0 40px rgba(0,0,0,.2)}
    .modal{max-width:100%;border-radius:18px 18px 0 0;align-self:flex-end;max-height:92vh}
    .ovl{place-items:end center;padding:0}
    #toasts{bottom:96px}
    .content .card{padding:15px}
    .kpi .v{font-size:22px}
  }
  @media (max-width:380px){ .g2.keep{grid-template-columns:1fr} }
</style>

<script>
/* ===========================================================================

   기능 카운트 목록은 파일 하단 FEATURES[] 배열 참조 (결과보고서 §2 기능표 소스).

const LS_KEY = "doltbom-v3";
const won = n => "₩" + Math.round(n).toLocaleString("ko-KR");

    ],

  };
}
function seed(){

    { id:"t1", name:"행복재가복지센터", code:"L-2024-0917", region:"대구광역시 수성구", capacity:50,
      staff:[
        { id:"s1", name:"한미경", role:"사회복지사", tel:"010-7001-****", cert:"사회복지사 1급", assigned:["r1","r2","r3"], color:"#0e8f7e", home:[35.857,128.62] },
        { id:"s2", name:"오정자", role:"요양보호사", tel:"010-7002-****", cert:"요양보호사 1급", assigned:["r1","r3"], color:"#2f6fd0", home:[35.853,128.63] },
        { id:"s3", name:"신복희", role:"요양보호사", tel:"010-7003-****", cert:"요양보호사 1급", assigned:["r2","r4"], color:"#c98a00", home:[35.86,128.61] },
        { id:"s4", name:"문간호", role:"간호사", tel:"010-7004-****", cert:"간호사", assigned:["r2","r3"], color:"#6a3fb5", home:[35.848,128.64] },
        { id:"s5", name:"강요양", role:"요양보호사", tel:"010-7005-****", cert:"요양보호사 2급", assigned:["r4","r5"], color:"#d24b4b", home:[35.862,128.635] },
      ] },
    [
      { id:"r1", name:"김순자", birth:"1939-03-12", gender:"F", grade:"2", copay:"감경40",
        disease:["고혈압","경증치매","관절염"], addr:"수성구 범어동", loc:[35.858,128.625], guardian:"김민호(아들)", guardianTel:"010-1234-****",
        services:["방문요양-90","방문목욕-차량"], note:"보행보조기 사용. 낙상 주의.", since:"2023-05-01", falls12m:1, hosp12m:0, meds:5, weightDrop:false },
      { id:"r2", name:"박영수", birth:"1942-11-02", gender:"M", grade:"3", copay:"일반",
        disease:["당뇨","뇌졸중 후유증"], addr:"수성구 만촌동", loc:[35.855,128.635], guardian:"박지영(딸)", guardianTel:"010-2222-****",
        services:["방문요양-60","방문간호-60"], note:"인슐린 투여. 좌측 편마비.", since:"2023-09-15", falls12m:0, hosp12m:1, meds:7, weightDrop:false },
      { id:"r3", name:"이말순", birth:"1936-06-22", gender:"F", grade:"1", copay:"기초수급",
        disease:["중증치매","욕창","연하곤란"], addr:"수성구 황금동", loc:[35.849,128.628], guardian:"이정훈(아들)", guardianTel:"010-3333-****",
        services:["방문요양-120","방문간호-60"], note:"와상 상태. 체위변경 2시간마다.", since:"2022-12-01", falls12m:2, hosp12m:2, meds:9, weightDrop:true },
      { id:"r4", name:"최복동", birth:"1945-01-18", gender:"M", grade:"4", copay:"일반",
        disease:["파킨슨병"], addr:"수성구 두산동", loc:[35.861,128.62], guardian:"최수연(딸)", guardianTel:"010-4444-****",
        services:["주야간보호-8h"], note:"낮 동안 주야간보호 이용. 약 복용 관리 필요.", since:"2024-01-10", falls12m:1, hosp12m:0, meds:6, weightDrop:false },
      { id:"r5", name:"정금례", birth:"1940-08-30", gender:"F", grade:"인지지원", copay:"감경60",
        disease:["경도인지장애"], addr:"수성구 지산동", loc:[35.852,128.64], guardian:"정태우(아들)", guardianTel:"010-5555-****",
        services:["주야간보호-8h"], note:"인지자극 프로그램 참여 적극적.", since:"2024-03-05", falls12m:0, hosp12m:0, meds:3, weightDrop:false },
    ]);
  const t2 = seedTenant(

function migrate(s){
  // v2: 테넌트별 방문/근태/케어플랜 자동 생성(시드 후 1회)
  if(!s._tenants){ // v1 단일구조에서 올라온 경우는 무시하고 새 시드 (v2는 LS_KEY 분리)
    return seedAndFill(seed());
  }
  return seedAndFill(s);
}
function seedAndFill(s){
  Object.values(s._tenants).forEach(td=>{
    if(!td.carePlans || Object.keys(td.carePlans).length===0){
      td.carePlans = {};
      td.recipients.forEach(r=>{ td.carePlans[r.id] = defaultPlan(r); });
    }
    if(!td.visits || td.visits.length===0) td.visits = seedVisits(td);
    if(!td.attendance) td.attendance = [];
    if(!td.notices) td.notices=[];
    if(!td.claims) td.claims=[];
    if(!td.audit) td.audit=[];
  });
  return s;
}

function defFreq(code){

/* ---------- 상태 로드/저장 ----------
   v2 멀티테넌트: S 는 글로벌(역할·뷰·언어·테넌트 레지스트리)을 들고,
   recipients/staff/visits/org/... 같은 운영 필드는 활성 테넌트(D())로 위임하는
   getter 를 S 에 설치한다. 이렇게 하면 기존 v1 뷰 코드(S.recipients 등)를 그대로 재사용한다. */
const TENANT_FIELDS=["org","recipients","staff","carePlans","visits","attendance","notices","claims","notifs","audit"];
function installTenantProxies(s){
  TENANT_FIELDS.forEach(f=>{
    Object.defineProperty(s, f, {
      configurable:true,
      get(){ return s._tenants[s._activeTenant][f]; },
      set(v){ s._tenants[s._activeTenant][f]=v; },
    });
  });
  return s;
}
let S = load();
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw) return installTenantProxies(migrate(JSON.parse(raw)));
  }catch(e){}
  const s = installTenantProxies(migrate(seed()));
  save(s); return s;
}
function save(s){ try{ localStorage.setItem(LS_KEY, JSON.stringify(s||S)); }catch(e){} }
function commit(){ save(S); render(); }

// 급여비 산정: 케어플랜 서비스 × 수가 × 월 횟수
function calcMonthlyBilling(rid){
  const r = S.recipients.find(x=>x.id===rid); const plan=S.carePlans[rid];
  if(!r||!plan) return null;
  let lines=[], gross=0;
  plan.services.forEach(sv=>{
    const fee = FEE_SCHEDULE[sv.code]; if(!fee) return;
    const amt = fee.unit * (sv.freq||0);
    gross += amt;
    lines.push({ code:sv.code, name:fee.name, unit:fee.unit, freq:sv.freq||0, amount:amt });
  });
  const cap = MONTHLY_CAP[r.grade] || 0;
  const capped = Math.min(gross, cap);
  const overCap = Math.max(0, gross-cap);
  const rate = COPAY_RATE[r.copay] ?? 0.15;
  const copay = Math.round(capped*rate);
  const insurance = capped - copay; // 공단 부담
  return { lines, gross, cap, capped, overCap, rate, copay, insurance, grade:r.grade, copayType:r.copay };
}
// 위험 스코어: 등급/질환/최근 기록 mood 기반
function riskScore(rid){
  const r=S.recipients.find(x=>x.id===rid); if(!r) return 0;
  let sc=0;
  sc += ({"1":40,"2":30,"3":20,"4":12,"5":8,"인지지원":6})[r.grade]||10;
  const heavy=["욕창","연하곤란","중증치매","뇌졸중 후유증","파킨슨병"];
  r.disease.forEach(d=>{ if(heavy.some(h=>d.includes(h.replace(" 후유증","")))) sc+=12; else sc+=4; });
  const vs = S.visits.filter(v=>v.rid===rid);
  if(vs.some(v=>v.mood==="주의")) sc+=15;
  return Math.min(100, sc);
}
function riskLevel(sc){ return sc>=60?{k:"bad",l:"고위험"}:sc>=35?{k:"warn",l:"주의"}:{k:"ok",l:"안정"}; }
function age(birth){ return new Date().getFullYear()-Number(birth.slice(0,4)); }

/* 통계 집계 */
function stats(){

/* ===========================================================================
   v2 알고리즘 엔진 (실 알고리즘 — 룰 기반에서 데이터 기반으로 심화)
   =========================================================================== */

/* ── (1) 낙상 위험 예측: 로지스틱 회귀 ──────────────────────────────────────
   features → 표준화 → 가중합(logit) → 시그모이드 확률. 계수는 노인 낙상 위험요인
   문헌(다약제·기왕력·인지저하·체중감소 등)을 근거로 한 데모 가중치.
   ⚠ 데모용 계수 — 실제 임상 적용 전 코호트 데이터로 보정 필요. */
const FALL_MODEL = {
  // [feature, weight] — logit = b0 + Σ w·x  (x 는 정규화된 값)
  intercept: -1.65,
  weights: {
    age:        0.030,   // (나이-80)
    grade:      0.62,    // 등급 심각도 가중(1등급=가장 큼)
    falls12m:   0.95,    // 최근 12개월 낙상 횟수
    hosp12m:    0.55,    // 최근 12개월 입원 횟수
    meds:       0.14,    // 복용 약물 수 (다약제)
    cognition:  0.70,    // 치매/인지저하 동반
    mobility:   0.80,    // 뇌졸중/파킨슨 등 보행장애
    weightDrop: 0.60,    // 최근 체중감소 여부
    incident:   0.45,    // 최근 방문기록 '주의/위험' 신호
  },
};
function gradeSeverity(g){ return ({"1":1.0,"2":0.8,"3":0.6,"4":0.4,"5":0.25,"인지지원":0.2})[g] ?? 0.4; }
function fallFeatures(r){
  const cog = r.disease.some(d=>/치매|인지/.test(d)) ? 1 : 0;
  const mob = r.disease.some(d=>/뇌졸중|파킨슨|편마비/.test(d)) ? 1 : 0;
  const incident = S.visits.filter(v=>v.rid===r.id).some(v=>v.mood==="주의"||v.mood==="위험") ? 1 : 0;
  return {
    age: (age(r.birth)-80)/10,
    grade: gradeSeverity(r.grade),
    falls12m: (r.falls12m||0),
    hosp12m: (r.hosp12m||0),
    meds: ((r.meds||0)-5)/3,
    cognition: cog,
    mobility: mob,
    weightDrop: r.weightDrop?1:0,
    incident,
  };
}
function sigmoid(z){ return 1/(1+Math.exp(-z)); }
function fallRisk(r){
  const f=fallFeatures(r); const w=FALL_MODEL.weights;
  let logit=FALL_MODEL.intercept;
  const contrib={};
  Object.keys(w).forEach(k=>{ const c=w[k]*f[k]; logit+=c; contrib[k]=c; });
  const p=sigmoid(logit);
  // 상위 기여 요인 정렬(설명가능성)
  const top=Object.entries(contrib).filter(([,v])=>v>0.001).sort((a,b)=>b[1]-a[1]).slice(0,3);
  return { p, logit, contrib, top, band: p>=0.6?"high":p>=0.35?"mid":"low" };
}
const FEAT_LABEL={age:"고령(80세+)",grade:"요양등급 심각도",falls12m:"최근 낙상 이력",hosp12m:"최근 입원 이력",meds:"다약제 복용",cognition:"인지저하 동반",mobility:"보행장애 동반",weightDrop:"최근 체중감소",incident:"방문기록 주의신호"};

/* ── (2) 인력 배치 최적화: 부하·이동거리 최소 그리디 배정 ──────────────────
   각 어르신을 직원에게 배정하되 (a) 직무 적합성 (b) 이동거리 (c) 현재 부하
   를 비용으로 환산해 최소비용 직원을 그리디 선택. 배정 전/후 부하 표준편차로 개선폭 측정. */
function haversine(a,b){ // [lat,lng] → km (근사)
  if(!a||!b) return 5;
  const toR=d=>d*Math.PI/180, R=6371;
  const dLat=toR(b[0]-a[0]), dLng=toR(b[1]-a[1]);
  const x=Math.sin(dLat/2)**2+Math.cos(toR(a[0]))*Math.cos(toR(b[0]))*Math.sin(dLng/2)**2;
  return R*2*Math.asin(Math.sqrt(x));
}
function needsNurse(r){ return r.disease.some(d=>/욕창|연하곤란|당뇨|뇌졸중/.test(d)) || r.services.some(s=>s.startsWith("방문간호")); }
function optimizeAssignment(){
  const staff=S.staff.map(s=>({...s, load:0, picks:[]}));
  // 부하: 등급 가중 점수
  const recips=S.recipients.map(r=>({r, weight: gradeSeverity(r.grade)*10, nurse:needsNurse(r)}))
    .sort((a,b)=>b.weight-a.weight); // 무거운 케이스 먼저(LPT 휴리스틱)
  const detail=[];
  recips.forEach(({r,weight,nurse})=>{
    let best=null, bestCost=Infinity, breakdown=null;
    staff.forEach(s=>{
      const dist=haversine(s.home,r.loc);
      const isNurse=/간호/.test(s.role);
      const skillPenalty = nurse && !isNurse ? 14 : 0;     // 간호필요인데 비간호사면 패널티
      const distCost = dist*1.2;
      const loadCost = s.load*0.9;                          // 부하 균형
      const cost = skillPenalty + distCost + loadCost;
      if(cost<bestCost){ bestCost=cost; best=s; breakdown={dist:+dist.toFixed(1),skillPenalty,loadCost:+loadCost.toFixed(1)}; }
    });
    best.load+=weight; best.picks.push(r.id);
    detail.push({ rid:r.id, name:r.name, grade:r.grade, nurse, sid:best.id, sname:best.name, cost:+bestCost.toFixed(1), ...breakdown });
  });
  // 개선폭: 기존 assigned 분포 부하 vs 최적화 부하 표준편차
  const before=S.staff.map(s=> (s.assigned||[]).reduce((a,rid)=>{const r=S.recipients.find(x=>x.id===rid);return a+(r?gradeSeverity(r.grade)*10:0);},0));
  const after=staff.map(s=>s.load);
  return { staff, detail, beforeStd:+std(before).toFixed(1), afterStd:+std(after).toFixed(1),
    beforeMax:+Math.max(...before,0).toFixed(0), afterMax:+Math.max(...after,0).toFixed(0) };
}
function std(arr){ if(!arr.length) return 0; const m=arr.reduce((a,b)=>a+b,0)/arr.length; return Math.sqrt(arr.reduce((a,b)=>a+(b-m)**2,0)/arr.length); }

/* ── (3) 수가/매출 시뮬레이션: 가동률·믹스·인상률 시나리오 → 월·연 매출 투영 ── */
function revenueSim(params){
  // params: occupancy(0~1), feeHike(%), nightShare(0~1 주야간 비중), capacity
  const cap=params.capacity;
  const beds=Math.round(cap*params.occupancy);
  const hikeFactor=1+params.feeHike/100;
  // 1인 월평균 공단급여(현 재원자 기준 평균) × 인상 × 정원가동
  const billing=S.recipients.map(r=>calcMonthlyBilling(r.id)).filter(Boolean);
  const avgIns = billing.length? billing.reduce((a,b)=>a+b.insurance,0)/billing.length : 1000000;
  const avgCopay = billing.length? billing.reduce((a,b)=>a+b.copay,0)/billing.length : 150000;
  const nightUplift = 1+params.nightShare*0.08; // 주야간 비중↑ → 회전·부가수익 가정
  const monthlyIns = beds*avgIns*hikeFactor*nightUplift;
  const monthlyCopay = beds*avgCopay*hikeFactor;
  const monthly = monthlyIns+monthlyCopay;
  return { beds, avgIns, avgCopay, monthlyIns, monthlyCopay, monthly, annual: monthly*12 };
}

/* ===========================================================================
   v3 알고리즘 엔진 (시리즈A 도약 — 예측·벤치마킹·약물안전·이탈)
   v2 의 로지스틱·최적화 위에 4종 추가. 모두 외부 라이브러리 없이 자체 구현.
   =========================================================================== */

/* ── (4) 입소/수요 예측: Holt 선형추세 지수평활(이중 지수평활) ──────────────
   과거 월별 재원 인원 시계열에 Holt(level+trend) 평활을 적용해 향후 N개월
   재원 인원·정원 가동률·예상 월매출을 예측한다. 95% 예측구간을 잔차 std로 근사. */
function tenantAdmissionSeries(td){
  // 결정적 시드: 테넌트 id + 현 재원수 기반으로 과거 12개월 시계열 합성(랜덤 없음 → 재현 가능)
  const base=td.recipients.length;
  const seedN=td.org.id.charCodeAt(1)||1;
  const arr=[];
  for(let i=0;i<12;i++){
    // 완만한 성장 + 계절성(겨울 입소↑) + 결정적 흔들림
    const trend=i*0.18;
    const season=Math.sin((i+seedN)/12*2*Math.PI)*0.9;
    const wobble=((i*seedN*7)%5-2)*0.25;
    arr.push(Math.max(1, Math.round(base-2+trend+season+wobble)));
  }
  arr[11]=base; // 최신값은 실제 현 재원수에 고정
  return arr;
}
function holtForecast(series, horizon){
  const alpha=0.5, beta=0.3;
  let level=series[0], trend=series[1]-series[0];
  const fitted=[series[0]];
  for(let i=1;i<series.length;i++){
    const prevLevel=level;
    level=alpha*series[i]+(1-alpha)*(level+trend);
    trend=beta*(level-prevLevel)+(1-beta)*trend;
    fitted.push(prevLevel+trend);
  }
  const resid=series.map((y,i)=>y-fitted[i]);
  const sigma=std(resid);
  const fc=[];
  for(let h=1;h<=horizon;h++){
    const yhat=level+h*trend;
    fc.push({ h, mean:yhat, lo:yhat-1.96*sigma*Math.sqrt(h), hi:yhat+1.96*sigma*Math.sqrt(h) });
  }
  return { level:+level.toFixed(2), trend:+trend.toFixed(3), sigma:+sigma.toFixed(2), fitted, fc };
}
function demandForecast(td, horizon){
  const series=tenantAdmissionSeries(td);
  const h=holtForecast(series, horizon);
  const cap=td.org.capacity;
  const billing=td.recipients.map(r=>{ const plan=td.carePlans[r.id]; if(!plan) return 0;
    let g=0; plan.services.forEach(sv=>{const f=FEE_SCHEDULE[sv.code]; if(f) g+=f.unit*(sv.freq||0);});
    const capped=Math.min(g,MONTHLY_CAP[r.grade]||0); return capped*(1-(COPAY_RATE[r.copay]??0.15)); });
  const perCapita=billing.reduce((a,b)=>a+b,0)/Math.max(1,td.recipients.length);
  const proj=h.fc.map(f=>({...f, occ:Math.min(100,Math.round(f.mean/cap*100)), revenue:Math.round(Math.max(0,f.mean)*perCapita) }));
  return { series, ...h, proj, cap, perCapita };
}

/* ── (5) 케어 질 지표 벤치마킹: 다기관 비교 + 백분위(percentile rank) ────────
   각 시설의 KPI(고위험비율·방문완수율·1인부하·평균위험 등)를 법인 내 전 시설과
   비교해 백분위 순위를 매긴다. 외부 업계 벤치마크 대비 갭도 표시. */
const INDUSTRY_BENCH={ highRiskRatio:0.28, checkRate:0.88, loadStd:5.0, avgRisk:0.42, claimPerCap:1100000 };
function facilityQuality(td){
  const recs=td.recipients;
  const fr=recs.map(r=>predictFallFor(td,r).p);
  const highRiskRatio=fr.filter(p=>p>=0.6).length/Math.max(1,recs.length);
  const avgRisk=fr.reduce((a,b)=>a+b,0)/Math.max(1,fr.length);
  const visits=td.visits||[];
  const checkRate=visits.length?visits.reduce((a,v)=>a+v.checks/v.total,0)/visits.length:0.85;
  const loadByStaff=td.staff.map(s=>(s.assigned||[]).reduce((a,rid)=>{const r=recs.find(x=>x.id===rid);return a+(r?gradeSeverity(r.grade)*10:0);},0));
  const loadStd=std(loadByStaff);
  const billing=recs.map(r=>{const plan=td.carePlans[r.id];if(!plan)return 0;let g=0;plan.services.forEach(sv=>{const f=FEE_SCHEDULE[sv.code];if(f)g+=f.unit*(sv.freq||0);});return Math.min(g,MONTHLY_CAP[r.grade]||0)*(1-(COPAY_RATE[r.copay]??0.15));});
  const claimPerCap=billing.reduce((a,b)=>a+b,0)/Math.max(1,recs.length);
  return { id:td.org.id, name:td.org.name, highRiskRatio, avgRisk, checkRate, loadStd, claimPerCap };
}
function percentileRank(values, v){ // 동점 보정 midrank 백분위 (낮은 값=0%, 높은 값=100%)
  const n=values.length; if(n<=1) return 50;
  const below=values.filter(x=>x<v).length;
  const equal=values.filter(x=>x===v).length;
  // midrank: 동점은 평균 순위로 → 단일 시설이 0/100 극단으로 튀지 않게
  return Math.round((below+(equal-1)/2)/(n-1)*100);
}
function qualityBenchmark(){
  const all=tenantList().map(facilityQuality);
  const metrics=[
    { key:"checkRate", label:"방문 서비스 완수율", higherBetter:true, fmt:v=>Math.round(v*100)+"%", bench:INDUSTRY_BENCH.checkRate },
    { key:"highRiskRatio", label:"고위험 어르신 비율", higherBetter:false, fmt:v=>Math.round(v*100)+"%", bench:INDUSTRY_BENCH.highRiskRatio },
    { key:"avgRisk", label:"평균 낙상위험 확률", higherBetter:false, fmt:v=>Math.round(v*100)+"%", bench:INDUSTRY_BENCH.avgRisk },
    { key:"loadStd", label:"인력 부하 편차", higherBetter:false, fmt:v=>v.toFixed(1), bench:INDUSTRY_BENCH.loadStd },
    { key:"claimPerCap", label:"1인 월 공단청구", higherBetter:true, fmt:v=>won(v), bench:INDUSTRY_BENCH.claimPerCap },
  ];
  return { all, metrics };
}

/* ── (6) 약물 상호작용(DDI) 체크: 질환→처방 약물 추정 후 상호작용 규칙 매칭 ──
   어르신 질환에서 대표 처방 약물군을 추정하고, 알려진 상호작용 규칙쌍과 매칭해
   위험 등급(중대/주의)·임상 메모를 제시한다. 데모용 규칙셋(임상 검증 전). */
const DISEASE_DRUGS={ "고혈압":["암로디핀","로사르탄"],"당뇨":["메트포르민","글리메피리드"],"경증치매":["도네페질"],"중증치매":["도네페질","메만틴"],"경도인지장애":["도네페질"],"뇌졸중 후유증":["아스피린","와파린"],"파킨슨병":["레보도파"],"관절염":["이부프로펜","나프록센"],"욕창":["항생제"],"연하곤란":[],"고지혈증":["심바스타틴"] };
const DDI_RULES=[
  { a:"와파린", b:"이부프로펜", sev:"중대", note:"출혈 위험 증가 — 병용 회피, 위장보호제 고려" },
  { a:"와파린", b:"나프록센", sev:"중대", note:"항응고 작용 증강·출혈 위험" },
  { a:"와파린", b:"아스피린", sev:"중대", note:"이중 항혈전 — 출혈 모니터링 필수" },
  { a:"글리메피리드", b:"아스피린", sev:"주의", note:"저혈당 작용 증강 가능" },
  { a:"도네페질", b:"이부프로펜", sev:"주의", note:"위장관 출혈 위험 가산" },
  { a:"레보도파", b:"메토클로프라미드", sev:"중대", note:"도파민 길항 — 효과 상쇄" },
  { a:"심바스타틴", b:"암로디핀", sev:"주의", note:"근병증 위험 — 심바스타틴 용량 제한" },
  { a:"메트포르민", b:"이부프로펜", sev:"주의", note:"신기능 저하 시 젖산산증 위험" },
];
function recipientDrugs(r){
  const set=new Set();
  r.disease.forEach(d=>{ (DISEASE_DRUGS[d]||[]).forEach(x=>set.add(x)); });
  if((r.meds||0)>=8) set.add("와파린"); // 다약제 고령자 항응고 동반 가정
  return [...set];
}
function checkDDI(r){
  const drugs=recipientDrugs(r);
  const hits=[];
  DDI_RULES.forEach(rule=>{ if(drugs.includes(rule.a)&&drugs.includes(rule.b)) hits.push(rule); });
  return { drugs, hits, severe:hits.filter(h=>h.sev==="중대").length };
}

/* ── (7) 재원일수/이탈(중도해지) 예측: 생존분석 근사(이산 위험률) ───────────
   질환·등급·낙상이력·입원이력·체중감소를 위험인자로 한 월별 이탈 위험률(hazard)
   을 누적해 6개월 잔존확률·예상 재원개월(기대값)을 산출한다. */
function churnPredict(r){
  let base=0.04; // 월 기본 이탈(사망·시설이전·해지) 위험
  base += ({"1":0.06,"2":0.04,"3":0.025,"4":0.015,"5":0.01,"인지지원":0.008})[r.grade]||0.02;
  base += (r.hosp12m||0)*0.025;
  base += (r.falls12m||0)*0.015;
  if(r.weightDrop) base+=0.03;
  if(r.disease.some(d=>/욕창|연하곤란|중증치매/.test(d))) base+=0.025;
  base=Math.min(0.6, base);
  let surv=1; const curve=[];
  for(let m=1;m<=12;m++){ surv*=(1-base); curve.push({m, surv:+surv.toFixed(3)}); }
  // 기대 재원개월 = Σ 생존확률 (이산 기대수명 근사)
  const expectedMonths=curve.reduce((a,c)=>a+c.surv,0);
  const surv6=curve[5].surv;
  const band=base>=0.12?"high":base>=0.07?"mid":"low";
  return { hazard:+base.toFixed(3), curve, expectedMonths:+expectedMonths.toFixed(1), surv6, band };
}

function kpi(label,value,delta,kind){ return `<div class="card kpi"><div class="l">${label}</div><div class="v">${value}</div>${delta?`<div class="d pill ${kind||'gray'}" style="margin-top:6px">${delta}</div>`:""}</div>`; }
function barChart(data){ // [{label,value}]
  const max=Math.max(...data.map(d=>d.value),1);
  return `<div class="bars">${data.map(d=>`<div class="bar"><i style="height:${Math.round(d.value/max*100)}%"></i><span>${d.disp||d.value}</span><div class="lbl">${d.label}</div></div>`).join("")}</div>`;
}
function donut(parts){ // [{label,value,color}]
  const total=parts.reduce((a,b)=>a+b.value,0)||1; let acc=0;
  const seg=parts.map(p=>{ const a=acc/total*360; acc+=p.value; const b=acc/total*360; return `${p.color} ${a}deg ${b}deg`; }).join(",");
  return `<div class="row" style="gap:18px"><div class="donut" style="background:conic-gradient(${seg})"></div>
    <div style="flex:1">${parts.map(p=>`<div class="row" style="margin-bottom:6px"><span style="width:11px;height:11px;border-radius:3px;background:${p.color}"></span><span class="muted" style="flex:1">${p.label}</span><b>${p.value}</b></div>`).join("")}</div></div>`;
}

function exportRecipientsCsv(){
  const head=["성명","생년월일","등급","본인부담유형","질환","보호자","월본인부담금"];
  const rows=S.recipients.map(r=>{const b=calcMonthlyBilling(r.id);return [r.name,r.birth,r.grade,r.copay,r.disease.join("; "),r.guardian,b?b.copay:0];});
  downloadCsv("어르신목록", head, rows); toast("어르신 목록 CSV 내보내기 완료");
}
function downloadCsv(name,head,rows){
  const csv="﻿"+[head.join(","),...rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(","))].join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=`${name}_${todayISO()}.csv`; a.click(); URL.revokeObjectURL(url);
}

      </div>${nav()}</div>`;

    const r=S.recipients.find(x=>x.id===vw.rid);const checked=Object.values(vw.checks).filter(Boolean).length;
    return `<div class="card" style="background:var(--surf2)"><div class="row sp"><span class="muted">어르신</span><b>${r.name}</b></div>

      <div class="row sp"><span class="muted">사진</span><b>${vw.photos.filter(Boolean).length}장</b></div>

  };
  openModal(`

  document.getElementById("vwNext").onclick=()=>{
    if(vw.step<3){ vw.step++; renderVisitWizard(); }

    }

let claimStep=0;
function viewBilling(el){

        <td><button class="btn sm gho" data-bill="${r.id}">명세</button></td></tr>`).join("")}
        <tr style="font-weight:800"><td colspan="2">합계</td><td class="num">${won(totalGross)}</td><td class="num">${won(totalIns)}</td><td class="num">${won(totalCopay)}</td><td></td></tr>
      </tbody></table></div>
    </div>
    <div class="card">
      <h3 style="margin-bottom:10px">본인부담금 수납 현황</h3>
      ${bills.map(({r,b})=>{const paid=(S.claims.find(c=>c.month===month)?.paid||[]).includes(r.id);return `<div class="row sp" style="padding:9px 0;border-bottom:1px solid var(--line)">

}
function openClaimWizard(month,bills,totalIns){
  claimStep=0;
  const render=()=>{
    const steps=["산정 확인","청구서 생성","공단 전송","정산"];
    let body="";
    if(claimStep===0) body=`<div class="card" style="background:var(--surf2)"><div class="row sp"><span class="muted">청구 월</span><b>${month}</b></div>
      <div class="row sp"><span class="muted">청구 대상</span><b>${bills.length}명</b></div>
      <div class="row sp"><span class="muted">공단 청구 총액</span><b style="color:var(--brand-d)">${won(totalIns)}</b></div></div>
      <div class="muted" style="margin-top:10px;font-size:13px">국민건강보험공단 노인장기요양보험 청구 명세를 생성합니다.</div>`;
    else if(claimStep===1) body=`<div style="text-align:center;padding:14px"><div style="font-size:38px">🧾</div><b>청구 명세서 ${bills.length}건 생성됨</b><div class="muted" style="margin-top:6px">전자문서(XML) 변환 완료</div></div>`;
    else if(claimStep===2) body=`<div style="text-align:center;padding:14px"><div style="font-size:38px">📡</div><b>공단 포털 전송 (Mock)</b><div class="muted" style="margin-top:6px">접수번호 ${uid("RCP").toUpperCase()}<br>전송 ${bills.length}건 · 오류 0건</div></div>`;
    else body=`<div style="text-align:center;padding:14px"><div style="font-size:38px">✅</div><b>정산 예정</b><div class="muted" style="margin-top:6px">공단 지급 예정액 ${won(totalIns)}<br>지급 예정일 익월 25일</div></div>`;
    openModal(`<div class="hd"><b style="font-size:16px">급여 청구 · ${steps[claimStep]}</b><button class="iconbtn" data-mclose>✕</button></div>
      <div class="bd"><div class="progress" style="margin-bottom:14px"><i style="width:${(claimStep+1)/4*100}%"></i></div>${body}</div>
      <div class="ft"><button class="btn gho" id="clPrev" ${claimStep===0?'disabled':''}>← 이전</button><button class="btn pri" id="clNext">${claimStep===3?'✓ 완료':'다음 →'}</button></div>`);
    document.getElementById("clPrev").onclick=()=>{ if(claimStep>0){claimStep--;render();} };
    document.getElementById("clNext").onclick=()=>{ if(claimStep<3){claimStep++;render();} else {
      S.claims.push({month,sentAt:todayISO(),amount:totalIns,paid:[]}); closeModal(); commit(); toast(`${month} 급여 청구 전송 완료`);
    } };
  };
  render();
}

/* ===========================================================================
   jsPDF — 케어플랜·청구서·일지·요약 실제 생성 (한글: 캔버스 렌더 폴백으로 한글 정상)
   jsPDF는 기본 폰트에 한글이 없으므로, 캔버스에 한글을 그려 이미지로 삽입한다.
   =========================================================================== */
function pdfReady(){ return !!(window.jspdf && window.jspdf.jsPDF); }
function makePdfFromLines(title, lines){
  if(!pdfReady()){ toast("PDF 라이브러리 오프라인 — 인쇄 미리보기로 대체"); printFallback(title,lines); return; }
  const { jsPDF } = window.jspdf; const doc=new jsPDF({unit:"pt",format:"a4"});
  const W=595, M=40; let y=0;
  // 캔버스로 한글 렌더 후 이미지 삽입
  const scale=2; const cw=(W-M*2);
  const cv=document.createElement("canvas"); const lineH=22; const pad=16;
  const height=pad*2 + 40 + lines.length*lineH + 20;
  cv.width=cw*scale; cv.height=height*scale; const ctx=cv.getContext("2d"); ctx.scale(scale,scale);
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,cw,height);
  ctx.fillStyle="#0e8f7e"; ctx.fillRect(0,0,cw,6);
  ctx.fillStyle="#15302c"; ctx.font="bold 20px -apple-system,'Malgun Gothic',sans-serif";
  ctx.fillText(title, pad, pad+22);
  ctx.font="13px -apple-system,'Malgun Gothic',sans-serif";
  let ly=pad+22+30;
  lines.forEach(l=>{
    if(l.startsWith("##")){ ctx.fillStyle="#0a6d60"; ctx.font="bold 14px -apple-system,'Malgun Gothic',sans-serif"; ctx.fillText(l.slice(2).trim(), pad, ly); ctx.font="13px -apple-system,'Malgun Gothic',sans-serif"; }
    else if(l.startsWith("--")){ ctx.strokeStyle="#dfe9e7"; ctx.beginPath(); ctx.moveTo(pad,ly-8); ctx.lineTo(cw-pad,ly-8); ctx.stroke(); }
    else { ctx.fillStyle="#15302c"; ctx.fillText(l, pad, ly); }
    ly+=lineH;
  });
  const img=cv.toDataURL("image/png");
  const imgW=W-M*2; const imgH=height*(imgW/cw);
  doc.addImage(img, "PNG", M, 30, imgW, imgH);
  doc.save(title.replace(/[\s·\/]/g,"_")+"_"+todayISO()+".pdf");
  toast(title+" PDF 생성 완료");
}

// 테넌트 컨텍스트 독립 낙상예측(법인 콘솔용 — 활성 테넌트 의존 제거)
function predictFallFor(td,r){
  const cog=r.disease.some(d=>/치매|인지/.test(d))?1:0;
  const mob=r.disease.some(d=>/뇌졸중|파킨슨|편마비/.test(d))?1:0;
  const incident=(td.visits||[]).filter(v=>v.rid===r.id).some(v=>v.mood==="주의"||v.mood==="위험")?1:0;
  const f={age:(age(r.birth)-80)/10,grade:gradeSeverity(r.grade),falls12m:(r.falls12m||0),hosp12m:(r.hosp12m||0),
    meds:((r.meds||0)-5)/3,cognition:cog,mobility:mob,weightDrop:r.weightDrop?1:0,incident};
  const w=FALL_MODEL.weights; let logit=FALL_MODEL.intercept; Object.keys(w).forEach(k=>logit+=w[k]*f[k]);
  return { p:sigmoid(logit) };
}

function v3Banner(emoji,title,desc){
  return `<div class="card" style="margin-bottom:14px;border-left:4px solid var(--brand)"><b>${emoji} ${title}</b>
    <div class="muted" style="font-size:13px;margin-top:6px;line-height:1.6">${desc}</div></div>`;

// SVG 라인차트(과거 실측 + 예측구간) — 흰배경, 도메인 색은 앱 디자인가이드(컬러 허용)
function lineChart(hist, proj){
  const all=[...hist, ...proj.map(p=>p.mean)];
  const lo=Math.min(...all, ...proj.map(p=>p.lo)), hi=Math.max(...all, ...proj.map(p=>p.hi));
  const pad=lo===hi?1:(hi-lo)*0.15; const min=lo-pad, max=hi+pad;
  const W=100, H=46; const n=hist.length+proj.length;
  const X=i=>+(i/(n-1)*W).toFixed(2);
  const Y=v=>+((1-(v-min)/(max-min))*H).toFixed(2);
  const histPts=hist.map((v,i)=>`${X(i)},${Y(v)}`).join(" ");
  const projPts=proj.map((p,i)=>`${X(hist.length-1+ (i+1))},${Y(p.mean)}`);
  const lastHist=`${X(hist.length-1)},${Y(hist[hist.length-1])}`;
  const projLine=[lastHist,...projPts].join(" ");
  const bandTop=proj.map((p,i)=>`${X(hist.length-1+(i+1))},${Y(p.hi)}`);
  const bandBot=proj.map((p,i)=>`${X(hist.length-1+(i+1))},${Y(p.lo)}`).reverse();
  const band=[lastHist,...bandTop,...bandBot].join(" ");
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:160px;background:#fff;border:1px solid var(--line);border-radius:12px">
    <polygon points="${band}" fill="var(--brand-l)" opacity="0.6"/>
    <polyline points="${histPts}" fill="none" stroke="var(--brand)" stroke-width="0.8"/>
    <polyline points="${projLine}" fill="none" stroke="var(--info)" stroke-width="0.8" stroke-dasharray="2 1.5"/>
    ${hist.map((v,i)=>`<circle cx="${X(i)}" cy="${Y(v)}" r="0.7" fill="var(--brand)"/>`).join("")}
    ${projPts.map(p=>{const [x,y]=p.split(",");return `<circle cx="${x}" cy="${y}" r="0.7" fill="var(--info)"/>`;}).join("")}
  </svg>`;
}

        <div class="card" data-churn="${r.id}" style="padding:13px;margin-bottom:10px;cursor:pointer;border-left:4px solid var(--${k})">
          <div class="row sp" style="margin-bottom:8px"><div class="row"><div class="avatar">${r.name[0]}</div><div><b>${r.name}</b> <span class="ter">${age(r.birth)}세 · ${r.grade}등급</span></div></div>

          <div class="row sp" style="font-size:12px;margin-bottom:4px"><span class="muted">${ts("chSurv6")} ${surv}%</span><span class="muted">${ts("chHazard")} ${Math.round(ch.hazard*100)}%/월</span></div>

function renderIotLine(e){ const col=e.type==="FALL"?"#ff9a9a":e.type==="HR_ALERT"?"#ffd479":"#9fe"; return `<div style="color:${col}">[${e.ts}] ${e.dev} → <b>${e.type}</b> ${e.msg}</div>`; }
function pushIot(){
  const types=[
    {type:"ACTIVITY",msg:S._lang==="en"?"step count +12":"걸음수 +12",dev:"W-07"},
    {type:"HR_ALERT",msg:S._lang==="en"?"HR 112bpm elevated":"심박 112bpm 상승",dev:"W-07"},
    {type:"FALL",msg:S._lang==="en"?"fall detected — confidence 0.91":"낙상 감지 — 신뢰도 0.91",dev:"A-12"},
    {type:"ACTIVITY",msg:S._lang==="en"?"out-of-bed 03:14":"기상 감지 03:14",dev:"A-12"},
    {type:"DOOR",msg:S._lang==="en"?"door opened":"현관 열림",dev:"D-03"},
  ];
  const pick=types[(iotEvents.length*7)%types.length];
  const e={...pick, ts:new Date().toLocaleTimeString(S._lang==="en"?"en-US":"ko-KR")};
  iotEvents.unshift(e); if(iotEvents.length>40) iotEvents.length=40;
  if(e.type==="FALL"){
    const r=S.recipients[0];
    S.notifs.unshift({id:uid("n"),t:`${S._lang==="en"?"IoT fall alert":"IoT 낙상 경보"}: ${r?.name||""} (A-12)`,who:"IoT",time:S._lang==="en"?"now":"방금",read:false,kind:"bad"});
    logAudit("IoT 낙상 이벤트", `${r?.name||""} · 신뢰도 0.91`);
  }
  const log=document.getElementById("iotLog"); if(log) log.innerHTML=iotEvents.map(renderIotLine).join("");
}
function startIot(){ if(iotTimer) return; pushIot(); iotTimer=setInterval(pushIot,1100); toast(S._lang==="en"?"IoT stream started (mock)":"IoT 스트림 시작 (Mock)"); }
function stopIot(){ if(iotTimer){ clearInterval(iotTimer); iotTimer=null; toast(S._lang==="en"?"Stream stopped":"스트림 정지"); save(); } }

function genRiskPdf(rid){
  const r=S.recipients.find(x=>x.id===rid); const fr=fallRisk(r); const f=fallFeatures(r);
  const rows=Object.entries(fr.contrib).sort((a,b)=>b[1]-a[1]);
  const lines=[`## 낙상 위험 예측 분석 (로지스틱 회귀)`,`성명: ${r.name}  (${age(r.birth)}세, ${r.grade}등급)`,
    `예측 확률: ${Math.round(fr.p*100)}%  (logit ${fr.logit.toFixed(2)}, ${fr.band==='high'?'고위험':fr.band==='mid'?'중위험':'저위험'})`,`--`,`## 요인별 기여도`,
    ...rows.map(([k,v])=>`${FEAT_LABEL[k]}: 입력 ${(+f[k]).toFixed(2)} → 기여 ${v>=0?'+':''}${v.toFixed(2)}`),
    `--`,`* 데모 계수 — 임상 적용 전 코호트 데이터로 보정 필요`];
  makePdfFromLines(`낙상위험분석 - ${r.name}`, lines);
}
function genEdiPdf(month,rcp,cnt,total){
  const lines=[`## 장기요양 급여비용 청구 접수증 (EDI)`,`기관: ${D().org.name} (${D().org.code})`,`청구월: ${month}`,`--`,
    `접수번호: ${rcp}`,`접수 건수: ${cnt}건   반려: 0건`,`공단 청구 총액: ${won(total)}`,`지급 예정일: 익월 25일`,`--`,
    `* 본 접수증은 mock 전송 결과입니다(오프라인 데모).`];
  makePdfFromLines(`공단EDI접수증 - ${month}`, lines);
}
function genMedsPdf(rid){
  const r=S.recipients.find(x=>x.id===rid); const ddi=checkDDI(r);
  const lines=[`## 약물 상호작용(DDI) 안전 점검`,`성명: ${r.name}  (${age(r.birth)}세, ${r.grade}등급)`,`질환: ${r.disease.join(", ")}`,`--`,
    `## 추정 처방 약물 (${ddi.drugs.length})`, ddi.drugs.join(", ")||"없음",`--`,
    `## 검출된 상호작용 (${ddi.hits.length})`,
    ...(ddi.hits.length?ddi.hits.map(h=>`[${h.sev}] ${h.a} × ${h.b} — ${h.note}`):["상호작용 경고 없음"]),
    `--`,`* 데모 규칙셋 — 임상 적용 전 약사·의사 검토 필요`];
  makePdfFromLines(`약물점검 - ${r.name}`, lines);
}
