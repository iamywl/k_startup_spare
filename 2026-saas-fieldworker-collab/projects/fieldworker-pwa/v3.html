<script>
  // PWA manifest via blob (file:// 호환). install 요건: manifest + SW + start_url + icons.
  (function(){
    const icon = (n)=> 'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="'+n+'" height="'+n+'"><rect width="'+n+'" height="'+n+'" rx="'+(n*0.21)+'" fill="#1E5FD6"/><text x="50%" y="62%" font-size="'+(n*0.42)+'" text-anchor="middle" fill="#fff" font-family="sans-serif">현</text></svg>');
    const manifest = {
      name: '현장톡 — 현장 작업자 협업·안전', short_name: '현장톡', start_url: '.', scope: '.', display: 'standalone',
      background_color: '#F6F8FB', theme_color: '#1E5FD6', orientation: 'portrait', categories:['productivity','business'],
      description: '현장 작업자 모바일 협업 · 산업별 체크리스트 · 보험사 위험분석 · 안전 KPI',
      icons: [
        { src: icon(192), sizes:'192x192', type:'image/svg+xml', purpose:'any maskable' },
        { src: icon(512), sizes:'512x512', type:'image/svg+xml', purpose:'any maskable' }
      ],
      shortcuts: [
        { name:'이상 보고', short_name:'이상', url:'.?view=report' },
        { name:'안전 KPI', short_name:'KPI', url:'.?view=kpi' }
      ]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
    const link = document.createElement('link'); link.rel='manifest'; link.href=URL.createObjectURL(blob);
    document.head.appendChild(link);
    window.__manifestReady = true;
  })();
</script>
<style>
  :root { --brand:#1E5FD6; --brand-dark:#16469E; --ink:#141A29; --ink-2:#41506B; --ink-3:#7C879B; --bg:#F6F8FB; --line:#DDE3EC; --green:#14AE5C; --red:#F04452; --amber:#FFB331; }
  body { background:var(--bg); color:var(--ink); -webkit-tap-highlight-color: transparent; font-family: "Pretendard", -apple-system, "Pretendard", "Apple SD Gothic Neo", system-ui, sans-serif; }
  .toss-card { background:#fff; border-radius:20px; box-shadow:0 1px 2px rgba(0,0,0,.04), 0 4px 14px rgba(17,24,39,.04); }
  .btn-primary { background:var(--brand); color:#fff; border-radius:14px; min-height:54px; font-weight:700; font-size:16px; }
  .btn-secondary { background:#f1f3f5; color:var(--ink); border-radius:14px; min-height:54px; font-weight:600; }
  .pill { padding:3px 9px; border-radius:999px; font-size:11px; font-weight:700; letter-spacing:-0.2px; }
  .thumb { width:64px; height:64px; object-fit:cover; border-radius:14px; }
  .nav-side a.active { background:#EAF1FC; color:var(--brand); font-weight:700; }
  .focus-ring:focus-visible { outline:3px solid #A8C5F2; outline-offset:2px; }
  .sheet { transform: translateY(100%); transition: transform .28s cubic-bezier(.32,.72,0,1); }
  .sheet.open { transform: translateY(0); }
  @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
  .skel { background: linear-gradient(90deg,#eee 8%,#f5f5f5 18%,#eee 33%); background-size:800px 100px; animation: shimmer 1.4s infinite; border-radius:8px; }
  .spark { display:flex; align-items:flex-end; gap:3px; height:48px; }
  .spark > div { flex:1; background:var(--brand); border-radius:3px 3px 0 0; min-height:3px; opacity:.85; }

  /* ===== design-tone-components (guide §6·§7) ===== */
  button, [role="button"], a.w-full, input[type="submit"], input[type="button"] {
    transition: transform .12s cubic-bezier(.3,0,0,1), opacity .15s ease, box-shadow .15s ease, background-color .15s ease;
  }
  button:active:not(:disabled), [role="button"]:active, a.w-full:active,
  input[type="submit"]:active, input[type="button"]:active { transform: scale(.97); }
  button:disabled, button[disabled], [role="button"][aria-disabled="true"] { opacity: .35; cursor: not-allowed; }
  button:focus-visible, [role="button"]:focus-visible, a.w-full:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
    outline: none; border-color: #1E5FD6; box-shadow: 0 0 0 1.5px #1E5FD6;
  }
  button.w-full, button[type="submit"].w-full, a.w-full[class*="bg-"] {
    min-height: 52px; border-radius: 12px;
  }

  /* glass-material — 떠 있는 레이어 전용 (guide §5). toss-card 등 콘텐츠 면은 평면 유지 */
  /* 은은한 그라데이션 배경 (base bg #EEF2F9) */
  body { background-color: #EAEEF6; }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(72% 56% at 8% -2%, rgba(30,95,214,0.20), transparent 60%),
      radial-gradient(64% 52% at 98% 10%, rgba(20,174,92,0.12), transparent 60%),
      radial-gradient(80% 62% at 50% 104%, rgba(18,58,130,0.18), transparent 60%);
  }
  /* 모바일 본문 컨테이너는 살짝 투명해 가장자리에 그라데이션이 비치게 */
  #main.bg-white { background-color: rgba(255,255,255,0.92); }

  #main > header {
    background-color: rgba(255,255,255,0.62) !important;
    -webkit-backdrop-filter: saturate(200%) blur(26px);
            backdrop-filter: saturate(200%) blur(26px);

  }

  /* 하단 탭바 — frosted 0.6+ (기존 backdrop-blur 클래스 강화) */
  #nav-bottom {
    background-color: rgba(255,255,255,0.62) !important;
    -webkit-backdrop-filter: saturate(200%) blur(26px);
            backdrop-filter: saturate(200%) blur(26px);
    border-top-color: rgba(229,232,235,0.6) !important;

  }

  #sheet-mask {
    background-color: rgba(20,26,41,0.18) !important;
    -webkit-backdrop-filter: blur(2px);
            backdrop-filter: blur(2px);
  }

  /* 토스트 — frosted glass + sheen */
  #toast {
    background-color: rgba(20,26,41,0.72) !important;
    -webkit-backdrop-filter: saturate(200%) blur(26px);
            backdrop-filter: saturate(200%) blur(26px);
    box-shadow: 0 8px 24px rgba(20,26,41,0.18), inset 0 1px 0 rgba(255,255,255,0.12);
  }

  /* 데스크톱 사이드바(sticky) — frosted (스크롤 콘텐츠 위 vibrancy) */
  @media (min-width:1024px){
    aside.sticky {
      background-color: rgba(255,255,255,0.55);
      -webkit-backdrop-filter: saturate(200%) blur(26px);
              backdrop-filter: saturate(200%) blur(26px);
      border-radius: 0 20px 20px 0;
    }
  }

  /* 폴백 — backdrop-filter 미지원 시 불투명 */
  @supports not ((-webkit-backdrop-filter: blur(1px)) or (backdrop-filter: blur(1px))) {
    #main > header, #nav-bottom, #sheet { background-color: #FFFFFF !important; }
    #sheet-mask { background-color: rgba(20,26,41,0.40) !important; }
    #toast { background-color: #141A29 !important; }
    @media (min-width:1024px){ aside.sticky { background-color: #F9FAFB; } }
  }
  @media (prefers-reduced-transparency: reduce) {
    #main > header, #nav-bottom, #sheet { background-color: #FFFFFF !important;
      -webkit-backdrop-filter: none; backdrop-filter: none; }
    #sheet-mask { background-color: rgba(20,26,41,0.40) !important;
      -webkit-backdrop-filter: none; backdrop-filter: none; }
    #toast { background-color: #141A29 !important;
      -webkit-backdrop-filter: none; backdrop-filter: none; }
    @media (min-width:1024px){ aside.sticky { background-color: #F9FAFB;
      -webkit-backdrop-filter: none; backdrop-filter: none; } }
  }
  </style>
</head>

// IndexedDB 오프라인 큐 + 충돌 해결/동기화 상세 (기능 8 + 외부통합 IndexedDB)
// ============================================================================
const DB = (()=>{
  const req = indexedDB.open('fw_v3_queue', 1); let db;
  req.onupgradeneeded = e=>{ e.target.result.createObjectStore('q', {keyPath:'id', autoIncrement:true}); };
  req.onsuccess = e=>{ db=e.target.result; trySync(); };
  req.onerror = ()=>{};
  return {
    put(item){ if(!db) return; const tx=db.transaction('q','readwrite'); tx.objectStore('q').add(item); },
    drain(cb){ if(!db){ cb([]); return; } const tx=db.transaction('q','readwrite'); const s=tx.objectStore('q'); const all=s.getAll(); all.onsuccess=()=>{ cb(all.result||[]); s.clear(); }; }
  };
})();

// 충돌 해결: 같은 작업에 대해 큐 항목과 서버(=현재 state) 버전이 충돌하면
// updatedAt(최신 우선, LWW: last-write-wins)로 결정하고 충돌 로그를 남긴다.
function resolveConflict(item){
  if (item.type==='complete'){
    const o = state.orders.find(x=>x.id===item.id);
    if (o && o.status==='done' && (o._serverUpdatedAt||0) > (item.updatedAt||0)){
      return { applied:false, reason:'서버 우선(LWW) — 이미 완료됨', strategy:'server-wins' };
    }
    if (o){ o.status='done'; o._serverUpdatedAt = item.updatedAt||Date.now(); }
    return { applied:true, reason:'클라이언트 변경 적용', strategy:'client-wins' };
  }
  return { applied:true, reason:'신규 레코드 삽입', strategy:'insert' };
}

function trySync(){
  if (!state || !navigator.onLine) return;
  DB.drain(items=>{
    if (!items.length) return;
    let applied=0, conflicts=0;
    items.forEach(it=>{
      const res = resolveConflict(it);
      if (res.applied) applied++; else conflicts++;
      state.syncLog.unshift({ t:nowStr(), label:it.label, strategy:res.strategy, applied:res.applied, reason:res.reason });
      pushHistory('오프라인 큐 동기화', `${it.label} · ${res.strategy} · ${res.applied?'적용':'스킵'}`);
    });
    state.queue = [];
    persist();
    toast(`큐 ${items.length}건을 동기화했어요 (적용 ${applied} · 충돌 ${conflicts})`);
    render();
  });
}

// ============================================================================
// 보험사 위험분석 API 시뮬레이션 (기능 2) — 실 계산 알고리즘
// 입력: 라인별 이상보고 + 체크리스트 미준수 + 사고 심각도 → 위험점수·등급·권고
// ============================================================================
const RISK_API = (()=>{
  // 산업 손해율 기준치 (보험 언더라이팅 가정) — 라인 산업 추정
  const INDUSTRY_BASE = { '제조':1.0, 'F&B':0.8, '물류':1.25 };
  function lineIndustry(line){ return line.includes('물류') ? '물류' : line.includes('C') ? 'F&B' : '제조'; }
  const SEVERITY_W = { '경미':1, '중대':5, '아차사고':2 };

  // 단일 라인 위험점수 산출 (0~100, 높을수록 위험)
  function scoreLine(line){
    const ind = lineIndustry(line);
    const base = INDUSTRY_BASE[ind] || 1.0;
    const reports = state.reports.filter(r=>r.line===line);
    const orders  = state.orders.filter(o=>o.line===line);

    // 1) 사고/이상 가중합 (심각도 가중)
    const incidentLoad = reports.reduce((s,r)=> s + (SEVERITY_W[r.severity]||1) * (r.resolved?0.4:1), 0);
    // 2) 미해결 비율
    const unresolved = reports.length ? reports.filter(r=>!r.resolved).length / reports.length : 0;
    // 3) 체크리스트 준수율 (낮을수록 위험) — 완료작업 중 체크 충족 비율
    const withChecks = orders.filter(o=>o.checks && o.checks.length);
    const compliance = withChecks.length
      ? withChecks.reduce((s,o)=> s + o.checks.filter(c=>c.d).length / o.checks.length, 0) / withChecks.length
      : 0.6; // 데이터 부족 시 중립 가정
    // 4) 작업 적체(미완료 비율)
    const backlog = orders.length ? orders.filter(o=>o.status!=='done').length / orders.length : 0;
    // 5) 최근성 가중 — 24h 내 중대 보고 가산
    const recentSevere = reports.filter(r=> r.severity==='중대' && (Date.now()-r.ts) < 1000*60*60*24).length;

    // 가중 합산 → 0~100 정규화
    let raw =
        incidentLoad * 7 * base +
        unresolved   * 22 +
        (1 - compliance) * 28 +
        backlog      * 14 +
        recentSevere * 9;
    const score = Math.max(0, Math.min(100, Math.round(raw)));

    const grade = score>=70 ? 'D(고위험)' : score>=50 ? 'C(주의)' : score>=30 ? 'B(보통)' : 'A(양호)';
    // 보험료 할인·할증 계수 (언더라이팅 가정): A -10% ~ D +25%
    const premiumDelta = score>=70 ? +0.25 : score>=50 ? +0.10 : score>=30 ? 0.0 : -0.10;

    // 권고 (룰 기반)
    const rec = [];
    if (unresolved>0.5) rec.push('미해결 이상보고 즉시 종결 — 24h 내 처리율 80% 목표');
    if (compliance<0.5) rec.push('체크리스트 준수율 저조 — 라인장 교육 및 게이트 강제 적용');
    if (recentSevere>0) rec.push('24h 내 중대 사고 발생 — 작업 중지·원인분석(TBM) 권고');
    if (backlog>0.5)    rec.push('작업 적체 과다 — 인력 재배치 또는 SLA 재산정');
    if (!rec.length)    rec.push('현 수준 유지 — 분기 보험료 갱신 시 할인 적용 가능');

    return { line, industry:ind, score, grade, premiumDelta,
             factors:{ incidentLoad:+incidentLoad.toFixed(1), unresolved:+(unresolved*100).toFixed(0),
                       compliance:+(compliance*100).toFixed(0), backlog:+(backlog*100).toFixed(0), recentSevere },
             recommendations: rec };
  }

  // 전사 위험분석 실행 (API 호출 시뮬레이션 — 키 부재 시 로컬 알고리즘, mock 응답 형태 유지)
  async function run(){
    const lines = state.lines;
    const perLine = lines.map(scoreLine);
    const overall = Math.round(perLine.reduce((s,r)=>s+r.score,0) / (perLine.length||1));
    const grade = overall>=70 ? 'D(고위험)' : overall>=50 ? 'C(주의)' : overall>=30 ? 'B(보통)' : 'A(양호)';
    // mock 외부 API 응답 봉투 (HTTPS 키 존재 시 실 fetch 로 대체되는 지점)
    const envelope = {
      provider: 'KSafe 보험 위험분석 API (mock)',
      apiKey: (typeof INSURANCE_API_KEY!=='undefined' && INSURANCE_API_KEY) ? 'live' : 'mock-fallback',
      requestedAt: nowStr(),
      overall, grade, perLine,
    };
    // 약간의 지연으로 네트워크 호출 흉내
    await new Promise(r=>setTimeout(r, 120));
    state.riskResults.unshift(envelope);
    if (state.riskResults.length>5) state.riskResults.length=5;
    pushHistory('위험분석 실행', `전사 점수 ${overall} · ${grade}`);
    persist();
    return envelope;
  }
  return { scoreLine, run };
})();

// ============================================================================
// SLA / 에스컬레이션 룰 엔진 (기능 6) — 실 알고리즘
// 작업 생성 후 경과시간이 우선순위별 SLA 초과 시 자동 상향보고 후보 판정
// ============================================================================
function slaEvaluate(){
  const rule = state.slaRule;
  const limitFor = (o)=> o.priority==='HIGH'? rule.highMin : o.priority==='NORMAL'? rule.normalMin : rule.lowMin;
  return state.orders.filter(o=>o.status!=='done').map(o=>{
    const elapsedMin = Math.round((Date.now()-o.createdAt)/60000);
    const limit = limitFor(o);
    const overdue = elapsedMin - limit;
    const ratio = limit ? elapsedMin/limit : 0;
    let level = 'ok';
    if (ratio>=1)       level='breach';        // SLA 위반 → 에스컬레이션
    else if (ratio>=0.8) level='warn';         // 임박
    return { o, elapsedMin, limit, overdue, ratio, level };
  }).sort((a,b)=> b.ratio - a.ratio);
}
function runEscalation(){
  const breaches = slaEvaluate().filter(x=>x.level==='breach');
  breaches.forEach(b=>{
    if (!b.o._escalated){
      b.o._escalated = true;
      pushHistory('SLA 에스컬레이션', `${b.o.id} ${b.o.title} — ${b.overdue}분 초과 → ${ROLE_LABEL[state.slaRule.escalateTo]} 상향`);
    }
  });
  persist();
  return breaches;
}

              when: scheduleStr || '즉시', status: scheduleStr&&scheduleStr!=='즉시'?'scheduled':'sent',
              sentAt: scheduleStr&&scheduleStr!=='즉시'? '예약됨' : new Date().toLocaleTimeString('ko-KR'),
              reach, mode };
  state.campaigns.unshift(c);
  pushHistory('푸시 캠페인', `${title} · ${audience} · ${c.status} (${mode})`);
  persist();
  return c;
}

    <div class="space-y-2">${rows.map(x=>{
      const c = x.level==='breach'?'border-red-300 bg-red-50':x.level==='warn'?'border-amber-300 bg-amber-50':'';
      const lab = x.level==='breach'?'<span class="pill bg-red-100 text-red-700">SLA 위반</span>':x.level==='warn'?'<span class="pill bg-amber-100 text-amber-800">임박</span>':'<span class="pill bg-emerald-100 text-emerald-700">정상</span>';
      return `<div class="toss-card p-4 border ${c}">
        <div class="flex items-center justify-between"><div class="font-bold">${x.o.title}</div>${lab}</div>
        <div class="text-xs text-slate-500 mt-1">${x.o.id} · ${x.o.line} · ${x.o.priority}</div>
        <div class="mt-2"><div class="h-2 bg-slate-100 rounded-full overflow-hidden"><div class="h-full ${x.level==='breach'?'bg-red-500':x.level==='warn'?'bg-amber-500':'bg-emerald-500'}" style="width:${Math.min(100,x.ratio*100)}%"></div></div>

      </div>`;
    }).join('')}</div>
  </div>`;
}

// 안전 KPI 대시보드 (기능 3) — 라인별 사고/이상/완료율 추세 차트
function vKpi(){
  const lines = state.lines;
  const totalInc = lines.reduce((s,l)=> s + state.kpiSeries[l].reduce((a,d)=>a+d.incidents,0), 0);
  const totalAno = lines.reduce((s,l)=> s + state.kpiSeries[l].reduce((a,d)=>a+d.anomalies,0), 0);
  const avgComp = Math.round(lines.reduce((s,l)=>{ const arr=state.kpiSeries[l]; return s + arr[arr.length-1].completion; },0)/lines.length);
  return `<div class="px-5 py-5 lg:px-0 space-y-4">
    <h1 class="text-xl lg:text-3xl font-bold">현장 안전 KPI 대시보드</h1>
    <div class="text-sm text-slate-500">최근 7일 · 라인별 사고·이상·완료율 추세</div>
    <div class="grid grid-cols-3 gap-3">
      ${kpi('주간 사고', totalInc, '전 라인 합계', totalInc>8?'text-red-600':'')}
      ${kpi('주간 이상보고', totalAno, '전 라인 합계')}
      ${kpi('평균 완료율', avgComp+'%', '최근일')}
    </div>
    <div class="grid lg:grid-cols-2 gap-3">${lines.map(l=>{
      const arr = state.kpiSeries[l];
      const inc = arr.map(d=>d.incidents); const ano = arr.map(d=>d.anomalies); const comp = arr.map(d=>d.completion);
      const wkInc = inc.reduce((a,b)=>a+b,0);
      return `<div class="toss-card p-5">
        <div class="flex items-center justify-between"><div class="font-bold">${l}</div><span class="pill ${wkInc>=8?'bg-red-100 text-red-700':wkInc>=4?'bg-amber-100 text-amber-800':'bg-emerald-100 text-emerald-700'}">주간 사고 ${wkInc}</span></div>
        <div class="mt-4 grid grid-cols-3 gap-4">
          <div><div class="text-xs text-slate-500 mb-1">사고</div>${sparkline(inc)}<div class="flex justify-between text-[10px] text-slate-400 mt-1">${arr.map(d=>`<span>${d.day}</span>`).join('')}</div></div>
          <div><div class="text-xs text-slate-500 mb-1">이상보고</div>${sparkline(ano)}</div>
          <div><div class="text-xs text-slate-500 mb-1">완료율</div>${sparkline(comp,100)}<div class="text-xs text-slate-600 mt-1">${comp[comp.length-1]}%</div></div>
        </div>
      </div>`;
    }).join('')}</div>
  </div>`;
}

const VIEW_FN = {
  list: ()=> state.role==='worker' && state.selected ? vDetail() : vList(),
  report: vReport, history: vHistory, mypage: vMypage,
  compose: vCompose, inbox: vInbox, lines: vLines, sla: vSla,
  admin: vAdmin, kpi: vKpi, campaign: vCampaign, 'report-mgr': vReportMgr, team: vTeam, settings: vSettings,
  risk: vRisk, checklists: vChecklists, audit: vAudit,
};
function bodyView(){
  const v = allowedView(state.role, state.view);
  if (v!==state.view){ state.view=v; }
  return (VIEW_FN[v] || vList)();
}

function bind(){
  document.querySelectorAll('[data-role]').forEach(b=>b.onclick=()=>{ state.role=b.dataset.role; state.view=defaultView(state.role); state.selected=null; persist(); render(); });
  const rc = document.getElementById('role-cycle'); if (rc) rc.onclick=()=>{ const i=ROLES.indexOf(state.role); state.role=ROLES[(i+1)%ROLES.length]; state.view=defaultView(state.role); state.selected=null; persist(); render(); toast('역할을 바꿨어요: '+ROLE_LABEL[state.role]); };
  document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{ state.view=allowedView(state.role,b.dataset.view); state.selected=null; persist(); render(); });
  document.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>{ state.selected=b.dataset.id; persist(); render(); });
  const back = document.querySelector('[data-back]'); if(back) back.onclick=()=>{ state.selected=null; persist(); render(); };

  // detail: checklist toggle + apply from library
  document.querySelectorAll('[data-chk]').forEach(c=>c.onclick=()=>{ const o=state.orders.find(x=>x.id===state.selected); o.checks[c.dataset.chk].d=c.checked; persist(); render(); });
  const apply = document.getElementById('apply-tpl'); if (apply) apply.onclick=()=>{
    const tpls = libraryTemplates();
    openSheet(`<div class="p-6"><div class="text-lg font-bold mb-1">산업별 체크리스트 선택</div><div class="text-xs text-slate-500 mb-4">제조·F&B·물류 라이브러리</div>${tpls.map((t,i)=>`<button data-tpl="${i}" class="w-full p-4 my-1.5 rounded-xl bg-slate-50 text-left flex items-center justify-between"><span><span class="font-semibold">${CHECKLIST_LIBRARY[t.industry].icon} ${t.name}</span><span class="block text-xs text-slate-500">${t.industry} · ${t.items.length}항목</span></span><span class="text-blue-600 text-sm">적용</span></button>`).join('')}</div>`);
    document.querySelectorAll('[data-tpl]').forEach(b=>b.onclick=()=>{ const t=tpls[+b.dataset.tpl]; const o=state.orders.find(x=>x.id===state.selected); o.checks=JSON.parse(JSON.stringify(t.items)); pushHistory('체크리스트 적용', `${o.id} · ${t.key}`); persist(); closeSheet(); render(); toast(t.name+'을(를) 적용했어요'); });
  };

  // camera (real → mock fallback)
  const cam = document.getElementById('cam'); if (cam) cam.onchange=async e=>{ const o=state.orders.find(x=>x.id===state.selected); for(const f of e.target.files){ o.photos.push(await fileToDataURL(f)); } persist(); render(); };
  const oc = document.getElementById('open-cam'); if (oc) oc.onclick=async ()=>{
    let stream=null;
    try { if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}); } catch(e){ stream=null; }
    if (stream){
      openSheet(`<div class="p-6"><div class="text-lg font-bold mb-4">카메라 스트림 (라이브)</div><video id="vid" autoplay playsinline class="w-full rounded-xl bg-black" style="max-height:60vh"></video><button id="snap" class="w-full mt-4 btn-primary">📸 캡처</button></div>`);
      document.getElementById('vid').srcObject=stream;
      document.getElementById('snap').onclick=()=>{ const v=document.getElementById('vid'); const c=document.createElement('canvas'); c.width=v.videoWidth||640; c.height=v.videoHeight||480; c.getContext('2d').drawImage(v,0,0); const o=state.orders.find(x=>x.id===state.selected); o.photos.push(c.toDataURL('image/jpeg',0.8)); stream.getTracks().forEach(t=>t.stop()); persist(); closeSheet(); render(); toast('사진을 담았어요'); };
    } else {
      openSheet(`<div class="p-6"><div class="text-lg font-bold mb-1">카메라 (mock 모드)</div><div class="text-xs text-slate-500 mb-4">file:// · 권한 부재로 실 카메라 미가용 → mock 프레임 생성</div><canvas id="mockcam" width="320" height="240" class="w-full rounded-xl border"></canvas><button id="snap" class="w-full mt-4 btn-primary">📸 mock 캡처</button></div>`);
      const cv=document.getElementById('mockcam'); const g=cv.getContext('2d');
      g.fillStyle='#1b2733'; g.fillRect(0,0,320,240); g.fillStyle='#1E5FD6'; g.fillRect(0,0,320,34); g.fillStyle='#fff'; g.font='bold 14px sans-serif'; g.fillText('현장톡 CAM · '+state.currentLine,10,22); g.font='12px sans-serif'; g.fillStyle='#D1D6DB'; g.fillText(new Date().toLocaleString('ko-KR'),10,210); g.fillText('GPS '+(state._geoFix?`${state._geoFix.lat.toFixed(4)}, ${state._geoFix.lng.toFixed(4)}`:'37.5012, 127.0390'),10,228); g.strokeStyle='#FFB331'; g.lineWidth=3; g.strokeRect(110,90,100,70);
      document.getElementById('snap').onclick=()=>{ const o=state.orders.find(x=>x.id===state.selected); o.photos.push(cv.toDataURL('image/jpeg',0.85)); persist(); closeSheet(); render(); toast('mock 사진을 담았어요'); };
    }
  };
  const cmp = document.querySelector('[data-complete]'); if (cmp) cmp.onclick=()=>{
    const o=state.orders.find(x=>x.id===state.selected); if(!o) return;
    if (o.status==='done'){ toast('이미 완료한 작업이에요'); return; }
    if (!o.photos.length){ toast('사진을 1장 이상 첨부해 주세요'); return; }
    if (o.checks.length && o.checks.some(c=>!c.d)){ toast('체크리스트를 모두 완료해 주세요'); return; }
    o.status='done'; o.log.push({t:fmtTime(), msg:`완료 (사진 ${o.photos.length}장, 체크 ${o.checks.length}/${o.checks.length})`});
    pushHistory('작업 완료', `${o.id} ${o.title}`);
    if (!state.online){ state.queue.push({type:'complete', id:o.id, label:`완료 ${o.id}`, updatedAt:Date.now()}); DB.put({label:`완료 ${o.id}`, type:'complete', id:o.id, updatedAt:Date.now()}); }
    persist(); state.selected=null; render(); toast(state.online?'완료 보고했어요!':'오프라인이라 큐에 저장했어요');
  };
  const iss = document.querySelector('[data-issue]'); if (iss) iss.onclick=()=>{ state.view='report'; state.selected=null; persist(); render(); };
  const geo = document.querySelector('[data-geo]'); if (geo) geo.onclick=()=>{
    const recordMock=()=>{ const o=state.orders.find(x=>x.id===state.selected); const mock={lat:37.5012,lng:127.0390,mock:true}; o.geo=mock; state._geoFix=mock; persist(); render(); toast('위치를 기록했어요 (mock 좌표)'); };
    if (!navigator.geolocation){ recordMock(); return; }
    navigator.geolocation.getCurrentPosition(p=>{ const o=state.orders.find(x=>x.id===state.selected); const fix={lat:p.coords.latitude,lng:p.coords.longitude}; o.geo=fix; state._geoFix=fix; persist(); render(); toast('위치를 기록했어요'); }, e=>recordMock(), {timeout:3000});
  };

  // report form
  document.querySelectorAll('.cat-btn').forEach(b=>b.onclick=()=>{ document.querySelectorAll('.cat-btn').forEach(x=>{x.classList.remove('bg-blue-50','border-blue-500','text-blue-700','font-bold');x.classList.add('border-slate-200');}); b.classList.add('bg-blue-50','border-blue-500','text-blue-700','font-bold'); window._cat=b.dataset.cat; });
  document.querySelectorAll('.sev-btn').forEach(b=>b.onclick=()=>{ document.querySelectorAll('.sev-btn').forEach(x=>{x.classList.remove('bg-blue-50','border-blue-500','text-blue-700','font-bold');x.classList.add('border-slate-200');}); b.classList.add('bg-blue-50','border-blue-500','text-blue-700','font-bold'); window._sev=b.dataset.sev; });
  const send = document.getElementById('send'); if (send) send.onclick=()=>{
    const memo=document.getElementById('memo').value; if(!memo.trim()){ toast('메모를 입력해 주세요'); return; }
    const photos=window._rprev||[];
    const r={ id:'IR-'+Math.floor(Math.random()*900+100), time:fmtTime(), cat:window._cat||'안전 위험', severity:window._sev||'경미', memo, photos:[...photos], by:state.user, line:state.currentLine, resolved:false, ts:Date.now() };
    state.reports.unshift(r); pushHistory('이상 보고', `[${r.cat}/${r.severity}] ${memo.slice(0,28)}`);
    if (!state.online){ state.queue.push({type:'report', label:`이상 ${r.id}`, updatedAt:Date.now()}); DB.put({label:`이상 ${r.id}`, type:'report', updatedAt:Date.now()}); }
    window._rprev=[]; persist(); render(); toast(state.online?'이상 보고를 전송했어요':'오프라인이라 큐에 저장했어요');
  };
  const rphoto=document.getElementById('rphoto'); if (rphoto) rphoto.onchange=async e=>{ window._rprev=window._rprev||[]; for(const f of e.target.files){ window._rprev.push(await fileToDataURL(f)); } document.getElementById('rprev').innerHTML=window._rprev.map(p=>`<img src="${p}" class="thumb">`).join(''); };
  const mic=document.getElementById('mic'); if (mic) mic.onclick=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR){ toast('이 브라우저에서는 음성 인식을 쓸 수 없어요'); return; }
    const r=new SR(); r.lang='ko-KR'; r.interimResults=false;
    r.onresult=ev=>{ const t=ev.results[0][0].transcript; const ta=document.getElementById('memo'); ta.value=(ta.value?ta.value+' ':'')+t; toast('🎙️ '+t); };
    r.onerror=ev=>toast('음성 인식이 잘 안 됐어요. 다시 시도해 주세요'); r.start(); toast('🎙️ 듣고 있어요...');
  };

  // foreman compose
  const cs=document.getElementById('c-send'); if (cs) cs.onclick=()=>{
    const t=document.getElementById('c-title').value; if(!t){ toast('제목을 입력해 주세요'); return; }
    const id='WO-2606-'+String(state.orders.length+1).padStart(2,'0');
    const tplKey=document.getElementById('c-tpl').value;
    const tpl = libraryTemplates().find(x=>x.key===tplKey);
    state.orders.unshift({ id, title:t, priority:document.getElementById('c-prio').value, due:document.getElementById('c-due').value, status:'todo', from:state.user, line:document.getElementById('c-line').value, shift:state.currentShift, detail:document.getElementById('c-detail').value.split('\n').filter(Boolean), photos:[], log:[{t:fmtTime(),msg:'발행됨'}], geo:null, checks: tpl? JSON.parse(JSON.stringify(tpl.items)):[], createdAt:Date.now(), slaMin:120 });
    pushHistory('작업 발행', `${id} ${t}`); persist(); render(); toast('작업을 발행했어요: '+id);
  };

  // inbox
  document.querySelectorAll('[data-resolve]').forEach(b=>b.onclick=()=>{ const r=state.reports.find(x=>x.id===b.dataset.resolve); r.resolved=true; pushHistory('이상 처리', r.id); persist(); render(); toast('처리 완료했어요'); });
  document.querySelectorAll('[data-escalate]').forEach(b=>b.onclick=()=>{ pushHistory('이상 상위보고', b.dataset.escalate); toast('상위에 보고했어요'); });

  // SLA
  const re=document.getElementById('run-escalation'); if (re) re.onclick=()=>{ const b=runEscalation(); render(); toast(`에스컬레이션을 실행했어요 — ${b.length}건 상향보고`); };

  // PM admin shortcut
  const gc=document.getElementById('goto-campaign'); if (gc) gc.onclick=()=>{ state.view='campaign'; persist(); render(); };

  // KPI / risk
  const rr=document.getElementById('run-risk'); if (rr) rr.onclick=async ()=>{ rr.disabled=true; rr.textContent='분석하고 있어요…'; await RISK_API.run(); render(); toast('위험분석을 마쳤어요'); };

  // campaign
  const pcs=document.getElementById('pc-send'); if (pcs) pcs.onclick=async ()=>{
    const t=document.getElementById('pc-title').value; if(!t){ toast('제목을 입력해 주세요'); return; }
    const aud=document.getElementById('pc-audience').value; const when=document.getElementById('pc-when').value;
    await sendCampaign(t, aud, when); render(); toast(when==='즉시'?'캠페인을 발송했어요':'캠페인을 예약했어요');
  };

  // reports CSV
  const ec=document.getElementById('export-csv'); if (ec) ec.onclick=()=>{
    const rows=[['ID','제목','우선순위','상태','라인','마감','사진수']].concat(state.orders.map(o=>[o.id,o.title,o.priority,STATUS[o.status][0],o.line,o.due,o.photos.length]));
    const csv=rows.map(r=>r.join(',')).join('\n'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv'})); a.download='fieldwork_report.csv'; a.click(); toast('작업 CSV를 내려받았어요');
  };
  const erc=document.getElementById('export-risk-csv'); if (erc) erc.onclick=()=>{
    const latest=state.riskResults[0]; if(!latest){ toast('먼저 위험분석을 실행해 주세요 (안전관리자)'); return; }
    const rows=[['라인','산업','위험점수','등급','보험료영향%']].concat(latest.perLine.map(r=>[r.line,r.industry,r.score,r.grade,(r.premiumDelta*100).toFixed(0)]));
    const csv=rows.map(r=>r.join(',')).join('\n'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv'})); a.download='risk_analysis.csv'; a.click(); toast('위험분석 CSV를 내려받았어요');
  };

  // settings
  const ip=document.getElementById('install-pwa'); if (ip) ip.onclick=async ()=>{
    if (deferredInstall){ deferredInstall.prompt(); const r=await deferredInstall.userChoice; toast(r.outcome==='accepted'?'홈 화면에 설치했어요!':'설치를 취소했어요'); deferredInstall=null; }
    else toast('브라우저 메뉴에서 "홈 화면에 추가"를 눌러 설치해 주세요 (manifest+SW 등록됨)');
  };
  document.querySelectorAll('#install-native').forEach(b=> b.onclick=nativeInstallSheet);
  const ssla=document.getElementById('save-sla'); if (ssla) ssla.onclick=()=>{
    state.slaRule.highMin=+document.getElementById('sla-high').value; state.slaRule.normalMin=+document.getElementById('sla-normal').value; state.slaRule.lowMin=+document.getElementById('sla-low').value; state.slaRule.escalateTo=document.getElementById('sla-to').value;
    persist(); toast('SLA 룰을 저장했어요'); render();
  };
  const ep=document.getElementById('enable-push'); if (ep) ep.onclick=async ()=>{
    let granted=false;
    try { if ('Notification' in window){ const p=await Notification.requestPermission(); granted=(p==='granted'); if(granted) new Notification('현장톡',{body:'푸시 알림을 켰어요'}); } } catch(e){ granted=false; }
    state.pushSubscribed=true; state.pushEndpoint = granted?'https://fcm.googleapis.com/fcm/send/REAL-'+Math.random().toString(36).slice(2,10):'mock://push/endpoint/'+Math.random().toString(36).slice(2,10); state.pushMode = granted?'real':'mock';
    pushHistory('푸시 구독', `${state.pushMode} · ${state.pushEndpoint.slice(0,42)}…`); persist(); render(); toast(granted?'푸시 알림을 켰어요':'푸시 알림을 켰어요 (mock endpoint)');
  };
  const el=document.getElementById('enable-loc'); if (el) el.onclick=()=>{ if(!navigator.geolocation){ toast('이 브라우저는 위치를 지원하지 않아요 (mock)'); return; } navigator.geolocation.getCurrentPosition(p=>toast(`위치: ${p.coords.latitude.toFixed(4)}, ${p.coords.longitude.toFixed(4)}`), e=>toast('위치 권한이 꺼져 있어 mock 좌표를 써요')); };
  const rs=document.getElementById('reset'); if (rs) rs.onclick=()=>{ if(confirm('정말 초기화할까요?')){ localStorage.removeItem(KEY); location.reload(); } };

  // mypage selects
  const ls=document.getElementById('line-sel'); if (ls) ls.onchange=()=>{ state.currentLine=ls.value; persist(); render(); };
  const sf=document.getElementById('shift-sel'); if (sf) sf.onchange=()=>{ state.currentShift=sf.value; persist(); render(); };

  const lo=document.getElementById('logout'); if (lo) lo.onclick=()=>{ if(confirm('데이터를 초기화할까요?')){ localStorage.removeItem(KEY); location.reload(); } };
}

function render(){ document.getElementById('main').innerHTML = header() + bodyView(); renderNav(); bind(); }
window.addEventListener('resize', ()=>renderNav());

// URL ?view= 진입 (manifest shortcut 지원)
(function(){ const p=new URLSearchParams(location.search); const v=p.get('view'); if (v) state.view=allowedView(state.role,v); })();
render();
</script>
</body>
</html>
