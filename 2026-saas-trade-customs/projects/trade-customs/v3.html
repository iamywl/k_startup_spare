<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>트레이드릴레이 · 수출 통관·관세 자동화 SaaS (v3 · 시리즈A)</title>
<!-- jsPDF (오프라인 폴백: 없으면 mock 안내) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    /* 무역/통관 도메인 — 신뢰의 인디고/블루, WCAG AA 톤 */
    --brand:#2f5fd8; --brand-d:#1f3fa8; --brand-l:#e8eefb;
    --ink:#15203a; --sec:#4a5872; --ter:#8893a8;
    --bg:#f4f6fb; --surf:#ffffff; --surf2:#eef2f9; --line:#dfe5f0;
    --ok:#1f9d57; --okbg:#e7f6ee; --warn:#c98a00; --warnbg:#fdf3da;
    --bad:#d24b4b; --badbg:#fbeaea; --info:#2f6fd0; --infobg:#e8f0fb;
    --r:14px; --r2:18px; --sb:248px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;max-width:100%;overflow-x:hidden}
  body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;
    background:linear-gradient(180deg,#eef2fb,#f4f6fb 240px);color:var(--ink);font-size:15px;line-height:1.5}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:15px}
  h1,h2,h3,h4{margin:0;line-height:1.25}
  .muted{color:var(--sec)} .ter{color:var(--ter)}
  .hidden{display:none!important}
  .app{display:flex;min-height:100vh}
  .sidebar{width:var(--sb);flex:0 0 var(--sb);background:var(--surf);border-right:1px solid var(--line);
    position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:18px 12px;gap:4px;overflow-y:auto}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 14px}
  .brand .logo{width:34px;height:34px;border-radius:10px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800;font-size:16px}
  .brand b{font-size:17px}
  .navsec{font-size:11px;font-weight:700;color:var(--ter);padding:12px 10px 4px;letter-spacing:.04em}
  .nav{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:11px;color:var(--sec);font-weight:600;font-size:14px;transition:.12s;width:100%;text-align:left}
  .nav:hover{background:var(--surf2)}
  .nav.active{background:var(--brand-l);color:var(--brand-d)}
  .nav .ic{width:20px;text-align:center}
  .nav .badge{margin-left:auto;background:var(--bad);color:#fff;font-size:11px;font-weight:700;border-radius:9px;padding:1px 7px}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:12px;padding:12px 22px;
    background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(18px);border-bottom:1px solid var(--line)}
  @supports not (backdrop-filter:blur(1px)){.topbar{background:#fff}}
  .topbar h2{font-size:18px}
  .grow{flex:1}
  .content{padding:22px;max-width:1180px;width:100%;margin:0 auto}
  .iconbtn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:17px;color:var(--sec);background:var(--surf2)}
  .iconbtn:active{transform:scale(.95)}
  .card{background:var(--surf);border:1px solid var(--line);border-radius:var(--r2);padding:18px}
  .card h3{font-size:15px;margin-bottom:4px}
  .grid{display:grid;gap:14px}
  .g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
  .kpi .v{font-size:25px;font-weight:800;letter-spacing:-.02em}
  .kpi .l{font-size:13px;color:var(--sec);font-weight:600}
  .kpi .d{font-size:12px;margin-top:3px}
  .row{display:flex;align-items:center;gap:10px}
  .sp{justify-content:space-between}
  .wrap{flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:3px 9px;border-radius:999px}
  .pill.ok{background:var(--okbg);color:var(--ok)} .pill.warn{background:var(--warnbg);color:var(--warn)}
  .pill.bad{background:var(--badbg);color:var(--bad)} .pill.info{background:var(--infobg);color:var(--info)}
  .pill.brand{background:var(--brand-l);color:var(--brand-d)} .pill.gray{background:var(--surf2);color:var(--sec)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 15px;border-radius:11px;font-weight:700;font-size:14px;background:var(--surf2);color:var(--ink);transition:.12s}
  .btn:active{transform:scale(.97)} .btn.pri{background:var(--brand);color:#fff} .btn.pri:hover{background:var(--brand-d)}
  .btn.dang{background:var(--badbg);color:var(--bad)} .btn.sm{padding:6px 11px;font-size:13px;border-radius:9px}
  .btn.gho{background:transparent;border:1px solid var(--line)}
  .btn:disabled{opacity:.4;pointer-events:none}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{font-size:12px;color:var(--ter);font-weight:700}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
  .field label{font-size:13px;font-weight:600;color:var(--sec)}
  .field input,.field select,.field textarea{padding:11px 12px;border:1px solid var(--line);border-radius:11px;background:var(--surf);width:100%}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-l)}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{padding:7px 12px;border-radius:9px;font-size:13px;font-weight:600;background:var(--surf2);color:var(--sec)}
  .seg button.on{background:var(--brand);color:#fff}
  .progress{height:8px;background:var(--surf2);border-radius:99px;overflow:hidden}
  .progress > i{display:block;height:100%;background:var(--brand);border-radius:99px}
  .steps{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
  .steps .st{flex:1;min-width:90px;padding:9px 8px;border-radius:11px;background:var(--surf2);font-size:12px;font-weight:700;color:var(--ter);text-align:center;position:relative}
  .steps .st.on{background:var(--brand-l);color:var(--brand-d)}
  .steps .st.done{background:var(--okbg);color:var(--ok)}
  .ovl{position:fixed;inset:0;z-index:60;background:rgba(21,32,58,.34);display:grid;place-items:center;padding:18px}
  .modal{background:var(--surf);border-radius:20px;max-width:640px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.22)}
  .modal.wide{max-width:760px}
  .modal .hd{position:sticky;top:0;background:var(--surf);display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);z-index:1}
  .modal .bd{padding:18px}
  .modal .ft{position:sticky;bottom:0;background:var(--surf);padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
  #toasts{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
  .toast{background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;transform:translateY(8px);transition:.25s;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:none}
  .bars{display:flex;align-items:flex-end;gap:10px;height:130px;padding-top:18px}
  .bars .bar{flex:1;background:var(--surf2);border-radius:8px 8px 0 0;position:relative;min-height:4px}
  .bars .bar > i{position:absolute;bottom:0;left:0;right:0;background:var(--brand);border-radius:8px 8px 0 0}
  .bars .bar span{position:absolute;top:-17px;left:0;right:0;text-align:center;font-size:11px;font-weight:700;color:var(--sec)}
  .bars .bar em{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:11px;color:var(--ter);font-style:normal}
  .cand{border:1px solid var(--line);border-radius:13px;padding:12px;margin-bottom:10px;cursor:pointer;transition:.12s}
  .cand:hover{border-color:var(--brand)}
  .cand.sel{border-color:var(--brand);background:var(--brand-l)}
  .checkitem{display:flex;align-items:flex-start;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line)}
  .checkbox{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex:0 0 auto;display:grid;place-items:center;color:#fff;font-size:13px;cursor:pointer}
  .checkbox.on{background:var(--brand);border-color:var(--brand)}
  .tl{position:relative;padding-left:22px}
  .tl::before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
  .tl .it{position:relative;padding:0 0 14px}
  .tl .it::before{content:"";position:absolute;left:-21px;top:4px;width:11px;height:11px;border-radius:50%;background:var(--brand);border:2px solid var(--surf)}
  .hs{font-variant-numeric:tabular-nums;font-weight:700;letter-spacing:.02em}
  /* v2 추가 ---------------------------------------------------------- */
  .meter{height:10px;background:var(--surf2);border-radius:99px;overflow:hidden;margin:4px 0}
  .meter > i{display:block;height:100%;background:var(--brand);border-radius:99px;transition:width .3s}
  .meter.ok > i{background:var(--ok)} .meter.warn > i{background:var(--warn)} .meter.bad > i{background:var(--bad)}
  .ftarow{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid var(--line);border-radius:12px;margin-bottom:9px;transition:.12s;flex-wrap:wrap}
  .ftarow.best{border-color:var(--ok);background:var(--okbg)}
  .log{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.6;background:#0f1626;color:#cfe0ff;border-radius:12px;padding:13px 14px;overflow-x:auto;white-space:pre-wrap;word-break:break-word}
  .log .ok2{color:#7fe3a3} .log .warn2{color:#ffd479} .log .dim{color:#7c8aa8}
  .roleswitch{display:flex;align-items:center;gap:7px}
  .avatar{width:30px;height:30px;border-radius:9px;background:var(--brand-l);color:var(--brand-d);display:grid;place-items:center;font-weight:800;font-size:13px}
  .tenant-sel{padding:7px 10px;border:1px solid var(--line);border-radius:10px;background:var(--surf);font-weight:600;font-size:13px;max-width:170px}
  .matrix td,.matrix th{text-align:center;white-space:nowrap}
  .matrix td:first-child,.matrix th:first-child{text-align:left}
  .yes{color:var(--ok);font-weight:800} .no{color:var(--ter)}
  .heat{display:inline-block;min-width:30px;padding:3px 0;border-radius:6px;font-weight:700;font-size:12px}
  /* v3 추가 ---------------------------------------------------------- */
  .langtog{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .langtog button{padding:5px 10px;font-size:12px;font-weight:800;color:var(--sec);background:var(--surf)}
  .langtog button.on{background:var(--brand);color:#fff}
  .scen{display:flex;align-items:flex-end;gap:14px;height:150px;padding:22px 6px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .scen .col{flex:1 0 auto;min-width:72px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;position:relative}
  .scen .col > i{width:60%;max-width:48px;background:var(--brand);border-radius:8px 8px 0 0;position:relative}
  .scen .col.up > i{background:var(--bad)} .scen .col.down > i{background:var(--ok)} .scen .col.base > i{background:var(--ter)}
  .scen .col span{position:absolute;top:-18px;font-size:11px;font-weight:800;color:var(--ink)}
  .scen .col em{margin-top:6px;font-size:11px;color:var(--ter);font-style:normal;text-align:center}
  .node{border:1px solid var(--line);border-radius:11px;padding:9px 11px;background:var(--surf2);display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:7px}
  .node b{font-variant-numeric:tabular-nums}
  .node.dom{border-color:var(--ok);background:var(--okbg)} .node.imp{border-color:var(--warn);background:var(--warnbg)}
  .gauge{position:relative;height:14px;border-radius:99px;background:linear-gradient(90deg,var(--ok),var(--warn),var(--bad));margin:10px 0 4px}
  .gauge > i{position:absolute;top:-4px;width:4px;height:22px;background:var(--ink);border-radius:2px;transform:translateX(-50%)}
  .riskchip{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 11px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;font-size:13px}
  .lc{font-family:ui-monospace,Menlo,monospace;font-size:12px;background:var(--surf2);border:1px dashed var(--line);border-radius:11px;padding:12px 14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
  .reco{border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:10px;transition:.12s}
  .reco.top{border-color:var(--ok);background:var(--okbg)}
  .mtop{display:none}
  .bottomnav{display:none}
  .drawer,.drawerbd{display:none}
  /* ===== responsive ===== */
  @media (max-width:860px){
    .sidebar{display:none}
    .topbar{display:none}
    .mtop{display:flex;position:sticky;top:0;z-index:40;align-items:center;gap:10px;padding:11px 14px;
      background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(18px);border-bottom:1px solid var(--line)}
    .mtop .logo{width:30px;height:30px;border-radius:9px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800;font-size:14px}
    .mtop b{font-size:15px}
    .mtop .tenant-sel{max-width:120px;padding:6px 8px;font-size:12px}
    .content{padding:14px 14px 96px;max-width:100%}
    .g2,.g3,.g4{grid-template-columns:1fr}
    .g2.keep{grid-template-columns:1fr 1fr}
    .bottomnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.94);
      backdrop-filter:saturate(180%) blur(18px);border-top:1px solid var(--line);padding:6px 4px 8px;justify-content:space-around}
    .bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:11px;font-weight:600;color:var(--ter);padding:5px 2px;position:relative}
    .bottomnav button.on{color:var(--brand-d)}
    .bottomnav .ic{font-size:18px}
    .bottomnav .badge{position:absolute;top:0;right:18%;background:var(--bad);color:#fff;font-size:9px;border-radius:8px;padding:0 5px;font-weight:700}
    .drawerbd{display:block;position:fixed;inset:0;z-index:70;background:rgba(21,32,58,.4)}
    .drawer{display:flex;flex-direction:column;position:fixed;top:0;bottom:0;right:0;width:84%;max-width:320px;z-index:71;
      background:var(--surf);padding:16px 12px;overflow-y:auto;box-shadow:-12px 0 40px rgba(0,0,0,.2)}
    .modal,.modal.wide{max-width:100%;border-radius:18px 18px 0 0;align-self:flex-end;max-height:92vh}
    .ovl{place-items:end center;padding:0}
    #toasts{bottom:96px}
    .content .card{padding:15px}
    .kpi .v{font-size:22px}
    .steps .st{min-width:0;font-size:11px;padding:8px 4px}
    .tablewrap table{min-width:560px}
    .tablewrap table.matrix{min-width:520px}
    .tablewrap td,.tablewrap th{white-space:nowrap}
    .ftarow{font-size:13px}
  }
  @media (max-width:380px){ .g2.keep{grid-template-columns:1fr} }
</style>
</head>
<body>
<div id="root"></div>
<div id="toasts"></div>
<div id="modalRoot"></div>
<div id="drawerRoot"></div>

<script>
/* ===========================================================================
   트레이드릴레이 — 수출 통관·관세 자동화 SaaS · v3 단일 HTML 데모 (오프라인 자체완결, 시리즈A)
   v2 위에 적층: ① 고급 알고리즘 4종(관세율 변동 시나리오·다국가 공급망 원산지 누적 roll-up·
   FTA 사후검증 리스크 스코어·수출 채산성 최적 협정/국가 추천) ② KO/EN 다국어 i18n
   ③ 역할 5종(+해외바이어·은행)·외부연동 7건(+바이어포털·무역금융 LC·선사 EDI)
   ④ 뷰 15종·워크플로 5개.
   상태: localStorage 'traderelay-v3'. 키 없이 mock 동작. 로그인 없이 즉시 시연.
   기능 카운트는 파일 하단 FEATURES[] 주석 참조.
   =========================================================================== */
const LS_KEY = "traderelay-v3";

/* ---------- i18n (KO/EN) — 수출 도메인: 해외 바이어·영문 서류 대응 ---------- */
const I18N = {

    items:"품목·HS코드", origin:"FTA 원산지·최적화", scenario:"관세율 시나리오", supply:"공급망 원산지 누적",

    data:"연동 로그·설정", role:"역할", tenant:"테넌트", menu:"메뉴",

    amount:"수출금액", hs:"HS코드", fta:"FTA", stage:"단계", open:"열기", recommend:"추천",
    scenario_t:"관세율 변동 시나리오 시뮬레이션", scenario_d:"FTA 미발효·부분 인상·미·중 추가관세 등 시나리오별로 관세율을 변동시켜 착지원가·마진 영향을 정량 시뮬레이션한다.",

/* HS 분류: 가중 TF 점수 + negative 키워드 감점. softmax 유사 정규화로 신뢰도. */
function classifyHS(text){
  const t = (text||"").toLowerCase();
  const scored = HS_RULES.map(r=>{
    let raw=0, hits=[];
    for(const [k,w] of Object.entries(r.kw)){ if(t.includes(k.toLowerCase())){ raw+=w; hits.push(k); } }
    (r.neg||[]).forEach(k=>{ if(t.includes(k.toLowerCase())) raw-=2; });
    return { hs:r.hs, label:r.label, rate:r.rate, raw:Math.max(0,raw), reason:hits };
  }).filter(c=>c.raw>0);
  if(scored.length===0) return [{ hs:"미분류", label:"키워드 매칭 없음 — 사전심사 권장", rate:8, conf:0, reason:[] }];
  // 정규화: 상위 후보 raw 합 대비 비율 → 신뢰도(상한 97)
  const sum = scored.reduce((a,c)=>a+c.raw,0);
  scored.forEach(c=>{ c.conf = Math.min(97, Math.round(40 + c.raw*9 + (c.raw/sum)*30)); });
  return scored.sort((a,b)=>b.conf-a.conf).slice(0,3);
}
/* 다협정 최적화: 도착국에서 적용 가능한 모든 협정을 비교해 절감 최대 협정 추천.
   각 협정 충족 가정 시 절감 = MFN% × 수출금액. 동률이면 양허 잔여기간 짧은 협정 우선(staging). */
function optimizeFTA(it){
  const dest=it.dest; const valUSD=it.qty*it.unitUSD;
  const ags = DEST_FTAS[dest] || Object.keys(FTA);
  const rows = ags.map(a=>{
    const f=FTA[a];
    const saveUSD = Math.round(valUSD * f.mfn/100);
    // 충족 난이도 점수(낮을수록 쉬움): RVC 문턱 + 발급유형 가중
    const difficulty = f.rvcMin + (f.coType.includes("기관")||f.coType.includes("Form")?12:0) + (f.coType.includes("인증")?6:0);
    return { ag:a, partner:f.partner, mfn:f.mfn, saveUSD, rvcMin:f.rvcMin, staging:f.stagingYears, coType:f.coType, difficulty };
  });
  rows.sort((a,b)=> b.saveUSD-a.saveUSD || a.staging-b.staging || a.difficulty-b.difficulty);
  return { rows, best: rows[0], valUSD };
}
/* 원산지 RVC 정량 판정: 입력 부가가치율 vs 협정 문턱 + CTH 충족 여부 → 충족/미충족 + 마진 */
function originResult(agreement, cthMet, rvcInput, valueUSD){
  const f = FTA[agreement];
  const rvcOk = rvcInput >= f.rvcMin;
  const ok = cthMet || rvcOk;            // 대부분 협정 CTH '또는' RVC
  const saveUSD = ok ? Math.round(valueUSD * f.mfn/100) : 0;
  const margin = Math.round(rvcInput - f.rvcMin);
  return { ok, rvcOk, cthMet, rvcMin:f.rvcMin, margin, mfn:f.mfn, saveUSD, partner:f.partner, coType:f.coType };
}
/* 관세·물류비 시뮬레이션: 도착국 MFN/특혜 관세 + 물류비(중량 기반 mock 요율) + 관세 절감 */
const FREIGHT = { "미국":2.6,"유럽연합":2.9,"EU":2.9,"일본":1.4,"중국":1.3,"베트남":1.7,"인도네시아":1.9,"태국":1.8 }; // USD/kg mock
function landedCost(it, agreementOk){
  const valUSD = it.qty*it.unitUSD;
  const wKg = (it.weightKg||0.4) * it.qty;            // 단위중량×수량(기본 0.4kg)
  const freight = Math.round(wKg * (FREIGHT[it.dest]||2.2));
  const mfn = it.mfn ?? 8;
  const dutyMFN = Math.round(valUSD * mfn/100);
  const dutyFTA = agreementOk ? 0 : dutyMFN;
  const insurance = Math.round(valUSD*0.003);
  return { valUSD, wKg:Math.round(wKg), freight, insurance, dutyMFN, dutyFTA, saveDuty:dutyMFN-dutyFTA,
    landedMFN: valUSD+freight+insurance+dutyMFN, landedFTA: valUSD+freight+insurance+dutyFTA };
}
/* 간이정액환급 정밀 산정: 품목군별 1만원당 환급액(고시 mock) × (수출금액원/1만) */
const REFUND_PER_10K = { "3304":62,"3305":58,"3401":55,"6109":70,"6204":70,"6404":66,"4202":60,"9503":52,"1905":48,"2106":50,"8517":0 };
function refundEstimate(valueKRW, hs){
  const grp = hs ? hs.replace(".","").slice(0,4) : "0000";
  const per = REFUND_PER_10K[grp] ?? 56;             // 미상품목 평균 mock
  return Math.round(valueKRW/10000 * per);
}

   v3 고급 알고리즘 (실 연산)
   ===================================================================== */
/* ① 관세율 변동 시나리오 시뮬레이션 — 시나리오별 관세율을 변동시켜 착지원가·마진 영향 산정.
   각 시나리오는 적용 관세율(effRate)을 정하고, 그 관세·착지원가·마진율을 계산한다.
   마진 = (판매가 가정 = 상품가×(1+목표마진)) − 착지원가. 목표마진 기본 30%[추정]. */
const TARGET_MARGIN = 0.30; // 판매가 산정용 가정 마진 [추정]
function tariffScenarios(it){
  const valUSD = it.qty*it.unitUSD;
  const wKg = (it.weightKg||0.4)*it.qty;
  const freight = Math.round(wKg*(FREIGHT[it.dest]||2.2));
  const insurance = Math.round(valUSD*0.003);
  const sell = Math.round(valUSD*(1+TARGET_MARGIN)); // 목표 판매가(바이어 가격)
  const mfn = it.mfn ?? 8;
  const base = it.originOk ? 0 : mfn; // 현행: 원산지 충족 시 0
  const scns = [
    { key:"fta",  ko:"현행(FTA 적용)",   en:"Current (FTA)",      rate: it.originOk?0:mfn },
    { key:"lapse",ko:"FTA 미발효/실효",  en:"FTA Lapse",          rate: mfn },
    { key:"half", ko:"양허 부분복귀(½)", en:"Partial Restore ½",  rate: +(mfn/2).toFixed(1) },
    { key:"extra",ko:"추가관세(+10%p)",  en:"Extra Duty +10%p",   rate: mfn+10 },
  ];
  const rows = scns.map(s=>{
    const duty = Math.round(valUSD*s.rate/100);
    const landed = valUSD+freight+insurance+duty;
    const margin = sell - landed;
    const marginPct = +(margin/sell*100).toFixed(1);
    return { ...s, duty, landed, margin, marginPct };
  });
  const baseLanded = valUSD+freight+insurance+Math.round(valUSD*base/100);
  rows.forEach(r=> r.deltaLanded = r.landed - baseLanded);
  return { valUSD, sell, freight, insurance, rows, base };
}
/* ② 다국가 공급망 원산지 누적(roll-up) — 부품 트리에서 역내(누적대상)/역외 금액을 집계해 RVC 계산.
   RVC(BU/공제법 단순화) = 역내가치 / 총가치 ×100. 역내(domestic)+누적가능국(accum)을 역내로 인정. */
function rollupOrigin(components, agreement){
  const f = FTA[agreement] || FTA["RCEP"];
  let regional=0, total=0;
  components.forEach(c=>{ total += c.value; if(c.regional) regional += c.value; });
  const rvc = total? Math.round(regional/total*100) : 0;
  const ok = rvc >= f.rvcMin;
  return { regional, nonRegional: total-regional, total, rvc, threshold:f.rvcMin, ok, margin: rvc - f.rvcMin, partner:f.partner };
}
/* ③ FTA 사후검증 리스크 스코어(0~100, 높을수록 위험) — 가중 합산.
   요인: RVC 마진(얇을수록↑), 원산지 근거(CTH 미충족↑), 발급유형(자율발급↑), 서류 완비도(미비↑), 누적 의존(↑). */
function postAuditRisk(it){
  const f = it.agreement? FTA[it.agreement] : null;
  let score=10, factors=[];
  const margin = (it.rvc!=null && f)? it.rvc - f.rvcMin : -1;
  if(margin < 0){ score+=35; factors.push({k:"RVC 미충족/미입력", en:"RVC unmet/not entered", w:35, lv:"bad"}); }
  else if(margin < 5){ score+=24; factors.push({k:"RVC 마진 < 5%p (얇음)", en:"RVC margin < 5%p (thin)", w:24, lv:"bad"}); }
  else if(margin < 12){ score+=12; factors.push({k:"RVC 마진 5~12%p (보통)", en:"RVC margin 5-12%p (medium)", w:12, lv:"warn"}); }
  else factors.push({k:"RVC 마진 ≥12%p (여유)", en:"RVC margin ≥12%p (ample)", w:0, lv:"ok"});
  if(f && f.coType.includes("자율")){ score+=15; factors.push({k:"자율발급(수출자 작성)", en:"Self-issued (by exporter)", w:15, lv:"warn"}); }
  else if(f && f.coType.includes("인증")){ score+=6; factors.push({k:"인증수출자 신고", en:"Approved-exporter declaration", w:6, lv:"warn"}); }
  else factors.push({k:"기관발급 C/O", en:"Authority-issued C/O", w:0, lv:"ok"});
  const need = it.originOk ? 3 : 2; const have = (it.docs||[]).length;
  if(have < need){ score+=18; factors.push({k:"증빙서류 미비("+have+"/"+need+")", en:"Docs incomplete ("+have+"/"+need+")", w:18, lv:"bad"}); }
  else factors.push({k:"증빙서류 완비("+have+"/"+need+")", en:"Docs complete ("+have+"/"+need+")", w:0, lv:"ok"});
  if(it.rollupUsed){ score+=10; factors.push({k:"역내 누적 의존(다국가 부품)", en:"Relies on regional accumulation (multi-country parts)", w:10, lv:"warn"}); }
  score = Math.max(0, Math.min(100, score));
  const grade = score>=55?"높음":score>=30?"보통":"낮음";
  const gradeEn = score>=55?"High":score>=30?"Medium":"Low";
  return { score, grade, gradeEn, factors };
}
/* ④ 수출 채산성 최적 협정·국가 추천 — 도착국×협정 조합별 순채산(마진) 계산해 정렬.
   순채산 = 판매가(목표) − 착지원가 + 환급. 도착국별 물류요율·협정 절감 반영. */
function profitOptimize(it){
  const valUSD = it.qty*it.unitUSD;
  const wKg = (it.weightKg||0.4)*it.qty;
  const sell = Math.round(valUSD*(1+TARGET_MARGIN));
  const insurance = Math.round(valUSD*0.003);
  const refundKRW = refundEstimate(valUSD*S.fx, it.hs);
  const refundUSD = Math.round(refundKRW/S.fx);
  const dests = Object.keys(DEST_FTAS);
  const rows=[];
  dests.forEach(dest=>{
    const freight = Math.round(wKg*(FREIGHT[dest]||2.2));
    (DEST_FTAS[dest]||[]).forEach(ag=>{
      const f=FTA[ag];
      // 협정 충족 가정(RVC 입력 ≥ 문턱 가정) → 관세 0, 아니면 MFN
      const dutyFTA = 0;
      const landed = valUSD + freight + insurance + dutyFTA;
      const net = sell - landed + refundUSD;          // 순채산(환급 가산)
      const netPct = +(net/sell*100).toFixed(1);
      rows.push({ dest, ag, partner:f.partner, freight, refundUSD, net, netPct, rvcMin:f.rvcMin, coType:f.coType });
    });
  });
  rows.sort((a,b)=> b.net-a.net);
  return { sell, refundUSD, rows: rows.slice(0,8), best: rows[0], cur:it.dest };
}

/* 현재 역할·테넌트로 가시 품목 필터(RBAC + 멀티테넌트) */
function visibleItems(){
  let arr = S.items;
  if(S._role==="exporter") arr = arr.filter(i=>i.cid==="c1");        // 데모 수출기업 = c1
  else if(S._role==="buyer") arr = arr.filter(i=>i.buyer);           // 바이어: 자신에게 배정된 주문만
  else if(S._tenant!=="all") arr = arr.filter(i=>i.cid===S._tenant);
  return arr;
}

/* ---------- toast / modal ---------- */
function toast(msg){
  const w=document.getElementById("toasts"); const t=document.createElement("div");
  t.className="toast"; t.textContent=msg; w.appendChild(t);
  requestAnimationFrame(()=>t.classList.add("show"));
  setTimeout(()=>{ t.classList.remove("show"); setTimeout(()=>t.remove(),250); },1900);
}
function modal(html, wide){ document.getElementById("modalRoot").innerHTML = `<div class="ovl" onclick="if(event.target===this)closeModal()"><div class="modal ${wide?'wide':''}">${html}</div></div>`; }
function closeModal(){ document.getElementById("modalRoot").innerHTML=""; }

/* ---------- derived metrics (가시 품목 기준) ---------- */
function metrics(){
  const arr=visibleItems(); const fx=S.fx;
  const totalUSD = arr.reduce((a,i)=>a+i.qty*i.unitUSD,0);
  const saveUSD = arr.reduce((a,i)=>a+(i.saveUSD||0),0);
  const refundKRW = arr.reduce((a,i)=>a+(i.refundKRW||0),0);
  const unfiled = arr.filter(i=>STAGES.indexOf(i.stage)<3).length;
  const unrefunded = arr.filter(i=>i.stage==="신고서"||i.stage==="환급").filter(i=>!i.refundStatus).length;
  const byStage = STAGES.map(s=>arr.filter(i=>i.stage===s).length);
  return { totalUSD, saveUSD, refundKRW, unfiled, unrefunded, byStage, fx, count:arr.length };
}

  line("Refund (est.)", won(refundEstimate(it.qty*it.unitUSD*S.fx, it.hs)));

}

    <button class="btn gho" onclick="closeModal()">닫기</button>
  </div>`);
}

function downloadSampleCSV(){
  const csv="품명,소재용도설명,수량,단가USD,도착국\n글로우 립밤,립밤 틴트 lip cosmetic,500,6,미국\n데님 청바지,데님 청바지 jeans denim,300,24,일본\n블루투스 스피커,bluetooth 무선 스피커 speaker,200,40,베트남\n";
  dl("traderelay-sample.csv", csv); toast("샘플 CSV 다운로드");
}
function importCSV(ev){
  const f=ev.target.files[0]; if(!f) return;
  const cid = S._role==="exporter"?"c1":(S._tenant!=="all"?S._tenant:"c1");
  const r=new FileReader();
  r.onload=()=>{
    const lines=r.result.split(/\r?\n/).filter(l=>l.trim()); let added=0;
    lines.slice(1).forEach(l=>{
      const c=l.split(","); if(c.length<5) return;
      const [name,desc,qty,unit,dest]=c;
      const cands=classifyHS(desc+" "+name); const top=cands[0];
      const it={ id:uid("e"), cid, name:name.trim(), desc:desc.trim(), qty:+qty||1, unitUSD:+unit||1, dest:(dest||"미국").trim(), weightKg:0.4,
        stage: top && top.conf>0 ? "HS분류":"등록",
        hs: top&&top.conf>0?top.hs:null, hsLabel: top&&top.conf>0?top.label:null, mfn: top&&top.conf>0?top.rate:null,
        agreement:null,originOk:null,rvc:null,saveUSD:0,refundKRW:0,refundStatus:null,refundRef:null,unipass:null,shipment:null,docs:[],createdAt:todayISO(),
        history:[{t:todayISO(),e:"CSV 일괄 등록"}].concat(top&&top.conf>0?[{t:todayISO(),e:`자동 HS ${top.hs} (신뢰도 ${top.conf}%)`}]:[]) };
      S.items.unshift(it); added++;
    });
    save(); toast(added+"건 CSV 일괄 등록·자동 분류 완료"); setView("items");
  };
  r.readAsText(f,"utf-8"); ev.target.value="";
}
function exportCSV(){
  const head="수출기업,품명,도착국,HS코드,MFN(%),FTA협정,RVC(%),원산지충족,수출금액USD,절감USD,환급추정KRW,UNIPASS접수번호,단계,환급상태\n";
  const rows=visibleItems().map(i=>[company(i.cid).name,i.name,i.dest,i.hs||"",i.mfn??"",i.agreement||"",i.rvc??"",i.originOk==null?"":(i.originOk?"Y":"N"),i.qty*i.unitUSD,i.saveUSD||0, refundEstimate(i.qty*i.unitUSD*S.fx,i.hs), i.unipass?i.unipass.ref:"", i.stage, i.refundStatus||""].join(",")).join("\n");
  dl("traderelay-v2-export.csv", head+rows); toast("내역 CSV 내보내기 완료");
}
function dl(name,txt){ const b=new Blob(["﻿"+txt],{type:"text/csv;charset=utf-8"}); const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }

function resetAll(){ if(confirm("데모 데이터를 초기화할까요?")){ localStorage.removeItem(LS_KEY); S=load(); setView("dashboard"); toast("초기화 완료"); } }

function navItems(active, mobile){
  return navFor().map(n=>{
    const m=metrics();
    const badge = n.v==="refund" ? m.unrefunded : (n.v==="docs"? m.unfiled : (n.v==="filing"? visibleItems().filter(i=>i.docs.includes("수출신고서")&&!i.unipass).length : 0));
    return `<button class="nav ${active===n.v?'active':''}" data-view="${n.v}" onclick="${mobile?'closeDrawer();':''}setView('${n.v}')">
      <span class="ic">${n.ic}</span><span>${navT(n)}</span>${badge>0?`<span class="badge">${badge}</span>`:''}</button>`;
  }).join("");
}
function roleSwitch(){
  return `<div class="roleswitch"><select class="tenant-sel" onchange="setRole(this.value)" title="역할 전환(RBAC)">
    ${Object.entries(ROLES).map(([k,r])=>`<option value="${k}" ${S._role===k?'selected':''}>${r.ic} ${roleName(k)}</option>`).join("")}
  </select></div>`;
}
function langToggle(){
  return `<div class="langtog" title="${t("lang")}">
    <button class="${L()==='ko'?'on':''}" onclick="setLang('ko')">KO</button>
    <button class="${L()==='en'?'on':''}" onclick="setLang('en')">EN</button>
  </div>`;
}
function tenantSwitch(){
  if(S._role!=="broker") return "";
  return `<select class="tenant-sel" onchange="setTenant(this.value)" title="${t("tenant")}">
    <option value="all" ${S._tenant==='all'?'selected':''}>${t("all_companies")}</option>
    ${S.companies.map(c=>`<option value="${c.id}" ${S._tenant===c.id?'selected':''}>${c.name}</option>`).join("")}</select>`;
}
function bottomNav(active){
  const nav=navFor(); const main=nav.slice(0,4);
  return `<div class="bottomnav">
    ${main.map(n=>{const m=metrics();const b=n.v==="docs"?m.unfiled:(n.v==="refund"?m.unrefunded:0); return `<button class="${active===n.v?'on':''}" data-view="${n.v}" onclick="setView('${n.v}')"><span class="ic">${n.ic}</span>${navT(n).slice(0,6)}${b>0?`<span class="badge">${b}</span>`:''}</button>`;}).join("")}
    <button id="moreTab" class="${nav.slice(4).some(n=>n.v===active)?'on':''}" onclick="openDrawer()"><span class="ic">⋯</span>${L()==="en"?"More":"더보기"}</button>
  </div>`;
}
function openDrawer(){ document.getElementById("drawerRoot").innerHTML=`<div class="drawerbd" onclick="closeDrawer()"></div><div class="drawer" id="navDrawer"><div class="brand"><div class="logo">TR</div><b>트레이드릴레이</b></div><div class="navsec">${t("lang")}</div><div style="padding:0 8px 10px">${langToggle()}</div><div class="navsec">${t("role")} · ${t("tenant")}</div><div style="padding:0 8px 10px;display:flex;flex-direction:column;gap:8px">${roleSwitch()}${tenantSwitch()}</div><div class="navsec">${t("menu")}</div>${navItems(S._view,true)}</div>`; }
function closeDrawer(){ document.getElementById("drawerRoot").innerHTML=""; }

function viewTitle(){ const n=NAV_ALL.find(n=>n.v===S._view)||NAV_ALL[0]; return navT(n); }
function renderView(){
  const can=ROLES[S._role].can;
  if(!can.includes(S._view)) S._view=can[0];
  switch(S._view){
    case "clients": return viewClients();
    case "items": return viewItems();
    case "origin": return viewOrigin();
    case "scenario": return viewScenario();
    case "supply": return viewSupply();
    case "profit": return viewProfit();
    case "docs": return viewDocs();
    case "filing": return viewFiling();
    case "refund": return viewRefund();
    case "forward": return viewForward();
    case "trade_fin": return viewTradeFin();
    case "buyer": return viewBuyer();
    case "postaudit": return viewPostaudit();
    case "data": return viewData();
    default: return viewDashboard();
  }
}
function render(){
  document.getElementById("root").innerHTML = `
  <div class="app">
    <aside class="sidebar" id="navDesktop">
      <div class="brand"><div class="logo">TR</div><b>트레이드릴레이</b></div>
      <div style="padding:0 8px 6px">${langToggle()}</div>

      ${S._role==="broker"?`<div class="navsec">${t("tenant")}</div><div style="padding:0 8px 6px">${tenantSwitch()}</div>`:''}

  </div>
  ${bottomNav(S._view)}`;
}
